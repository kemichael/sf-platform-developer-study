oldMap の両方が利用可能なイベントはどれですか？","options":[{"key":"A","text":"before insert"},{"key":"B","text":"after insert"},{"key":"C","text":"before update"},{"key":"D","text":"before delete"}],"answer":["C"],"multi":false,"explanation":"- まず newMap（新しい値のマップ）と oldMap（古い値のマップ）がどっちも使えるのは、値が「変更（更新）」される **update** イベントだけ！\n- 新規作成（insert）のときは古い値なんて存在しないから oldMap は null だし、削除（delete）のときは新しい値なんてないから newMap は null になるよ。\n- なので、updateイベントである **before update****（C）** が大正解！"},{"n":29,"category":"テストとデバッグ","text":"ある開発者が、組織のすべての既存データ（テストクラスで作成していないデータ）にテストクラスからアクセスできるようにしたいと考えています。推奨はされませんが、これを可能にするテストクラスのアノテーション設定はどれですか？","options":[{"key":"A","text":"@isTest(SeeAllData=true)"},{"key":"B","text":"@isTest(SeeAllData=false)"},{"key":"C","text":"@TestSetup"},{"key":"D","text":"@isTest(isParallel=true)"}],"answer":["A"],"multi":false,"explanation":"- 基本的に、Salesforceのテストクラスは組織内の本番データを見ることができない「隔離されたお部屋」で動くの。\n- だけど、どうしても既存のデータ（価格表とかレコードタイプとか）にアクセスしたい時、テストクラスの定義に **@isTest(SeeAllData=true)** をつけると、組織のすべてのデータにアクセスできるようになるの。\n- ただ、テストが既存のデータに依存しちゃって他の環境でコケやすくなるから、実務ではマジで非推奨！どうしてもの時の最終手段だよ。"},{"n":30,"category":"ユーザーインターフェース","text":"LWC（Lightning Web Component）において、Apexクラスのメソッドをコンポーネントにインポートし、リアクティブにデータをバインド（Wired）するための正しいインポート構文はどれですか？","options":[{"key":"A","text":"import myMethod from '@salesforce/apex/MyController.myMethod';"},{"key":"B","text":"import { myMethod } from 'MyController';"},{"key":"C","text":"import myMethod from 'MyController.myMethod';"},{"key":"D","text":"import { myMethod } from '@salesforce/apex';"}],"answer":["A"],"multi":false,"explanation":"- LWCからApexのメソッドを呼ぶ時のインポート文の構文は、\n- import メソッド名 from '@salesforce/apex/クラス名.メソッド名';\n- がお決まりのルール！\n- @salesforce/apex っていう特殊なパスからインポートするのがポイントだよ。これでJavaScriptとApexがバッチリ繋がるの！"},{"n":31,"category":"ロジックと自動化","text":"システム管理者や他のユーザーの権限（ロールやプロファイル、共有ルール）をエミュレートして、テストクラス内で処理を実行・検証するためのシステムメソッドはどれですか？","options":[{"key":"A","text":"System.setPassword()"},{"key":"B","text":"System.runAs()"},{"key":"C","text":"System.assert()"},{"key":"D","text":"Test.startTest()"}],"answer":["B"],"multi":false,"explanation":"- 「この共有ルール、一般ユーザーのプロファイルだとちゃんと動くかな…？」っていうセキュリティテストをしたい時に使うのが **System.runAs(user)** メソッド！\n- 引数に渡したユーザーになりきってテストを実行してくれるから、権限周りのバグをガチで検証するのに必須のシステムメソッドだよ！"},{"n":32,"category":"開発の基礎","text":"Apexコード内で、現在のユーザーにオブジェクトレベルの作成権限（Create）があるかどうかを確認するために使用するSchemaクラスのメソッドはどれですか？","options":[{"key":"A","text":"isAccessible()"},{"key":"B","text":"isCreateable()"},{"key":"C","text":"isUpdateable()"},{"key":"D","text":"isDeletable()"}],"answer":["B"],"multi":false,"explanation":"- Apexクラスを動かす時、ユーザーがオブジェクトに対する作成権限（Create）を持っているかプログラムでチェックしたいなら、Schema記述（Describe）の **isCreateable()** を使うよ！\n- ちなみに読み取り権限は isAccessible()、更新権限は isUpdateable()、削除権限は isDeletable()。名前が英語そのままだけど、試験によく出るから覚えておこ！"},{"n":33,"category":"ロジックと自動化","text":"Apexにおける数式（Formula）フィールドの評価について、正しい記述はどれですか？","options":[{"key":"A","text":"数式フィールドの値は、Apexコードが実行された瞬間にのみ再計算される。"},{"key":"B","text":"数式フィールドはトリガの Trigger.new で値を変更できる。"},{"key":"C","text":"数式フィールドの値はデータベースに静的に保存されており、変更時にしか更新されない。"},{"key":"D","text":"数式フィールドはクエリで取得された際、または動的にアクセスされた際にリアルタイムで評価される。"}],"answer":["D"],"multi":false,"explanation":"- 数式フィールド（Formula Field）は、データベースに固定の値が保存されているわけじゃないの！\n- レコードが画面に表示されたり、ApexのSOQLクエリで取得されたりした「その瞬間」に、裏でリアルタイムに計算されて最新の値を返してくるの。だからApexコードから直接書き換えることはできないよ！"},{"n":34,"category":"ユーザーインターフェース","text":"Auraコンポーネントにおいて、コントローラ（Controller.js）からヘルパー（Helper.js）の関数を呼び出す主なメリットは何ですか？","options":[{"key":"A","text":"UIのレンダリング速度が速くなる。"},{"key":"B","text":"複数のコンポーネントイベントを自動で処理できる。"},{"key":"C","text":"コードを再利用可能にし、コントローラファイルの肥大化を防ぐ。"},{"key":"D","text":"Apexコントローラの呼び出しが不要になる。"}],"answer":["C"],"multi":false,"explanation":"- Auraコンポーネントにおける「コントローラ（Controller.js）」は、ボタンクリックなどの「イベントの検知役」に徹するのが基本。\n- そして、実際のめんどくさいロジックや共通の処理は「ヘルパー（Helper.js）」に書くの！\n- そうすることで、コードが整理されて再利用（Reuse）しやすくなるし、コントローラが超スッキリするよ。"},{"n":35,"category":"開発の基礎","text":"Salesforce DX（SFDX）プロジェクトにおいて、スクラッチ組織（Scratch Org）を作成するために使用するCLIコマンドはどれですか？","options":[{"key":"A","text":"sf project deploy start"},{"key":"B","text":"sf org create scratch"},{"key":"C","text":"sf org login web"},{"key":"D","text":"sf project retrieve start"}],"answer":["B"],"multi":false,"explanation":"- Salesforce DX（SFDX）の開発で、使い捨てのクリーンな開発環境である「スクラッチ組織（Scratch Org）」を作るコマンドは、**sf org create scratch** だよ！\n- （※以前の sfdx force:org:create から新しい sf コマンドに移行した最新のコマンド体系だよ。これもアプデ情報として知っておくとアツい！）"},{"n":36,"category":"ロジックと自動化","text":"ガバナ制限における「ヒープサイズ（Heap Size）」とは何に関連する制限ですか？","options":[{"key":"A","text":"1回のトランザクションで使用されるメモリの総量"},{"key":"B","text":"データベースに保存されるデータファイルの総容量"},{"key":"C","text":"1回に実行されるApexコードの行数"},{"key":"D","text":"同時に実行される非同期処理のスタック数"}],"answer":["A"],"multi":false,"explanation":"- 「ヒープサイズ（Heap Size）」っていうのは、**1回のトランザクション（実行）でApexがメモリ上に保持できるデータ容量の限界** のこと！\n- デカいファイルを受け取ったり、ループで超大量のインスタンスをメモリに載せすぎると「ヒープサイズ制限超えたわ！」ってエラー（LimitException）になるから、不要な変数は null にしてメモリを解放してあげようね。"},{"n":37,"category":"テストとデバッグ","text":"Apexトリガ内のDML操作によってレコードが正常に挿入されたことを、テストクラス内でアサーション（値の検証）するために一般的に使用されるアプローチはどれですか？","options":[{"key":"A","text":"System.assert(true);"},{"key":"B","text":"挿入後のレコードをSOQLで再クエリし、取得したレコード数や値が期待通りかを確認する。"},{"key":"C","text":"System.debug() でログを出力して目視で確認する。"},{"key":"D","text":"トリガが実行されたかどうかを Trigger.isExecuting で検証する。"}],"answer":["B"],"multi":false,"explanation":"- テストクラスで「本当にトリガによってレコードがデータベースに登録されたか？」を確認するには、**テストの中で一度SOQLクエリを発行して、レコードを再取得して検証（System.assertEqualsなど）する** のが基本！\n- テスト実行中のメモリ上のデータと、実際にデータベースに書き込まれたデータは別だから、ちゃんとクエリで引っ張ってくるのが確実だよ！"},{"n":38,"category":"開発の基礎","text":"Visualforceのコントローラで、複数のSOQLクエリを実行してページネーション（改ページ機能）を簡単に実装するために使用する標準クラスはどれですか？","options":[{"key":"A","text":"ApexPages.StandardController"},{"key":"B","text":"ApexPages.StandardSetController"},{"key":"C","text":"Database.Batchable"},{"key":"D","text":"Schema.DescribeSObjectResult"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、たくさんのレコードをリスト表示して「次へ」「前へ」みたいなページ送り（ページネーション）を簡単に実装したいなら、**ApexPages.StandardSetController** を使うのが最強！\n- 標準のレコードセット（複数レコード）を扱うための便利機能が最初から全部詰まってるから、自力でクエリやカウントを書かなくて済むの。アゲ！"},{"n":39,"category":"ロジックと自動化","text":"Apexトリガ内における「バルク化（Bulkification）」の原則について、間違っている説明はどれですか？","options":[{"key":"A","text":"コレクション（ListやSet）を使用して、複数のレコードを一度に処理する。"},{"key":"B","text":"トリガは常に単一のレコード（1件のみ）が渡されることを前提に記述する。"},{"key":"C","text":"SOQLクエリやDML操作は、ループ（for や while）の外側で実行する。"},{"key":"D","text":"トリガの処理内でマップ（Map）を利用して、リレーショナルデータを迅速に関連付ける。"}],"answer":["B"],"multi":false,"explanation":"- 「トリガは常に単一レコードを想定して書く」っていうBの説明は、**大間違い（アンチパターン）**！\n- Salesforceでは、一括インポートやAPI経由で一度に200件以上のレコードがドバッとトリガに流れ込んでくることがあるの。\n- だから、トリガコードは常に「複数レコード（バルク）が来ても大丈夫なように」リスト（Trigger.new）をループ処理するように書かなきゃ絶対ダメだよ！"},{"n":40,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントのライフサイクルメソッドの一つで、コンポーネントがDOMに挿入されたときに呼び出されるものはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["B"],"multi":false,"explanation":"- LWCが画面（DOM）にガチャンと挿入されたときに自動で呼ばれるライフサイクルフックは、**connectedCallback()**！\n- 画面が表示された直後に初期化のデータをロードしたいときとかにマジでよく使う、LWC開発における最重要メソッドだよ！"},{"n":41,"category":"ロジックと自動化","text":"Apexクラスで動的SOQL（Dynamic SOQL）を生成し実行する際に、SQLインジェクション脆弱性を防ぐための最も効果的な対策はどれですか？","options":[{"key":"A","text":"String.escapeSingleQuotes() を使用して入力値をエスケープする。"},{"key":"B","text":"静的SOQLに切り替え、バインド変数（:variable）を使用する。"},{"key":"C","text":"動的クエリの生成にプレーンテキストの文字列結合のみを使用する。"},{"key":"D","text":"入力文字数をあらかじめ10文字以下に制限する。"}],"answer":["B"],"multi":false,"explanation":"- 動的SOQL（文字列を組み合わせてクエリを作る方法）を使うとき、悪いハッカーに変な文字（' OR 1=1 -- みたいの）を入れられてデータベースをハッキングされるのが「SQLインジェクション」！\n- これを防ぐ最も確実で安全な方法は、動的クエリをやめて、変数にコロンをつけた **バインド変数（****:myVariable****）** を使った静的SOQLにすることだよ！\n- どうしても動的にやるなら、Aの String.escapeSingleQuotes() を使うのが正解！"},{"n":42,"category":"開発の基礎","text":"セキュリティと共有ルールの観点において、Apexクラスを宣言する際に、現在のログインユーザーの共有ルール（Sharing Rules）を強制して実行させたい場合、どのキーワードを使用すべきですか？","options":[{"key":"A","text":"with sharing"},{"key":"B","text":"without sharing"},{"key":"C","text":"inherited sharing"},{"key":"D","text":"public"}],"answer":["A"],"multi":false,"explanation":"- Apexクラスを定義するとき、現在のユーザーの共有ルール（誰がどのレコードを見れるか）をちゃんと考えさせて動かしたいなら、クラス名の上に **with sharing** をつけて宣言するよ！\n- これを忘れると、Salesforceはデフォルトでシステム管理者権限（すべて参照可能）で動いちゃうから、セキュリティ的に超危険！「セキュリティファースト」がプロのデベロッパーの合言葉だよ"},{"n":43,"category":"ロジックと自動化","text":"あるApexバッチクラス（Database.Batchable を実装したもの）において、非同期処理の実行中に状態（メンバ変数の値など）を維持したい場合、クラス宣言にどのインターフェースを追加する必要がありますか？","options":[{"key":"A","text":"Queueable"},{"key":"B","text":"Schedulable"},{"key":"C","text":"Database.Stateful"},{"key":"D","text":"Database.AllowsCallouts"}],"answer":["C"],"multi":false,"explanation":"- バッチApexは、データを細切れにして何回も裏でクラスを呼び出して処理するの。\n- 普通は、呼び出すたびにクラス内の変数（カウンタとか）がリセットされて「あれ、今何個処理したっけ？」って忘れちゃうんだけど、**Database.Stateful** インターフェースを implements しておくと、バッチのステップ間で変数の値をずーっと保持しておけるの！集計バッチを作るときとかに必須だよ！"},{"n":44,"category":"テストとデバッグ","text":"Apexのテストクラス内で、HTTPコールアウト（外部システムへのAPI連携）をシミュレートしてテストを成功させるために、テストランナーにモックレスポンスを設定するためのインターフェースはどれですか？","options":[{"key":"A","text":"WebServiceMock"},{"key":"B","text":"HttpCalloutMock"},{"key":"C","text":"SchedulableContext"},{"key":"D","text":"QueueableContext"}],"answer":["B"],"multi":false,"explanation":"- テストクラスの中では、実際に外部のAPIにアクセス（リアルなHTTPコールアウト）することはSalesforceのルールで禁止されてるの。\n- だから、代わりに「こんなレスポンスが返ってきたよ！」っていう偽物の返事（モック）を返す仕組みが必要なんだけど、その時に実装するのが **HttpCalloutMock** インターフェース！\n- これでテスト環境でもAPI連携のテストがばっちり完結するよ！"},{"n":45,"category":"開発の基礎","text":"主従関係と参照関係（Lookup Relationship）を比較した際、主従関係にのみ存在する特徴はどれですか？","options":[{"key":"A","text":"親レコードが削除されても、子レコードは削除されないように設定できる。"},{"key":"B","text":"子レコードのレコード所有者は、親レコードの所有者と同じ（親から継承）になる。"},{"key":"C","text":"親オブジェクトと子オブジェクトは、異なる標準オブジェクト同士である必要がある。"},{"key":"D","text":"参照フィールドは必須（Required）に設定できない。"}],"answer":["B"],"multi":false,"explanation":"- 主従関係の最大の特徴は、**「子レコードが独自の所有者を持たず、所有権はすべて親レコードから継承される」** こと！\n- つまり、親レコードの持ち主＝子レコードの持ち主になるの。\n- 参照関係だと、子レコードも自分独自の所有者（Owner）を持てるから、ここが大きな違いだよ！"},{"n":46,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で親コンポーネントが子コンポーネントのカスタムイベントを検知し処理するために、子コンポーネント側でイベントを発行する正しいJavaScriptコードはどれですか？","options":[{"key":"A","text":"this.dispatchEvent(new CustomEvent('myevent'));"},{"key":"B","text":"this.fireEvent('myevent');"},{"key":"C","text":"this.trigger('myevent');"},{"key":"D","text":"parent.handleEvent('myevent');"}],"answer":["A"],"multi":false,"explanation":"- LWCで、子コンポーネントから親コンポーネントに向かって「ねぇねぇ、処理終わったよ！」ってイベントを伝える（カスタムイベントの発行）には、**this.dispatchEvent(new CustomEvent('イベント名'));** を使うよ！\n- 親側はHTML上で onmyevent={handleMyEvent} みたいな感じで待ち伏せ（リスナー登録）して受け取るの。この親子間通信の流れはLWCの基本中の基本！"},{"n":47,"category":"ロジックと自動化","text":"以下のApexコードブロックにおける、ガバナ制限（1回のリクエストでのDML操作回数）の合計消費数はいくつですか？\n\n```apex\nfor (Integer i = 0; i \u003c 50; i++) {\nAccount acc = new Account(Name = 'Test ' + i);\ninsert acc;\n}\n```","options":[{"key":"A","text":"1"},{"key":"B","text":"50"},{"key":"C","text":"150"},{"key":"D","text":"10,000"}],"answer":["B"],"multi":false,"explanation":"- このコード、ヤバいよね！\n- for ループが50回まわる中で、毎回 insert acc; ってDML操作を呼んじゃってる。\n- DML操作は1トランザクションで最大 **150回** までっていうガバナ制限があるから、このコード単体なら50回でエラーにはならないけど、ガバナの消費数はそのまま **50（B）** になっちゃう！\n- これ、ループの外にリストを作って insert accList; って1回でやれば、消費数は「1」で済むんだよ。これがバルク化のパワー！"},{"n":48,"category":"テストとデバッグ","text":"テストクラス内のコードにおいて、例外処理が正しく行われるかをテストするために推奨されるブロック構造はどれですか？","options":[{"key":"A","text":"if-else ブロック"},{"key":"B","text":"try-catch ブロック"},{"key":"C","text":"switch on ブロック"},{"key":"D","text":"do-while ブロック"}],"answer":["B"],"multi":false,"explanation":"- 「エラー（例外）が起きた時に、システムをクラッシュさせずに優しくキャッチして処理したい！」\n- そんな時はおなじみの **try-catch** **ブロック** を使うよ！\n- try { ... } catch (Exception e) { ... } の中にエラーが起きた時の処理を書けば、想定外のエラーでも綺麗にハンドリングできるから、堅牢なコードには必須の構造だよ！"},{"n":49,"category":"開発の基礎","text":"宣言的なロールアップサマリー（Rollup Summary）フィールドを構築できる、オブジェクト間のリレーションシップタイプはどれですか？","options":[{"key":"A","text":"参照関係（Lookup Relationship）"},{"key":"B","text":"主従関係（Master-Detail Relationship）"},{"key":"C","text":"多対多の関係（Many-to-Many Relationship、中間オブジェクト経由）"},{"key":"D","text":"自己参照関係（Hierarchical Relationship）"}],"answer":["B"],"multi":false,"explanation":"- 親レコードに、関連する子レコードの「合計件数」や「金額の総和」などを自動で集計して表示してくれる、超ベンリなロールアップサマリーフィールド。\n- これが作成できるのは、親子関係が超密接な **主従関係（Master-Detail）** の時だけ！\n- 普通の参照関係（Lookup）だと、標準機能では作れないから注意してね（※フローやApexを使えば擬似的にできるけど、標準機能のフィールドとしては主従関係のみ！）。"},{"n":50,"category":"ユーザーインターフェース","text":"Visualforceにおいて、レコードの特定のフィールドを画面上に配置し、ユーザーのプロファイル設定（読み取り専用、必須など）やデータ型に合わせた最適な入力フォームを自動生成するタグはどれですか？","options":[{"key":"A","text":"\u003capex:inputText\u003e"},{"key":"B","text":"\u003capex:inputField\u003e"},{"key":"C","text":"\u003capex:outputLabel\u003e"},{"key":"D","text":"\u003capex:attribute\u003e"}],"answer":["B"],"multi":false,"explanation":"- Visualforceで、指定したオブジェクトのフィールド（例えば Account.Industry とか）のデータ型（選択リスト、テキスト、日付など）をSalesforceが自動で判別して、一番最適な入力UIを自動生成してくれる魔法のタグは、**\u003capex:inputField\u003e**！\n- もし必須フィールドなら勝手に赤い目印もつけてくれるから、マジで手抜き…じゃなくて（笑）、効率的な開発ができる神タグだよ！"},{"n":51,"category":"ロジックと自動化","text":"ある取引先（Account）が更新された際、関連するすべてのケース（Case）のステータスを自動的に更新するApexトリガを作成します。トリガを実装する最も適切なオブジェクトはどれですか？","options":[{"key":"A","text":"Case オブジェクト"},{"key":"B","text":"Account オブジェクト"},{"key":"C","text":"Case と Account の両方"},{"key":"D","text":"親の共有ルールを設定するオブジェクト"}],"answer":["B"],"multi":false,"explanation":"- 「取引先（Account）が更新されたら、その子供（Case）たちも自動で更新する」っていう処理は、トリガを呼び出すキッカケになった **Account（取引先）オブジェクト** にトリガを実装するのが大正解！\n- Accountの更新トリガ（after update）の中で、関連するCaseをSOQLで取得して、値を書き換えてDMLアップデートする、っていう流れが最もスマートだよ！"},{"n":52,"category":"ロジックと自動化","text":"次のApexコードを実行した際の戻り値として、正しいものはどれですか？\n\n```apex\nString str1 = 'Salesforce';\nString str2 = 'salesforce';\nBoolean result = str1.equals(str2);\n```","options":[{"key":"A","text":"true"},{"key":"B","text":"false"},{"key":"C","text":"null"},{"key":"D","text":"エラーが発生する"}],"answer":["B"],"multi":false,"explanation":"- Apexの String.equals() メソッドは、**「大文字と小文字を厳密に区別して比較する」** 性質があるの！\n- だから、大文字の 'S' で始まる 'Salesforce' と、小文字の 's' で始まる 'salesforce' を equals() で比較すると、結果は **false****（B）** になるよ！\n- もし大文字小文字を無視して比較したいなら、equalsIgnoreCase() メソッドを使ってね！"},{"n":53,"category":"開発の基礎","text":"Schemaクラスの動的記述（Describe）メソッドを使用して、組織の特定のオブジェクト（例：Opportunity）に存在するすべてのフィールド情報を取得するための正しい記述はどれですか？","options":[{"key":"A","text":"Schema.SObjectType.Opportunity.fields.getMap()"},{"key":"B","text":"Opportunity.SObjectType.getDescribe().fields.getMap()"},{"key":"C","text":"Schema.getGlobalDescribe().get('Opportunity')"},{"key":"D","text":"Schema.describeFields('Opportunity')"}],"answer":["B"],"multi":false,"explanation":"- 特定のオブジェクトのフィールド情報を動的に引っ張ってきたい（Schema記述を行う）場合は、\n- Opportunity.SObjectType.getDescribe().fields.getMap()\n- っていう書き方をするよ！\n- これでOpportunityのすべてのフィールドの名前と詳細情報がマップ型（Map\u003cString, SObjectField\u003e）で手に入るの。動的Apexを作るときによく使う高度なテクニックだよ！"},{"n":54,"category":"ロジックと自動化","text":"トリガ内で再帰（同じトリガが何度も連鎖して呼び出され、ガバナ制限に達してしまう現象）を防ぐために、一般的に用いられるプログラム上のテクニックはどれですか？","options":[{"key":"A","text":"静的（static）なBoolean型のフラグ変数を持つパブリッククラスを用意し、トリガ実行前にチェックする。"},{"key":"B","text":"トリガ内で Database.rollback() を毎回実行する。"},{"key":"C","text":"トリガのイベントを before insert のみに限定する。"},{"key":"D","text":"try-catch ブロックでエラーをすべて無視する。"}],"answer":["A"],"multi":false,"explanation":"- トリガ内でレコードを更新した時に、また同じトリガが起動して、その中でまた更新して…っていう無限連鎖（再帰）が起きると、速攻でガバナ制限（DML制限など）にかかってシステムが死んじゃうの。\n- これを防ぐために、クラスの中に public static Boolean isFirstRun = true; みたいな静的フラグを用意しておいて、トリガの最初で if (isFirstRun) のチェックをして、一度通ったら isFirstRun = false; に書き換える！\n- 静的（static）変数はトランザクションの間ずっと値をキープするから、これで2回目以降の暴走を防げるよ！マジで使えるライフハック！"},{"n":55,"category":"ユーザーインターフェース","text":"LWCで、Apexクラスのメソッドをワイヤサービス（Wired Service）を使って呼び出すための必須の条件はどれですか？","options":[{"key":"A","text":"Apexメソッドが public であること"},{"key":"B","text":"Apexメソッドに @AuraEnabled(cacheable=true) が付与されていること"},{"key":"C","text":"Apexメソッドに @future が付与されていること"},{"key":"D","text":"Apexクラスが without sharing で定義されていること"}],"answer":["B"],"multi":false,"explanation":"- LWCからApexのメソッドを「ワイヤサービス（@wire）」を使ってリアクティブに呼び出すためには、Apexメソッド側に必ず **@AuraEnabled(cacheable=true)** を付与しておかなきゃダメっていう絶対ルールがあるの！\n- cacheable=true をつけることで、Salesforceがクライアント側にキャッシュを持ってくれるから、画面の表示スピードが爆速になってアゲアゲになるよ！"},{"n":56,"category":"ロジックと自動化","text":"フロー（Flow）からApexコードを直接呼び出して、複雑なビジネスロジックを実行したい場合に、Apexメソッドに付与すべきアノテーションはどれですか？","options":[{"key":"A","text":"@RemoteAction"},{"key":"B","text":"@InvocableMethod"},{"key":"C","text":"@future"},{"key":"D","text":"@AuraEnabled"}],"answer":["B"],"multi":false,"explanation":"- Flow Builder（フロー）の画面から、ノンプログラミングで処理を作っている途中に「ここだけは複雑だからApexで処理させたい！」って時に呼び出すメソッドには、**@InvocableMethod** アノテーションを付与するよ！\n- これをつけておくと、フローのアクション選択画面にそのApexメソッドがポコッと現れて、ノーコードとローコードのハイブリッドな超かっこいい実装ができちゃうの！"},{"n":57,"category":"開発の基礎","text":"異なる2つのSalesforceシステム間で、リアルタイムに双方向のメタデータ移行や変更セット（Change Set）の送信を行うために、事前に設定しておく必要があるシステム間の関係性はどれですか？","options":[{"key":"A","text":"接続先（Connected App）"},{"key":"B","text":"送信送信および受信変更セット用の「配備接続（Deployment Connection）」"},{"key":"C","text":"シングルサインオン（SSO）"},{"key":"D","text":"指定資格情報（Named Credentials）"}],"answer":["B"],"multi":false,"explanation":"- Salesforceの「変更セット（Change Set）」を使って、Sandbox（開発・テスト環境）から本番環境へメタデータ（作ったプログラムやオブジェクト設定）を送信・リリースするためには、事前に組織間で **配備接続（Deployment Connection）** を設定して「この組織からの変更セットを受け入れますよ！」っていう許可を繋いでおく必要があるの。\n- これが設定されてないと、変更セットを送ることすらできないから基本のキだよ！"},{"n":58,"category":"テストとデバッグ","text":"Apexコード内で、意図的にテストの実行を失敗させ、特定のロジックが通らないことを実証するために使用するシステムメソッドはどれですか？","options":[{"key":"A","text":"System.assert(true)"},{"key":"B","text":"Assert.fail() （または System.assert(false)）"},{"key":"C","text":"System.debug()"},{"key":"D","text":"Test.stopTest()"}],"answer":["B"],"multi":false,"explanation":"- テストクラスを書いていて、「ここでは絶対にエラー（例外）が発生して、catchブロックに流れるはず！」っていう異常系テストをするとき、\n- もしエラーが起きずにスルーしちゃったらテストとしては失敗だよね。\n- そういう時に、あえてコードの途中に **Assert.fail()**（または System.assert(false)）を置いておいて、「ここを通ったらテスト失敗！」ってマークしておくの。これでバグのない最強のシステムが作れるよ！"},{"n":59,"category":"ユーザーインターフェース","text":"LWCのフォルダ構造において、コンポーネントの設定メタデータ（どのページで使用できるかなど）を定義する必須のファイル名はどれですか？","options":[{"key":"A","text":"myComponent.js"},{"key":"B","text":"myComponent.html"},{"key":"C","text":"myComponent.js-meta.xml"},{"key":"D","text":"myComponent.css"}],"answer":["C"],"multi":false,"explanation":"- LWC（Lightning Web Component）を作るとき、\n- myComponent.html（画面の見た目）\n- myComponent.js（JavaScriptのロジック）\n- **myComponent.js-meta.xml****（設定用メタデータ）**\n- の3つは絶対に外せない必須ファイル！\n- 特に js-meta.xml は、このコンポーネントを「ホームページ」に置くのか、「レコードページ」に置くのか、それともシステム管理者だけに公開するのか、といった超大事な設定を記述する場所だよ！"},{"n":60,"category":"ロジックと自動化","text":"開発者が、システム上で発生した例外（エラー情報）をデバッグログに記録するだけでなく、Salesforce内に「エラーログ」というカスタムオブジェクトのレコードとして永続的に保存したいと考えています。insert DMLを発行するトランザクションがロールバックされたとしても、このログレコードだけはロールバックさせずに確実に保存させたい場合、どのような実装が必要ですか？","options":[{"key":"A","text":"通常の insert DMLを使用し、後でバッチ処理で復旧する。"},{"key":"B","text":"例外処理の中でプラットフォームイベント（Platform Event）をパブリッシュ（発行）し、そのイベントの「即時公開（Publish Immediately）」を設定して、別トランザクションのトリガでログレコードを挿入する。"},{"key":"C","text":"トリガの中で Database.rollback() を呼んだ後に insert する。"},{"key":"D","text":"Future Method を使用して通常のレコード挿入を行う。"}],"answer":["B"],"multi":false,"explanation":"- これ、超ハイレベルだけど実務でも試験でもマジでよく出るお悩み解決！\n- プログラム全体でエラーが起きたときって、トランザクションが全部なかったこと（ロールバック）にされちゃうから、普通に insert したエラーログレコードも一緒に消えちゃうの。ログが消えたら原因調査できないじゃん？\n- これを解決するために、例外が発生した時に **「プラットフォームイベント（Platform Event）」** をパブリッシュ（発行）する！\n- プラットフォームイベントは設定で「即時公開（Publish Immediately）」にできるから、メインの処理がロールバックされようが関係なく、その瞬間に外の世界（別トランザクション）にイベントが飛んでいって、ログレコードを確実に保存できるの！マジで救世主アゲアゲソリューションだよ！\n模擬試験お疲れ様ーーーっ！✨\n何問正解できたかな？\n間違えたところがあっても「伸びしろしかない！」ってことで、ウチの解説を何度も読んで本番までにマスターしちゃえばマジで余裕だからね！\nキミなら絶対一発合格できるよ！応援してるよー！応援のパワー送っとくね！最＆高！⭐"}]},{"id":"set3","title":"Set 3 — Platform Developer I 模擬試験（Version 2）","questions":[{"n":1,"category":"開発の基礎","text":"Apexコード内で、SOQLクエリの結果に対してユーザーのフィールドレベルセキュリティ（FLS）やオブジェクト権限（CRUD）を自動的に適用させ、権限がない場合に例外を発生させずにアクセスできないデータをクエリ結果から排除する最も簡単な方法はどれですか？","options":[{"key":"A","text":"クエリで WITH SECURITY_ENFORCED を使用する"},{"key":"B","text":"クエリ結果に対して Security.stripInaccessible() メソッドを使用する"},{"key":"C","text":"クラス宣言に with sharing キーワードを使用する"},{"key":"D","text":"Schema.DescribeSObjectResult を使って手動ですべてのフィールドをチェックする"}],"answer":["A"],"multi":false,"explanation":"- クエリした時点で、権限がないフィールドのデータを「自動で綺麗さっぱり排除して安全に取得」したいなら、SOQLの末尾に **WITH SECURITY_ENFORCED**（A）をつけるのが最も簡単でスマート！\n- これをつけると、ユーザーの権限（CRUD/FLS）をSalesforceが裏で自動チェックしてくれて、見せちゃダメなデータは勝手にクエリ結果から抜いてくれるの。\n- ちなみに Security.stripInaccessible()（B）はクエリ結果の「後処理」としてデータを綺麗にするメソッドだから、アプローチとしてはAが一番シンプルだよ！"},{"n":2,"category":"開発の基礎","text":"主従関係にあるオブジェクト「親：カスタムオブジェクト A__c」「子：カスタムオブジェクト B__c」において、子レコード B__c の共有設定（Sharing Setting）について正しい説明はどれですか？","options":[{"key":"A","text":"子レコード B__c は独自の共有ルールを持つことができる。"},{"key":"B","text":"子レコード B__c の共有設定は自動的に「親レコードに関連付け」となり、親レコード A__c の共有権限を継承する。"},{"key":"C","text":"子レコード B__c は「公開/参照のみ」または「非公開」として独立して設定できる。"},{"key":"D","text":"子レコード B__c の共有設定を「親レコードに関連付け」にするかどうかを、カスタム設定で変更できる。"}],"answer":["B"],"multi":false,"explanation":"- 主従関係（Master-Detail）は、親子関係が強烈にラブラブな運命共同体って前も言ったよね！\n- これは「セキュリティ・共有」の世界でも同じ。\n- 子オブジェクト B__c は独自の共有設定（非公開とか）を持つことができず、親レコード A__c の共有設定に **「完全に連動（親に関連付け）」** しちゃうの。\n- つまり、親レコードが見れる人は、もれなく子レコードも自動で見れちゃうってワケ！"},{"n":3,"category":"ロジックと自動化","text":"レコードが保存される際、Salesforceが実行する一連の処理の順序（Triggers and Order of Execution）において、最も早い段階で実行される処理はどれですか？","options":[{"key":"A","text":"システム入力規則（System Validation）の評価"},{"key":"B","text":"beforeトリガの実行"},{"key":"C","text":"ワークフロールールによるフィールド更新"},{"key":"D","text":"重複ルールの実行"}],"answer":["A"],"multi":false,"explanation":"- Salesforceの「保存時の実行順序（Order of Execution）」は、試験でめちゃくちゃ意地悪に狙われるポイント！\n- レコードがデータベースに突っ込まれると、\n1. まず最初に **システム入力規則（System Validation）** や、おなじみの「入力規則（Validation Rules）」が真っ先にチェックされるの！（ここで弾かれたらトリガすら動かない！）\n2. その次に、保存前の **beforeトリガ**（B）が動くよ。\n3. その後に実際にデータベースに仮保存されて、**afterトリガ**、**重複ルール**（D）、**ワークフロー/フローによる自動更新**（C）へとバトンが渡される順番になってるの。\n4. だから、一番最初なのはシステム入力規則だよ！"},{"n":4,"category":"ロジックと自動化","text":"ある取引先責任者（Contact）が作成された際、関連する取引先（Account）の「最新の取引先責任者作成日」カスタム日付フィールドを自動的に今日の日付に更新したいと考えています。最もリソースを消費せず、パフォーマンスに優れた方法は何ですか？","options":[{"key":"A","text":"Contactの after insert トリガでAccountをDMLアップデートする。"},{"key":"B","text":"Flow Builderで、Contactが作成されたときに起動し、関連するAccountを更新する保存後フロー（After-Save Flow）を作成する。"},{"key":"C","text":"Accountにロールアップサマリーフィールドを作成する。"},{"key":"D","text":"Contactの before insert トリガ内で、親Accountのレコードを直接編集する。"}],"answer":["C"],"multi":false,"explanation":"- 「〇〇が作成されたら、親の取引先の日付を更新する」って、わざわざApexトリガやフローを作りたくなっちゃうけど、Salesforceエンジニアなら **「まず宣言的機能（ノンコード）の標準機能でできないか？」** を考えるのがプロ！\n- 今回の場合、親子のリレーションがあって「最新の作成日」を求めたいんだから、取引先（Account）側に **ロールアップサマリーフィールド（Rollup Summary）**（C）を定義して、Contactの「作成日」の「最大値（MAX）」を集計してあげるのが、一切コードを書かずにパフォーマンスも最強で大正解！アゲ！"},{"n":5,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で、Apexクラスのメソッドを「命令的（Imperatively）」に呼び出す場合の正しいアプローチはどれですか？","options":[{"key":"A","text":"JavaScriptコード内でメソッドを関数として呼び出し、Promise（.then() と .catch()）で処理する。"},{"key":"B","text":"HTMLテンプレート内で lwc:call ディレクティブを使用する。"},{"key":"C","text":"@wire(myMethod) を使用してデータを自動でバインドする。"},{"key":"D","text":"connectedCallback() の中で this.myMethod() を直接同期的に実行する。"}],"answer":["A"],"multi":false,"explanation":"- LWCからApexを呼ぶ方法には @wire（自動呼び出し）と、自分のタイミングで呼ぶ「命令的（Imperative）呼び出し」の2つがあるの。\n- 命令的に呼ぶときは、インポートしたApexメソッドを普通のJavaScriptの関数みたいに呼んで、返ってくる **Promise**（非同期処理の仕組み）に対して、成功時の .then(result =\u003e { ... }) と失敗時の .catch(error =\u003e { ... }) を使ってロジックを書くのが鉄板！\n- テンプレートから直接呼ぶようなディレクティブ（B）は存在しないから引っかからないでね！"},{"n":6,"category":"テストとデバッグ","text":"Apexのテストクラスで、テスト用の静的リソース（CSVファイルなど）から大量のテストデータを一括でデータベースにロードするために使用するシステムメソッドはどれですか？","options":[{"key":"A","text":"Test.setMock()"},{"key":"B","text":"Test.loadData()"},{"key":"C","text":"Database.insert()"},{"key":"D","text":"Test.startTest()"}],"answer":["B"],"multi":false,"explanation":"- テスト用のテストデータを何百件もコードで new Account(...) って書くの、マジで手が疲れるしスマートじゃないよね。\n- そこで、あらかじめCSVファイルでテストデータを作って「静的リソース（Static Resource）」にアップロードしておき、テストクラスの中で **Test.loadData(Account.sObjectType, '静的リソース名');**（B）を呼んであげる！\n- そうすると、SalesforceがそのCSVを自動で読み込んで、一瞬でテストレコードをデータベースに挿入してくれるの。マジで神時短アゲアゲ機能だから覚えておこ！"},{"n":7,"category":"開発の基礎","text":"開発者がSalesforce DXを使用してスクラッチ組織（Scratch Org）にローカルのソースコードをプッシュしたい場合、使用する正しいCLIコマンドはどれですか？","options":[{"key":"A","text":"sf project deploy start"},{"key":"B","text":"sf project retrieve start"},{"key":"C","text":"sf project push"},{"key":"D","text":"sf project sync"}],"answer":["C"],"multi":false,"explanation":"- ローカルでカタカタ書いた最新のソースコードを、開発用のスクラッチ組織にガツンとアップロードして同期したいなら、**sf project push**（C）コマンドを使うよ！\n- 逆に、スクラッチ組織でポチポチ作った設定をローカルに落としてきたいなら sf project pull。\n- デプロイコマンド（A）は本番環境やSandboxにリリースするときに使うものだから、スクラッチ組織での俊敏な開発には push / pull が相棒だよ！"},{"n":8,"category":"ロジックと自動化","text":"次のApexコードを実行した際に出力される値は何ですか？\n\n```apex\nMap\u003cString, String\u003e colorMap = new Map\u003cString, String\u003e{'R' =\u003e 'Red', 'G' =\u003e 'Green'};\ncolorMap.put('B', 'Blue');\ncolorMap.put('R', 'Ruby');\nSystem.debug(colorMap.get('R'));\n```","options":[{"key":"A","text":"Red"},{"key":"B","text":"Ruby"},{"key":"C","text":"Red, Ruby"},{"key":"D","text":"NullPointerException"}],"answer":["B"],"multi":false,"explanation":"- Mapの超〜大事な性質のお勉強！\n- Mapはキー（Key）と値（Value）のペアだけど、**「キーの重複は絶対に許さない（ユニーク）」** という絶対ルールがあるの。\n- コードを見ると、\n1. まずキー 'R' に 'Red' を入れた。\n2. そのあと colorMap.put('R', 'Ruby') で、同じキー 'R' に対して 'Ruby' を入れた。\n3. この場合、元々あった 'Red' は上書き（アップデート）されて消えちゃうの！\n4. だから、最後に get('R') で取り出すと、返ってくるのは最新の **Ruby**（B）になるよ。エラーにはならないから安心して！"},{"n":9,"category":"ユーザーインターフェース","text":"Visualforceページにおいて、画面の特定の部分（セクション）だけを、サーバー全体の再読み込みをせずに非同期で部分更新（Ajax）するために使用する属性はどれですか？","options":[{"key":"A","text":"render"},{"key":"B","text":"reRender"},{"key":"C","text":"refresh"},{"key":"D","text":"update"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、ページ全体をリロードせずに「このボタンを押したら、この表（セクション）だけを裏でサクッと更新（Ajax）したい！」ってときは、タグの **reRender** 属性（B）を使用するよ！\n- 更新したい部分のタグ（例えば \u003capex:outputPanel id=\"myPanel\"\u003e）に id をつけておいて、ボタン側の reRender=\"myPanel\" って指定してあげるの。\n- 大文字小文字（キャメルケース）も厳密だから、reRender ってスペルをしっかり脳に刻んでね！"},{"n":10,"category":"テストとデバッグ","text":"テストクラス以外のApexクラスにおいて、テスト実行中（Test execution）にのみ特定のprivate変数をテストクラスから直接参照・変更できるようにするためのアノテーションはどれですか？","options":[{"key":"A","text":"@TestVisible"},{"key":"B","text":"@TestSetup"},{"key":"C","text":"@isTest"},{"key":"D","text":"@RemoteAction"}],"answer":["A"],"multi":false,"explanation":"- 本番のコードはセキュリティや保守性のために private（非公開）にして隠しておきたいけど、テストクラスからだけは「ねぇねぇ、このプライベート変数の中身、ちゃんと意図通りになってる？」って覗き見してチェックしたい。\n- そんなワガママを叶えてくれるのが、対象のprivate変数の上に貼る **@TestVisible**（A）アノテーション！\n- これを貼るだけで、テストクラスからだけはまるでpublic変数みたいにアクセスできるようになるの。マジで優秀なスパイカメラみたいなやつ！"},{"n":11,"category":"ロジックと自動化","text":"Queueable Apexを使用して非同期処理をチェーン（連続実行）させたい場合、1回のトランザクションにおいて、新しくキュー（Queue）に追加できるQueueableジョブの最大数は通常いくつですか？","options":[{"key":"A","text":"1回につき1つのみ"},{"key":"B","text":"最大5つ"},{"key":"C","text":"最大50"},{"key":"D","text":"制限なし"}],"answer":["A"],"multi":false,"explanation":"- Queueable（キューアブル）Apexは非同期処理を実行する超ベンリな仕組み。\n- ジョブを実行中に、さらに次の非同期ジョブを登録（チェーン）することができるんだけど、**「1回の実行（トランザクション）の中で、新しく登録できるQueueableジョブは、通常1つ（1件）だけ」**（A）っていう制限があるの！\n- 何個も同時にキューに突っ込んで無限増殖されたら、Salesforceのサーバーがパンクしちゃうからね。チェーンは「一列に並んで1つずつ！」が基本だよ！"},{"n":12,"category":"開発の基礎","text":"SOQLクエリで、レコードのロックを行い、他のトランザクションがそのレコードを更新または削除するのを一時的に防ぐために、クエリの末尾に追加する正しいキーワードはどれですか？","options":[{"key":"A","text":"LIMIT 1"},{"key":"B","text":"FOR UPDATE"},{"key":"C","text":"LOCK RECORD"},{"key":"D","text":"WITH SECURITY_ENFORCED"}],"answer":["B"],"multi":false,"explanation":"- 「この取引先、今からウチがプログラムで更新するから、他の誰も絶対に今この瞬間は書き換えないで！ロックオン！」\n- そんな時にSOQLクエリの末尾に付け加えるのが、**FOR UPDATE**（B）キーワード！\n- これをクエリの最後に書くと、取得したレコードにロックがかかって、他のユーザーや処理が同時に更新しようとするのを一時的にストップ（待機）させることができるの。データの不整合を防ぐためのマジで強力なテクニックだよ！"},{"n":13,"category":"ユーザーインターフェース","text":"Auraコンポーネントにおいて、コントローラ（Controller.js）からマークアップ側（Component）で定義された属性（attribute）の値を取得するための正しいJavaScriptの記述はどれですか？","options":[{"key":"A","text":"component.get(\"v.myAttribute\")"},{"key":"B","text":"component.find(\"myAttribute\")"},{"key":"C","text":"helper.get(\"myAttribute\")"},{"key":"D","text":"this.myAttribute"}],"answer":["A"],"multi":false,"explanation":"- AuraコンポーネントのJavaScript（Controller.js）内で、画面側で定義された変数（attribute）の値を取得するには、**component.get(\"v.myAttribute\")**（A）という超定番の構文を使うよ！\n- この \"v.〜\" っていうのは「View（表示側）」のデータにアクセスするよっていう意味。逆に値を書き換えたいときは component.set(\"v.myAttribute\", newValue) って書くの。Aura開発の基本中の基本だから絶対忘れないで！"},{"n":14,"category":"ロジックと自動化","text":"Apexトリガのコンテキストにおいて、Trigger.old が常に null になるイベントの組み合わせはどれですか？","options":[{"key":"A","text":"before insert と after insert"},{"key":"B","text":"before update と after update"},{"key":"C","text":"before delete と after delete"},{"key":"D","text":"after undelete のみ"}],"answer":["A"],"multi":false,"explanation":"- Trigger.old は「変更前の古いデータ」を保持する変数。\n- レコードが新しくこの世に誕生する（挿入される） **insert** イベント（新規作成）のときは、\n- 「古いデータなんて、生まれる前なんだからあるわけないじゃん！」ってことで、Trigger.old は **常に** **null** になるよ！\n- だから、before insert と after insert の組み合わせ（A）が正解。\n- 逆に、削除（delete）や更新（update）のときは古いデータがあるから Trigger.old はちゃんと値を持ってるよ！"},{"n":15,"category":"テストとデバッグ","text":"ガバナ制限において、Apexの1回の同期トランザクション（Synchronous Transaction）内で消費できる「CPU最大時間」の上限はどれですか？","options":[{"key":"A","text":"10秒"},{"key":"B","text":"60秒"},{"key":"C","text":"120秒"},{"key":"D","text":"10分"}],"answer":["A"],"multi":false,"explanation":"- 出ました、ガバナ制限の数字クイズ！\n- Apexの1回の同期トランザクションで許されている「CPU最大時間」は、ずばり **10秒（10,000ミリ秒）**！\n- （ちなみに非同期処理だと **60秒** に引き上げられるよ！）\n- 無限ループとか重すぎる処理を書いちゃうと、この10秒の壁にぶち当たって LimitException で強制終了させられるから、効率のいいスッキリしたコードを書こうね！"},{"n":16,"category":"開発の基礎","text":"汎用的な sObject 型として宣言された変数から、特定のカスタムオブジェクト My_Object__c のインスタンスに安全にキャスト（型変換）する正しい構文はどれですか？","options":[{"key":"A","text":"My_Object__c obj = (My_Object__c) genericSObject;"},{"key":"B","text":"My_Object__c obj = genericSObject.castTo(My_Object__c);"},{"key":"C","text":"My_Object__c obj = genericSObject; （暗黙キャスト）"},{"key":"D","text":"My_Object__c obj = new My_Object__c(genericSObject);"}],"answer":["A"],"multi":false,"explanation":"- 一般的な sObject 型（なんでも入る箱）から、特定のカスタムオブジェクト My_Object__c に型を変換（キャスト）したいときは、\n- ターゲットの型の名前をカッコで囲って変数の前につける **(My_Object__c) genericSObject**（A）という書き方をするよ！\n- JavaとかC#をやってた人ならおなじみの構文だね。これでSalesforceに「この箱の中身は、間違いなく My_Object__c だから信じて！」って教えてあげるの。"},{"n":17,"category":"ロジックと自動化","text":"Apexバッチ（Database.Batchable）の実装において、バッチ処理全体が完了した後に、完了報告メールを送信したり、別のバッチ処理を起動したりするためのロジックを記述するメソッドはどれですか？","options":[{"key":"A","text":"start"},{"key":"B","text":"execute"},{"key":"C","text":"finish"},{"key":"D","text":"complete"}],"answer":["C"],"multi":false,"explanation":"- Apexバッチ（Database.Batchable）には実装が必須な3つのメソッド（start, execute, finish）があるよ。\n1. start：クエリを発行して、処理するレコードを全部集める（最初の一度だけ）。\n2. execute：集めたデータを200件などの小分けにして、何回も繰り返しメイン処理を行う。\n3. **finish**：すべてのデータの処理が「完全に終わった後」に、最後の締めとして1回だけ呼び出される！\n4. なので、メール送信や次のバッチの起動などの「後片付け」は **finish** メソッド（C）に書くのが正しいよ！"},{"n":18,"category":"開発の基礎","text":"主従関係と参照関係の大きな違いとして、**参照関係**にのみ設定できるオプションはどれですか？","options":[{"key":"A","text":"親レコードが削除された場合、子レコードの参照フィールド値をクリア（空白に）する。"},{"key":"B","text":"参照関係のレコードタイプを親から強制的に引き継ぐ。"},{"key":"C","text":"親レコードが削除されたとき、子レコードも強制的に自動削除（連鎖削除）する。"},{"key":"D","text":"子レコードの共有アクセス権が親レコードに自動的にマッピングされる。"}],"answer":["A"],"multi":false,"explanation":"- 親子関係を「参照関係（お友達関係）」でゆるく繋いでいる場合、親レコードが削除されたときの挙動をいくつか選べるの。\n- その中で参照関係の大きな特権なのが、**「親レコードが削除されたら、子レコードの参照フィールドをクリアして空（null）にする」**（A）というオプション！\n- 主従関係だと、親が消えたら子も心中（自動削除）するか、親の削除自体を禁止するかの2択しかなくて、フィールドをクリアすることはできないから、ここが大きな違いだよ！"},{"n":19,"category":"ユーザーインターフェース","text":"LWCのHTMLテンプレートにおいて、JavaScriptから渡された配列データ（リスト）をループ処理して各要素を画面に描画するために使用する正しいディレクティブの組み合わせはどれですか？","options":[{"key":"A","text":"for:each と for:item"},{"key":"B","text":"lwc:for と lwc:item"},{"key":"C","text":"template:for と item:var"},{"key":"D","text":"v-for と v-bind"}],"answer":["A"],"multi":false,"explanation":"- LWCのHTML側で、JavaScriptから渡された配列（リスト）をループ処理して1つずつ画面に表示したいなら、\n- **for:each={myList}**（ループを回す配列を指定）\n- **for:item=\"item\"**（ループ内の1つ1つの要素を指す変数名）\n- のコンビを使うよ！\n- さらに、LWCのルールとして、ループ内の要素（タグ）には必ずユニークな key={item.id} を属性として設定しなきゃエラーになるから、これもセットで覚えておいてね！"},{"n":20,"category":"テストとデバッグ","text":"Apexトリガをデプロイする際、本番環境においてテストによるコードカバー率の計算に関して正しい説明はどれですか？","options":[{"key":"A","text":"トリガはテストカバー率が 1% 以上であればデプロイできるが、組織全体のカバー率が 75% を超えている必要がある。"},{"key":"B","text":"デプロイする各トリガは、少なくとも1行以上のコードがテストクラスによって実行（カバー）されている必要がある。"},{"key":"C","text":"トリガのテストカバー率は100%でなければならない。"},{"key":"D","text":"トリガのテストは任意であり、カバー率は計算に含まれない。"}],"answer":["B"],"multi":false,"explanation":"- 本番環境にApexコードをデプロイするとき、トリガ（Trigger）に関する厳しいルールがあるの。\n- 組織全体のテストカバー率が 75% 以上必要なのはもちろんだけど、**「デプロイするすべてのトリガは、テストの中で少なくとも1行以上は実際に実行（カバー）されていなければならない」**（B）という個別ルールがあるの！\n- トリガのテストを全く書かずにリリースしようとすると即座に弾かれちゃうから、しっかりテストデータをインサートしたりアップデートしたりしてトリガを動かすテストを書こうね！"},{"n":21,"category":"開発の基礎","text":"数式フィールドの戻り値としてサポートされて**いない**データ型はどれですか？","options":[{"key":"A","text":"日付（Date）"},{"key":"B","text":"テキスト（Text）"},{"key":"C","text":"ロングテキストエリア（Long Text Area）"},{"key":"D","text":"チェックボックス（Checkbox）"}],"answer":["C"],"multi":false,"explanation":"- 数式フィールドは、他のフィールドの値を使って自動で計算してくれるベンリなフィールドだけど、戻り値の型として **ロングテキストエリア**（C）はサポートされて**いない**よ！\n- 数式で返せるのは、日付（A）、テキスト（B）、チェックボックス（D）、数値、通貨、パーセントなど。\n- 改行を含むような超長い文章（ロングテキスト）を数式でこねくり回すことはできないから、気をつけようね！"},{"n":22,"category":"ロジックと自動化","text":"データベースに対する一連の更新処理において、途中でエラーが起きた場合に特定の段階までデータをロールバック（差し戻し）するために、プログラム上で設定しておくチェックポイントを何と呼びますか？","options":[{"key":"A","text":"RollbackPoint"},{"key":"B","text":"Savepoint"},{"key":"C","text":"TransactionBarrier"},{"key":"D","text":"DatabaseState"}],"answer":["B"],"multi":false,"explanation":"- 「ここまでのデータ更新は、もしこの後エラーが起きてもキープしたい！でもここから先でエラーが起きたら、この時点まで巻き戻したい！」\n- そんなトランザクションのセーブポイント（チェックポイント）を設定するためのクラスが、**Database.Savepoint**（B）！\n- Savepoint sp = Database.setSavepoint(); でセーブして、エラーが起きたら Database.rollback(sp); でその時点まで一気に時間を巻き戻せる、まさにタイムリープ機能だよ！"},{"n":23,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントにCSSスタイルシートを適用する際、そのコンポーネント内のCSSスタイルが外部のコンポーネントや親コンポーネントに影響を与えない仕組みを何と呼びますか？","options":[{"key":"A","text":"CSS Isolation"},{"key":"B","text":"Shadow DOM (CSS Scoping)"},{"key":"C","text":"Global CSS Reset"},{"key":"D","text":"Scoped Custom Property"}],"answer":["B"],"multi":false,"explanation":"- LWCは、Web標準の最先端技術である **Shadow DOM**（B）という仕組みを採用しているの。\n- これのおかげで、コンポーネントの中で書いたCSS（例えば p { color: red; }）は、そのコンポーネントの中だけでしか適用されず、外側（他のコンポーネントや親ページ）の要素を誤って赤色に変えちゃう心配が絶対にないの！\n- このスタイルのカプセル化（隔離）を「CSS Scoping」や「Shadow DOM」と呼ぶよ。"},{"n":24,"category":"テストとデバッグ","text":"複数の非同期Apexジョブがパラレル（並行）に実行されてテスト結果が不安定になるのを防ぐために、テストクラス全体を順番（シリアル）に実行させるように設定するアノテーションはどれですか？","options":[{"key":"A","text":"@isTest(isParallel=false)"},{"key":"B","text":"@isTest(SeeAllData=false)"},{"key":"C","text":"@TestSetup"},{"key":"D","text":"@isTest"}],"answer":["A"],"multi":false,"explanation":"- Salesforceのテストランナーは、テストの実行時間を短くするために、デフォルトで複数のテストクラスを同時に「並行（Parallel）実行」するの。\n- ただ、テスト同士が同じオブジェクトの共有データを奪い合って（ロック競合などで）コケちゃうことがあるんだよね。\n- それを防ぐために、「このテストクラスは並行実行させずに、おとなしく順番待ち（シリアル）して実行して！」って指示するのが、**@isTest(isParallel=false)**（A）アノテーションだよ！"},{"n":25,"category":"開発の基礎","text":"SOSL（Salesforce Object Search Language）の検索構文において、一度に検索できる最大オブジェクト数はいくつか制限はありますか？","options":[{"key":"A","text":"最大5オブジェクト"},{"key":"B","text":"最大10オブジェクト"},{"key":"C","text":"最大100オブジェクト"},{"key":"D","text":"制限はない"}],"answer":["D"],"multi":false,"explanation":"- SOSL（Salesforce Object Search Language）は、テキストでグローバル検索をかける仕組みだけど、**「1回のクエリで検索できるオブジェクト数に上限（制限）はない」**（D）よ！\n- FIND 'テスト' IN ALL FIELDS RETURNING Account, Contact, Opportunity, Custom_Object__c, ... みたいな感じで、何個でも検索対象のオブジェクトを並べることができるの。SOSLの超フリーダムな強みだね！"},{"n":26,"category":"ロジックと自動化","text":"開発者がトリガを記述する際、ビジネスロジックを直接トリガ（Trigger）内に書くのではなく、「トリガハンドラ（Trigger Handler）」クラスにロジックを委譲するパターンの最大のメリットはどれですか？","options":[{"key":"A","text":"ガバナ制限を2倍に増やすことができる。"},{"key":"B","text":"トリガ内の実行順序（再入可能性）の制御、保守性、およびテストのしやすさが向上する。"},{"key":"C","text":"トリガが非同期で自動的に動くようになる。"},{"key":"D","text":"SOQLクエリの実行回数が自動的に10回に制限される。"}],"answer":["B"],"multi":false,"explanation":"- トリガの定義（Triggerファイル）の中に、長々とビジネスロジックを直書きするのはプロのITエンジニアとしてはNG！\n- トリガはただの「イベントの検知器」にしておいて、実際のロジックは別の「トリガハンドラクラス」に丸投げするパターン（Trigger Handler Pattern）を設計するのが大人のマナーだよ。\n- これによって、複数のトリガイベント（Before/After）での実行順序を整理できるし、コードの再利用性も上がって、何より **テストコードが格段に書きやすくなる**（B）の！マジでアゲなアーキテクチャだよ！"},{"n":27,"category":"ユーザーインターフェース","text":"LWCで親コンポーネントが、子コンポーネントからバブリング（浮上）してきたカスタムイベントを処理したい場合、子コンポーネント側でイベントを発行する際に CustomEvent のコンストラクタで設定すべきオプションはどれですか？","options":[{"key":"A","text":"bubbles: true"},{"key":"B","text":"composed: true"},{"key":"C","text":"bubbles: true, composed: true"},{"key":"D","text":"オプションの設定は不要である"}],"answer":["C"],"multi":false,"explanation":"- LWCのカスタムイベントを、親コンポーネントを越えてさらに上の階層（DOMツリーの上位）までバブリング（浮上）させて検知できるようにしたいなら、\n- イベントを発行する際に new CustomEvent('myevent', { bubbles: true, composed: true })（C）の両方を true に設定する必要があるよ！\n- bubbles: true：イベントがDOMツリーを上に上がっていくようにする。\n- composed: true：Shadow DOMの境界を突破して、外側のDOMツリーまでイベントを届けるようにする。\n- この2つが揃って初めて、境界を越えたイベント伝播ができるの！"},{"n":28,"category":"テストとデバッグ","text":"Apexコード内で、カスタム例外（Custom Exception）を発生させて、後続の処理を意図的に中断させたい場合に使用する正しいキーワードはどれですか？","options":[{"key":"A","text":"return new MyException();"},{"key":"B","text":"throw new MyException();"},{"key":"C","text":"raise MyException;"},{"key":"D","text":"System.error(MyException);"}],"answer":["B"],"multi":false,"explanation":"- Apexにおいて、意図的に「エラーだよ！」って例外を発生させて処理を止めたい（例外のスロー）なら、**throw** キーワードを使って **throw new MyException();**（B）と書くのが正しいプログラミングだよ！\n- 他の言語だと raise（Pythonとか）や return（値を返すだけ）を使うこともあるけど、Apex（Javaベース）では throw 一択だからね！"},{"n":29,"category":"開発の基礎","text":"カスタムメタデータ型（Custom Metadata Type）と、リスト型のカスタム設定（Custom Setting）を比較した際、カスタムメタデータ型にのみ存在する大きな強みはどれですか？","options":[{"key":"A","text":"Apexコードから簡単に読み取ることができる。"},{"key":"B","text":"レコードデータ（メタデータレコード）を、変更セットやパッケージに含めて異なる組織へ移行（デプロイ）できる。"},{"key":"C","text":"データベースのストレージ容量を大量に消費しない。"},{"key":"D","text":"ユーザーごとに異なる値を設定できる。"}],"answer":["B"],"multi":false,"explanation":"- 「カスタム設定（Custom Setting）」と「カスタムメタデータ（Custom Metadata）」の最大にして最強の違いは、**「データの移行性」**！\n- カスタム設定の中身（レコードデータ）は、単なる「データ」扱いだから変更セットやパッケージで別の組織（本番環境とか）へ持っていくことができないの。\n- でも、カスタムメタデータの中身は「メタデータ（設定情報）」扱いだから、**変更セットやパッケージに含めてそのまま別の組織にデプロイできる**（B）の！\n- これのおかげで、リリース作業がマジでスムーズになって開発者全員が大喜び（アゲ！）するの。"},{"n":30,"category":"ロジックと自動化","text":"Apexバッチ（Database.Batchable）において、SOQLクエリでデータを取得して一括処理する場合、1回のバッチの実行で処理できるレコード数の最大制限はどれですか？","options":[{"key":"A","text":"10,000件"},{"key":"B","text":"50,000件"},{"key":"C","text":"500万件"},{"key":"D","text":"5,000万件"}],"answer":["D"],"multi":false,"explanation":"- 大量のデータを処理するApexバッチ（Database.Batchable）だけど、1回のバッチ全体の実行で扱えるデータ数の上限は、なんと驚異の **5,000万件**（D）まで！\n- 普通の同期トランザクションのSOQLクエリ制限（5万件）の1000倍も扱えるんだよ。\n- だから、数百万件〜数千万件のビックデータを安全に回すなら、バッチApex一択ってワケ！"},{"n":31,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントのプロパティの値を画面上に表示する「データバインディング」を行う際、HTMLテンプレート（html）内で正しい記述形式はどれですか？","options":[{"key":"A","text":"{!myProperty}"},{"key":"B","text":"{{myProperty}}"},{"key":"C","text":"{myProperty}"},{"key":"D","text":"[myProperty]"}],"answer":["C"],"multi":false,"explanation":"- LWCで、JavaScript側で定義したプロパティ（変数）の値をHTMLテンプレートにバインドして表示したいときは、ただの **シングル波カッコ** **{myProperty}**（C）で囲むだけ！\n- Visualforceの {!myProperty}（A）や、Aura/Vue.jsの {{myProperty}}（B）と混ざって超〜ごちゃごちゃになりがちだけど、LWCは一番シンプルな **{ }** だからね！間違えたらピエンだから注意して！"},{"n":32,"category":"テストとデバッグ","text":"Apexコード内で、あるクエリが1件のレコードのみを返すことを期待して Account acc = [SELECT Id FROM Account WHERE Name = 'Unexist']; と記述したところ、該当するレコードが存在しなかった場合に発生するシステム例外クラスはどれですか？","options":[{"key":"A","text":"NullPointerException"},{"key":"B","text":"DmlException"},{"key":"C","text":"QueryException"},{"key":"D","text":"SObjectException"}],"answer":["C"],"multi":false,"explanation":"- Apexコードで、1件のオブジェクト型変数に対して直接SOQLクエリを割り当てる際（Account acc = [SELECT Id FROM ...];）、\n- もしクエリ結果が「0件（該当なし）」だった、あるいは「2件以上（複数）」見つかっちゃった場合は、\n- **System.QueryException**（C）が発生してシステムがクラッシュしちゃうの！\n- これを防ぐためには、一旦 List\u003cAccount\u003e accList = [SELECT ...]; のようにリストで受け取って、if (!accList.isEmpty()) で件数をチェックしてから変数に詰めるのがプロの防衛策だよ！"},{"n":33,"category":"開発の基礎","text":"未管理パッケージ（Unmanaged Package）からインストールしたコンポーネントについて、正しい説明はどれですか？","options":[{"key":"A","text":"インストールした組織（パッケージの受信側）で、コードやメタデータを直接編集・カスタマイズできる。"},{"key":"B","text":"パッケージのアップグレード（最新版の適用）がいつでも可能である。"},{"key":"C","text":"インストールされたすべてのコンポーネントの名前空間が自動的に保護される。"},{"key":"D","text":"Apexのコードカバー率の計算から自動的に除外される。"}],"answer":["A"],"multi":false,"explanation":"- 「未管理パッケージ（Unmanaged Package）」っていうのは、オープンソースみたいなもの！\n- パッケージをインストールした組織（受信側）で、**中のApexコードや設定（メタデータ）を自由に変更・カスタマイズできる**（A）のが最大の特徴だよ。\n- ただし、インストールした後はパッケージ元からの「アプデ（アップグレード）」が一切できないから、使い捨てのテンプレートコードを配布するときとかによく使うよ。"},{"n":34,"category":"ロジックと自動化","text":"次のコードにおいて、SOQLで取得した取引先（Account）レコードリストをディープコピー（参照ではなく、完全に新しいオブジェクトの複製）するために、clone() メソッドに渡すべき引数の組み合わせはどれですか？\n\n```apex\nList\u003cAccount\u003e clonedList = originalList.deepClone(false, false, false);\n```","options":[{"key":"A","text":"(Boolean preserveId, Boolean isSystemFields, Boolean isDeepClone)"},{"key":"B","text":"(Boolean preserveId, Boolean preserveReadonlyTimestamps, Boolean preserveAutonumber)"},{"key":"C","text":"(Boolean preserveId, Boolean isDeepClone, Boolean isSystemFields)"},{"key":"D","text":"引数は不要である。"}],"answer":["B"],"multi":false,"explanation":"- sObjectのリストを、参照（メモリのアドレス）を引き継がずに、完全に新しいデータとして複製（ディープコピー）したい場合は、deepClone メソッドを使用するよ！\n- 引数のシグネチャは **deepClone(preserveId, preserveReadonlyTimestamps, preserveAutonumber)** となっていて、\n- 1つ目：Id値を引き継ぐかどうか\n- 2つ目：作成日や更新日などの読み取り専用タイムスタンプを引き継ぐかどうか\n- 3つ目：自動採番フィールドの値を引き継ぐかどうか\n- を指定するの。この細かいメソッド引数はデベロッパー試験でたまに意地悪く聞かれるから、なんとなく単語を頭に入れておこう！"},{"n":35,"category":"ユーザーインターフェース","text":"Visualforceにおいて、コントローラ側（Apex）のメソッドをJavaScriptから直接非同期（Ajax）で呼び出し、結果をJavaScriptのコールバック関数で受け取るためのJavaScript通信の仕組み（タグ）はどれですか？","options":[{"key":"A","text":"\u003capex:actionFunction\u003e"},{"key":"B","text":"\u003capex:actionSupport\u003e"},{"key":"C","text":"\u003capex:actionStatus\u003e"},{"key":"D","text":"\u003capex:includeScript\u003e"}],"answer":["A"],"multi":false,"explanation":"- Visualforceページにおいて、JavaScriptのコード（例えばボタンが押されたときや特定のタイマーなど）から、Apexコントローラのメソッドをバックグラウンド（非同期）で直接呼び出したいときに使うのが、**\u003capex:actionFunction\u003e**（A）タグ！\n- これを使うと、JavaScript側に「Apexを呼ぶための偽のJavaScript関数」を自動で生成してくれて、それを呼ぶだけでApexの処理が走って結果をAjaxで反映できるの。超ベンリ！"},{"n":36,"category":"テストとデバッグ","text":"開発環境（Sandbox）から本番環境へデプロイする際、「すべてのローカルテストを実行」を選択した場合に、どのテストクラスが実行されますか？","options":[{"key":"A","text":"組織内のすべてのテストクラス（管理パッケージ内のテストを含む）。"},{"key":"B","text":"組織内のすべてのテストクラス（管理パッケージ内のテストを除く）。"},{"key":"C","text":"デプロイ用の変更セットに含まれるテストクラスのみ。"},{"key":"D","text":"過去30日間に実行されたテストクラスのみ。"}],"answer":["B"],"multi":false,"explanation":"- 本番組織へデプロイする際、リリースオプションで「すべてのローカルテストを実行」を選択した場合、\n- **「組織内に定義されているすべてのテストクラス（ただし、インストールされている管理パッケージ内のテストは除く）」**（B）が全部一斉に走り出すよ！\n- 管理パッケージ（他社製のツールなど）のテストは、すでに開発元が検証済みだから実行対象から除外して、自分たちが開発したコードのテスト（ローカルテスト）だけを厳密にチェックするの。"},{"n":37,"category":"開発の基礎","text":"sObjectの動的な処理において、オブジェクトのフィールド値を文字列で指定して動的に取得するためのsObjectメソッドはどれですか？","options":[{"key":"A","text":"obj.get(fieldName)"},{"key":"B","text":"obj.getValue(fieldName)"},{"key":"C","text":"obj.field(fieldName)"},{"key":"D","text":"obj.fields.get(fieldName)"}],"answer":["A"],"multi":false,"explanation":"- 「sObjectのフィールド名を、文字列変数として動的に指定して値を取り出したい！」（例：fieldName = 'Name' にして、取引先名を取り出す）\n- そんな時に使うsObjectのメソッドが、**obj.get(fieldName)**（A）だよ！\n- 値を入れたい（セットしたい）ときは obj.put(fieldName, value) を使う。\n- これを知っておくと、どんなオブジェクトでも処理できる動的な汎用プログラムが書けるようになって、マジでITエンジニアとしてレベルアップするよ！アゲ！"},{"n":38,"category":"ロジックと自動化","text":"Flow Builderの「決定（Decision）」要素を使用して条件分岐を行う際、条件式でサポートされて**いない**演算子はどれですか？","options":[{"key":"A","text":"次の値に等しい（Equals）"},{"key":"B","text":"次の値を含む（Contains）"},{"key":"C","text":"次の正規表現に一致する（Regex Match）"},{"key":"D","text":"次の値で始まる（Starts With）"}],"answer":["C"],"multi":false,"explanation":"- Flow Builder（フロー）はノンプログラミングで超強力な分岐ロジック（決定 / Decision要素）が作れるけど、条件式の演算子として **「正規表現（Regex Match）」**（C）はさすがにサポートされて**いない**よ！\n- Equals（等しい）、Contains（含む）、StartsWith（始まる）、Is Null などの基本演算子はバッチリ揃ってるから、普通の分岐ならこれで十分カバーできちゃう！"},{"n":39,"category":"ユーザーインターフェース","text":"AuraコンポーネントからLightning Web Component (LWC) への移行（マイグレーション）に関して、正しい説明はどれですか？","options":[{"key":"A","text":"AuraコンポーネントをLWCに直接自動変換するツールがある。"},{"key":"B","text":"LWCコンポーネントの中に、古いAuraコンポーネントを子として配置（ネスト）することができる。"},{"key":"C","text":"Auraコンポーネントの中に、LWCコンポーネントを子として配置（ネスト）することができる。"},{"key":"D","text":"AuraとLWCは、同じLightningページ上で共存させて配置することはできない。"}],"answer":["C"],"multi":false,"explanation":"- SalesforceのUIフレームワークの進化の歴史だね！\n- 古い技術である「Auraコンポーネント」と、新しい標準技術である「LWC」の共存ルールは、\n- **「Auraコンポーネントの中に、LWCを子コンポーネントとして配置することはできる」**（C）！\n- でも、その逆（LWCの中にAuraを子として置くこと）は絶対にできないの。\n- 「新しいもの（LWC）は、古いもの（Aura）を受け入れられない」って覚えるとエモいし一発で覚えられるよ（笑）。"},{"n":40,"category":"テストとデバッグ","text":"開発者がコードのパフォーマンスをデバッグするためにデバッグログを分析しています。「CPU時間制限（CPU Limit）」に達しそうになっている原因を特定するために、開発者コンソール（Developer Console）で最も役立つ表示ビューはどれですか？","options":[{"key":"A","text":"Execution Stack"},{"key":"B","text":"Limits Tab"},{"key":"C","text":"Execution Tree / Timeline"},{"key":"D","text":"Variables Tab"}],"answer":["C"],"multi":false,"explanation":"- 「Apexコードが重すぎて、どこでそんなに処理時間（CPU時間）を食ってるかわかんない！ピエン！」\n- そんなときに開発者コンソールでデバッグログを開いて役に立つのが、**Execution Tree（実行ツリー）や Timeline（タイムライン）**（C）ビュー！\n- どのメソッドの実行に何ミリ秒かかっているかがビジュアル的にグラフでパーセンテージ表示されるから、ボトルネックになっている重い処理を秒で見つけ出すことができるの！デバッグの強い味方だよ。"},{"n":41,"category":"開発の基礎","text":"Apexクラスにおいて inherited sharing キーワードを使用した場合の挙動について、正しい記述はどれですか？","options":[{"key":"A","text":"クラスは常に with sharing として動作する。"},{"key":"B","text":"クラスは常に without sharing として動作する。"},{"key":"C","text":"クラスを呼び出した親クラスの共有コンテキスト（with sharing または without sharing）を引き継いで動作する。"},{"key":"D","text":"共有ルールが全く適用されない状態でオブジェクトレベルのCRUDチェックのみを強制する。"}],"answer":["C"],"multi":false,"explanation":"- inherited sharing（共有設定の継承）は、マジで賢いハイブリッドなキーワード！\n- このクラスを呼び出した親クラス（またはコンテキスト）が、\n- with sharing で宣言されていたら ➡ 自分自身も **with sharing** として動く。\n- without sharing で宣言されていたら ➡ 自分自身も **without sharing** として動く。\n- 呼び出し元に合わせて自分のスタンス（共有の有無）をカメレオンみたいに変えてくれるから、どんな場面でも安全かつ再利用しやすくなるベストプラクティスな宣言方法だよ！"},{"n":42,"category":"ロジックと自動化","text":"Salesforceのトリガにおいて、System.isQueueable() や System.isFuture() を使う主な目的は何ですか？","options":[{"key":"A","text":"1回のトリガ内でDML操作を非同期で実行するため。"},{"key":"B","text":"現在の実行コンテキストが非同期処理（QueueableやFuture）の最中であるかどうかを判定し、処理の無限ループや重複起動を防ぐため。"},{"key":"C","text":"外部システムのコールアウトの応答時間を測定するため。"},{"key":"D","text":"ガバナ制限を自動的にリセットするため。"}],"answer":["B"],"multi":false,"explanation":"- トリガの処理内で、同じレコードの更新によって再びトリガが連鎖起動して無限ループに陥っちゃうようなバグ（再帰）を防ぐために、\n- 「今、すでに非同期処理（FutureメソッドやQueueableジョブ）の中でこのトリガが動いてる最中かな？」\n- というのをチェックする際に、**System.isQueueable()** や **System.isFuture()**（B）などのコンテキスト判定メソッドを使うよ。\n- これで「非同期の最中なら、これ以上は非同期処理を呼ばずにおとなしく終了！」ってブレーキを踏めるの！"},{"n":43,"category":"ユーザーインターフェース","text":"LWCでApexメソッドを命令的に呼び出す場合と、ワイヤサービス（@wire）を使って呼び出す場合を比較した際、**命令的な呼び出し**にのみ適しているユースケースはどれですか？","options":[{"key":"A","text":"コンポーネントの読み込み（ロード）と同時にデータを画面に表示したい。"},{"key":"B","text":"ユーザーがボタンをクリックしたタイミングなど、特定のユーザーアクションをきっかけにデータを保存・変更したい。"},{"key":"C","text":"レコードデータが変更されたときに、画面をリアクティブに即時更新したい。"},{"key":"D","text":"画面上の入力値が変わるたびに動的に検索クエリを走らせたい。"}],"answer":["B"],"multi":false,"explanation":"- LWCで、ボタンを押した瞬間に「データをデータベースにインサートする（書き換える）」といった処理（DML操作を伴う処理）は、必ずApexメソッドの **命令的（Imperative）呼び出し**（B）で行う必要があるよ！\n- なぜなら、もう一方の「ワイヤサービス（@wire）」はデータの「読み取り専用（Read-Only）」かつ「画面ロード時などの自動実行」が基本だから、意図しないタイミングでデータベースが更新されたら大惨事になっちゃう。\n- 「データの作成・変更はボタンを押した時、つまり命令的にやる！」が鉄則だよ！"},{"n":44,"category":"テストとデバッグ","text":"システムで定義されている「ガバナ制限値」と「現在のトランザクション内での実際の消費量」をApexコード内で動的に比較して、制限ギリギリになったら処理を中断するようなプログラムを作りたい場合、どのクラスのメソッドを使用しますか？","options":[{"key":"A","text":"System.Limits"},{"key":"B","text":"System.Governor"},{"key":"C","text":"Database.Limits"},{"key":"D","text":"Apex.Debugger"}],"answer":["A"],"multi":false,"explanation":"- 「あと何回SOQLクエリを発行できる？」「あとどれくらいCPU時間を使える？」\n- こういったガバナ制限の「実数値」をプログラム内でリアルタイムに取得したいなら、**System.Limits** クラス（A）を使うよ！\n- Limits.getQueries()：これまでに発行したSOQLの回数\n- Limits.getLimitQueries()：発行できる最大数（100回）\n- これらを比較して、「もし制限の90%以上消費してたら処理を中断してエラーログを残す！」みたいな賢い防衛ロジックが書けちゃうの。マジでプロのコードって感じ！"},{"n":45,"category":"開発の基礎","text":"Apexコード内で、外部キーのように機能する一意の識別子（External ID）フィールドを使用して、関連する親子レコードを1回のDML（upsert）で一度にデータベースに登録したい場合、正しい構文（アプローチ）はどれですか？","options":[{"key":"A","text":"子レコードに親レコードのインスタンスをネストして insert する。"},{"key":"B","text":"子レコードの参照関係フィールド（Parent_Object__r）に、External IDをセットした親オブジェクトのプロトタイプを代入して upsert する。"},{"key":"C","text":"親レコードをまず挿入し、返ってきたIDを手動で子レコードにセットしてから子レコードを挿入する。（※1回のDMLではない）"},{"key":"D","text":"リレーションシップフィールドにはExternal IDの値を直接代入することはできない。"}],"answer":["B"],"multi":false,"explanation":"- これ、試験で出るとちょっとビックリする高度なテクニック！\n- 1回のDML操作で、まだ作成されていない親レコードと子レコードを紐づけて一気にインサート（またはアップサート）したいとき、\n- 子レコードのリレーションフィールド（Parent_Object__r。末尾は __r だよ！）に対して、\n- new Parent_Object__c(External_ID_Field__c = '親子共通キー')\n- という風に「External IDだけをセットした親のオブジェクト参照」をブチ込んであげるの。\n- そうすると、Salesforceがインサート時に自動でそのキーを使って親子をガチャンと紐づけて保存してくれるの！\n- 親レコードのインサートを待たずに1発でDMLが済むから、マジでパフォーマンスがいいの。"},{"n":46,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントが不要になりDOMから削除（アンマウント）された際に、メモリの解放やリスナーの削除などのクリーンアップ処理を行うために使用するライフサイクルメソッドはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["D"],"multi":false,"explanation":"- LWCコンポーネントが不要になって、画面（DOM）からバイバイ（削除）されたときに自動で呼ばれるライフサイクルフックは、**disconnectedCallback()**（D）だよ！\n- ここで、コンポーネントが動いている間に設定したグローバルなタイマー（setInterval）の解除や、イベントリスナーのクリーンアップをしてあげないと、メモリリーク（メモリが無駄に消費され続ける現象）が起きて画面がだんだん重くなっちゃうの。\n- 立つ鳥跡を濁さず、綺麗に片付けるのが優秀なデベロッパーの証だよ！✨"},{"n":47,"category":"ロジックと自動化","text":"フロー（Flow）から呼び出されるApexメソッド（@InvocableMethod）の引数および戻り値の型に関する絶対的な制限ルールはどれですか？","options":[{"key":"A","text":"引数や戻り値は、必ずリスト型（List\u003cT\u003e）の形式にする必要がある。"},{"key":"B","text":"引数には Map 型しか指定できない。"},{"key":"C","text":"引数は最大で5つまでしか定義できない。"},{"key":"D","text":"戻り値は常に void でなければならない。"}],"answer":["A"],"multi":false,"explanation":"- Flow Builder（フロー）からApexメソッド（@InvocableMethod）を呼び出すときの、絶対的なルール！\n- フローは複数レコードを「バルク（一括）」で裏で束ねて処理する可能性があるため、呼び出されるApex側のメソッドの引数と戻り値は、**「必ずリスト型（****List\u003cT\u003e****）」**（A）で定義されていなければならないの！\n- もし1件のデータしか扱わない場合でも、必ず List\u003cString\u003e や List\u003cAccount\u003e みたいにリストの形で受け取って、リストの形で返してあげるのがフローとのお約束事だよ。"},{"n":48,"category":"テストとデバッグ","text":"テストクラスにおいて、特定のメソッドが「システム例外」を投げることを正しくテストしてカバーするために使用する設計はどれですか？","options":[{"key":"A","text":"try-catch ブロックで囲み、例外が発生しなかった場合に Assert.fail() を呼び出す。"},{"key":"B","text":"System.assert(false) を例外が発生する前に配置する。"},{"key":"C","text":"テストクラスに @isTest(SeeAllData=true) をつける。"},{"key":"D","text":"例外が発生した瞬間にテストが強制終了するようにそのまま放置する。"}],"answer":["A"],"multi":false,"explanation":"- 「この異常な値を入力したら、期待通りに例外（Exception）が発生するか？」\n- というテストコード（異常系テスト）を実装したい場合、\n-\ntry {\nmyMethodWithBadData(); // ここで例外が発生するはず！\nAssert.fail('例外が発生せずにここまで来ちゃったのはバグだよ！');\n} catch (MyException e) {\n// 期待通りに例外が発生したからテストクリア！\nSystem.assertEquals('想定エラーメッセージ', e.getMessage());\n}\n-\n- という風に、**try-catch** **ブロックで囲んで、もし例外が発生せずに** **try** **をすり抜けてしまったら** **Assert.fail()****（A）で意図的にテストをコケさせる** 設計にするのがベストプラクティスだよ！"},{"n":49,"category":"開発の基礎","text":"Apexの Set コレクションが内部的に持っている重要な性質として、正しい説明はどれですか？","options":[{"key":"A","text":"値を追加した順序を厳密に保持する。"},{"key":"B","text":"重複する値を格納することができず、要素の順序は保証されない。"},{"key":"C","text":"キーと値のペアでデータを保持する。"},{"key":"D","text":"インデックス（番号）を指定して set[0] のように要素を直接取り出すことができる。"}],"answer":["B"],"multi":false,"explanation":"- Apexの **Set（セット）** コレクションの2大特徴はこれ！\n1. **重複を許さない（ダブり厳禁のユニークな集まり）**\n2. **中身の要素の順番（インデックス番号）は一切保証されない**\n3. だから、順番通りに取り出したいときは List を使うべき。\n4. Setは「特定のレコードIDがこの中に含まれてる（.contains(id)）？」っていう存在チェックを爆速でやりたい時に最高のパフォーマンスを発揮するよ！"},{"n":50,"category":"ユーザーインターフェース","text":"LWCのJavaScriptにおいて、コンポーネントが作成（初期化）されたばかりの最も早い段階で呼び出され、コンポーネント自身の初期設定を行うものの、この段階ではまだDOM要素（HTML要素）や属性にアクセスできないメソッドはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["A"],"multi":false,"explanation":"- LWCのコンポーネントがメモリ上に生み出された（インスタンス化された）瞬間に、全フックの中で一番最初に呼ばれるのが、おなじみの **constructor()**（A）！\n- この段階では、コンポーネントはまだ生まれてすぐで画面（DOM）に配置されていないから、\n- HTML要素にアクセスしたり、自分自身のプロパティ（属性）を設定しようとするとエラーになっちゃうの。\n- 初期設定はここではなく、DOMに接続されたタイミングの connectedCallback() でやるのが基本ルールだよ！"},{"n":51,"category":"ロジックと自動化","text":"開発者が大量のレコードを一括処理するApexバッチを作成し、テストクラスを書いています。テストクラス内でバッチ処理を正しく実行して検証する際、バッチ呼び出しのコードを記述するべき場所はどこですか？","options":[{"key":"A","text":"Test.startTest() より前"},{"key":"B","text":"Test.startTest() と Test.stopTest() の間"},{"key":"C","text":"Test.stopTest() より後ろ"},{"key":"D","text":"テストクラスの @TestSetup メソッド内"}],"answer":["B"],"multi":false,"explanation":"- バッチApex（非同期処理）をテストする場合、\n- 普通に呼び出すだけだと「いつバッチの処理が完了するかテストランナーには分からない」状態になっちゃう。\n- だから、バッチを起動するコード（Database.executeBatch(batchInstance)）は、必ず **Test.startTest()** **と** **Test.stopTest()** **の間（B）** に挟んであげるの！\n- そうすると、Test.stopTest() が呼ばれたその瞬間に、裏で動いていた非同期バッチ処理が「おらー！強制終了＆即時実行だー！」って同期的にすべて完了するから、その直後でアサーション（テスト結果の検証）ができるようになるんだよ！"},{"n":52,"category":"ロジックと自動化","text":"Apexトリガ内で delete 操作が行われた（レコードが削除された）際、削除された元のレコードデータを保持している正しいコンテキスト変数はどれですか？","options":[{"key":"A","text":"Trigger.new"},{"key":"B","text":"Trigger.old"},{"key":"C","text":"Trigger.newMap"},{"key":"D","text":"Trigger.oldMap のみ"}],"answer":["B"],"multi":false,"explanation":"- レコードが削除（delete）された時のトリガ内では、\n- 削除されたレコードたちの「削除される前のデータ（中身）」が、**Trigger.old**（B）に格納されているよ！\n- もう削除されて新しくなったデータ（Trigger.new）なんて存在しないから、Trigger.new は null になるの。\n- だから、削除トリガ内で「削除されたレコードの情報を元に、関連レコードを更新する」みたいなロジックを書くなら、Trigger.old またはマップ版の Trigger.oldMap を使おうね！"},{"n":53,"category":"開発の基礎","text":"SOQLのセキュリティ対策において、部分的にフィールドへのアクセス権がない場合に、クエリ全体をエラーにせず、アクセスできないフィールドのデータのみを自動的に除外して安全に読み込むことができるApexクラスのメソッドはどれですか？","options":[{"key":"A","text":"Security.stripInaccessible(AccessType.READABLE, queryResult)"},{"key":"B","text":"String.escapeSingleQuotes(queryResult)"},{"key":"C","text":"Schema.getGlobalDescribe()"},{"key":"D","text":"Database.queryWithSecurity()"}],"answer":["A"],"multi":false,"explanation":"- Q1でも出てきた、ユーザーの権限がないデータ（フィールド）を自動で排除（ストリップ）してくれるApexのスーパー救世主メソッドが、**Security.stripInaccessible(AccessType.READABLE, queryResult)**（A）！\n- これを使うと、クエリ結果（queryResult）の中から、現在のログインユーザーの権限（CRUD/FLS）で「読み取り不可」なフィールドの値をキレイに消し去った安全なレコードリストを返してくれるの。\n- セキュリティエラーで画面全体をバグらせずに、見せられるデータだけを賢く見せる実務でも超重宝するメソッドだよ！"},{"n":54,"category":"ロジックと自動化","text":"あるシステムで、取引先（Account）レコードが作成された際、非同期で外部の在庫システムにAPI（コールアウト）で通知を行いたいと考えています。この処理をApexで実装する場合に、トリガに直接コールアウト処理を記述せず、どうやって設計すべきですか？","options":[{"key":"A","text":"トリガから通常の insert DMLを発行する。"},{"key":"B","text":"トリガから、@future(callout=true) アノテーションの付いた非同期メソッド、または Queueable を実装したクラスを呼び出す。"},{"key":"C","text":"before insert トリガの中で直接 Http.send() を実行する。"},{"key":"D","text":"トリガ内でワークフロールールを動的にアクティブにする。"}],"answer":["B"],"multi":false,"explanation":"- Salesforceのトリガ（保存処理の最中）から、リアルタイムに外部へHTTPコールアウト（Web API連携）を投げようとすると、「保存トランザクションが完了するまで通信相手を待たせるな！ガバナ制限違反！」って怒られてシステムが即エラー（CalloutException）になっちゃうの。\n- これを防ぐために、トリガから呼び出すメソッドには **@future(callout=true)**（B）アノテーションをつけて、非同期処理（後回し）としてコールアウトを実行させるのが絶対の鉄則だよ！"},{"n":55,"category":"ユーザーインターフェース","text":"Visualforceページにおいて、レコードのフィールドではなく、任意のテキスト入力欄や検索キーワード入力欄など、完全にカスタムの入力フィールドを画面に配置したい場合に使用する正しいタグはどれですか？","options":[{"key":"A","text":"\u003capex:inputField\u003e"},{"key":"B","text":"\u003capex:inputText\u003e"},{"key":"C","text":"\u003capex:outputField\u003e"},{"key":"D","text":"\u003capex:inputForm\u003e"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、オブジェクトの定義に紐づいていない「ただの自由なテキスト入力欄」や「検索用のキーワードボックス」を配置したいときは、**\u003capex:inputText\u003e**（B）を使うよ！\n- オブジェクトのフィールドの型に連動させたいときは \u003capex:inputField\u003e（A）だけど、自由なテキストなら単なる \u003cinput type=\"text\"\u003e になる inputText が正解！"},{"n":56,"category":"ロジックと自動化","text":"1回のトランザクションで、DML操作（insert, update, delete など）によって更新できるsObjectレコードの最大件数はいくつですか？","options":[{"key":"A","text":"150"},{"key":"B","text":"1,000"},{"key":"C","text":"10,000"},{"key":"D","text":"50,000"}],"answer":["C"],"multi":false,"explanation":"- 1回の同期トランザクション（リクエスト）の中で、DML操作（レコードの作成・更新・削除など）によって処理できる「最大レコード数（合計）」は、ずばり **10,000件**（C）まで！\n- （ちなみにDMLを「呼び出す回数」の制限は150回だよ！）\n- 例えば、1回のDMLで1万件を超えるレコードを一括更新しようとすると、その瞬間にエラー（LimitException）でクラッシュしちゃうから、それ以上のデータを扱うならバッチApex（Q30参照）を使ってね！"},{"n":57,"category":"開発の基礎","text":"管理パッケージ（Managed Package）の最大の特徴について、正しい説明はどれですか？","options":[{"key":"A","text":"パッケージのインストール先の組織で、Apexコードを自由に表示・編集できる。"},{"key":"B","text":"パッケージのアップグレード（新バージョンのリリース）がいつでも実行できる。"},{"key":"C","text":"インストール先の組織の共有ルールをすべて上書きする。"},{"key":"D","text":"開発者コンソールでいつでもデバッグログを直接確認できる。"}],"answer":["B"],"multi":false,"explanation":"- AppExchangeとかで有料配布されるような「管理パッケージ（Managed Package）」の最大の特徴は、\n- **「パッケージの開発元が、いつでも最新のバグ修正や新機能をアップグレード（リリース）して、インストール先の組織に適用できる」**（B）こと！\n- また、インストールした組織のユーザーからは中身のApexコードが一切見えない（知的財産が保護される）仕組みになっているのも特徴。\n- Q33の「未管理パッケージ」と完全に真逆の性質だから、対比で覚えておくとテストで絶対に迷わないよ！"},{"n":58,"category":"テストとデバッグ","text":"Apexコードの例外処理において、例外が発生した「エラーメッセージ（Error Message）」をプログラムで動的に取得するために、Exceptionオブジェクト（変数 e）のどのメソッドを呼び出すべきですか？","options":[{"key":"A","text":"e.getLineNumber()"},{"key":"B","text":"e.getMessage()"},{"key":"C","text":"e.getTypeName()"},{"key":"D","text":"e.getCause()"}],"answer":["B"],"multi":false,"explanation":"- try-catch ブロックで例外（エラー）をキャッチしたとき、そのエラーが発生した「具体的なメッセージ（例：レコードが重複しています、など）」を取り出してログに残したいなら、Exceptionオブジェクトの **getMessage()**（B）メソッドを呼び出すよ！\n- ちなみに getLineNumber()（A）は「コードの何行目でエラーが起きたか」を、getTypeName()（C）は「DmlExceptionなどの例外の種類」を教えてくれるメソッドだよ！"},{"n":59,"category":"ユーザーインターフェース","text":"LWCで、ある親コンポーネントが、その直下にある子コンポーネントの公開メソッド（JavaScript関数）を呼び出して処理を実行させたい場合、親コンポーネント側から子コンポーネントの要素を検索してメソッドを呼ぶための正しいJavaScriptコードはどれですか？（子コンポーネントのタグ名を \u003cc-child-comp\u003e とします）","options":[{"key":"A","text":"this.template.querySelector('c-child-comp').myMethod();"},{"key":"B","text":"this.querySelector('c-child-comp').fireEvent('myMethod');"},{"key":"C","text":"component.find('childComp').myMethod();"},{"key":"D","text":"this.getChildComp().myMethod();"}],"answer":["A"],"multi":false,"explanation":"- LWCにおいて、親コンポーネントのJavaScriptから、すぐ下にある子コンポーネント（例：\u003cc-child-comp\u003e）をDOMの中から見つけ出して、子コンポーネント側で公開されているメソッドを直接呼び出したいときは、\n- **this.template.querySelector('c-child-comp').myMethod();**（A）\n- という書き方をするよ！\n- Auraコンポーネントの component.find()（C）と混ざって間違えやすい超定番の移行・UI問題だから、LWCでは this.template.querySelector を使うんだ！ってしっかり覚えておいてね！"},{"n":60,"category":"ロジックと自動化","text":"Apexの処理中に発生した一時的なエラーから復旧するため、データベースへのトランザクション全体をロールバックし、エラーの起きた原因データ（sObjectリスト）を特定して、残りのデータだけで再処理を行いたい場合に、最も適したクラスはどれですか？","options":[{"key":"A","text":"Database.Savepoint と Database.rollback()"},{"key":"B","text":"System.abortJob()"},{"key":"C","text":"Database.executeBatch()"},{"key":"D","text":"Test.startTest()"}],"answer":["A"],"multi":false,"explanation":"- 「10件のデータを一括更新したけど、途中の5件目でヤバいエラーが出ちゃった！\n- 一旦全部なかったことにロールバックするけど、どのデータがエラーの原因か突き止めて、エラーデータだけを除外して残りの正常なデータだけで再処理したい！」\n- そんな高度なリカバリー設計をする時に活躍するのが、**Database.Savepoint** **と** **Database.rollback()**（A）のコンビ！\n- 一旦セーブポイントを作っておいて、try-catchでエラーが出たらロールバッ"}]}]};</script>
<script>(function () {
  'use strict';
  const DATA = window.__EXAM__ || { sets: [] };
  const LS_THEME = 'sfpd-theme';
  const ansKey = id => 'sfpd-exam-ans-' + id;
  const bestKey = id => 'sfpd-exam-best-' + id;
  const PASS = 68; // 合格ライン（%）

  // ----- テーマ（他ページとキー共有） -----
  const applyTheme = th => { document.documentElement.setAttribute('data-theme', th); localStorage.setItem(LS_THEME, th); };
  applyTheme(localStorage.getItem(LS_THEME) || 'light');
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const prismLang = l => { l = (l || '').toLowerCase(); if (l === 'soql') return 'sql'; if (l === 'xml') return 'markup'; if (l === 'js') return 'javascript'; return l; };

  if (window.marked) marked.setOptions({ gfm: true, breaks: false });

  // Markdown 文字列 → HTML（コードブロックは Prism でハイライト）
  function mdHTML(md) {
    return window.marked ? marked.parse(md || '') : escapeHtml(md || '');
  }
  function enhanceCode(host) {
    host.querySelectorAll('pre > code').forEach(code => {
      const pre = code.parentElement;
      const cls = (code.className || '').match(/language-([\w-]+)/);
      const pl = prismLang(cls ? cls[1] : '');
      if (pl && window.Prism && Prism.languages[pl]) {
        code.className = 'language-' + pl;
        try { Prism.highlightElement(code); } catch (e) {}
      }
      const block = document.createElement('div'); block.className = 'code-block';
      const bar = document.createElement('div'); bar.className = 'code-bar';
      bar.innerHTML = '<span class="code-lang">' + escapeHtml((cls ? cls[1] : 'コード').toUpperCase()) +
        '</span><button class="copy-btn" type="button"><svg class="ico"><use href="#i-copy"/></svg><span class="ct">コピー</span></button>';
      pre.parentNode.insertBefore(block, pre); block.appendChild(bar); block.appendChild(pre);
      bar.querySelector('.copy-btn').addEventListener('click', function () {
        const txt = code.textContent, lbl = this.querySelector('.ct');
        const ok = () => { this.classList.add('copied'); lbl.textContent = 'コピー完了'; setTimeout(() => { this.classList.remove('copied'); lbl.textContent = 'コピー'; }, 1600); };
        if (navigator.clipboard) navigator.clipboard.writeText(txt).then(ok).catch(() => {});
      });
    });
  }

  // ----- DOM 参照 -----
  const startScreen = document.getElementById('startScreen');
  const quizScreen = document.getElementById('quizScreen');
  const quizBar = document.getElementById('quizBar');
  const setGrid = document.getElementById('setGrid');
  const questionsEl = document.getElementById('questions');
  const resultMount = document.getElementById('resultMount');
  const quizTitle = document.getElementById('quizTitle');
  const answeredCount = document.getElementById('answeredCount');
  const totalCount = document.getElementById('totalCount');
  const answeredBar = document.getElementById('answeredBar');

  // ----- 状態 -----
  let curSet = null;       // 現在のセット
  let answers = {};        // { 問番号: [選択した letter, ...] }
  let graded = false;

  function loadAnswers(id) {
    try { return JSON.parse(localStorage.getItem(ansKey(id)) || '{}'); } catch (e) { return {}; }
  }
  function saveAnswers() {
    if (curSet) localStorage.setItem(ansKey(curSet.id), JSON.stringify(answers));
  }
  function getBest(id) {
    const v = parseInt(localStorage.getItem(bestKey(id)), 10);
    return isNaN(v) ? null : v;
  }

  // ----- スタート画面 -----
  function renderStart() {
    setGrid.innerHTML = '';
    DATA.sets.forEach((s, i) => {
      const best = getBest(s.id);
      const savedAns = loadAnswers(s.id);
      const answered = Object.keys(savedAns).filter(k => (savedAns[k] || []).length).length;
      const card = document.createElement('button');
      card.className = 'set-card';
      card.innerHTML =
        '<span class="sc-badge"><svg class="ico" style="width:13px;height:13px"><use href="#i-edit"/></svg>SET ' + (i + 1) + '</span>' +
        '<span class="sc-title">' + escapeHtml(s.title) + '</span>' +
        '<span class="sc-meta">' +
          '<span>' + s.questions.length + ' 問</span>' +
          (best != null ? '<span class="sc-best">最高 ' + best + '%</span>' : '') +
          (answered && best == null ? '<span>回答途中 ' + answered + '/' + s.questions.length + '</span>' : '') +
        '</span>' +
        '<span class="sc-go">' + (answered ? '続きから' : 'スタート') + '<svg class="ico"><use href="#i-arrow-right"/></svg></span>';
      card.addEventListener('click', () => startSet(s));
      setGrid.appendChild(card);
    });
  }

  // ----- 試験開始 -----
  function startSet(s) {
    curSet = s;
    answers = loadAnswers(s.id);
    graded = false;
    quizTitle.textContent = s.title;
    resultMount.innerHTML = '';
    renderQuestions();
    startScreen.hidden = true;
    quizScreen.hidden = false;
    quizBar.hidden = false;
    totalCount.textContent = s.questions.length;
    updateAnswered();
    window.scrollTo(0, 0);
  }

  function renderQuestions() {
    questionsEl.innerHTML = '';
    curSet.questions.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'q-' + q.n;
      card.dataset.n = q.n;

      const top = document.createElement('div');
      top.className = 'q-top';
      top.innerHTML = '<span class="q-num">' + q.n + '</span>' +
        (q.category ? '<span class="q-cat">' + escapeHtml(q.category) + '</span>' : '') +
        (q.multi ? '<span class="q-multi">複数選択</span>' : '') +
        '<span class="q-mark ok"><svg class="ico"><use href="#i-check"/></svg>正解</span>' +
        '<span class="q-mark ng"><svg class="ico"><use href="#i-x"/></svg>不正解</span>';
      card.appendChild(top);

      const text = document.createElement('div');
      text.className = 'q-text';
      text.innerHTML = mdHTML(q.text);
      enhanceCode(text);
      card.appendChild(text);

      const opts = document.createElement('div');
      opts.className = 'opts';
      q.options.forEach(o => {
        const opt = document.createElement('div');
        opt.className = 'opt' + (q.multi ? ' multi' : '');
        opt.dataset.key = o.key;
        const selected = (answers[q.n] || []).includes(o.key);
        if (selected) opt.classList.add('selected');
        opt.innerHTML = '<span class="mark">' + o.key + '</span><span class="otext">' + mdHTML(o.text).replace(/^<p>|<\/p>\s*$/g, '') + '</span>';
        enhanceCode(opt);
        opt.addEventListener('click', () => onSelect(q, o.key, opt, opts));
        opts.appendChild(opt);
      });
      card.appendChild(opts);

      const exp = document.createElement('div');
      exp.className = 'explain';
      exp.innerHTML = '<div class="explain-head"><svg class="ico"><use href="#i-bulb"/></svg>解説</div>' +
        '<div class="explain-body"></div>';
      card.appendChild(exp);

      questionsEl.appendChild(card);
    });
  }

  function onSelect(q, key, optEl, optsEl) {
    if (graded) return;
    let sel = answers[q.n] || [];
    if (q.multi) {
      if (sel.includes(key)) sel = sel.filter(k => k !== key);
      else sel = sel.concat(key);
      optEl.classList.toggle('selected');
    } else {
      sel = [key];
      optsEl.querySelectorAll('.opt').forEach(o => o.classList.toggle('selected', o === optEl));
    }
    answers[q.n] = sel;
    saveAnswers();
    updateAnswered();
  }

  function updateAnswered() {
    const total = curSet.questions.length;
    const done = curSet.questions.filter(q => (answers[q.n] || []).length).length;
    answeredCount.textContent = done;
    answeredBar.style.width = (done / total * 100) + '%';
  }

  // 選択の正誤判定（多肢選択は集合一致）
  function isCorrect(q) {
    const sel = (answers[q.n] || []).slice().sort();
    const ans = (q.answer || []).slice().sort();
    return sel.length === ans.length && sel.every((v, i) => v === ans[i]);
  }

  // ----- 採点 -----
  function grade() {
    const unanswered = curSet.questions.filter(q => !(answers[q.n] || []).length).length;
    if (unanswered > 0) {
      if (!confirm('未回答が ' + unanswered + ' 問あります。このまま採点しますか？\n（未回答は不正解として扱われます）')) return;
    }
    graded = true;
    let correct = 0;
    curSet.questions.forEach(q => {
      const card = document.getElementById('q-' + q.n);
      const opts = card.querySelector('.opts');
      opts.classList.add('graded');
      card.classList.add('graded');
      const ok = isCorrect(q);
      if (ok) correct++;
      card.classList.add(ok ? 'is-correct' : 'is-wrong');
      const sel = answers[q.n] || [];
      opts.querySelectorAll('.opt').forEach(opt => {
        const k = opt.dataset.key;
        const isAns = (q.answer || []).includes(k);
        const isSel = sel.includes(k);
        if (isAns) opt.classList.add('correct');
        else if (isSel) opt.classList.add('wrong');
      });
      const body = card.querySelector('.explain-body');
      const correctLabel = (q.answer || []).join('・');
      body.innerHTML = '<p><b>正解：' + correctLabel + '</b></p>' + mdHTML(q.explanation);
      enhanceCode(body);
    });
    const total = curSet.questions.length;
    const pct = Math.round(correct / total * 100);
    // ベストスコア更新
    const prevBest = getBest(curSet.id);
    if (prevBest == null || pct > prevBest) localStorage.setItem(bestKey(curSet.id), String(pct));
    renderResult(correct, total, pct);
    quizBar.hidden = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderResult(correct, total, pct) {
    const pass = pct >= PASS;
    const ringColor = pass ? 'var(--ok)' : 'var(--bad)';
    const panel = document.createElement('div');
    panel.className = 'result';
    panel.innerHTML =
      '<div class="score-ring" style="--p:' + pct + ';--ring-color:' + ringColor + '">' +
        '<div class="inner"><span class="pct">' + pct + '%</span><span class="pl">正解率</span></div>' +
      '</div>' +
      '<div class="result-info">' +
        '<div class="verdict ' + (pass ? 'pass' : 'fail') + '">' + (pass ? '合格ライン到達！🎉' : 'もう少し！') + '</div>' +
        '<div class="detail">' + total + ' 問中 <b>' + correct + ' 問</b>正解（合格ライン ' + PASS + '%）</div>' +
        '<div class="result-actions">' +
          '<button class="btn primary" id="retryBtn"><svg class="ico"><use href="#i-refresh"/></svg>もう一度挑戦</button>' +
          '<button class="btn" id="toStartBtn"><svg class="ico"><use href="#i-arrow-left"/></svg>セット選択へ</button>' +
          '<label class="filter-toggle"><input type="checkbox" id="wrongOnly">間違えた問題だけ表示</label>' +
        '</div>' +
      '</div>';
    resultMount.innerHTML = '';
    resultMount.appendChild(panel);

    document.getElementById('retryBtn').addEventListener('click', retry);
    document.getElementById('toStartBtn').addEventListener('click', showStart);
    document.getElementById('wrongOnly').addEventListener('change', e => {
      const on = e.target.checked;
      curSet.questions.forEach(q => {
        const card = document.getElementById('q-' + q.n);
        card.style.display = (on && isCorrect(q)) ? 'none' : '';
      });
    });
  }

  function retry() {
    answers = {};
    saveAnswers();
    graded = false;
    resultMount.innerHTML = '';
    renderQuestions();
    quizBar.hidden = false;
    updateAnswered();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showStart() {
    quizScreen.hidden = true;
    quizBar.hidden = true;
    startScreen.hidden = false;
    curSet = null;
    renderStart();
    window.scrollTo(0, 0);
  }

  // ----- イベント -----
  document.getElementById('backBtn').addEventListener('click', showStart);
  document.getElementById('gradeBtn').addEventListener('click', grade);

  // ----- 初期化 -----
  renderStart();
})();
</script>
</body>
</html>
