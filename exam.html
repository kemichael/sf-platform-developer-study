egory":"","text":"Lightning Experience のアカウントの標準編集ボタンを上書きするには何を使用できますか?","options":[{"key":"A","text":"雷撃アクション"},{"key":"B","text":"Lightning ページ"},{"key":"C","text":"Lightning コンポーネント"},{"key":"D","text":"雷流"}],"answer":["C"],"multi":false,"explanation":"Lightning Experience で標準ボタン（編集ボタンなど）を上書きできるのは、**Lightning コンポーネント**です（C が正解）。具体的には `lightning:actionOverride` インターフェースを実装した Aura コンポーネント（または LWC をラップしたもの）をアクションの上書きに指定します。\n\n他の選択肢が誤りの理由:\n- **A（Lightning アクション）**: クイックアクションはボタンの追加はできますが、標準ボタンの上書きには使えません。\n- **B（Lightning ページ）**: Lightning アプリケーションビルダーのページはレコードページ等のレイアウト用であり、ボタンの上書きはできません。\n- **D（Lightning フロー）**: フローを直接標準ボタンの上書きに指定することはできません。"},{"n":22,"category":"","text":"Batchable インターフェースを実装するときに Apex コードが Apex クラスの execute() メソッド内で実行される場合、ガバナ制限に関して正しい 2 つのステートメントはどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"Apex ガバナ制限は、execute() メソッドの各反復ごとにリセットされます。"},{"key":"B","text":"トランザクションの非同期性のため、Apex ガバナー制限を超えることはできません。"},{"key":"C","text":"Apex ガバナー制限では、非同期制限レベルが使用されます。"},{"key":"D","text":"Apex クラスのコンストラクターを呼び出すときに、Apex ガバナー制限が省略されます。"}],"answer":["A","C"],"multi":true,"explanation":"バッチ Apex では、**`execute()` メソッドの各実行（各バッチチャンク）が独立したトランザクション**として扱われるため、ガバナ制限は実行のたびにリセットされます（A が正解）。また、バッチ Apex は非同期処理であるため、**非同期用のガバナ制限**（例: SOQL 取得行数やヒープサイズの上限が同期処理より大きい）が適用されます（C が正解）。\n\n他の選択肢が誤りの理由:\n- **B**: 非同期であってもガバナ制限は存在し、超過すれば例外が発生します。\n- **D**: コンストラクターの呼び出しでガバナ制限が免除されるという仕様はありません。"},{"n":23,"category":"","text":"Lightning Web コンポーネントで使用するために、AccountController クラスに updateAccounts という Apex メソッドが含まれているコード ステートメントはどれですか。","options":[{"key":"A","text":"「AccountControlles」から updateAccounts をインポートします。"},{"key":"B","text":"「Salesforce/apex/AccountController:' から updateAccounts をインポートします。"},{"key":"C","text":"「Account@ontroller.updateAccounts」から updateAccounts をインポートします。"},{"key":"D","text":"\"@salesforce/apex/AccountController.updateAccounts\" から updateAccounts をインポートします。"}],"answer":["D"],"multi":false,"explanation":"LWC から Apex メソッドをインポートする正しい構文は **`import updateAccounts from '@salesforce/apex/AccountController.updateAccounts';`** です（D が正解）。スキーマは `@salesforce/apex/` で始まり、その後に `クラス名.メソッド名` をドット区切りで指定します（名前空間がある場合は `名前空間.クラス名.メソッド名`）。\n\n他の選択肢が誤りの理由:\n- **A**: クラス名のみの指定であり、`@salesforce/apex/` スキーマもメソッド名もありません。\n- **B**: 区切り文字がコロン（`:`）になっており、`@` も欠けています。正しくはドット区切りです。\n- **C**: `@salesforce/apex/` スキーマが欠けています。"},{"n":24,"category":"","text":"SOQL クエリが返すことができる 3 つのデータ型はどれですか?\n3つの回答を選択してください","options":[{"key":"A","text":"Double"},{"key":"B","text":"O Long"},{"key":"C","text":"sObject"},{"key":"D","text":"dg Integer"},{"key":"E","text":"List"}],"answer":["C","D","E"],"multi":true,"explanation":"Apex での SOQL クエリの戻り値は 3 種類です。通常のクエリは **`List\u003csObject\u003e`（リスト）** を返し（E）、結果が 1 件のみと確実な場合は **単一の `sObject`** に直接代入できます（C）。また `SELECT COUNT()` 形式のクエリは **`Integer`** を返します（D）。\n\n他の選択肢が誤りの理由:\n- **A（Double）/ B（Long）**: SOQL クエリ自体の戻り値の型としては定義されていません（集計結果の値は `AggregateResult` の中から取得します）。"},{"n":25,"category":"","text":"Apex で @lnvocableMethod アノテーションを使用する際の 3 つの考慮事項は何ですか?\n3つの回答を選択してください","options":[{"key":"A","text":"Apex クラスごとに、@invecableMethod アノテーションを使用するメソッドを 1 つだけ定義できます。"},{"key":"B","text":"@invecableMethod アノテーションを使用するメソッドには、複数の入力パラメータを設定できます。"},{"key":"C","text":"@invocablemethod アノテーションを使用するメソッドは、static として宣言する必要があります。"},{"key":"D","text":"GO @invocablemethod アノテーションを使用するメソッドは、戻り値を定義する必要があります。"},{"key":"E","text":"@invocableMethod アノテーションを使用するメソッドは、Public または Global として宣言できます。"}],"answer":["A","C","E"],"multi":true,"explanation":"`@InvocableMethod` アノテーションの主な考慮事項は次のとおりです。**1 つの Apex クラスに定義できる `@InvocableMethod` は 1 つだけ**です（A が正解）。メソッドは **`static` として宣言する必要**があります（C が正解）。アクセス修飾子は **`public` または `global`** である必要があります（E が正解）。\n\n他の選択肢が誤りの理由:\n- **B**: 入力パラメータは**リスト型 1 つのみ**しか定義できず、複数のパラメータは指定できません。\n- **D**: 戻り値の定義は必須ではなく、`void` を返すメソッドも許可されています。"},{"n":26,"category":"","text":"Universal Containersは最近、ClassicからLightning Experienceに移行しました。同社のビジネスプロセスの一つでは、ユーザーが商談詳細ページでカスタムボタンを押した際に、商談オブジェクトの特定の値をHTTP RESTコールアウト経由で外部の注文管理システムに送信することが求められています。\n例のフィールド:\n* 名前\n* 額\n* アカウント\nビジネス要件を満たすために開発者が実装する必要がある 2 つの方法はどれですか?\n2つの回答を選択してください。","options":[{"key":"A","text":"HTTP REST コールアウトを実行するカスタム Visualforce クイックアクションを作成し、商談の詳細ページで使用します。"},{"key":"B","text":"Opportunity オブジェクトに、@future (callout=true) を使用してヘルパー メソッドを呼び出して HTTP REST コールアウトを実行する更新後トリガーを作成します。"},{"key":"C","text":"HTTP REST コールアウトを実行する Lightning コンポーネントのクイックアクションを作成し、商談の詳細ページで使用します。"},{"key":"D","text":"Opportunity オブジェクトにリモート アクションを作成し、Opportunity が更新されるたびに HTTP REST コールアウトを実行する Apex 即時アクションを実行します。"}],"answer":["A","C"],"multi":true,"explanation":"要件は「ユーザーがカスタムボタンを押したとき」にコールアウトを実行することです。詳細ページに配置できる**クイックアクション**（Visualforce クイックアクションまたは Lightning コンポーネントのクイックアクション）であれば、ユーザーの明示的な操作をトリガーとして HTTP REST コールアウトを実行できます。したがって A と C が正解です。\n\n**他の選択肢が誤りの理由**\n- **B**: 更新後トリガーはレコードが更新されるたびに実行されるため、「ボタンを押したとき」という要件を満たしません。\n- **D**: これも更新のたびに実行される自動処理であり、ユーザーのボタン操作をトリガーにできません。"},{"n":27,"category":"","text":"開発者は、複数の Lightning Web コンポーネントを含むアプリを作成しています。\n子コンポーネントの 1 つはナビゲーションの目的で使用されます。ユーザーが子コンポーネントの「次へ」というボタンをクリックすると、親コンポーネントに通知して次のページに移動できるようにする必要があります。\nこれをどのように達成すればよいでしょうか?","options":[{"key":"A","text":"親のプロパティを更新します。"},{"key":"B","text":"Apex コントローラ内のメソッドを呼び出します。"},{"key":"C","text":"通知を発行します。"},{"key":"D","text":"カスタム イベントを作成します。"}],"answer":["D"],"multi":false,"explanation":"Lightning Web コンポーネントでは、**子から親への通信はカスタムイベント**（`CustomEvent`）を使用します。子コンポーネントが `this.dispatchEvent(new CustomEvent('next'))` のようにイベントを発行し、親コンポーネントがテンプレート上で `onnext` ハンドラを定義して受け取るのが標準パターンです。\n\n**他の選択肢が誤りの理由**\n- **A**: プロパティ（`@api`）による受け渡しは親から子への通信手段であり、子から親への通知には使えません。\n- **B**: Apex コントローラはサーバ側の処理であり、コンポーネント間の通知手段ではありません。\n- **C**: 「通知（notification）」という汎用的な仕組みは LWC の親子間通信の標準手段ではありません（Lightning Message Service は関連のないコンポーネント間で使うものです）。"},{"n":28,"category":"","text":"ある会社のエンジニアリング部門では、100 台以上のサーバーのクラスターを必要とする社内開発ソフトウェアのスケーラビリティについて 1 か月間のテストを実施しています。次のモデルのうち、どのモデルを使用するのが最適ですか。","options":[{"key":"A","text":"PaaS"},{"key":"B","text":"SaaS"},{"key":"C","text":"BaaS"},{"key":"D","text":"aaS"}],"answer":["D"],"multi":false,"explanation":"100 台以上のサーバークラスタを一時的（1 か月間）に構築してスケーラビリティテストを行うようなケースでは、仮想サーバーなどのインフラ資源を必要な期間だけ調達できる **IaaS（Infrastructure as a Service）** が最適です（選択肢の「aaS」は OCR による欠落で、原典では IaaS です）。使った分だけ課金され、テスト終了後にすぐ解放できる点が要件に合致します。\n\n**他の選択肢が誤りの理由**\n- **A (PaaS)**: アプリケーションの実行基盤を提供するモデルで、サーバークラスタそのものを制御する用途には向きません。\n- **B (SaaS)**: 完成したアプリケーションを利用するモデルであり、自社開発ソフトウェアのテスト基盤にはなりません。\n- **C (BaaS)**: モバイルアプリ等のバックエンド機能を提供するモデルで、要件とは異なります。"},{"n":29,"category":"","text":"開発者は、既存の Payment クラスの実装を提供する CreditCardPayment クラスを作成する必要があります。\npublic virtual class Payment {\npublic virtual void makePayment(Decimal amount) {\n// implementation\n}\nWhich is the correct implementation?","options":[{"key":"A","text":"public class CreditCardPayment extends Payment { public virtual void makePayment(Decimal amount){ /* implementation */ } }"},{"key":"B","text":"public class CreditCardPayment implements Payment { public virtual void makePayment(Decimal amount) { /* implementation */ } }"},{"key":"C","text":"public class CreditCardPayment implements Payment { public override void makePayment(Decimal amount) { /* implementation */ } }"},{"key":"D","text":"public class CreditCardPayment extends Payment { public override void makePayment(Decimal amount) { /* implementation */ } }"}],"answer":["D"],"multi":false,"explanation":"`Payment` は `virtual` クラスなので、継承には **`extends`** を使用します。また、親クラスの `virtual` メソッド `makePayment` を子クラスで再定義するには **`override`** キーワードが必要です。したがって `public class CreditCardPayment extends Payment { public override void makePayment(Decimal amount) {...} }` となる D が正解です。\n\n**他の選択肢が誤りの理由**\n- **A**: `extends` は正しいですが、親の virtual メソッドを再定義する側には `override` が必要です。\n- **B, C**: `implements` はインターフェースを実装する場合のキーワードであり、クラスの継承には使えません。"},{"n":30,"category":"","text":"次のコード スニペットは、2,000 件を超えるリード レコードがある環境で Lightning Web コンポーネントによって実行されます。\n```apex\n@AuraEnabled\npublic void static updateLeads() {\n    for (Lead thisLead : [SELECT Origin__c FROM Lead]) {\n        thisLead.LeadSource = thisLead.Origin__c;\n        update thisLead;\n    }\n}\n```\nApex トランザクション内でどのガバナー制限を超える可能性がありますか?","options":[{"key":"A","text":"発行されたSOOLクエリの合計数"},{"key":"B","text":"発行されたDMLステートメントの合計数"},{"key":"C","text":"DML文の結果として処理されたレコードの合計数"}],"answer":["B"],"multi":false,"explanation":"このコードは SOQL の結果をループしながら、レコード 1 件ごとに `update` を実行しています。同期トランザクションの **DML ステートメント数の上限は 150** なので、2,000 件を超えるリードが存在する環境では 151 件目の `update` で制限超過となります。\n\n**他の選択肢が誤りの理由**\n- **A**: SOQL クエリ（原文の SOOL は SOQL の誤記）はループの外で 1 回しか発行されないため、上限 100 回には達しません。\n- **C**: DML で処理されるレコード数の上限は 10,000 件で、1 件ずつの更新が 2,000 回でも合計 2,000 件にとどまり、この制限には達しません（その前に DML 回数の制限に抵触します）。"},{"n":31,"category":"","text":"「高」、「中」、「低」の値は、異なるオブジェクトにわたる複数の選択リストの共通値として識別されます。\n開発者が選択リストとその値のメンテナンスを効率化し、値を上記の値に制限するために実行できるアプローチは何ですか?","options":[{"key":"A","text":"各オブジェクトに選択リストを作成し、値を含むグローバル選択リスト値セットを使用します。"},{"key":"B","text":"各オブジェクトに必須フィールドとして選択リストを作成し、「入力された順序ではなくアルファベット順に値を表示する」を選択します。"},{"key":"C","text":"各オブジェクトに選択リストを作成し、データの整合性を確保するための検証ルールを追加します。"},{"key":"D","text":"各オブジェクトに選択リストを作成し、「選択リストを値セットで定義された値に制限する」を選択します。"}],"answer":["A"],"multi":false,"explanation":"複数のオブジェクトで共通の選択リスト値（高・中・低）を使う場合は、**グローバル選択リスト値セット**を作成し、各オブジェクトの選択リスト項目から参照するのがベストプラクティスです。値の追加・変更が 1 か所で済むためメンテナンスが効率化され、グローバル値セットは常に「制限付き（restricted）」なので値も定義済みのものに限定されます。\n\n**他の選択肢が誤りの理由**\n- **B**: アルファベット順の表示は見た目の設定にすぎず、値の一元管理や制限にはなりません。\n- **C**: 検証ルールで縛る方法はオブジェクトごとにルールを重複管理することになり、効率的ではありません。\n- **D**: 「値セットで定義された値に制限する」設定だけでは、各オブジェクトに個別の値リストを重複して定義する必要があり、一元管理になりません。"},{"n":32,"category":"","text":"Universal Containers には、特定のアカウントによってレンタルされているすべての Container__c のテーブルを表示する Visualforce ページがあります。最近、一部の顧客が 10,000 個を超えるコンテナをレンタルしているため、このページはビュー ステートの制限により失敗しています。\nページの読み込みエラーを解決するために、開発者は Visualforce ページについて何を変更する必要がありますか?","options":[{"key":"A","text":"OffsetController を使用してページネーションを実装します。"},{"key":"B","text":"StandardSetController を使用してページネーションを実装します。"},{"key":"C","text":"SOQL オフセットで JavaScript リモート処理を使用します。"},{"key":"D","text":"遅延読み込みと一時的なリスト変数を使用します。"}],"answer":["B"],"multi":false,"explanation":"ビューステートの制限（135KB）を超える原因は、大量のレコードをコントローラの状態として保持していることです。**StandardSetController** を使ってページネーションを実装すれば、一度に保持・表示するレコードを一定件数（最大 10,000 件のセットをページ単位で取得）に抑えられ、ビューステートの肥大化を防げます。\n\n**他の選択肢が誤りの理由**\n- **A**: `OffsetController` という標準の仕組みは存在しません。\n- **C**: SOQL の `OFFSET` は最大 2,000 件までしか対応しておらず、10,000 件超のデータには使えません。\n- **D**: 遅延読み込みや `transient` 変数は緩和策にはなり得ますが、大量レコードのテーブル表示に対する標準的な解決策はページネーションであり、この問題の正答は StandardSetController です。"},{"n":33,"category":"","text":"リード開発者が「OrderRequest」という仮想クラスを作成します。次のコードスニペットをご覧ください。\nPublic class CustomerOrder {\n//code implementation\n}\n開発者は CustomerOrder クラス内で OrderRequest クラスをどのように使用できますか?","options":[{"key":"A","text":"(class=\"OrderRequest\"}public class CustomerOrder を拡張します"},{"key":"B","text":"パブリッククラス CustomerOrder は Order を実装します"},{"key":"C","text":"パブリッククラス CustomerOrder は OrderRequest を拡張します"},{"key":"D","text":"@Implements (class=\"OrderRequest\") パブリッククラス Customerorder"}],"answer":["C"],"multi":false,"explanation":"`OrderRequest` は `virtual` クラスとして定義されているため、他のクラスから利用（継承）するには **`extends`** キーワードを使用します。`public class CustomerOrder extends OrderRequest` と宣言することで、`OrderRequest` のメソッドやプロパティを継承・オーバーライドできます。\n\n**他の選択肢が誤りの理由**\n- **A, D**: `@Implements(class=...)` のようなアノテーション構文は Apex に存在しません。\n- **B**: `implements` はインターフェースの実装に使うキーワードで、virtual クラスの継承には使えません（クラス名も `Order` になっており不正確です）。"},{"n":34,"category":"","text":"Universal Containers の管理者は、システム内で削除できるのは廃止されたコンテナのみであることを保証したいと考えています。ビジネス要件を満たすために、Salesforce 開発者は Container _c オブジェクト内の Status _c カスタム フィールドの選択リスト値として「廃止」を追加します。\n開発者が「廃止」ステータスのコンテナ レコードのみを削除できるようにするために使用できる 2 つのアプローチはどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"レコードトリガーの欠陥の前"},{"key":"B","text":"Apexトリガー"},{"key":"C","text":"レコードトリガーフローの後"},{"key":"D","text":"検証ルール"}],"answer":["A","B"],"multi":true,"explanation":"削除操作を条件付きで阻止するには、削除の**前**に介入できる仕組みが必要です。**削除前（before delete）のレコードトリガーフロー**（選択肢 A の「欠陥」は「フロー」の誤記）と **Apex トリガー**（before delete で `addError` を使用）は、どちらもステータスが「廃止」でないレコードの削除をブロックできます。\n\n**他の選択肢が誤りの理由**\n- **C**: 削除後（after delete）のフローではレコードはすでに削除されており、削除を防ぐことはできません。\n- **D**: 検証ルールはレコードの作成・更新時にのみ評価され、削除時には実行されません。"},{"n":35,"category":"","text":"サンドボックスから本番環境にデプロイする場合の 2 つの考慮事項は何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"Apex コードの少なくとも 75% は単体テストでカバーされる必要があります。"},{"key":"B","text":"単体テストには System.assert メソッドの呼び出しが必要です。"},{"key":"C","text":"フィードバックに迅速に対応できるように、営業時間中に展開する必要があります。"},{"key":"D","text":"すべてのトリガーには、少なくとも 1 行のテスト カバレッジが必要です。"}],"answer":["A","D"],"multi":true,"explanation":"本番環境へのデプロイ要件として、**組織全体の Apex コードの 75% 以上が単体テストでカバーされていること**、および**すべてのトリガーに 1 行以上のテストカバレッジがあること**が必須です。これらを満たさないとデプロイは失敗します。\n\n**他の選択肢が誤りの理由**\n- **B**: `System.assert` の使用はテスト品質上のベストプラクティスですが、デプロイの必須条件ではありません。\n- **C**: 営業時間中のデプロイは要件ではなく、むしろ影響を避けるため業務時間外のデプロイが推奨されるのが一般的です。"},{"n":36,"category":"","text":"Lightning Web コンポーネントのプロパティに接続できるようにするには、開発者は Apex メソッドでどのアノテーションを使用する必要がありますか?","options":[{"key":"A","text":"@AuraEnabled(cacneable=true)"},{"key":"B","text":"@RemoteAction (cacheable-true)"},{"key":"C","text":"@RemoteAction"},{"key":"D","text":"@AuraEnabled"}],"answer":["A"],"multi":false,"explanation":"Apex メソッドを LWC のプロパティに **`@wire`** で接続するには、メソッドに **`@AuraEnabled(cacheable=true)`**（選択肢の cacneable は cacheable の誤記）を付与する必要があります。`cacheable=true` によりクライアント側でのキャッシュが有効になり、wire サービス経由での呼び出しが可能になります。\n\n**他の選択肢が誤りの理由**\n- **B, C**: `@RemoteAction` は Visualforce の JavaScript リモート処理用のアノテーションで、LWC では使用できません。\n- **D**: `@AuraEnabled` のみでは命令的（imperative）な呼び出しはできますが、wire でプロパティに接続するには `cacheable=true` が必須です。"},{"n":37,"category":"","text":"Universal Hiring は、Salesforce を使用して求人応募を取得します。Salesforce 管理者は、マスター オブジェクトとして機能する Job__c と詳細として機能する Application_c の 2 つのカスタム オブジェクトを作成しました。\nJob__c オブジェクト内では、カスタムの複数選択選択リストである preferred _Locations__c に、その職位の承認済み州のリストが含まれています。各 Job_Application__c レコードは、マスター詳細関係を通じてシステム内の連絡先に関連付けられています。\n採用担当者は、連絡先の郵送先州の値が、Job_Application__c レコード内の Preferred Locations__c フィールドで選択された値と一致するかどうかを表示する機能を要求しました。採用担当者は、連絡先の郵送先州に変更が発生した場合でも、この値が同期されたままになることを望んでいます。\nビジネス要件を満たすために開発者が使用すべき推奨ツールは何ですか?","options":[{"key":"A","text":"Apex トリガー"},{"key":"B","text":"ロールアップサマリーフィールド"},{"key":"C","text":"レコードトリガーフロー"}],"answer":["C"],"multi":false,"explanation":"連絡先の郵送先都道府県が変更されたときに、関連する応募（Job_Application__c）レコード上の一致判定を自動的に更新し続ける必要があります。この要件は宣言的ツールで実現可能であり、Salesforce では**コードより宣言的ツールを優先する**のが推奨のため、連絡先の変更を検知して関連レコードを更新する**レコードトリガーフロー**が最適です。\n\n**他の選択肢が誤りの理由**\n- **A**: Apex トリガーでも実現できますが、宣言的ツールで対応できる要件にコードを使うのは推奨アプローチではありません。\n- **B**: ロールアップサマリーは子レコードの件数や合計などの集計専用で、文字列の一致判定には使えません。"},{"n":38,"category":"","text":"次のコード スニペットの結果は何でしょうか?\npublic word doWork(Account acct) {\nfor (Integer i \\= 0; i \u003c= 2007 i++) {\ninsert acct;\n}","options":[{"key":"A","text":"アカウントが挿入されます。"},{"key":"B","text":"アカウントが挿入されました。"},{"key":"C","text":"200 個のアカウントが挿入されます。"},{"key":"D","text":"201 個のアカウントが挿入されました。"}],"answer":["A"],"multi":false,"explanation":"このコードはループ内で `insert` を 201 回実行しようとします。同期トランザクションの **DML ステートメント上限は 150 回**のため、151 回目で `LimitException` が発生します（さらに、同一の sObject インスタンスを再挿入しようとする時点でも例外になります）。ガバナ制限の例外は捕捉できず、**トランザクション全体がロールバック**されるため、結果として**アカウントは 1 件も挿入されません**（原典の選択肢は「0 accounts are inserted」です）。\n\n**他の選択肢が誤りの理由**\n- **B**: 例外発生時はトランザクション全体がロールバックされるため、途中まで成功した挿入も取り消されます。\n- **C, D**: 150 回目の DML の後に制限超過となるため、200 件や 201 件が確定することはありません。"},{"n":39,"category":"","text":"Universal Containers では、ユーザーが複数のレコードを編集できるようにする Visualforce ページを表示するリスト ボタンが必要です。\nこの要件をサポートする Visualforce 機能はどれですか?","options":[{"key":"A","text":"カスタム リスト コントローラー拡張を備えた標準コントローラー"},{"key":"B","text":"recorasetvar ページ属性を持つカスタム リスト コントローラ"},{"key":"C","text":"コントローラ拡張と \u003cspex:listButton\u003e タグ"},{"key":"D","text":"標準コントローラと recordsetvar ページ属性"}],"answer":["D"],"multi":false,"explanation":"複数レコードの一括編集を行う Visualforce ページには、**標準リストコントローラ**を使用します。ページの `standardController` 属性に加えて **`recordSetVar` 属性**を指定することでリストコントローラとして動作し、リストボタンからの複数レコード選択・編集（一括更新）を標準機能でサポートできます。\n\n**他の選択肢が誤りの理由**\n- **A**: 拡張は不要で、標準リストコントローラだけで要件を満たせます（拡張自体はリスト機能を提供しません）。\n- **B**: `recordSetVar` は標準コントローラと組み合わせて使う属性で、カスタムコントローラでは使用できません。\n- **C**: `\u003capex:listButton\u003e` というタグは存在しません。"},{"n":40,"category":"","text":"開発者がアカウント オブジェクトにトリガーを作成しました。トリガーをテストしているときに、「トリガーの最大深度を超えました」というエラー メッセージが表示されます。\n考えられる原因は何でしょうか?","options":[{"key":"A","text":"開発者に適切なユーザー権限がありません。"},{"key":"B","text":"トリガーが長すぎるため、ヘルパー クラスにリファクタリングする必要があります。"},{"key":"C","text":"トリガーのコード カバレッジが十分ではありません。"},{"key":"D","text":"トリガーが複数回実行されています"}],"answer":["D"],"multi":false,"explanation":"「maximum trigger depth exceeded（トリガーの最大深度を超えました）」は、トリガー内の DML が同じトリガーを再度起動する**再帰（recursion）**が発生し、トリガーが繰り返し実行されたことが原因です。static 変数による再帰制御や、更新対象を自レコードに限定する設計で回避します。\n\n**他の選択肢が誤りの理由**\n- **A**: 権限不足の場合は権限エラーになり、このメッセージは表示されません。\n- **B**: コードの長さや構成はこのエラーとは無関係です。\n- **C**: コードカバレッジ不足はデプロイ・テスト時の問題であり、実行時のこのエラーの原因ではありません。"},{"n":41,"category":"","text":"開発者は、ユーザーが複数の商談を作成できるページを作成しています。開発者は、現在のユーザーのデフォルトの商談レコード タイプを確認し、レコードを挿入する前にレコード タイプに基づいて特定のデフォルト値を設定するように求められます。\n開発者は現在のユーザーのデフォルトのレコード タイプをどのように見つけることができますか?","options":[{"key":"A","text":"挿入する前に、商談を作成し、現在のユーザーのデフォルトのレコード タイプのレコード ID を持つ商談レコード タイプを確認します。"},{"key":"B","text":"IDがuserinfo.getprofileID()に等しいプロファイルを照会し、プロファイル機会を使用します。getdefaultresoratype()メソッド、"},{"key":"C","text":"schema.Userinfo.Opportunity.getDefaultRecordType {) メソッドを使用します。"},{"key":"D","text":"レコード タイプのリストを取得するには、opportunity.sobjectTyps.getDeacribse().getRecordTypeInfos {) を使用し、isDefaultRecordtypeMapping {) が true になるまで反復処理します。"}],"answer":["D"],"multi":false,"explanation":"現在のユーザーのデフォルトレコードタイプは、スキーマ記述メソッドで取得します。**`Opportunity.SObjectType.getDescribe().getRecordTypeInfos()`** でレコードタイプ情報のリストを取得し、各 `RecordTypeInfo` の **`isDefaultRecordTypeMapping()`** が `true` を返すものを探すのが正しい方法です（選択肢の綴りは OCR による乱れがありますが、原典はこのメソッドです）。\n\n**他の選択肢が誤りの理由**\n- **A**: レコードを実際に作成して確認する方法は非効率で、デフォルトレコードタイプの取得方法として不適切です。\n- **B**: プロファイルオブジェクトに `getDefaultRecordType()` のようなメソッドは存在しません。\n- **C**: `Schema.UserInfo.Opportunity.getDefaultRecordType()` という API は存在しません。"},{"n":42,"category":"","text":"組織には、レコード更新要素を使用して商談を編集する既存のフローがあります。開発者は、フローを更新して連絡先も作成し、作成された連絡先の ID を商談に保存する必要があります。\n開発者はフロー内でどの更新を行う必要がありますか?","options":[{"key":"A","text":"新しい更新レコード要素を追加します。"},{"key":"B","text":"新しいロールバックレコード要素を追加します。"},{"key":"C","text":"新しいレコード作成要素を追加します。"},{"key":"D","text":"新しい Get Records 要素を追加します。"}],"answer":["C"],"multi":false,"explanation":"新しく連絡先を作成するには、フローに**レコード作成（Create Records）要素**を追加します。作成された連絡先の ID は Create Records 要素の出力として取得できるため、それを既存のレコード更新要素（またはトリガーレコードへの代入）で商談の項目に設定できます。\n\n**他の選択肢が誤りの理由**\n- **A**: 更新レコード要素は既存レコードの変更用で、新規の連絡先を作成できません。\n- **B**: ロールバックレコード要素はトランザクションの取り消し用で、レコード作成とは無関係です。\n- **D**: Get Records は既存レコードの取得用であり、新規作成はできません。"},{"n":43,"category":"","text":"開発者は、外部 Web アプリケーションで使用されるカスタム SOAP Web サービスを実装する必要があります。\n開発者は、Web アプリケーションで使用されないヘルパー メソッドを Web サービス クラスの実装に含めることを選択します。\nどのコード セグメントがクラスとメソッドの正しい宣言を示していますか?","options":[{"key":"A","text":"```apex\nwebservice class WebServiceClass {\n\nprivate Boolean helperMethod() { /* implementation ... */ }\n\nglobal static String updateRecords() { /* implementation ... */ }\n\n}\n```"},{"key":"B","text":"```apex\nglobal class WebServiceClass {\n\nprivate Boolean helperMethod() { /* implementation ... */ }\n\nwebservice static String updateRecords() { /* implementation ... */ }\n\n}\n```"},{"key":"C","text":"```apex\nwebservice class WebServiceClass {\n\nprivate Boolean helperMethod() { /* implementation ... */ }\n\nwebservice static String updateRecords() { /* implementation ... */ }\n\n}\n```"},{"key":"D","text":"```apex\nglobal class WebServiceClass {\n\nprivate Boolean helperMethod() { /* implementation ... */ }\n\nglobal String updateRecords() { /* implementation ... */ }\n\n}\n```"}],"answer":["B"],"multi":false,"explanation":"カスタム SOAP Web サービスを公開するクラスは **`global`** で宣言し、外部に公開するメソッドには **`webservice static`** キーワードを付与する必要があります。外部から使用しないヘルパーメソッドは `private` のままで問題ありません。この組み合わせを満たすのは B です。\n\n**他の選択肢が誤りの理由**\n- **A, C**: `webservice` はクラス宣言には使用できないキーワードです（クラスは `global` で宣言します）。\n- **D**: 公開メソッドに `webservice` キーワードがなく、`static` でもないため、SOAP Web サービスとして公開されません。"},{"n":44,"category":"","text":"次のコード スニペットを検討してください。\n```apex\npublic class with sharing AccountsController {\n@AuraEnabled\npublic List\u003cAccount\u003e getAllAccounts(){\nreturn [SELECT Id, Name, Industry FROM Account];\n}\n```\nApex テストクラス スニペット:\n@isTest\nprivate class with sharing AccountsController_Test {\n@testSetup\nprivate static void makeData(){\nUser user1 \\= [SELECT Id FROM User WHERE Profile.Name \\= 'System Administrator' AND isActive \\= true LIMIT 1]; User user2 \\= [SELECT Id FROM User WHERE Profile.Name \\= 'Standard User' AND UserName \\= 'test@test.\ncom' AND isActive \\= true LIMIT 1];\nTestUtils.insertAccounts(10, user1.Id);\nTestUtils.insertAccounts(20, user2.Id);\nprivate static void getAllAccounts_StandardUser_Test(){\nList\u003cAccount\u003e result \\= AccountsController.getAllAccounts();\nSystem.assertEquals(20, result.size());\nテストクラスが実行されると、アサーションは失敗します。\nテストメソッドが正常に実行されるようにするには、開発者は Apex テストメソッドにどのような変更を実装する必要がありますか?","options":[{"key":"A","text":"管理者ユーザーをメモリに照会し、行 15 と 16 を System.runAs(user); メソッド内に囲みます。"},{"key":"B","text":"標準ユーザーをメモリに照会し、行 15 と 16 を System.runAs(); メソッド内に囲みます。"},{"key":"C","text":"12 行目に @isTest(seeAllData=true); を追加し、15 行目と 16 行目を Test.startTest(); と Test で囲みます。\nstopTest(); を実行します。"},{"key":"D","text":"14 行目に System.runAs(user); を追加し、15 行目を Test.startTest(); と Test.stopTest(); で囲みます。"}],"answer":["B"],"multi":false,"explanation":"`AccountsController` は `with sharing` で宣言されているため、`getAllAccounts()` は**実行ユーザーが参照できるレコードのみ**を返します。アサーションは標準ユーザーが所有する 20 件を期待しているので、テスト内で**標準ユーザーを取得し、`System.runAs(user)` ブロックで囲んで**メソッドを実行する必要があります。runAs を使わない場合、テストはシステムコンテキストで実行され共有ルールが期待どおり適用されません。\n\n**他の選択肢が誤りの理由**\n- **A**: 管理者ユーザーで実行すると全 30 件が見えてしまい、アサーション（20 件）は失敗したままです。\n- **C**: `seeAllData=true` は組織の既存データを見えるようにする設定で、共有コンテキストの問題は解決せず、むしろテストの独立性を損ないます。\n- **D**: どのユーザーとして実行するかを指定しない `runAs` の使い方は成立せず、`Test.startTest()`/`stopTest()` はガバナ制限のリセット用で本件の解決策ではありません。"},{"n":45,"category":"","text":"開発者は、アカウントの SOQL ステートメントの結果セットを反復処理することで、メモリ内でリソースを大量に消費するアクションを実行するメソッドを Apex クラスで特定しました。このメソッドは、変更をデータベースに保存するために DML ステートメントも実行します。\nトランザクション制御を確実にし、ガバナー制限の超過を回避するために、開発者がベストプラクティスとして実装する必要がある 2 つの手法はどれですか。* 2 つの回答を選択してください。","options":[{"key":"A","text":"@ReadOnly アノテーションを使用して、SOQL によって返される行数をバイパスします。"},{"key":"B","text":"有効なデータのみがコミットされるように、部分的な DML ステートメントを使用します。"},{"key":"C","text":"System.limit クラスを使用して、現在の CPU ガバナー制限の消費を監視します。"},{"key":"D","text":"データベースの整合性を強化するには、Database.Savepoint メソッドを使用します。"}],"answer":["C","D"],"multi":true,"explanation":"リソース消費の激しい処理では、**`Limits` クラス**（`Limits.getCpuTime()` など）で現在のガバナ制限消費量を監視し、制限超過前に処理を制御するのがベストプラクティスです。また、DML を伴う処理では **`Database.setSavepoint()` と `Database.rollback()`** を使ってセーブポイントを設定し、エラー時に変更を巻き戻すことでトランザクション制御とデータ整合性を確保できます。\n\n**他の選択肢が誤りの理由**\n- **A**: `@ReadOnly` は DML を実行できなくなるため、DML を行う本メソッドには使用できません。\n- **B**: 部分成功の DML（`Database.insert(records, false)` など）は一部エラーの許容が目的で、トランザクション制御やガバナ制限対策のベストプラクティスとは言えません。"},{"n":46,"category":"","text":"開発者は、Visualforce ウィザードと連携して複数の sObject の作成と編集をサポートする単一のカスタム コントローラ クラスを持っています。ウィザードは、複数の Visualforce ページのユーザー入力と初期 URL のパラメータからデータを受け入れます。\nカスタム コントローラーを効果的にテストするために、ユニット テスト内で役立つ 3 つのステートメントはどれですか。\n3つの回答を選択してください","options":[{"key":"A","text":"String nextPage \\= controller.save().getUrl ();"},{"key":"B","text":"ApexPages.currentPage ().getParametera(}.put{'input', \"TeatValue');"},{"key":"C","text":"insert pageret;"},{"key":"D","text":"public Extendedcontroller (ApexPages.Standardcontraller entrl) { }"},{"key":"E","text":"Test. setCurrentPage (pageRef) ;"}],"answer":["A","B","E"],"multi":true,"explanation":"Visualforce のカスタムコントローラをテストする際の定石は次のとおりです。**`Test.setCurrentPage(pageRef)`** でテスト対象のページを設定し（E）、**`ApexPages.currentPage().getParameters().put('input', 'TestValue')`** で URL パラメータやユーザー入力を模擬し（B）、**`String nextPage = controller.save().getUrl()`** でアクションメソッドの戻り先ページ（PageReference）を検証します（A）。\n\n**他の選択肢が誤りの理由**\n- **C**: `PageReference` は sObject ではないため `insert` できず、構文として成立しません。\n- **D**: これは標準コントローラ拡張のコンストラクタ定義であり、カスタムコントローラの単体テスト内で使用するステートメントではありません。"},{"n":47,"category":"","text":"新機能開発の一環として、開発者は、ステートフル クライアントで実行されるタッチ イベントに応答できるレスポンシブ アプリケーションを構築するよう求められます。\nビジネス要件を完全にサポートするフレームワーク上に構築されている 2 つのテクノロジはどれですか。2 つの回答を選択してください。","options":[{"key":"A","text":"Lightning Web コンポーネント"},{"key":"B","text":"Visualforce コンポーネント"},{"key":"C","text":"Visualforce ページ"},{"key":"D","text":"オーラコンポーネント"}],"answer":["A","D"],"multi":true,"explanation":"タッチイベントに対応したレスポンシブでステートフルなアプリケーションを構築するためのフレームワークは Lightning（コンポーネントフレームワーク）です。その上に構築されている技術は **Lightning Web コンポーネント**と **Aura コンポーネント**の 2 つです。どちらもクライアント側で状態を保持する SPA 型のアーキテクチャで、モバイルのタッチ操作をサポートします。\n\n**他の選択肢が誤りの理由**\n- **B, C**: Visualforce はページ中心のサーバーサイドレンダリング（ステートレスに近いリクエスト/レスポンス型）であり、ステートフルクライアントやタッチイベントを前提としたフレームワークではありません。"},{"n":48,"category":"","text":"カスタム オブジェクト Trainer__c には、別のカスタム オブジェクト Gym__c への参照フィールドがあります。\nViridian City Gym とそのトレーナー全員のレコードを取得する SOQL クエリはどれですか?","options":[{"key":"A","text":"Trainer_c から ID を選択し、Gym_r.Name を 'Viridian City Gym' に設定します。"},{"key":"B","text":"SELECT Id、(SELECT Id FROM Trainer_c FROM Gym_c WHERE Name \\= 'Viridian City Gym\""},{"key":"C","text":"SELECT Id、(SELECT Id FROM Trainers _r) FROM Gym_c WHERE Name \\= 'Viridian City Gym'"},{"key":"D","text":"IDを選択、(選択 Id FROM Trainers _c) FROM Gym_c WHERE Name \\= 'Viridian City Gym'"}],"answer":["C"],"multi":false,"explanation":"親（Gym__c）から子（Trainer__c）を取得する親子サブクエリでは、サブクエリの FROM に**子リレーション名**を指定します。カスタムオブジェクトの子リレーション名は末尾が `__r` となるため、`SELECT Id, (SELECT Id FROM Trainers__r) FROM Gym__c WHERE Name = 'Viridian City Gym'` の形になる C が正解です。\n\n**他の選択肢が誤りの理由**\n- **A**: Trainer__c 側からの単独クエリで、ジムとトレーナー全員を 1 クエリで取得する形になっていません（親レコード自体が取得できません）。\n- **B**: サブクエリの括弧が閉じておらず、子リレーション名でもないため構文エラーです。\n- **D**: サブクエリの FROM にオブジェクト名（`Trainers__c`）を指定しており、子リレーション名（`__r`）ではないためエラーになります。"},{"n":49,"category":"","text":"開発者がバッチ メソッドまたは将来のメソッドのステータスに関する情報を見つけることができる 2 つの場所はどこですか?\n2つの回答を選択してください","options":[{"key":"A","text":"開発者コンソール"},{"key":"B","text":"Apexジョブ"},{"key":"C","text":"一時停止されたフローインタビューコンポーネント"},{"key":"D","text":"Apex Flex キュー"}],"answer":["B","D"],"multi":true,"explanation":"非同期処理の状況は、[設定] の **Apex ジョブ**ページで確認できます。バッチジョブや future メソッドのステータス（Queued、Processing、Completed など）が一覧表示されます。また、**Apex Flex キュー**では、実行待ち（Holding 状態）のバッチジョブの確認と順序の変更ができます。\n\n**他の選択肢が誤りの理由**\n- **A**: 開発者コンソールにはジョブステータス専用の画面はありません（`AsyncApexJob` をクエリすることは可能ですが、標準の確認場所ではありません）。\n- **C**: 一時停止されたフローインタビューはフローの中断状態を表示するもので、Apex の非同期ジョブとは無関係です。"},{"n":50,"category":"","text":"開発者は、従来のオンプレミス SQL データベースと統合しています。\n統合されるデータが Salesforce 内の適切なレコードと一致することを確認するために、開発者は何を使用すればよいでしょうか?","options":[{"key":"A","text":"外部オブジェクト"},{"key":"B","text":"外部IDフィールド"},{"key":"C","text":"数式フィールド"},{"key":"D","text":"ルックアップフィールド"}],"answer":["B"],"multi":false,"explanation":"外部システムとのデータ統合でレコードを正しく照合するには、**外部 ID 項目（External ID field）**を使用します。外部システム側の一意キーを外部 ID 項目に保持することで、upsert 操作により Salesforce ID を知らなくても既存レコードとの一致判定（更新か新規作成か）が自動的に行われます。\n\n**他の選択肢が誤りの理由**\n- **A**: 外部オブジェクトは外部データを Salesforce 内に保存せず仮想的に参照する仕組みで、レコードの照合（マッチング）用途ではありません。\n- **C**: 数式項目は表示用の計算値であり、統合時のキーとして upsert に使用できません。\n- **D**: ルックアップ項目は Salesforce 内部のレコード間の関連付けで、外部システムのキーとの照合には使えません。"},{"n":51,"category":"","text":"ISV Salesforce パートナーの Cloud Kicks Fitness は、管理パッケージ アプリケーションを開発しています。アプリケーション モジュールの 1 つでは、Apex クラス Bodyfat とそのメソッド calculateBodyFat () を使用して、ユーザーが体脂肪を計算できます。製品所有者は、ISV のパッケージ名前空間外でカスタマイズを開発するときに、アプリケーションの消費者がこのメソッドにアクセスできるようにしたいと考えています。\ncalculateBodyFat() がパッケージ名前空間の外部からアクセス可能であることを保証するために、開発者はどのようなアプローチを取るべきでしょうか?","options":[{"key":"A","text":"グローバル アクセス修飾子を使用してクラスとメソッドを宣言します。"},{"key":"B","text":"public アクセス修飾子を使用してクラスとメソッドを宣言します。"},{"key":"C","text":"クラスを public として宣言し、メソッドにグローバル アクセス修飾子を使用します。"},{"key":"D","text":"クラスをグローバルとして宣言し、メソッドに public アクセス修飾子を使用します。"}],"answer":["A"],"multi":false,"explanation":"管理パッケージの名前空間の**外部**からクラスやメソッドにアクセスできるようにするには、クラスとメソッドの両方を `global` アクセス修飾子で宣言する必要があります。`global` は管理パッケージの API として公開する唯一の手段であり、`global` メソッドを持つクラス自体も `global` でなければコンパイルエラーになります。\n\n**他の選択肢が誤りの理由**\n- **B**: `public` は同一名前空間（パッケージ内）でのみアクセス可能で、パッケージ外のサブスクライバー組織からは参照できません。\n- **C**: `global` メソッドを含むクラスは `global` で宣言する必要があるため、`public` クラスに `global` メソッドは定義できません。\n- **D**: クラスが `global` でもメソッドが `public` では、そのメソッドは名前空間の外部から呼び出せません。"},{"n":52,"category":"","text":"どの例外タイプをキャッチできないでしょうか?","options":[{"key":"A","text":"カスタム例外"},{"key":"B","text":"リンク例外"},{"key":"C","text":"アクセス例外なし"},{"key":"D","text":"セルアウト例外"}],"answer":["B"],"multi":false,"explanation":"選択肢 B は **LimitException**（機械翻訳で「リンク例外」と誤変換）を指しており、これはガバナ制限超過時に Salesforce プラットフォームがスローする例外で、**try-catch でキャッチできません**。ガバナ制限はマルチテナント環境を保護するための仕組みであり、超過するとトランザクションが即座に強制終了されます。\n\n**他の選択肢が誤りの理由**\n- **A（カスタム例外）**: `Exception` を継承した独自例外は通常どおり catch できます。\n- **C（NoAccessException）**: 権限不足時の例外で、catch 可能です。\n- **D（CalloutException）**: 外部コールアウト失敗時の例外で、catch 可能です。"},{"n":53,"category":"","text":"Visualforce ページで Lightning コンポーネントを作成するために必要な 3 つのコード行はどれですか。\n3つの回答を選択してください。","options":[{"key":"A","text":"$Lightning.use"},{"key":"B","text":"$Lightning.useComponent"},{"key":"C","text":"\u003capex:includeLightning/\u003e"},{"key":"D","text":"\u003capex:slds/\u003e"},{"key":"E","text":"$Lightning.createComponent"}],"answer":["A","C","E"],"multi":true,"explanation":"Visualforce ページ内で Lightning コンポーネント（Aura）を表示するには **Lightning Out for Visualforce** を使用します。手順は次の 3 つです。(1) `\u003capex:includeLightning/\u003e` タグで Lightning Out の JavaScript ライブラリを読み込む、(2) `$Lightning.use()` で Lightning Out 対応アプリケーション（依存アプリ）を参照する、(3) `$Lightning.createComponent()` でコンポーネントを動的に生成してページに挿入する。\n\n**他の選択肢が誤りの理由**\n- **B**: `$Lightning.useComponent` というメソッドは存在しません。\n- **D**: `\u003capex:slds/\u003e` は Salesforce Lightning Design System のスタイルを適用するタグであり、コンポーネントの生成には関与しません。"},{"n":54,"category":"","text":"```apex\nBoolean isOK;\nInteger x;\nString theString = 'Hello';\n\nif (isOK == false && theString == 'Hello') {\n    x = 1;\n} else if (isOK == true && theString == 'Hello') {\n    x = 2;\n} else if (isOK != null && theString == 'Hello') {\n    x = 3;\n} else {\n    x = 4;\n}\n```\nこのコードに基づくと、x の値は何ですか?","options":[{"key":"A","text":"4"},{"key":"B","text":"1"},{"key":"C","text":"2"},{"key":"D","text":"3"}],"answer":["A"],"multi":false,"explanation":"変数 `isOK` は初期化されていないため値は `null` です。Apex では **`null` と Boolean 値の比較（`null == false` や `null == true`）は `false` を返す**ため、最初の 2 つの条件は成立しません。3 つ目の `isOK != null` も `null != null` で `false` となるため、最終的に `else` ブロックが実行され **x = 4** になります。\n\n**他の選択肢が誤りの理由**\n- **B（x=1）**: `isOK == false` は `null == false` となり `true` にはなりません。\n- **C（x=2）**: `isOK == true` も同様に成立しません。\n- **D（x=3）**: `isOK != null` は `false` なのでこの分岐には入りません。"},{"n":55,"category":"","text":"次の Apex ステートメントがあるとします。\nアカウント myAccount \\= [アカウントから Id、名前を選択);\nSOQL クエリによって複数のアカウントが返された場合、何が起こりますか?","options":[{"key":"A","text":"変数 myaccount は自動的に List データ型にキャストされます。"},{"key":"B","text":"未処理の例外がスローされ、コードが終了します。"},{"key":"C","text":"クエリが失敗し、デバッグ ログにエラーが書き込まれます。"},{"key":"D","text":"返された最初のアカウントは myAccount に割り当てられます。"}],"answer":["B"],"multi":false,"explanation":"SOQL クエリの結果を単一の sObject 変数（`Account myAccount = [SELECT Id, Name FROM Account];`）に代入する場合、クエリが**ちょうど 1 件**を返さなければなりません。複数行が返されると `System.QueryException: List has more than 1 row for assignment to SObject` がスローされ、未処理のままコードが終了します。\n\n**他の選択肢が誤りの理由**\n- **A**: Apex は変数の型を自動的に `List` へキャストすることはありません。\n- **C**: クエリ自体は成功しており、失敗するのは単一変数への代入です。またエラーがログに書かれるだけで処理が継続することはありません。\n- **D**: 先頭 1 件が自動的に代入される仕様はありません（0 件の場合も同様に例外が発生します）。"},{"n":56,"category":"","text":"開発者が組織内でテストを実行する 2 つの方法は何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"ツール API"},{"key":"B","text":"メタデータ API"},{"key":"C","text":"バルクAPI"},{"key":"D","text":"開発者コンソール"}],"answer":["A","D"],"multi":true,"explanation":"組織内で Apex テストを実行する方法として、**Tooling API**（`runTestsAsynchronous` / `runTestsSynchronous` エンドポイント）と**開発者コンソール（Developer Console）**の Test メニューが公式にサポートされています。そのほか Salesforce UI（Apex テスト実行ページ）や Salesforce CLI などもありますが、選択肢の中ではこの 2 つが該当します。\n\n**他の選択肢が誤りの理由**\n- **B（メタデータ API）**: メタデータのリリース（デプロイ）時に付随してテストが実行されることはありますが、テスト実行そのものを目的とした API ではありません。\n- **C（Bulk API）**: 大量データの読み込み・抽出用の API であり、テスト実行機能はありません。"},{"n":57,"category":"","text":"開発者が、キュー可能インターフェースを実装するクラスのキューに入れられたジョブのステータスを取得できる 2 つの方法は何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"Apexステータスページを表示する"},{"key":"B","text":"Apexジョブページを表示する"},{"key":"C","text":"AsyncApexJobオブジェクトをクエリする"},{"key":"D","text":"Apex Flex キューを表示する"}],"answer":["B","C"],"multi":true,"explanation":"`Queueable` インターフェースを実装したジョブは `System.enqueueJob()` でキューに投入され、そのステータスは (1) **[設定] の [Apex ジョブ] ページ（Apex Jobs）**で画面から確認する、(2) **`AsyncApexJob` オブジェクトを SOQL でクエリする**（`SELECT Status, NumberOfErrors FROM AsyncApexJob WHERE Id = :jobId`）、の 2 つの方法で取得できます。\n\n**他の選択肢が誤りの理由**\n- **A**: 「Apex ステータスページ」という設定ページは存在しません。\n- **D**: Apex Flex キューは**保留中（Holding）状態のバッチジョブ**の実行順を管理するためのもので、Queueable ジョブのステータス確認には使用しません。"},{"n":58,"category":"","text":"AW Computing の開発者は、カスタム オブジェクト Pricing Structure c 内に保存されたレコードを活用するプログラムによるカスタマイズをサポートするテスト クラスを作成するように求められています。AW Computing では、ストアの各アイテムに対して 500 を超えるレコードにわたる複雑な価格設定構造を持っています。\nテスト クラスの実行時に Pricing _Structure__c レコードが利用可能であることを保証するために、開発者が使用できる 2 つのアプローチはどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"Test Date Factory クラスを使用します。"},{"key":"B","text":"@TsTest (SeeAllData=true) アノテーションを使用します。"},{"key":"C","text":"Test.leadteat{) メソッドを使用します。"},{"key":"D","text":"クラス宣言で共有せずに使用します。"}],"answer":["A","C"],"multi":true,"explanation":"テストクラスで 500 件超の複雑な `Pricing_Structure__c` レコードを利用可能にするには、(1) **テストデータファクトリクラス**（Test Data Factory）で再利用可能なテストデータ生成ロジックを実装する方法と、(2) **`Test.loadData()` メソッド**（選択肢の「Test.leadteat」は OCR 誤り）で静的リソースの CSV からレコードを一括ロードする方法が適切です。どちらもテストを組織の実データから分離したまま大量データを準備できます。\n\n**他の選択肢が誤りの理由**\n- **B**: `@isTest(SeeAllData=true)` は組織の実データに依存するためテストが脆弱になり、ベストプラクティスに反します。\n- **D**: `without sharing` は共有ルールの適用有無を制御するキーワードであり、テストデータの準備とは無関係です。"},{"n":59,"category":"","text":"開発者は、失注理由が空白の場合、営業マネージャー プロファイルを持つユーザー以外のユーザーが商談ステータスを「クローズ済み失注」に変更できないようにする必要があります。\nどの自動化によって、開発者はこの要件を最も効率的に満たすことができますか?","options":[{"key":"A","text":"Opportunity オブジェクトの Apex トリガー"},{"key":"B","text":"Opportunity の検証ルールのエラー条件式"},{"key":"C","text":"Opportunityオブジェクトのレコードトリガーフロー"},{"key":"D","text":"商談オブジェクトの承認プロセス"}],"answer":["B"],"multi":false,"explanation":"「失注理由が空白の場合、営業マネージャープロファイル以外のユーザーは商談フェーズを『クローズ済み失注』に変更できない」という要件は、**入力チェック（検証ルール）のエラー条件数式**で最も効率的に実現できます。`ISPICKVAL(StageName, 'Closed Lost')`、`ISBLANK()`、`$Profile.Name` を組み合わせた数式のみで実装でき、コードもフローも不要です。\n\n**他の選択肢が誤りの理由**\n- **A（Apex トリガー）**: 宣言的手段で実現できる要件にコードを使うのは効率的ではありません。\n- **C（レコードトリガーフロー）**: 保存をブロックする単純な条件チェックには検証ルールの方が簡潔で保守性も高いです。\n- **D（承認プロセス）**: 承認申請の仕組みであり、項目値の入力チェックには適しません。"},{"n":60,"category":"","text":"Universal Containers (UC) は、注文と注文明細項目の間にマスター詳細関係を持つ、すぐに使用できる注文管理を使用します。\nUC は各注文明細項目の入手可能日を保存し、すべての注文明細項目が入手可能な場合にのみ注文が発送されます。\n注文の予想出荷日を計算するにはどの方法を使用すればよいですか?","options":[{"key":"A","text":"最新の利用可能日フィールドごとに 2 つの LATEST 数式を使用します。"},{"key":"B","text":"最新の利用可能日フィールドごとに CEILING 数式を使用します。"},{"key":"C","text":"注文の可用性日付フィールドと COUNT ロールアップ サマリー フィールドのそれぞれに @ DAYS 数式を使用します。"},{"key":"D","text":"最新の利用可能日フィールドで MAX ロールアップ サマリー フィールドを使用します。"}],"answer":["D"],"multi":false,"explanation":"注文（Order）と注文明細（Order Line Item）は主従関係（マスター詳細）にあるため、親の注文側に**ロールアップサマリー項目**を作成できます。「すべての明細が入手可能になる日 = 明細の入手可能日の最大値」なので、明細の入手可能日項目に対して **MAX を集計種別としたロールアップサマリー項目**を注文に定義するのが正解です。\n\n**他の選択肢が誤りの理由**\n- **A**: LATEST という数式関数は存在しません。\n- **B**: CEILING は数値の切り上げ関数であり、子レコード群から最大日付を求めることはできません。\n- **C**: COUNT のロールアップは件数を数えるだけで、最も遅い日付は取得できません。"},{"n":61,"category":"","text":"Universal Containers (UC) は、Vendor と呼ばれるカスタム オブジェクトを使用します。Vendor カスタム オブジェクトは、標準の Account オブジェクトとマスター詳細関係を持ちます。\n社内での議論に基づいて、UC 管理者はマスター詳細関係を参照関係に変更しようとしましたが、変更できませんでした。\nこの変更が許可されなかった理由として考えられるものは何ですか?","options":[{"key":"A","text":"一部のベンダー レコードのアカウント フィールドに null が含まれています。"},{"key":"B","text":"アカウント オブジェクトには、ベンダー オブジェクトのロールアップ サマリー フィールドがあります。"},{"key":"C","text":"アカウント オブジェクトでは、カスタム フィールドのフィールド タイプを変更できません。"},{"key":"D","text":"ベンダー オブジェクトの組織全体のデフォルトは、パブリック読み取り/書き込みです。"}],"answer":["B"],"multi":false,"explanation":"マスター詳細関係を参照関係（Lookup）に変更できない代表的な理由は、**親オブジェクト（Account）に子オブジェクト（Vendor）を対象としたロールアップサマリー項目が存在する**ことです。ロールアップサマリーはマスター詳細関係にのみ定義できるため、先にロールアップサマリー項目を削除しない限り関係の変換は許可されません。\n\n**他の選択肢が誤りの理由**\n- **A**: マスター詳細関係では親項目は必須のため null のレコードは存在し得ません（null があると問題になるのは逆方向、参照→主従への変換時です）。\n- **C**: マスター詳細から参照への項目種別の変更自体は条件を満たせば可能です。\n- **D**: 子オブジェクトの組織の共有設定（OWD）は主従関係では親に従属しており、変換可否の直接的な制約ではありません。"},{"n":62,"category":"","text":"Universal Containers は、Salesforce 組織内のすべてのデータと添付ファイルを月に 1 回バックアップしたいと考えています。\nこの要件を満たすために開発者はどのアプローチを使用すべきでしょうか?","options":[{"key":"A","text":"レポートをスケジュールします。"},{"key":"B","text":"データローダーのコマンドラインを使用します。"},{"key":"C","text":"データ エクスポートのスケジュールされたジョブを定義します。"},{"key":"D","text":"スケジュール可能な Apex クラスを作成します。"}],"answer":["C"],"multi":false,"explanation":"組織内の**すべてのデータと添付ファイル**を月 1 回バックアップするには、[設定] の**データエクスポートサービス（Data Export）**でスケジュールエクスポートを定義するのが標準的な方法です。週次または月次でのスケジュール実行が可能で、添付ファイル・ドキュメント・Chatter ファイルも含めて ZIP 形式の CSV としてエクスポートできます。\n\n**他の選択肢が誤りの理由**\n- **A（レポートのスケジュール）**: レポートでは全オブジェクト・全データや添付ファイルを網羅的に出力できません。\n- **B（データローダーの CLI）**: オブジェクトごとの個別設定が必要で、添付ファイルを含む全データの一括バックアップには非効率です。\n- **D（スケジュール可能な Apex）**: ガバナ制限の中で全データを抽出・保存する仕組みを自作することになり、標準機能がある以上不適切です。"},{"n":63,"category":"","text":"経営陣は、年間売上高が100万ドルを超える取引先に対して商談を自動的に作成するよう依頼しました。開発者は、この要件を満たすために、取引先オブジェクトに次のトリガを作成しました。\nfor (Account a : Trigger.new) {\nif (a.AnnualRevenue \u003e 1000000) {\nList\u003cOpportunity\u003e oppList \\= [SELECT Id FROM Opportunity WHERE AccountId \\= :a.Id]; if (oppList.size() \\== 0) { Opportunity oppty \\= new Opportunity(Name \\= a.Name, StageName \\= 'Prospecting', CloseDate \\= System.\ntoday().addDays(30));\ninsert oppty;\n}\nユーザーはUIから取引先レコードを更新でき、年間売上高の高い取引先向けに作成された商談を確認できます。しかし、管理者がデータローダーを使用して179件の取引先リストをアップロードしようとすると、システム例外エラーが発生し、アップロードに失敗します。\n上記のコード セグメントを修正するために開発者が実行する必要がある 2 つのアクションはどれですか。\n2つの答えを選択してください","options":[{"key":"A","text":"for ループの外側にある既存の商談をクエリします。"},{"key":"B","text":"作成時に商談のすべての必須フィールドが追加されているかどうかを確認します。"},{"key":"C","text":"機会を保存する DML を for ループの外側に移動します。"},{"key":"D","text":"データベース クエリを使用して機会を照会します。"}],"answer":["A","C"],"multi":true,"explanation":"このトリガーは **for ループ内で SOQL クエリと DML（insert）を実行**しており、一括処理（バルク化）されていません。データローダーで 179 件をアップロードするとループごとにクエリと DML が実行され、ガバナ制限（SOQL は 1 トランザクション 100 回、DML は 150 回）を超過して例外が発生します。修正には、(1) **既存商談のクエリをループの外に出す**（取引先 ID のセットで一括クエリ）、(2) **商談を挿入する DML をループの外に移動する**（リストに溜めて一括 insert）の 2 つが必要です。\n\n**他の選択肢が誤りの理由**\n- **B**: 必須項目（Name、StageName、CloseDate）はすでに設定されており、エラーの原因はガバナ制限です。\n- **D**: `Database.query()` に書き換えてもループ内で実行する限り SOQL 回数の制限超過は解消しません。"},{"n":64,"category":"","text":"変更セット展開の 3 つの特徴は何ですか?\n3 つの回答を選択してください。2 つの組織間で変更セットを送信するには、デプロイメント接続が必要です。","options":[{"key":"A","text":"変更セットはカスタム設定データを展開できます。"},{"key":"B","text":"変更セットは関連する組織間でのみ使用できます。"},{"key":"C","text":"デプロイメントは一方向の単一トランザクションで実行されます。"},{"key":"D","text":"2 つの組織間で変更セットを送信するには、デプロイメント接続が必要です。"},{"key":"E","text":"変更セットを使用してレコードを転送できます。"}],"answer":["B","C","D"],"multi":true,"explanation":"変更セット（Change Set）の特徴は次のとおりです。(1) **関連する組織間（本番組織とその Sandbox、または同一本番組織から作成された Sandbox 同士）でのみ使用できる**、(2) **リリースは一方向の単一トランザクションとして実行される**（送信された変更セットをそのまま送り返して編集することはできず、デプロイは全体で成功か失敗のいずれか）、(3) **組織間で変更セットを送受信するにはリリース接続（Deployment Connection）の承認が必要**。\n\n**他の選択肢が誤りの理由**\n- **A**: 変更セットで移行できるのはカスタム設定の**定義（メタデータ）**のみで、データ（レコード値）は展開できません。\n- **E**: 変更セットはメタデータ専用であり、レコード（データ）の転送はできません。"},{"n":65,"category":"","text":"Universal Containers は、新しい Salesforce アプリケーションを構築するために、完全に宣言型の開発を使用することを決定しました。\nこのアプリケーションのビジネス ロジック レイヤーを構築するために使用できる 2 つのオプションはどれですか?\n2つの回答を選択してください","options":[{"key":"A","text":"レコードトリガーフロー"},{"key":"B","text":"バッチジョブ"},{"key":"C","text":"リモートアクション"},{"key":"D","text":"検証ルール"}],"answer":["A","D"],"multi":true,"explanation":"完全に宣言型（ノーコード）でビジネスロジック層を構築できるのは、**レコードトリガーフロー**（レコードの作成・更新・削除を契機に自動化ロジックを実行）と**入力規則（検証ルール）**（数式によるデータ整合性の強制）です。いずれも Apex コードを一切書かずに設定のみで実装できます。\n\n**他の選択肢が誤りの理由**\n- **B（バッチジョブ）**: `Database.Batchable` インターフェースを実装した Apex コードが必要です。\n- **C（リモートアクション）**: `@RemoteAction` は Visualforce から呼び出す Apex メソッドであり、プログラム型の手段です。"},{"n":66,"category":"","text":"Universal Containers には、注文番号を使用して顧客とサービス エージェントの注文を識別する注文システムがあります。注文レコードは Salesforce にインポートされます。\nSalesforce で注文番号フィールドをどのように定義すればよいですか?","options":[{"key":"A","text":"間接ロックアップ"},{"key":"B","text":"直接検索"},{"key":"C","text":"外部IDと一意"},{"key":"D","text":"検索"}],"answer":["C"],"multi":false,"explanation":"外部の注文システムで採番された注文番号でレコードを識別し、Salesforce にインポートする場合、注文番号項目は**外部 ID（External ID）かつ一意（Unique）**として定義すべきです。外部 ID にすることでデータローダーや API の **upsert 操作**でレコードの照合キーとして使用でき、一意制約により重複レコードの作成を防止できます。\n\n**他の選択肢が誤りの理由**\n- **A（間接参照関係）**: 間接ルックアップは Salesforce Connect の外部オブジェクトと連携するための項目種別で、このシナリオには該当しません。\n- **B / D（参照関係）**: ルックアップは Salesforce 内の別レコードへの参照であり、外部システムのキー値の保持・照合には使えません。"},{"n":67,"category":"","text":"開発者は Visualforce ページを Lightning Web コンポーネントに移行しています。\nVisualforce ページには、単一のレコードに関する情報が表示されます。開発者は、レコード データにアクセスするために Lightning Data Service を使用することにしました。\n開発者はどのようなセキュリティ上の考慮事項に注意する必要がありますか?","options":[{"key":"A","text":"Lightning データ サービスはフィールド レベルのセキュリティを無視します。"},{"key":"B","text":"共有ルールを適用するには、with sharing キーワードを使用する必要があります。"},{"key":"C","text":"Lightning データサービスは共有ルールとフィールドレベルのセキュリティを処理します。"},{"key":"D","text":"フィールドレベルのアクセス チェックには、isAccessible () メソッドを使用する必要があります。"}],"answer":["C"],"multi":false,"explanation":"**Lightning Data Service（LDS）**（`lightning-record-form` や `@wire(getRecord)` など）は、レコードへのアクセス時に**共有ルール（レコードレベルセキュリティ）と項目レベルセキュリティ（FLS）を自動的に適用**します。そのため開発者が追加のセキュリティチェックを実装する必要がなく、これが Apex コントローラ経由のアクセスに対する大きな利点です。\n\n**他の選択肢が誤りの理由**\n- **A**: LDS は FLS を無視せず、むしろ自動的に尊重します。\n- **B**: `with sharing` は Apex クラスに対するキーワードであり、LDS の使用時には不要です。\n- **D**: `isAccessible()`（`Schema.DescribeFieldResult`）は Apex 内で手動 FLS チェックを行う場合の手段で、LDS では不要です。"},{"n":68,"category":"","text":"Aura アプリケーション イベントは従来のパブリッシュ/サブスクライブ モデルに従うため、イベントを起動するにはどの方法が使用されますか?","options":[{"key":"A","text":"発射()"},{"key":"B","text":"セグメントイベント (}"},{"key":"C","text":"ファイアイベント()"},{"key":"D","text":"出力()"}],"answer":["A"],"multi":false,"explanation":"Aura のアプリケーションイベントは、`$A.get(\"e.myNamespace:myAppEvent\")` でイベントインスタンスを取得し、**`fire()` メソッド**（選択肢の「発射()」は fire() の直訳）を呼び出して起動します。これはコンポーネントイベントでも同様で、`setParams()` で属性を設定した後に `fire()` を実行するのが標準的なパターンです。\n\n**他の選択肢が誤りの理由**\n- **B（sentEvent() 相当）**: そのようなメソッドは Aura フレームワークに存在しません。\n- **C（fireEvent() 相当）**: `fireEvent()` という API は Aura のイベント起動メソッドではありません。\n- **D（emit() 相当）**: `emit()` は Node.js 等のイベントモデルの用語で、Aura では使用しません。"},{"n":69,"category":"","text":"開発者は Salesforce プラットフォーム上で新しいアプリケーションを設計しており、複数のテナントを効果的にサポートできることを確認したいと考えています。\nスケーラビリティと保守性を確保するために、開発者はどの設計フレームワークを考慮する必要がありますか?","options":[{"key":"A","text":"ウォーターフォールモデル"},{"key":"B","text":"Flux (ビュー、アクション、ディスパッチャ、ストア)"},{"key":"C","text":"モデル・ビュー・コントローラ (MVC)"},{"key":"D","text":"アジャイル開発"}],"answer":["C"],"multi":false,"explanation":"Salesforce プラットフォームは **MVC（Model-View-Controller）**設計パターンに基づいて構築されており、モデル（オブジェクト・項目）、ビュー（ページレイアウト・Visualforce・Lightning コンポーネント）、コントローラ（Apex・フロー等のロジック）を分離することで、マルチテナント環境におけるスケーラビリティと保守性を確保できます。新しいアプリケーションを設計する際に考慮すべき設計フレームワークは MVC です。\n\n**他の選択肢が誤りの理由**\n- **A（ウォーターフォール）/ D（アジャイル）**: これらはソフトウェア開発の**プロセス（進め方）**であり、アプリケーションの設計フレームワークではありません。\n- **B（Flux）**: Flux は React 系のクライアントサイド状態管理アーキテクチャで、Salesforce プラットフォームの設計フレームワークではありません。"},{"n":70,"category":"","text":"開発者は、Apex クラス内のメソッドをインポートする Lightning Web コンポーネントを作成します。検証ボタンが押されると、メソッドが実行され、複雑な検証が実行されます。\nこの実装シナリオでは、MVC アーキテクチャに従ってコントローラーにどの 2 つのオプションがありますか?\n2つの回答を選択してください","options":[{"key":"A","text":"HTML ファイル"},{"key":"B","text":"Apexクラス"},{"key":"C","text":"JavaScript ファイル"},{"key":"D","text":"XMLファイル"}],"answer":["B","C"],"multi":true,"explanation":"Lightning Web Component を MVC アーキテクチャに当てはめると、**コントローラ**の役割を担うのは、ユーザー操作（ボタン押下）をハンドリングしてロジックを呼び出す **JavaScript ファイル**と、`@AuraEnabled` メソッドでサーバー側の複雑な検証処理を実行する **Apex クラス**の 2 つです。クライアント側とサーバー側の両方でコントローラ層が構成されます。\n\n**他の選択肢が誤りの理由**\n- **A（HTML ファイル）**: HTML テンプレートは画面表示を担う**ビュー**に該当します。\n- **D（XML ファイル）**: メタ設定ファイル（js-meta.xml）はコンポーネントの公開範囲などを定義する構成情報であり、MVC のいずれの層のロジックも持ちません。"},{"n":71,"category":"","text":"開発者は、連絡先情報を収集するためのカスタム Lightning Web コンポーネントを構築するタスクを負っています。\nフォームは組織内のさまざまなタイプのユーザー間で共有されます。特定のフィールドのみが特定のユーザー グループによって編集および表示できるようにするというセキュリティ要件があります。\nセキュリティ要件をサポートするために、開発者は Lightning Web コンポーネントで何を使用すればよいでしょうか?","options":[{"key":"A","text":"オーラ入力失敗"},{"key":"B","text":"強制入力に失敗しました"},{"key":"C","text":"UI入力に失敗しました"},{"key":"D","text":"雷入力失敗"}],"answer":["D"],"multi":false,"explanation":"選択肢 D は **`lightning-input-field`**（機械翻訳で「雷入力失敗」と誤変換）を指します。`lightning-record-edit-form` と組み合わせて使用する `lightning-input-field` は、**項目レベルセキュリティ（FLS）と CRUD 権限を自動的に尊重**するため、「特定の項目を特定のユーザーグループのみが表示・編集できる」というセキュリティ要件をコード追加なしで満たせます。\n\n**他の選択肢が誤りの理由**\n- **A（aura:inputField 相当）**: Aura の旧コンポーネントであり、LWC では使用できません。\n- **B（force:inputField 相当）**: 非推奨の Aura コンポーネントで、LWC では使用できません。\n- **C（ui:inputField 相当）**: `ui` 名前空間のコンポーネントは廃止されており、FLS も自動適用されません。"},{"n":72,"category":"","text":"次の匿名ブロックがあるとします。\n```apex\nList\u003cCase\u003e casesToUpdate = new List\u003cCase\u003e();\nfor (Case thisCase : [SELECT Id, Status FROM Case LIMIT 50000]) {\n    thisCase.Status = 'Working';\n    casesToUpdate.add(thisCase);\n}\ntry {\n    Database.update(casesToUpdate, false);\n} catch (Exception e) {\n    System.debug(e.getMessage());\n```\n10,000 件を超えるケース レコードがある環境では、開発者は何を考慮すべきでしょうか?","options":[{"key":"A","text":"トランザクションは成功し、変更がコミットされます。"},{"key":"B","text":"try-catch ブロックは、ガバナー制限によってスローされた例外を処理します。"},{"key":"C","text":"ガバナー制限を超えたため、トランザクションは失敗します。"},{"key":"D","text":"try-catchブロックはスローされたDML例外を処理します。"}],"answer":["C"],"multi":false,"explanation":"このコードは最大 50,000 件のケースを取得し、1 回の `Database.update()` で更新しようとしていますが、**1 トランザクションで DML 処理できるレコード数の上限は 10,000 件**です。10,000 件を超える環境ではガバナ制限超過により `System.LimitException` がスローされ、**LimitException は catch できない**ため try-catch があってもトランザクションは失敗します。\n\n**他の選択肢が誤りの理由**\n- **A**: DML 行数制限を超えるため成功しません。\n- **B**: ガバナ制限による `LimitException` は try-catch で捕捉できません。\n- **D**: 発生するのは DML 例外（`DmlException`）ではなく、捕捉不能な `LimitException` です。"},{"n":73,"category":"","text":"開発者は、レコードが特定の条件を満たしたときに送信メッセージを送信したいと考えています。\nこのユースケースを満たす 2 つの機能はどれですか?","options":[{"key":"A","text":"Flow Builder を使用して、レコード条件を確認し、送信メッセージを送信できます。"},{"key":"B","text":"承認プロセスを使用すると、レコードの条件を確認し、Apex コードなしで送信メッセージを送信できます。"},{"key":"C","text":"エンタイトルメントプロセスを使用すると、レコード条件を確認し、Apex コードなしで送信メッセージを送信できます。"},{"key":"D","text":"次善のアクションを使用して、レコード条件を確認し、送信メッセージを送信できます。"}],"answer":["A","B"],"multi":true,"explanation":"送信メッセージ（アウトバウンドメッセージ）は、**フロー（レコードトリガーフロー）のアクション**および**承認プロセスのアクション**として、レコードが条件を満たしたときに宣言的に送信できます。\n\n- **C（Apex トリガー）**: トリガーから送信メッセージ機能を直接呼び出すことはできず、実現するには HTTP コールアウトを自前で実装する必要があります。\n- **D（Lightning コンポーネント）**: UI コンポーネントであり、レコード条件に基づく自動送信の仕組みではありません。"},{"n":74,"category":"","text":"Universal Containers (UC) は、営業チーム向けに、すべての営業担当者が獲得した新規顧客ごとにスクリプト化された一連の手順を実行することを要求するプロセスを開発しています。\n情報収集の最初のステップでは、REST エンドポイントを介して UC の ERP システムをチェックし、顧客が存在するかどうかを確認する必要があります。顧客が存在する場合は、そのデータを Salesforce の営業担当者に提示する必要があります。\n要件を満たすために開発者が実装する必要がある 2 つはどれですか?\n2つの回答を選択してください","options":[{"key":"A","text":"フロー"},{"key":"B","text":"呼び出し可能なメソッド"},{"key":"C","text":"将来のメソッド"},{"key":"D","text":"トリガー"}],"answer":["A","B"],"multi":true,"explanation":"「営業担当者がスクリプト化された一連の手順を実行する」ガイド付き UI は**画面フロー（Flow）**で構築し、「REST エンドポイント経由で ERP システムに顧客の存在を確認する」コールアウト処理は **`@InvocableMethod`（呼び出し可能なメソッド）**を持つ Apex クラスとして実装してフローから呼び出します。この組み合わせにより、宣言的な画面遷移とプログラムによる外部連携を統合できます。\n\n**他の選択肢が誤りの理由**\n- **C（future メソッド）**: `@future` は非同期実行で戻り値を返せないため、確認結果をその場で営業担当者に提示する要件を満たせません。\n- **D（トリガー）**: トリガーはレコードの保存を契機とする自動化であり、対話的な一連の手順の実行や結果の画面表示には使用できません。"},{"n":75,"category":"","text":"クレジットカード会社は、サービス エージェントが破損または盗難にあったクレジットカードを処理するための機能を実装する必要があります。顧客からの電話を受けた場合、サービス エージェントは多くの情報を収集する必要があります。この機能を実装するタスクは開発者に課せられます。\nこの要件を最も効率的に満たすために、開発者は何を使用すべきでしょうか?","options":[{"key":"A","text":"画面ベースのフロー"},{"key":"B","text":"承認プロセス"},{"key":"C","text":"Apexトリガー"},{"key":"D","text":"Lightning コンポーネント"}],"answer":["A"],"multi":false,"explanation":"サービスエージェントが顧客からの電話を受けながら**多くの情報を段階的に収集する**ユースケースには、**画面フロー（Screen Flow）**が最も効率的です。複数の入力画面をウィザード形式で構成し、条件分岐やレコードの作成・更新まで宣言的に実装できるため、開発コストと保守コストを最小限に抑えられます。\n\n**他の選択肢が誤りの理由**\n- **B（承認プロセス）**: レコードの承認手続きのための機能であり、対話的な情報収集はできません。\n- **C（Apex トリガー）**: レコード保存時に動作するバックエンド処理で、UI を提供できません。\n- **D（Lightning コンポーネント）**: カスタム開発すれば実現可能ですが、コード開発が必要となり、宣言的に構築できる画面フローより効率が劣ります。"},{"n":76,"category":"","text":"```apex\npublic static void insertAccounts(List\u003cAccount\u003e theseAccounts) {\n    for (Account thisAccount : theseAccounts) {\n        if (thisAccount.website == null) {\n            thisAccount.website = 'https://www.demo.com';\n        }\n    }\n    update theseAccounts;\n}\n```\nコードが実行されると、DML 例外がスローされます。\n例外が適切に処理されるようにするには、開発者はどのようにコードを変更すればよいでしょうか?","options":[{"key":"A","text":"アップセット DML ステートメントを実装します。"},{"key":"B","text":"変更データキャプチャを実装します。"},{"key":"C","text":"DML の try/catch ブロックを実装します。"},{"key":"D","text":"アカウントのリストから null 項目を削除します。"}],"answer":["C"],"multi":false,"explanation":"DML 例外を「適切に処理する」には、DML ステートメント（この場合は `update theseAccounts;`）を **try/catch ブロック**で囲み、`DmlException` を捕捉して対処するのが正しい方法です。例外処理とは、エラー発生時にプログラムが制御された形で対応できるようにすることを指します。\n\n**他の選択肢が誤りの理由**\n- **A**: upsert に変更しても例外が発生する可能性は残り、例外の「処理」にはなりません。\n- **B**: Change Data Capture はレコード変更イベントを外部に通知する仕組みで、例外処理とは無関係です。\n- **D**: null 項目の除去は特定のエラーの回避策にすぎず、あらゆる DML 例外を適切に処理する方法ではありません。"},{"n":77,"category":"","text":"Aura コンポーネント内のどの 3 つのリソースに JavaScript 関数を含めることができますか?\n3つの回答を選択してください","options":[{"key":"A","text":"スタイル"},{"key":"B","text":"レンダラー"},{"key":"C","text":"コントローラー"},{"key":"D","text":"デザイン"},{"key":"E","text":"ヘルパー"}],"answer":["B","C","E"],"multi":true,"explanation":"Aura コンポーネントバンドルの中で JavaScript 関数を含められるリソースは、**Controller（コントローラ）**、**Helper（ヘルパー）**、**Renderer（レンダラー）** の 3 つです。Controller はイベント処理、Helper は再利用可能なロジック、Renderer はデフォルトのレンダリング動作のカスタマイズをそれぞれ JavaScript で記述します。\n\n**他の選択肢が誤りの理由**\n- **A（Style）**: スタイルリソースは CSS を記述するファイルで、JavaScript は含められません。\n- **D（Design）**: デザインリソースは Lightning アプリケーションビルダーでの設定属性を定義する XML ファイルです。"},{"n":78,"category":"","text":"開発者は、大量のレコードを更新するためにバッチ Apex ジョブを作成し、ジョブがタイムアウトして完了しないというレポートを受け取ります。\n問題のトラブルシューティングに向けた最初のステップは何ですか?","options":[{"key":"A","text":"ジョブのステータスとログを表示するには、非同期ジョブ監視ページを確認します。"},{"key":"B","text":"バッチジョブのデバッグログを確認します。"},{"key":"C","text":"バッチ ジョブを無効にして、レコード数を減らして再作成します。"},{"key":"D","text":"バッチ サイズを小さくして、システムの負荷を軽減します。"}],"answer":["A"],"multi":false,"explanation":"バッチ Apex ジョブの問題調査で最初に行うべきは、**[設定] の Apex ジョブページ（非同期ジョブ監視）でジョブのステータスやエラーメッセージ、処理済みバッチ数を確認する**ことです。ここでジョブが失敗したのか、実行待ちなのか、どのバッチで問題が起きたのかを把握してから、次の調査に進むのが正しい手順です。\n\n**他の選択肢が誤りの理由**\n- **B**: デバッグログの確認は有効ですが、まずジョブ全体のステータスを把握してから絞り込むべきで、最初のステップではありません。\n- **C**: 原因を特定せずにジョブを作り直すのはトラブルシューティングとして不適切です。\n- **D**: バッチサイズの縮小は対処策の 1 つですが、原因を確認する前に行うべきではありません。"},{"n":79,"category":"","text":"以下のコンポーネント コード要件を参照してください。\n\u003clightning:layout multipleRows=\"true\"\u003e\n\u003clightning:layoutItem size=\"12\"\u003e{!v.account.Name}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\"\u003e{!v.account.AccountNumber}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\"\u003e{!v.account.Industry}\u003c/lightning:layoutItem\u003e\n\u003c/lightning:レイアウト\u003e\n要件：\n* モバイル デバイスの場合、情報は 3 行に表示されます。\n* デスクトップとタブレットの場合、情報は 1 行に表示されます。\n要件 2 が期待どおりに表示されません。\nデスクトップとタブレットの要件を満たす正しいコンポーネント コードを持つオプションはどれですか。","options":[{"key":"A","text":"\u003clightning:layout multipleRows=\"true\"\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"4\"\u003e{!v.account.Name}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"4\"\u003e{!v.account.AccountNumber}\u003c/lightning:\nlayoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"4\"\u003e{!v.account.Industry}\u003c/lightning:layoutItem\u003e\n\u003c/lightning:layout\u003e"},{"key":"B","text":"\u003clightning:layout multipleRows=\"true\"\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"4\"\u003e{!v.account.Name}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\" largeDeviceSize=\"4\"\u003e{!v.account.AccountNumber}\u003c/lightning:\nlayoutItem\u003e\n\u003clightning:layoutItem size=\"12\" largeDeviceSize=\"4\"\u003e{!v.account.Industry}\u003c/lightning:layoutItem\u003e\n\u003c/lightning:layout\u003e"},{"key":"C","text":"\u003clightning:layout multipleRows=\"true\"\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\"\u003e{!v.account.Name}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\"\u003e{!v.account.AccountNumber}\u003c/lightning:\nlayoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\"\u003e{!v.account.Industry}\u003c/lightning:layoutItem\u003e\n\u003c/lightning:layout\u003e"},{"key":"D","text":"\u003clightning:layout multipleRows=\"true\"\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\" largeDeviceSize=\"4\"\u003e{!v.account.Name}\u003c\n/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\" largeDeviceSize=\"4\"\u003e{!v.account.\nAccountNumber}\u003c/lightning:layoutItem\u003e\n\u003clightning:layoutItem size=\"12\" mediumDeviceSize=\"6\" largeDeviceSize=\"4\"\u003e{!v.account.Industry}\u003c\n/lightning:layoutItem\u003e\n\u003c/lightning:layout\u003e"}],"answer":["A"],"multi":false,"explanation":"`lightning:layoutItem` のサイズ指定は「そのデバイスサイズ以上」に適用されます。`size=\"12\"` でモバイル（small 未満〜small）では各項目が全幅となり 3 行で表示され、`mediumDeviceSize=\"4\"` を指定するとタブレット（medium）以上では各項目が 12 分の 4 の幅になり、3 項目が **1 行**に収まります。medium の指定は large（デスクトップ）にも引き継がれるため、これだけで要件を満たせます。\n\n**他の選択肢が誤りの理由**\n- **B**: 1 項目だけ `mediumDeviceSize=\"4\"`、残りが `largeDeviceSize=\"4\"` のため、タブレットでは 1 行になりません。\n- **C**: `mediumDeviceSize=\"6\"` では 1 行に 2 項目までしか並ばず、2 行になります。\n- **D**: `mediumDeviceSize=\"6\"` のためタブレットで 2 行になり、要件を満たしません。"},{"n":80,"category":"","text":"開発者がバッチメソッドまたは将来のメソッドのステータスに関する情報を見つけることができる 2 つの場所はどこですか?\n2つの回答を選択してください","options":[{"key":"A","text":"Apex Flex キュー"},{"key":"B","text":"開発者コンソール"},{"key":"C","text":"Apexジョブ"},{"key":"D","text":"一時停止中のフローインタビューコンポーネント"}],"answer":["B","C"],"multi":true,"explanation":"バッチジョブや future メソッドの実行状況は `AsyncApexJob` オブジェクトに記録されます。**[設定] の「Apex ジョブ」ページ**で一覧・ステータスを確認でき、**開発者コンソール**でもクエリエディタから `AsyncApexJob` を照会したり、テスト実行やログからステータスを確認したりできます。\n\n**他の選択肢が誤りの理由**\n- **A（Apex Flex キュー）**: Flex キューに表示されるのは「Holding（保留）」状態のバッチジョブのみで、future メソッドは表示されません。\n- **D（一時停止中のフローインタビュー）**: これはフローの一時停止インタビューを管理する画面で、Apex の非同期ジョブとは無関係です。"},{"n":81,"category":"","text":"開発者は、Apex クラスを作成する際に、開発中のすべての機能が要件で指定されたとおりに処理されることを確認したいと考えています。\nApex クラスが仕様どおりに動作していることを確認するには、開発者はどのアプローチを使用する必要がありますか?","options":[{"key":"A","text":"セーブポイントと pacabase.rollback() を含めます。"},{"key":"B","text":"Apex クラスに try/catch ブロックを含めます。"},{"key":"C","text":"開発者コンソールの Execute Anonymous ブロックでコードを実行します。"},{"key":"D","text":"ビジネス ロジックを実行するテスト クラスを作成し、開発者コンソールでテストを実行します。"}],"answer":["D"],"multi":false,"explanation":"機能が要件どおりに動作することを検証する標準的なアプローチは、**ビジネスロジックを網羅するテストクラス（単体テスト）を作成し、実行して結果をアサーションで確認する**ことです。テストメソッドで正常系・異常系・一括処理などのシナリオを検証することで、仕様どおりの動作を継続的に保証できます。\n\n**他の選択肢が誤りの理由**\n- **A**: `Savepoint` と `Database.rollback()` はトランザクション制御の仕組みであり、動作検証の手段ではありません。\n- **B**: try/catch は例外処理のためのもので、仕様どおりに動作しているかの確認にはなりません。\n- **C**: 匿名実行は簡易的な動作確認には使えますが、再現可能で網羅的な検証にはならず、アサーションによる自動検証もありません。"},{"n":82,"category":"","text":"Universal Containers (UC) は、配送プロセスを効率化しながら配送コストを削減したいと考えています。配送担当者は、複数のアカウントがデフォルトの集荷先住所を共有できるようにグローバル アドレスを実装するよう UC にアドバイスします。開発者は、このビジネス要件をサポートするオブジェクトと関係を作成する任務を負っており、セットアップ メニューを使用して「グローバル アドレス」というカスタム オブジェクトを作成します。\nビジネスニーズをサポートする最も効率的なモデルを作成するには、開発者はどのフィールドを追加する必要がありますか?","options":[{"key":"A","text":"グローバル アドレス オブジェクトのマスター詳細フィールドをアカウント オブジェクトに追加します。"},{"key":"B","text":"グローバル アドレス オブジェクトの参照フィールドをアカウント オブジェクトに追加します。"},{"key":"C","text":"アカウント オブジェクトの参照フィールドをグローバル アドレス オブジェクトに追加します。"},{"key":"D","text":"アカウント オブジェクトのマスター詳細フィールドをグローバル アドレス オブジェクトに追加します。"}],"answer":["B"],"multi":false,"explanation":"「複数の取引先（Account）が 1 つのグローバルアドレスをデフォルト集荷先住所として共有できる」という要件は、**Account オブジェクト上に Global Address オブジェクトへの参照（Lookup）項目を追加する**ことで実現できます。これにより多くの Account レコードが同じ Global Address レコードを参照でき、住所が任意（未設定も許容）である柔軟な関係を最も効率的に表現できます。\n\n**他の選択肢が誤りの理由**\n- **A**: 標準オブジェクトである Account を主従関係（Master-Detail）の従（詳細）側にすることはできず、また住所削除で Account が削除される関係は不適切です。\n- **C**: Global Address 側に Account への参照を追加すると、1 つのアドレスレコードが 1 つの Account しか指せず、共有の要件を満たしません。\n- **D**: C と同様に関係の向きが逆であり、さらに主従関係にする必要もありません。"},{"n":83,"category":"","text":"ユーザーがアカウントの郵便番号を編集する場合、「タイムゾーン」という名前のカスタム アカウント テキスト フィールドを、PostalCodeToTimezone__c カスタム オブジェクトの値に基づいて更新する必要があります。\nこの機能を実装するために使用できる自動化ツールはどれですか? 2 つの回答を選択してください","options":[{"key":"A","text":"クイックアクション"},{"key":"B","text":"承認プロセス"},{"key":"C","text":"アカウントトリガー"},{"key":"D","text":"高速フィールド更新レコードトリガーフロー"}],"answer":["C","D"],"multi":true,"explanation":"郵便番号の編集時に、別のカスタムオブジェクト `PostalCodeToTimezone__c` の値を参照して同一レコードの項目を更新する処理は、**Apex トリガ（Account トリガ）**または**高速フィールド更新（Fast Field Update、保存前実行）のレコードトリガフロー**で実装できます。保存前フローは「レコードを取得」要素で他オブジェクトを参照でき、トリガ元レコードの項目を追加 DML なしで更新できるため効率的です。\n\n**他の選択肢が誤りの理由**\n- **A（クイックアクション）**: ユーザーの手動操作が必要で、編集時の自動更新はできません。\n- **B（承認プロセス）**: 承認申請を前提とした仕組みであり、項目編集をきっかけとした自動更新には使えません。"},{"n":84,"category":"","text":"サンドボックスで作業中に、テスト ランナーで Apex テストを実行すると失敗します。ただし、匿名実行ウィンドウで Apex ロジックを実行すると、例外やエラーは発生せず成功します。\nメソッドがサンドボックス テスト フレームワークでは失敗したのに、開発者コンソールでは成功したのはなぜですか?","options":[{"key":"A","text":"テスト メソッドは、特定のユーザーとして実行するために system.runAs を使用しません。"},{"key":"B","text":"テスト メソッドは @future メソッドを呼び出しています。"},{"key":"C","text":"テスト メソッドはサンドボックス内の既存のデータに依存します。"},{"key":"D","text":"テスト メソッドのコードに構文エラーがあります。"}],"answer":["C"],"multi":false,"explanation":"Apex テストメソッドは、デフォルト（API バージョン 24.0 以降、`@isTest(SeeAllData=true)` を指定しない限り）**組織内の既存データにアクセスできません**。匿名実行では組織の実データを参照できるため成功しますが、テストフレームワーク内では同じ SOQL が空の結果を返すなどして失敗します。テストに必要なデータはテストメソッド内（または `@testSetup`）で作成するのが正しい方法です。\n\n**他の選択肢が誤りの理由**\n- **A**: `System.runAs()` はユーザーコンテキストの切り替え用で、これがなくてもテストは実行できます。\n- **B**: テストから `@future` メソッドを呼ぶこと自体は問題なく、`Test.startTest()`/`Test.stopTest()` で同期的に実行できます。\n- **D**: 構文エラーがあればそもそもコンパイルできず、匿名実行でも失敗します。"},{"n":85,"category":"","text":"他のレコードの挿入に失敗した場合に、レコード リスト内の一部のレコードを挿入できるようにするには、どのステートメントを使用する必要がありますか。","options":[{"key":"A","text":"データベース。レコードを挿入(true)"},{"key":"B","text":"レコードを挿入する"},{"key":"C","text":"レコードを挿入 (false)"},{"key":"D","text":"データベース。レコードを挿入します (false)"}],"answer":["D"],"multi":false,"explanation":"一部のレコードが失敗しても残りのレコードを挿入できるようにする（部分成功を許可する）には、**`Database.insert(records, false)`** を使用します。第 2 引数 `allOrNone` を `false` にすると、失敗したレコードだけがスキップされ、結果は `Database.SaveResult` の配列で確認できます。\n\n**他の選択肢が誤りの理由**\n- **A（`Database.insert(records, true)`）**: `allOrNone=true` はデフォルトと同じで、1 件でも失敗すると全件がロールバックされます。\n- **B（`insert records`）**: DML ステートメントは常に all-or-none で、1 件の失敗で例外が発生し全件失敗します。\n- **C（`insert (records, false)`）**: DML ステートメントに `allOrNone` 引数を渡す構文は存在しません。"},{"n":86,"category":"","text":"Universal Containers は、個人に関する情報を保存する Applicant オブジェクトと、仕事を表す Job オブジェクトを備えた採用アプリを構築しています。各応募者は複数の仕事に応募できます。\n応募者が求人に応募したことを表すために、開発者は何を実装する必要がありますか?","options":[{"key":"A","text":"応募者と求人の間のジャンクションオブジェクト"},{"key":"B","text":"応募者から求人への参照フィールド"},{"key":"C","text":"応募者から求人へのマスター詳細フィールド"},{"key":"D","text":"求人情報を参照する応募者の数式フィールド\n####"}],"answer":["A"],"multi":false,"explanation":"「各応募者（Applicant）は複数の求人（Job）に応募でき、1 つの求人には複数の応募者が応募できる」という**多対多（Many-to-Many）の関係**は、Applicant と Job のそれぞれに主従関係（Master-Detail）を持つ**ジャンクションオブジェクト**（例: Job Application）で表現します。ジャンクションオブジェクトの各レコードが「1 件の応募」を表します。\n\n**他の選択肢が誤りの理由**\n- **B**: Applicant から Job への参照項目では、1 応募者につき 1 つの求人しか関連付けられません。\n- **C**: マスター詳細項目でも同様に 1 対多にしかならず、多対多を表現できません。\n- **D**: 数式項目は関係を作成するものではなく、応募の事実を保持できません。"},{"n":87,"category":"","text":"開発者は、更新前イベントでアカウント オブジェクトにトリガーを記述し、カウント フィールドを増分します。レコード トリガー フローも、アカウントが作成または更新されるたびにカウント フィールドを増分します。\nアカウントに他の自動化ロジックが実装されていないと仮定して、初期値ゼロでアカウントが挿入された場合、カウント フィールドの値は何ですか?","options":[{"key":"A","text":"4"},{"key":"B","text":"2"},{"key":"C","text":"1"},{"key":"D","text":"3"}],"answer":["B"],"multi":false,"explanation":"正解は **2** です。実行順序を追うと次のようになります。(1) レコードが値 0 で挿入される（トリガは before **update** のため挿入時には発動しない）。(2) 保存後、レコードトリガフローが「作成」を検知してカウントを 0→1 に更新する。(3) フローによる更新は同一レコードへの update DML となるため、before update トリガが発動しカウントを 1→2 に増分する。(4) フローは自身の更新によって再帰的に再実行されないため、最終値は 2 になります。\n\n**他の選択肢が誤りの理由**\n- **A（4）/ D（3）**: トリガとフローが無限に再帰することはなく、増分は合計 2 回だけです。\n- **C（1）**: フローの更新が before update トリガを発動させる点を見落としています。"},{"n":88,"category":"","text":"Lightning Web コンポーネントのカスタムイベントに当てはまる 2 つの特性はどれですか?\n2つの回答を選択してください","options":[{"key":"A","text":"@wire で装飾されたプロパティを使用して、カスタム イベントのペイロードでデータを渡すことができます。"},{"key":"B","text":"データは、detail というプロパティを使用してカスタム イベントのペイロードに渡される場合があります。"},{"key":"C","text":"デフォルトでは、カスタム イベントは、その直下のコンテナーと直下の子コンポーネントにのみ伝播します。"},{"key":"D","text":"デフォルトでは、カスタム イベントはその直下のコンテナーにのみ伝播します。"}],"answer":["B","D"],"multi":true,"explanation":"LWC のカスタムイベントでは、**`detail` プロパティを使ってペイロード（データ）を渡す**のが標準的な方法です（`new CustomEvent('myevent', { detail: ... })`）。また、デフォルト設定（`bubbles: false`, `composed: false`）では、**イベントは伝播（バブリング）せず、直下のコンテナー（親コンポーネント）でのみ処理できます**。\n\n**他の選択肢が誤りの理由**\n- **A**: `@wire` は Salesforce データの取得用デコレータで、イベントのペイロード受け渡しとは無関係です。\n- **C**: デフォルトではイベントは子コンポーネントには伝わりません。イベントは親方向に通知されるもので、子への伝播はそもそも行われません。"},{"n":89,"category":"","text":"Aura コンポーネントで JavaScript リソースをロードするときの \u003cltng: require\u003e タグの 3 つの機能は何ですか?\n3つの回答を選択してください","options":[{"key":"A","text":"重複スクリプトの1回限りの読み込み"},{"key":"B","text":"スクリプトを並列に読み込む"},{"key":"C","text":"ドキュメントからファイルを読み込む"},{"key":"D","text":"読み込み順序の指定"},{"key":"E","text":"外部でホストされているスクリプトをロードしています"}],"answer":["A","B","D"],"multi":true,"explanation":"`\u003cltng:require\u003e` は Aura コンポーネントで静的リソースの JavaScript/CSS を読み込むタグで、公式ドキュメントに記載されている機能は次の 3 つです。(1) **重複スクリプトの重複排除（同じスクリプトは 1 回だけ読み込まれる）**、(2) **スクリプトの並列読み込み**、(3) **カンマ区切りで指定した順序での読み込み（読み込み順序の指定）**。\n\n**他の選択肢が誤りの理由**\n- **C（ドキュメントからの読み込み）**: 読み込めるのは静的リソース（`$Resource`）のみで、ドキュメントオブジェクトのファイルは対象外です。\n- **E（外部ホストのスクリプト）**: セキュリティ上の理由から外部 URL のスクリプトは読み込めず、静的リソースとしてアップロードする必要があります。"},{"n":90,"category":"","text":"Visualforce ページの内容を PDF として表示するコードはどれですか?","options":[{"key":"A","text":"\u003capex:page renderAs=\"application/pdf\"\u003e"},{"key":"B","text":"\u003capex:page renderAs=\"pdf\"\u003e"},{"key":"C","text":"\u003capex:page contentType=\"application/pdf\"\u003e"},{"key":"D","text":"\u003capex:page contentType=\"pdf\"\u003e"}],"answer":["B"],"multi":false,"explanation":"Visualforce ページを PDF として出力するには、`\u003capex:page\u003e` タグの **`renderAs=\"pdf\"`** 属性を使用します。これによりページのコンテンツが PDF 形式でレンダリングされます。\n\n**他の選択肢が誤りの理由**\n- **A**: `renderAs` に指定する値は `pdf` であり、MIME タイプ（`application/pdf`）ではありません。\n- **C / D**: `contentType` 属性はレスポンスの MIME タイプを変更するもので、ページを PDF としてレンダリングする機能ではありません。"},{"n":91,"category":"","text":"Universal Containers は、マーケティング部門向けに新しい Lightning Web コンポーネントを開発しています。同社は、コンポーネントが微調整され、シームレスなユーザー エクスペリエンスが提供されることを確認したいと考えています。\nLightning コンポーネント フレームワークを使用する利点は何ですか?","options":[{"key":"A","text":"クライアント側レンダリングによるパフォーマンスの向上"},{"key":"B","text":"アクセシビリティ標準の自動サポート"},{"key":"C","text":"すべてのウェブブラウザとの互換性"},{"key":"D","text":"サードパーティのライブラリとの簡単な統合"}],"answer":["A"],"multi":false,"explanation":"Lightning コンポーネントフレームワークは、**ステートフルなクライアントとステートレスなサーバーのアーキテクチャ**を採用しており、UI のレンダリングをクライアント側（ブラウザ）で行うことでサーバーとのやり取りを減らし、**パフォーマンスの向上**を実現します。これがフレームワークの主要な利点の 1 つです。\n\n**他の選択肢が誤りの理由**\n- **B**: アクセシビリティ対応のベースコンポーネントは提供されますが、あらゆる実装で自動的に保証されるわけではありません。\n- **C**: サポート対象は特定のモダンブラウザに限られ、すべての Web ブラウザと互換性があるわけではありません。\n- **D**: サードパーティライブラリは Lightning Locker/LWS の制約を受けるため、「簡単な統合」は利点とは言えません。"},{"n":92,"category":"","text":"開発者は、OpportunityLineltem トリガーをカバーするテスト クラスを作成しながら、組織内の標準価格表にアクセスしたいと考えています。\nどの方法で価格表にアクセスできますか?","options":[{"key":"A","text":"Test .getStandardPricebookid() を使用して標準価格表 ID を取得します。"},{"key":"B","text":"@isTest [SeeAllData=true|] を使用して、既存の標準価格表を削除します。"},{"key":"C","text":"@Testvisible を使用して、テスト メソッドが標準価格表を表示できるようにします。"},{"key":"D","text":"Test.loadData() と静的リソースを使用して標準価格表を読み込みます。"}],"answer":["A"],"multi":false,"explanation":"テストクラス内で標準価格表（Standard Price Book）を利用するには、**`Test.getStandardPricebookId()`** メソッドで標準価格表の ID を取得します。テストコンテキストでは組織データにアクセスできませんが、このメソッドを使えば `SeeAllData=true` を使わずに標準価格表 ID を取得し、PricebookEntry の作成などに利用できます。\n\n**他の選択肢が誤りの理由**\n- **B**: `@isTest(SeeAllData=true)` は組織の実データに依存するためベストプラクティスに反し、「削除する」という記述も誤りです。\n- **C**: `@TestVisible` はプライベートメンバーをテストから参照可能にするアノテーションで、価格表とは無関係です。\n- **D**: `Test.loadData()` で標準価格表そのものを作成・読み込みすることはできません（標準価格表は組織に 1 つ既存のもの）。"},{"n":93,"category":"","text":"多くの開発者のチームが、本番組織と同じ構成を持つ独自の組織で作業します。\nこのシナリオに最適な組織の種類はどれですか?","options":[{"key":"A","text":"開発者サンドボックス"},{"key":"B","text":"フルサンドボックス"},{"key":"C","text":"開発者エディション"},{"key":"D","text":"パートナー開発者エディション"}],"answer":["A"],"multi":false,"explanation":"各開発者が「本番組織と同じ構成（メタデータ）を持つ独自の組織」で作業するには、**Developer Sandbox（開発者サンドボックス）** が最適です。Developer Sandbox は本番組織の設定・カスタマイズ（メタデータ）のコピーを含み、容量が小さく更新間隔も短い（1 日）ため、開発者ごとに複数用意する用途に向いています。\n\n**他の選択肢が誤りの理由**\n- **B（Full Sandbox）**: 全データを含む重量級のサンドボックスで、更新間隔が 29 日と長く、開発者個人ごとの環境としては過剰かつ非効率です。\n- **C（Developer Edition）**: 本番組織とは独立した無償組織で、本番の構成は含まれません。\n- **D（Partner Developer Edition）**: 同様に本番組織の構成を引き継がない独立組織です。"},{"n":94,"category":"","text":"開発者は、システムに特定の条件が存在する場合に、Request__c レコードの作成を防止する必要があります。\n条件をチェックする RequestLogic クラスが存在します。\n正しい実装は何ですか?","options":[{"key":"A","text":"```apex\ntrigger RequestTrigger on Request__c (before insert) {\n\nRequestLogic.validateRecords(Trigger.new);\n\n}\n```"},{"key":"B","text":"```apex\ntrigger RequestTrigger on Request__c (before insert) {\n\nRequestLogic.validateRecords(trigger.new);\n\n}\n```"},{"key":"C","text":"```apex\ntrigger RequestTrigger on Request__c (before insert) {\n\nif (RequestLogic.isValid(Request__c)) {\n\nRequest.addError('Your request cannot be created at this time.');\n\n}\n\n}\n```"},{"key":"D","text":"```apex\ntrigger RequestTrigger on Request__c (after insert) {\n\nif (RequestLogic.isValid(Request__c)) {\n\nRequest.addError('Your request cannot be created at this time.');\n\n}\n\n}\n```"}],"answer":["A"],"multi":false,"explanation":"レコードの**作成を防止**するには、レコードがデータベースに保存される前、つまり **`before insert` トリガ**で検証ロジックを実行する必要があります。検証処理はトリガ本体に書かず、`RequestLogic.validateRecords(Trigger.new)` のようにハンドラクラスへ委譲するのがベストプラクティスであり、クラス側で条件に該当するレコードに `addError()` を呼び出せば保存が阻止されます。なお、選択肢 A と B は `Trigger.new` の大文字小文字のみの違いで、Apex は大文字小文字を区別しないためどちらも動作しますが、原典の正解にあたるのは A です。\n\n**他の選択肢が誤りの理由**\n- **C**: `RequestLogic.isValid(Request__c)` はオブジェクト型そのものを引数に渡しており構文として不正で、`Request.addError()` の呼び出し方も誤りです。\n- **D**: `after insert` では既にレコードが保存された後であり、作成の防止には遅すぎます（C と同じ構文誤りもあります）。"},{"n":95,"category":"","text":"Aura コンポーネントとアプリケーション イベントの処理に関するベスト プラクティスはどれですか?\n2つの回答を選択してください","options":[{"key":"A","text":"コンポーネント イベントではなく、アプリケーション イベントを使用するようにしてください。"},{"key":"B","text":"ロジックをヘルパーに配置することで、コンポーネント バンドル内のイベント ロジックを再利用します。"},{"key":"C","text":"コンポーネント イベントを使用して、アプリケーション レベルで処理する必要があるアクションを伝達します。"},{"key":"D","text":"イベント ハンドラーで低レベルのイベントを処理し、高レベルのイベントとして再起動します。"}],"answer":["B","D"],"multi":true,"explanation":"Aura のイベント処理のベストプラクティスとして、(1) **イベント処理のロジックはヘルパー（Helper）に配置してコンポーネントバンドル内で再利用する**こと、(2) **低レベル（詳細）のイベントをハンドラで受け取り、より高レベルの意味を持つイベントとして再発行（re-fire）する**ことが挙げられます。これによりコンポーネントの疎結合と保守性が保たれます。\n\n**他の選択肢が誤りの理由**\n- **A**: 逆です。アプリケーションイベントは影響範囲が広いため、可能な限り**コンポーネントイベント**を優先すべきです。\n- **C**: アプリケーションレベルで処理すべきアクションには、コンポーネントイベントではなくアプリケーションイベントを使用します。"},{"n":96,"category":"","text":"開発者は、システム内に存在する ContactSearch Apex クラスのセキュリティ レビューを実行するように指示されています。開発者は、クラス内で次のメソッドをセキュリティ上の脅威として特定しました。\nist\u003c連絡先\u003e performSearch (String lastName} [\nreturn Database.query('SELECT Id, FirstName, LastName FROM Contact WHERE LastName Like s'+lastName+'s'\")?; 開発者がメソッドを更新して SOQL インジェクション攻撃を防ぐ 2 つの方法は何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"変数バインディングを使用し、動的クエリを静的 SOQL に置き換えます。"},{"key":"B","text":"パラメータを使用する前に、sacapeSingleQuotes メソッドを使用してパラメータをサニタイズします。"},{"key":"C","text":"クラスで Readonly アノテーションと with sharing キーワードを使用します。"},{"key":"D","text":"パラメータに正規表現を使用して特殊文字を削除します。"}],"answer":["A","B"],"multi":true,"explanation":"このメソッドはユーザー入力（`lastName`）を文字列連結で動的 SOQL に埋め込んでおり、SOQL インジェクションの脆弱性があります。対策は、(1) **バインド変数（`:lastName`）を使った静的 SOQL に置き換える**こと（最も確実な方法）、(2) 動的クエリを使い続ける場合は **`String.escapeSingleQuotes()` でユーザー入力をサニタイズしてから使用する**ことの 2 つです。\n\n**他の選択肢が誤りの理由**\n- **C**: `@ReadOnly` や `with sharing` はレコードの共有・ガバナ制限に関する仕組みで、インジェクション攻撃の防止にはなりません。\n- **D**: 正規表現による特殊文字の自前除去は漏れが生じやすく、Salesforce が推奨する対策ではありません。"},{"n":97,"category":"","text":"アプリケーションを開発するメリットは何ですか","options":[{"key":"A","text":"強制的なユニットテストとコードカバレッジのベストプラクティス"},{"key":"B","text":"定義済みのコンピューティング リソースへのアクセス"},{"key":"C","text":"ビッグデータ用に事前設定されたストレージ"},{"key":"D","text":"無制限の処理能力とメモリ"}],"answer":["B"],"multi":false,"explanation":"この問題は「マルチテナント環境でアプリケーションを開発するメリット」を問うものです。マルチテナントプラットフォームでは、インフラの構築・管理を Salesforce が担い、開発者は**事前定義されたコンピューティングリソース**（ガバナ制限内で公平に割り当てられる CPU・メモリ・ストレージなど）をすぐに利用できます。これがメリットです。\n\n**他の選択肢が誤りの理由**\n- **A**: テストとコードカバレッジの要件は品質担保のための「制約」であり、マルチテナントの利点そのものとして問われているものではありません。\n- **C**: ビッグデータ用の事前設定ストレージは提供されません。\n- **D**: マルチテナントでは全テナントでリソースを共有するため、処理能力やメモリはガバナ制限で**制限**されます。「無制限」は誤りです。"},{"n":98,"category":"","text":"Universal Containers には、カスタム オブジェクト「エンジニアリング サポート c」を使用してユーザーがエンジニアリング チームにサポートをリクエストできるサポート プロセスがあります。\nユーザーは、複数のエンジニアリング サポート __c レコードを 1 つの商談レコードに関連付けることができる必要があります。さらに、エンジニアリング サポート __c レコードに関する集計情報が商談レコードに表示される必要があります。\nこれらの要件をサポートするには、どの関係フィールドを実装する必要がありますか?","options":[{"key":"A","text":"商談からエンジニアリングへの参照フィールド _support__c"},{"key":"B","text":"エンジニアリング サポート__c から商談へのマスター詳細フィールド"},{"key":"C","text":"商談からエンジニアリング サポートへのマスター詳細フィールド__c"},{"key":"D","text":"エンジニアリング サポート __c から商談への参照フィールド"}],"answer":["B"],"multi":false,"explanation":"「複数の Engineering_Support__c レコードを 1 つの商談に関連付ける」（1 対多）かつ「集計情報を商談に表示する」（積み上げ集計項目 / Roll-Up Summary）という要件には、**Engineering_Support__c（子）から Opportunity（親）へのマスター詳細（Master-Detail）項目**が必要です。積み上げ集計項目は主従関係の主（親）側でのみ作成できます。\n\n**他の選択肢が誤りの理由**\n- **A / C**: 関係項目は「多」側（子）である Engineering_Support__c に作成するもので、商談側に作成する形は誤りです（商談からの参照では 1 対多を表現できません）。\n- **D**: 参照（Lookup）関係では積み上げ集計項目が使用できないため、集計要件を満たせません。"},{"n":99,"category":"","text":"開発者がカスタム オブジェクトにトリガーを作成しました。このカスタム オブジェクトには、依存する選択リストもいくつかあります。\n実行ルールの順序によれば、どのステップが最初に実行されますか?","options":[{"key":"A","text":"元のレコードがデータベースから読み込まれます。"},{"key":"B","text":"最大フィールド長に対してシステム検証が実行されます。"},{"key":"C","text":"古い値は新しいレコード値で上書きされます。"},{"key":"D","text":"JavaScript検証はブラウザで実行されます。"}],"answer":["D"],"multi":false,"explanation":"レコードの保存における実行順序（Order of Execution）では、リクエストがサーバーに送信される**前**の段階として、標準 UI の編集ページで保存した場合に**ブラウザ上で JavaScript 検証が実行**されます。この検証は主に**依存選択リスト（dependent picklist）** を含むレコードで行われるため、依存選択リストがあるこのシナリオでは、これが最初に実行されるステップです。\n\n**他の選択肢が誤りの理由**\n- **A**: 元のレコードの読み込みはサーバー側処理の最初のステップですが、ブラウザでの JavaScript 検証はそれより前に行われます。\n- **B**: 最大項目長などのシステム検証は、レコード読み込み・値の上書きの後に実行されます。\n- **C**: 新しい値による上書きはサーバー側処理の 2 番目のステップで、最初ではありません。"}]}]};</script>
<script>(function () {
  'use strict';
  const DATA = window.__EXAM__ || { sets: [] };
  const LS_THEME = 'sfpd-theme';
  const LS_MODE = 'sfpd-exam-mode';
  const ansKey = id => 'sfpd-exam-ans-' + id;
  const oneKey = id => 'sfpd-exam-one-' + id;
  const bestKey = id => 'sfpd-exam-best-' + id;
  const PASS = 68; // 合格ライン（%）

  // ----- テーマ（他ページとキー共有） -----
  const applyTheme = th => { document.documentElement.setAttribute('data-theme', th); localStorage.setItem(LS_THEME, th); };
  applyTheme(localStorage.getItem(LS_THEME) || 'light');
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const prismLang = l => { l = (l || '').toLowerCase(); if (l === 'soql') return 'sql'; if (l === 'xml') return 'markup'; if (l === 'js') return 'javascript'; return l; };

  if (window.marked) marked.setOptions({ gfm: true, breaks: false });

  // Markdown 文字列 → HTML（コードブロックは Prism でハイライト）
  function mdHTML(md) {
    return window.marked ? marked.parse(md || '') : escapeHtml(md || '');
  }
  function enhanceCode(host) {
    host.querySelectorAll('pre > code').forEach(code => {
      const pre = code.parentElement;
      const cls = (code.className || '').match(/language-([\w-]+)/);
      const pl = prismLang(cls ? cls[1] : '');
      if (pl && window.Prism && Prism.languages[pl]) {
        code.className = 'language-' + pl;
        try { Prism.highlightElement(code); } catch (e) {}
      }
      const block = document.createElement('div'); block.className = 'code-block';
      const bar = document.createElement('div'); bar.className = 'code-bar';
      bar.innerHTML = '<span class="code-lang">' + escapeHtml((cls ? cls[1] : 'コード').toUpperCase()) +
        '</span><button class="copy-btn" type="button"><svg class="ico"><use href="#i-copy"/></svg><span class="ct">コピー</span></button>';
      pre.parentNode.insertBefore(block, pre); block.appendChild(bar); block.appendChild(pre);
      bar.querySelector('.copy-btn').addEventListener('click', function () {
        const txt = code.textContent, lbl = this.querySelector('.ct');
        const ok = () => { this.classList.add('copied'); lbl.textContent = 'コピー完了'; setTimeout(() => { this.classList.remove('copied'); lbl.textContent = 'コピー'; }, 1600); };
        if (navigator.clipboard) navigator.clipboard.writeText(txt).then(ok).catch(() => {});
      });
    });
  }

  // ----- DOM 参照 -----
  const startScreen = document.getElementById('startScreen');
  const quizScreen = document.getElementById('quizScreen');
  const quizBar = document.getElementById('quizBar');
  const setGrid = document.getElementById('setGrid');
  const questionsEl = document.getElementById('questions');
  const resultMount = document.getElementById('resultMount');
  const quizTitle = document.getElementById('quizTitle');
  const barText = document.getElementById('barText');
  const answeredBar = document.getElementById('answeredBar');
  const gradeBtn = document.getElementById('gradeBtn');
  const skipBtn = document.getElementById('skipBtn');
  const oneBtn = document.getElementById('oneBtn');
  const modeDesc = document.getElementById('modeDesc');
  const qnavBtn = document.getElementById('qnavBtn');
  const qnavPanel = document.getElementById('qnavPanel');
  const qnavGrid = document.getElementById('qnavGrid');

  // ----- 状態 -----
  let mode = localStorage.getItem(LS_MODE) === 'one' ? 'one' : 'all'; // 'all'=一括採点 / 'one'=1問1答
  let curSet = null;       // 現在のセット
  let answers = {};        // { 問番号: [選択した letter, ...] }
  let graded = false;      // 一括モード：採点済みか
  let oneIdx = 0;          // 1問1答モード：現在の問題インデックス
  let oneGraded = [];      // 1問1答モード：判定済みの問番号

  function loadAnswers(id) {
    try { return JSON.parse(localStorage.getItem(ansKey(id)) || '{}'); } catch (e) { return {}; }
  }
  function saveAnswers() {
    if (curSet) localStorage.setItem(ansKey(curSet.id), JSON.stringify(answers));
  }
  function loadOne(id) {
    try { return JSON.parse(localStorage.getItem(oneKey(id)) || 'null'); } catch (e) { return null; }
  }
  function saveOne() {
    if (curSet) localStorage.setItem(oneKey(curSet.id), JSON.stringify({ a: answers, g: oneGraded, i: oneIdx }));
  }
  function getBest(id) {
    const v = parseInt(localStorage.getItem(bestKey(id)), 10);
    return isNaN(v) ? null : v;
  }

  // ----- 回答モード切替 -----
  function applyMode(m) {
    mode = m;
    localStorage.setItem(LS_MODE, m);
    document.querySelectorAll('.ms-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    modeDesc.textContent = m === 'one'
      ? '1問回答するごとに正誤と解説がすぐ表示されます。学習・復習向けのモードです。'
      : 'すべての問題に回答してから「採点する」でまとめて採点します。本番形式のモードです。';
    renderStart();
  }
  document.querySelectorAll('.ms-btn').forEach(b => b.addEventListener('click', () => applyMode(b.dataset.mode)));

  // ----- スタート画面 -----
  function renderStart() {
    setGrid.innerHTML = '';
    DATA.sets.forEach((s, i) => {
      const best = getBest(s.id);
      let answered = 0;
      if (mode === 'one') {
        const sv = loadOne(s.id);
        if (sv && (sv.i || 0) < s.questions.length) answered = (sv.g || []).length;
      } else {
        const savedAns = loadAnswers(s.id);
        answered = Object.keys(savedAns).filter(k => (savedAns[k] || []).length).length;
      }
      const card = document.createElement('button');
      card.className = 'set-card';
      card.innerHTML =
        '<span class="sc-badge"><svg class="ico" style="width:13px;height:13px"><use href="#i-edit"/></svg>SET ' + (i + 1) + '</span>' +
        '<span class="sc-title">' + escapeHtml(s.title) + '</span>' +
        '<span class="sc-meta">' +
          '<span>' + s.questions.length + ' 問</span>' +
          (best != null ? '<span class="sc-best">最高 ' + best + '%</span>' : '') +
          (answered && best == null ? '<span>回答途中 ' + answered + '/' + s.questions.length + '</span>' : '') +
        '</span>' +
        '<span class="sc-go">' + (answered ? '続きから' : 'スタート') + '<svg class="ico"><use href="#i-arrow-right"/></svg></span>';
      card.addEventListener('click', () => startSet(s));
      setGrid.appendChild(card);
    });
  }

  // ----- 試験開始 -----
  function startSet(s) {
    curSet = s;
    graded = false;
    quizTitle.textContent = s.title;
    resultMount.innerHTML = '';
    startScreen.hidden = true;
    quizScreen.hidden = false;
    quizBar.hidden = false;
    if (mode === 'one') {
      const sv = loadOne(s.id);
      if (sv && (sv.i || 0) < s.questions.length) {
        answers = sv.a || {}; oneGraded = sv.g || []; oneIdx = sv.i || 0;
      } else {
        answers = {}; oneGraded = []; oneIdx = 0; saveOne();
      }
      renderOne();
    } else {
      answers = loadAnswers(s.id);
      renderQuestions();
      updateAllBar();
    }
    window.scrollTo(0, 0);
  }

  // 問題カードを生成
  function buildCard(q) {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q-' + q.n;
    card.dataset.n = q.n;

    const top = document.createElement('div');
    top.className = 'q-top';
    top.innerHTML = '<span class="q-num">' + q.n + '</span>' +
      (q.category ? '<span class="q-cat">' + escapeHtml(q.category) + '</span>' : '') +
      (q.multi ? '<span class="q-multi">複数選択</span>' : '') +
      '<span class="q-mark ok"><svg class="ico"><use href="#i-check"/></svg>正解</span>' +
      '<span class="q-mark ng"><svg class="ico"><use href="#i-x"/></svg>不正解</span>';
    card.appendChild(top);

    const text = document.createElement('div');
    text.className = 'q-text';
    text.innerHTML = mdHTML(q.text);
    enhanceCode(text);
    card.appendChild(text);

    const opts = document.createElement('div');
    opts.className = 'opts';
    q.options.forEach(o => {
      const opt = document.createElement('div');
      opt.className = 'opt' + (q.multi ? ' multi' : '');
      opt.dataset.key = o.key;
      const selected = (answers[q.n] || []).includes(o.key);
      if (selected) opt.classList.add('selected');
      opt.innerHTML = '<span class="mark">' + o.key + '</span><span class="otext">' + mdHTML(o.text).replace(/^<p>|<\/p>\s*$/g, '') + '</span>';
      enhanceCode(opt);
      opt.addEventListener('click', () => onSelect(q, o.key, opt, opts));
      opts.appendChild(opt);
    });
    card.appendChild(opts);

    const exp = document.createElement('div');
    exp.className = 'explain';
    exp.innerHTML = '<div class="explain-head"><svg class="ico"><use href="#i-bulb"/></svg>解説</div>' +
      '<div class="explain-body"></div>';
    card.appendChild(exp);

    return card;
  }

  function renderQuestions() {
    questionsEl.innerHTML = '';
    curSet.questions.forEach(q => questionsEl.appendChild(buildCard(q)));
  }

  function onSelect(q, key, optEl, optsEl) {
    if (mode === 'all' && graded) return;
    if (mode === 'one' && oneGraded.includes(q.n)) return;
    let sel = answers[q.n] || [];
    if (q.multi) {
      if (sel.includes(key)) sel = sel.filter(k => k !== key);
