- Vue.jsの v-if（B）やAngularの ng-if（C）と似てるけど、Salesforce独自の構文だから間違えないように注意してね！"},{"n":21,"category":"開発の基礎","text":"標準オブジェクトである Contact（取引先責任者）とカスタムオブジェクトである Job_Application__c（応募）の間に参照関係があります。Job_Application__c 側から見て、親である Contact の Email フィールドを参照するApexでの正しい関係表現はどれですか？","options":[{"key":"A","text":"Job_Application__c.Contact__c.Email"},{"key":"B","text":"Job_Application__c.Contact__r.Email"},{"key":"C","text":"Job_Application__c.Contact.Email"},{"key":"D","text":"Job_Application__c.Contact__r.Email__c"}],"answer":["B"],"multi":false,"explanation":"- これ、オブジェクト同士の「リレーションシップを辿る」問題だね！\n- 標準オブジェクトへの参照（Contact__c ではなく標準の Contact フィールド）をカスタムオブジェクトから辿る場合、Apexコード内ではリレーションシップ名として **Contact__r**（__r は Relationship の頭文字！）を使うよ！\n- なので、Job_Application__c.Contact__r.Email が大正解！最後は普通のフィールドだから __c は要らないよ！"},{"n":22,"category":"ロジックと自動化","text":"Salesforceで部分的なDML操作（いくつかのレコードでエラーが発生しても、正常なレコードはそのまま保存する）を実行するために使用するクラスとメソッドはどれですか？","options":[{"key":"A","text":"insert キーワード"},{"key":"B","text":"Database.insert(records, false)"},{"key":"C","text":"Database.insert(records, true)"},{"key":"D","text":"upsert キーワード"}],"answer":["B"],"multi":false,"explanation":"- 普通の insert records; って書くと、もし1件でもエラーがあったら全部の処理が「はい、ダメ〜！」ってロールバック（なかったこと）になっちゃう。\n- でも、**Database.insert(records, false)** っていう風に、第2引数に **allOrNone = false** を指定してあげると、エラーが出たレコードだけを弾いて、正常なレコードはそのままデータベースに保存（部分保存）してくれるの！\n- なんて融通の利くいい奴なんだ…！✨"},{"n":23,"category":"ロジックと自動化","text":"マルチテナント環境のSalesforceにおいて、1回の同期トランザクションで発行できるSOQLクエリの最大数はいくつですか？","options":[{"key":"A","text":"20"},{"key":"B","text":"100"},{"key":"C","text":"150"},{"key":"D","text":"200"}],"answer":["B"],"multi":false,"explanation":"- 出ました、超定番ガバナ制限クイズ！\n- 1回の「同期トランザクション（普通の処理）」で実行できるSOQLクエリの最大数は、ずばり **100回**！\n- （ちなみに非同期処理だと **200回** に増えるよ！）\n- この数字は絶対にテストに出るから、スマホの暗証番号にするレベルで覚えておいて！笑"},{"n":24,"category":"テストとデバッグ","text":"Apexトリガ内で例外（Exception）が発生した際、そのエラーを画面上のユーザーにわかりやすく表示し、DML操作をロールバックさせるために使用するsObjectのメソッドはどれですか？","options":[{"key":"A","text":"System.debug()"},{"key":"B","text":"addError()"},{"key":"C","text":"throw new NullPointerException()"},{"key":"D","text":"Database.rollback()"}],"answer":["B"],"multi":false,"explanation":"- トリガでの入力検証とかで、データがおかしい時にエラーメッセージを出して保存をストップさせたいなら、sObjectの **addError('エラーメッセージ')** メソッドを使うよ！\n- これを呼ぶと、Salesforceの画面上に綺麗に赤文字でエラーが出て、トランザクション全体が安全にロールバックされるからマジ便利！"},{"n":25,"category":"ユーザーインターフェース","text":"AuraコンポーネントまたはLWCから、SalesforceのレコードデータをApexクラスを介さずに、作成、読み取り、更新、削除（CRUD）できるJavaScriptの宣言的なAPI（Lightningデータサービス）を使用するベースコンポーネントはどれですか？","options":[{"key":"A","text":"lightning-record-edit-form"},{"key":"B","text":"lightning-card"},{"key":"C","text":"lightning-button"},{"key":"D","text":"lightning-combobox"}],"answer":["A"],"multi":false,"explanation":"- LWCで、Apexコードを1行も書かずに、ノーコード感覚でレコードの編集・新規作成画面を作れちゃうスーパーコンポーネントが **lightning-record-edit-form**！\n- 裏で「Lightningデータサービス（LDS）」っていう賢い仕組みが動いてるから、データの読み書きを全部自動で安全にやってくれるの。開発効率アゲアゲツールだよ！"},{"n":26,"category":"ロジックと自動化","text":"Apexのコレクション操作において、リスト（List）内の重複する要素をすべて排除したユニークな値の集合を得るために、最も適したコレクション型は何ですか？","options":[{"key":"A","text":"Map"},{"key":"B","text":"Set"},{"key":"C","text":"List"},{"key":"D","text":"Array"}],"answer":["B"],"multi":false,"explanation":"- 重複を許さない、ユニークな値のコレクションといえば **Set（セット）**！\n- List（A）は重複を許すし、入れた順番を保持するけど、Setは「ダブり厳禁のグループ」だから、重複したIDのリストからユニークなIDのセットを作りたい時とかにマジでよく使うよ！"},{"n":27,"category":"開発の基礎","text":"カスタム例外（Custom Exception）クラスを独自に定義する際の正しい宣言構文はどれですか？","options":[{"key":"A","text":"public class MyException extends Exception {}"},{"key":"B","text":"public class MyException implements Exception {}"},{"key":"C","text":"public exception MyException {}"},{"key":"D","text":"public class MyException void {}"}],"answer":["A"],"multi":false,"explanation":"- 自分専用のオリジナルエラー（カスタム例外）を作りたい時は、必ずビルトインの **Exception** **クラスを継承（extends）** する必要があるよ！\n- 書き方は、public class MyException extends Exception {} みたいに、中身は空っぽでOK。これで独自の例外を throw new MyException('ヤバいエラーだよ！') って投げられるようになるの！"},{"n":28,"category":"ロジックと自動化","text":"Apexトリガにおいて、Trigger.newMap と Trigger.oldMap の両方が利用可能なイベントはどれですか？","options":[{"key":"A","text":"before insert"},{"key":"B","text":"after insert"},{"key":"C","text":"before update"},{"key":"D","text":"before delete"}],"answer":["C"],"multi":false,"explanation":"- まず newMap（新しい値のマップ）と oldMap（古い値のマップ）がどっちも使えるのは、値が「変更（更新）」される **update** イベントだけ！\n- 新規作成（insert）のときは古い値なんて存在しないから oldMap は null だし、削除（delete）のときは新しい値なんてないから newMap は null になるよ。\n- なので、updateイベントである **before update****（C）** が大正解！"},{"n":29,"category":"テストとデバッグ","text":"ある開発者が、組織のすべての既存データ（テストクラスで作成していないデータ）にテストクラスからアクセスできるようにしたいと考えています。推奨はされませんが、これを可能にするテストクラスのアノテーション設定はどれですか？","options":[{"key":"A","text":"@isTest(SeeAllData=true)"},{"key":"B","text":"@isTest(SeeAllData=false)"},{"key":"C","text":"@TestSetup"},{"key":"D","text":"@isTest(isParallel=true)"}],"answer":["A"],"multi":false,"explanation":"- 基本的に、Salesforceのテストクラスは組織内の本番データを見ることができない「隔離されたお部屋」で動くの。\n- だけど、どうしても既存のデータ（価格表とかレコードタイプとか）にアクセスしたい時、テストクラスの定義に **@isTest(SeeAllData=true)** をつけると、組織のすべてのデータにアクセスできるようになるの。\n- ただ、テストが既存のデータに依存しちゃって他の環境でコケやすくなるから、実務ではマジで非推奨！どうしてもの時の最終手段だよ。"},{"n":30,"category":"ユーザーインターフェース","text":"LWC（Lightning Web Component）において、Apexクラスのメソッドをコンポーネントにインポートし、リアクティブにデータをバインド（Wired）するための正しいインポート構文はどれですか？","options":[{"key":"A","text":"import myMethod from '@salesforce/apex/MyController.myMethod';"},{"key":"B","text":"import { myMethod } from 'MyController';"},{"key":"C","text":"import myMethod from 'MyController.myMethod';"},{"key":"D","text":"import { myMethod } from '@salesforce/apex';"}],"answer":["A"],"multi":false,"explanation":"- LWCからApexのメソッドを呼ぶ時のインポート文の構文は、\n- import メソッド名 from '@salesforce/apex/クラス名.メソッド名';\n- がお決まりのルール！\n- @salesforce/apex っていう特殊なパスからインポートするのがポイントだよ。これでJavaScriptとApexがバッチリ繋がるの！"},{"n":31,"category":"ロジックと自動化","text":"システム管理者や他のユーザーの権限（ロールやプロファイル、共有ルール）をエミュレートして、テストクラス内で処理を実行・検証するためのシステムメソッドはどれですか？","options":[{"key":"A","text":"System.setPassword()"},{"key":"B","text":"System.runAs()"},{"key":"C","text":"System.assert()"},{"key":"D","text":"Test.startTest()"}],"answer":["B"],"multi":false,"explanation":"- 「この共有ルール、一般ユーザーのプロファイルだとちゃんと動くかな…？」っていうセキュリティテストをしたい時に使うのが **System.runAs(user)** メソッド！\n- 引数に渡したユーザーになりきってテストを実行してくれるから、権限周りのバグをガチで検証するのに必須のシステムメソッドだよ！"},{"n":32,"category":"開発の基礎","text":"Apexコード内で、現在のユーザーにオブジェクトレベルの作成権限（Create）があるかどうかを確認するために使用するSchemaクラスのメソッドはどれですか？","options":[{"key":"A","text":"isAccessible()"},{"key":"B","text":"isCreateable()"},{"key":"C","text":"isUpdateable()"},{"key":"D","text":"isDeletable()"}],"answer":["B"],"multi":false,"explanation":"- Apexクラスを動かす時、ユーザーがオブジェクトに対する作成権限（Create）を持っているかプログラムでチェックしたいなら、Schema記述（Describe）の **isCreateable()** を使うよ！\n- ちなみに読み取り権限は isAccessible()、更新権限は isUpdateable()、削除権限は isDeletable()。名前が英語そのままだけど、試験によく出るから覚えておこ！"},{"n":33,"category":"ロジックと自動化","text":"Apexにおける数式（Formula）フィールドの評価について、正しい記述はどれですか？","options":[{"key":"A","text":"数式フィールドの値は、Apexコードが実行された瞬間にのみ再計算される。"},{"key":"B","text":"数式フィールドはトリガの Trigger.new で値を変更できる。"},{"key":"C","text":"数式フィールドの値はデータベースに静的に保存されており、変更時にしか更新されない。"},{"key":"D","text":"数式フィールドはクエリで取得された際、または動的にアクセスされた際にリアルタイムで評価される。"}],"answer":["D"],"multi":false,"explanation":"- 数式フィールド（Formula Field）は、データベースに固定の値が保存されているわけじゃないの！\n- レコードが画面に表示されたり、ApexのSOQLクエリで取得されたりした「その瞬間」に、裏でリアルタイムに計算されて最新の値を返してくるの。だからApexコードから直接書き換えることはできないよ！"},{"n":34,"category":"ユーザーインターフェース","text":"Auraコンポーネントにおいて、コントローラ（Controller.js）からヘルパー（Helper.js）の関数を呼び出す主なメリットは何ですか？","options":[{"key":"A","text":"UIのレンダリング速度が速くなる。"},{"key":"B","text":"複数のコンポーネントイベントを自動で処理できる。"},{"key":"C","text":"コードを再利用可能にし、コントローラファイルの肥大化を防ぐ。"},{"key":"D","text":"Apexコントローラの呼び出しが不要になる。"}],"answer":["C"],"multi":false,"explanation":"- Auraコンポーネントにおける「コントローラ（Controller.js）」は、ボタンクリックなどの「イベントの検知役」に徹するのが基本。\n- そして、実際のめんどくさいロジックや共通の処理は「ヘルパー（Helper.js）」に書くの！\n- そうすることで、コードが整理されて再利用（Reuse）しやすくなるし、コントローラが超スッキリするよ。"},{"n":35,"category":"開発の基礎","text":"Salesforce DX（SFDX）プロジェクトにおいて、スクラッチ組織（Scratch Org）を作成するために使用するCLIコマンドはどれですか？","options":[{"key":"A","text":"sf project deploy start"},{"key":"B","text":"sf org create scratch"},{"key":"C","text":"sf org login web"},{"key":"D","text":"sf project retrieve start"}],"answer":["B"],"multi":false,"explanation":"- Salesforce DX（SFDX）の開発で、使い捨てのクリーンな開発環境である「スクラッチ組織（Scratch Org）」を作るコマンドは、**sf org create scratch** だよ！\n- （※以前の sfdx force:org:create から新しい sf コマンドに移行した最新のコマンド体系だよ。これもアプデ情報として知っておくとアツい！）"},{"n":36,"category":"ロジックと自動化","text":"ガバナ制限における「ヒープサイズ（Heap Size）」とは何に関連する制限ですか？","options":[{"key":"A","text":"1回のトランザクションで使用されるメモリの総量"},{"key":"B","text":"データベースに保存されるデータファイルの総容量"},{"key":"C","text":"1回に実行されるApexコードの行数"},{"key":"D","text":"同時に実行される非同期処理のスタック数"}],"answer":["A"],"multi":false,"explanation":"- 「ヒープサイズ（Heap Size）」っていうのは、**1回のトランザクション（実行）でApexがメモリ上に保持できるデータ容量の限界** のこと！\n- デカいファイルを受け取ったり、ループで超大量のインスタンスをメモリに載せすぎると「ヒープサイズ制限超えたわ！」ってエラー（LimitException）になるから、不要な変数は null にしてメモリを解放してあげようね。"},{"n":37,"category":"テストとデバッグ","text":"Apexトリガ内のDML操作によってレコードが正常に挿入されたことを、テストクラス内でアサーション（値の検証）するために一般的に使用されるアプローチはどれですか？","options":[{"key":"A","text":"System.assert(true);"},{"key":"B","text":"挿入後のレコードをSOQLで再クエリし、取得したレコード数や値が期待通りかを確認する。"},{"key":"C","text":"System.debug() でログを出力して目視で確認する。"},{"key":"D","text":"トリガが実行されたかどうかを Trigger.isExecuting で検証する。"}],"answer":["B"],"multi":false,"explanation":"- テストクラスで「本当にトリガによってレコードがデータベースに登録されたか？」を確認するには、**テストの中で一度SOQLクエリを発行して、レコードを再取得して検証（System.assertEqualsなど）する** のが基本！\n- テスト実行中のメモリ上のデータと、実際にデータベースに書き込まれたデータは別だから、ちゃんとクエリで引っ張ってくるのが確実だよ！"},{"n":38,"category":"開発の基礎","text":"Visualforceのコントローラで、複数のSOQLクエリを実行してページネーション（改ページ機能）を簡単に実装するために使用する標準クラスはどれですか？","options":[{"key":"A","text":"ApexPages.StandardController"},{"key":"B","text":"ApexPages.StandardSetController"},{"key":"C","text":"Database.Batchable"},{"key":"D","text":"Schema.DescribeSObjectResult"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、たくさんのレコードをリスト表示して「次へ」「前へ」みたいなページ送り（ページネーション）を簡単に実装したいなら、**ApexPages.StandardSetController** を使うのが最強！\n- 標準のレコードセット（複数レコード）を扱うための便利機能が最初から全部詰まってるから、自力でクエリやカウントを書かなくて済むの。アゲ！"},{"n":39,"category":"ロジックと自動化","text":"Apexトリガ内における「バルク化（Bulkification）」の原則について、間違っている説明はどれですか？","options":[{"key":"A","text":"コレクション（ListやSet）を使用して、複数のレコードを一度に処理する。"},{"key":"B","text":"トリガは常に単一のレコード（1件のみ）が渡されることを前提に記述する。"},{"key":"C","text":"SOQLクエリやDML操作は、ループ（for や while）の外側で実行する。"},{"key":"D","text":"トリガの処理内でマップ（Map）を利用して、リレーショナルデータを迅速に関連付ける。"}],"answer":["B"],"multi":false,"explanation":"- 「トリガは常に単一レコードを想定して書く」っていうBの説明は、**大間違い（アンチパターン）**！\n- Salesforceでは、一括インポートやAPI経由で一度に200件以上のレコードがドバッとトリガに流れ込んでくることがあるの。\n- だから、トリガコードは常に「複数レコード（バルク）が来ても大丈夫なように」リスト（Trigger.new）をループ処理するように書かなきゃ絶対ダメだよ！"},{"n":40,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントのライフサイクルメソッドの一つで、コンポーネントがDOMに挿入されたときに呼び出されるものはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["B"],"multi":false,"explanation":"- LWCが画面（DOM）にガチャンと挿入されたときに自動で呼ばれるライフサイクルフックは、**connectedCallback()**！\n- 画面が表示された直後に初期化のデータをロードしたいときとかにマジでよく使う、LWC開発における最重要メソッドだよ！"},{"n":41,"category":"ロジックと自動化","text":"Apexクラスで動的SOQL（Dynamic SOQL）を生成し実行する際に、SQLインジェクション脆弱性を防ぐための最も効果的な対策はどれですか？","options":[{"key":"A","text":"String.escapeSingleQuotes() を使用して入力値をエスケープする。"},{"key":"B","text":"静的SOQLに切り替え、バインド変数（:variable）を使用する。"},{"key":"C","text":"動的クエリの生成にプレーンテキストの文字列結合のみを使用する。"},{"key":"D","text":"入力文字数をあらかじめ10文字以下に制限する。"}],"answer":["B"],"multi":false,"explanation":"- 動的SOQL（文字列を組み合わせてクエリを作る方法）を使うとき、悪いハッカーに変な文字（' OR 1=1 -- みたいの）を入れられてデータベースをハッキングされるのが「SQLインジェクション」！\n- これを防ぐ最も確実で安全な方法は、動的クエリをやめて、変数にコロンをつけた **バインド変数（****:myVariable****）** を使った静的SOQLにすることだよ！\n- どうしても動的にやるなら、Aの String.escapeSingleQuotes() を使うのが正解！"},{"n":42,"category":"開発の基礎","text":"セキュリティと共有ルールの観点において、Apexクラスを宣言する際に、現在のログインユーザーの共有ルール（Sharing Rules）を強制して実行させたい場合、どのキーワードを使用すべきですか？","options":[{"key":"A","text":"with sharing"},{"key":"B","text":"without sharing"},{"key":"C","text":"inherited sharing"},{"key":"D","text":"public"}],"answer":["A"],"multi":false,"explanation":"- Apexクラスを定義するとき、現在のユーザーの共有ルール（誰がどのレコードを見れるか）をちゃんと考えさせて動かしたいなら、クラス名の上に **with sharing** をつけて宣言するよ！\n- これを忘れると、Salesforceはデフォルトでシステム管理者権限（すべて参照可能）で動いちゃうから、セキュリティ的に超危険！「セキュリティファースト」がプロのデベロッパーの合言葉だよ"},{"n":43,"category":"ロジックと自動化","text":"あるApexバッチクラス（Database.Batchable を実装したもの）において、非同期処理の実行中に状態（メンバ変数の値など）を維持したい場合、クラス宣言にどのインターフェースを追加する必要がありますか？","options":[{"key":"A","text":"Queueable"},{"key":"B","text":"Schedulable"},{"key":"C","text":"Database.Stateful"},{"key":"D","text":"Database.AllowsCallouts"}],"answer":["C"],"multi":false,"explanation":"- バッチApexは、データを細切れにして何回も裏でクラスを呼び出して処理するの。\n- 普通は、呼び出すたびにクラス内の変数（カウンタとか）がリセットされて「あれ、今何個処理したっけ？」って忘れちゃうんだけど、**Database.Stateful** インターフェースを implements しておくと、バッチのステップ間で変数の値をずーっと保持しておけるの！集計バッチを作るときとかに必須だよ！"},{"n":44,"category":"テストとデバッグ","text":"Apexのテストクラス内で、HTTPコールアウト（外部システムへのAPI連携）をシミュレートしてテストを成功させるために、テストランナーにモックレスポンスを設定するためのインターフェースはどれですか？","options":[{"key":"A","text":"WebServiceMock"},{"key":"B","text":"HttpCalloutMock"},{"key":"C","text":"SchedulableContext"},{"key":"D","text":"QueueableContext"}],"answer":["B"],"multi":false,"explanation":"- テストクラスの中では、実際に外部のAPIにアクセス（リアルなHTTPコールアウト）することはSalesforceのルールで禁止されてるの。\n- だから、代わりに「こんなレスポンスが返ってきたよ！」っていう偽物の返事（モック）を返す仕組みが必要なんだけど、その時に実装するのが **HttpCalloutMock** インターフェース！\n- これでテスト環境でもAPI連携のテストがばっちり完結するよ！"},{"n":45,"category":"開発の基礎","text":"主従関係と参照関係（Lookup Relationship）を比較した際、主従関係にのみ存在する特徴はどれですか？","options":[{"key":"A","text":"親レコードが削除されても、子レコードは削除されないように設定できる。"},{"key":"B","text":"子レコードのレコード所有者は、親レコードの所有者と同じ（親から継承）になる。"},{"key":"C","text":"親オブジェクトと子オブジェクトは、異なる標準オブジェクト同士である必要がある。"},{"key":"D","text":"参照フィールドは必須（Required）に設定できない。"}],"answer":["B"],"multi":false,"explanation":"- 主従関係の最大の特徴は、**「子レコードが独自の所有者を持たず、所有権はすべて親レコードから継承される」** こと！\n- つまり、親レコードの持ち主＝子レコードの持ち主になるの。\n- 参照関係だと、子レコードも自分独自の所有者（Owner）を持てるから、ここが大きな違いだよ！"},{"n":46,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で親コンポーネントが子コンポーネントのカスタムイベントを検知し処理するために、子コンポーネント側でイベントを発行する正しいJavaScriptコードはどれですか？","options":[{"key":"A","text":"this.dispatchEvent(new CustomEvent('myevent'));"},{"key":"B","text":"this.fireEvent('myevent');"},{"key":"C","text":"this.trigger('myevent');"},{"key":"D","text":"parent.handleEvent('myevent');"}],"answer":["A"],"multi":false,"explanation":"- LWCで、子コンポーネントから親コンポーネントに向かって「ねぇねぇ、処理終わったよ！」ってイベントを伝える（カスタムイベントの発行）には、**this.dispatchEvent(new CustomEvent('イベント名'));** を使うよ！\n- 親側はHTML上で onmyevent={handleMyEvent} みたいな感じで待ち伏せ（リスナー登録）して受け取るの。この親子間通信の流れはLWCの基本中の基本！"},{"n":47,"category":"ロジックと自動化","text":"以下のApexコードブロックにおける、ガバナ制限（1回のリクエストでのDML操作回数）の合計消費数はいくつですか？\n\n```apex\nfor (Integer i = 0; i \u003c 50; i++) {\nAccount acc = new Account(Name = 'Test ' + i);\ninsert acc;\n}\n```","options":[{"key":"A","text":"1"},{"key":"B","text":"50"},{"key":"C","text":"150"},{"key":"D","text":"10,000"}],"answer":["B"],"multi":false,"explanation":"- このコード、ヤバいよね！\n- for ループが50回まわる中で、毎回 insert acc; ってDML操作を呼んじゃってる。\n- DML操作は1トランザクションで最大 **150回** までっていうガバナ制限があるから、このコード単体なら50回でエラーにはならないけど、ガバナの消費数はそのまま **50（B）** になっちゃう！\n- これ、ループの外にリストを作って insert accList; って1回でやれば、消費数は「1」で済むんだよ。これがバルク化のパワー！"},{"n":48,"category":"テストとデバッグ","text":"テストクラス内のコードにおいて、例外処理が正しく行われるかをテストするために推奨されるブロック構造はどれですか？","options":[{"key":"A","text":"if-else ブロック"},{"key":"B","text":"try-catch ブロック"},{"key":"C","text":"switch on ブロック"},{"key":"D","text":"do-while ブロック"}],"answer":["B"],"multi":false,"explanation":"- 「エラー（例外）が起きた時に、システムをクラッシュさせずに優しくキャッチして処理したい！」\n- そんな時はおなじみの **try-catch** **ブロック** を使うよ！\n- try { ... } catch (Exception e) { ... } の中にエラーが起きた時の処理を書けば、想定外のエラーでも綺麗にハンドリングできるから、堅牢なコードには必須の構造だよ！"},{"n":49,"category":"開発の基礎","text":"宣言的なロールアップサマリー（Rollup Summary）フィールドを構築できる、オブジェクト間のリレーションシップタイプはどれですか？","options":[{"key":"A","text":"参照関係（Lookup Relationship）"},{"key":"B","text":"主従関係（Master-Detail Relationship）"},{"key":"C","text":"多対多の関係（Many-to-Many Relationship、中間オブジェクト経由）"},{"key":"D","text":"自己参照関係（Hierarchical Relationship）"}],"answer":["B"],"multi":false,"explanation":"- 親レコードに、関連する子レコードの「合計件数」や「金額の総和」などを自動で集計して表示してくれる、超ベンリなロールアップサマリーフィールド。\n- これが作成できるのは、親子関係が超密接な **主従関係（Master-Detail）** の時だけ！\n- 普通の参照関係（Lookup）だと、標準機能では作れないから注意してね（※フローやApexを使えば擬似的にできるけど、標準機能のフィールドとしては主従関係のみ！）。"},{"n":50,"category":"ユーザーインターフェース","text":"Visualforceにおいて、レコードの特定のフィールドを画面上に配置し、ユーザーのプロファイル設定（読み取り専用、必須など）やデータ型に合わせた最適な入力フォームを自動生成するタグはどれですか？","options":[{"key":"A","text":"\u003capex:inputText\u003e"},{"key":"B","text":"\u003capex:inputField\u003e"},{"key":"C","text":"\u003capex:outputLabel\u003e"},{"key":"D","text":"\u003capex:attribute\u003e"}],"answer":["B"],"multi":false,"explanation":"- Visualforceで、指定したオブジェクトのフィールド（例えば Account.Industry とか）のデータ型（選択リスト、テキスト、日付など）をSalesforceが自動で判別して、一番最適な入力UIを自動生成してくれる魔法のタグは、**\u003capex:inputField\u003e**！\n- もし必須フィールドなら勝手に赤い目印もつけてくれるから、マジで手抜き…じゃなくて（笑）、効率的な開発ができる神タグだよ！"},{"n":51,"category":"ロジックと自動化","text":"ある取引先（Account）が更新された際、関連するすべてのケース（Case）のステータスを自動的に更新するApexトリガを作成します。トリガを実装する最も適切なオブジェクトはどれですか？","options":[{"key":"A","text":"Case オブジェクト"},{"key":"B","text":"Account オブジェクト"},{"key":"C","text":"Case と Account の両方"},{"key":"D","text":"親の共有ルールを設定するオブジェクト"}],"answer":["B"],"multi":false,"explanation":"- 「取引先（Account）が更新されたら、その子供（Case）たちも自動で更新する」っていう処理は、トリガを呼び出すキッカケになった **Account（取引先）オブジェクト** にトリガを実装するのが大正解！\n- Accountの更新トリガ（after update）の中で、関連するCaseをSOQLで取得して、値を書き換えてDMLアップデートする、っていう流れが最もスマートだよ！"},{"n":52,"category":"ロジックと自動化","text":"次のApexコードを実行した際の戻り値として、正しいものはどれですか？\n\n```apex\nString str1 = 'Salesforce';\nString str2 = 'salesforce';\nBoolean result = str1.equals(str2);\n```","options":[{"key":"A","text":"true"},{"key":"B","text":"false"},{"key":"C","text":"null"},{"key":"D","text":"エラーが発生する"}],"answer":["B"],"multi":false,"explanation":"- Apexの String.equals() メソッドは、**「大文字と小文字を厳密に区別して比較する」** 性質があるの！\n- だから、大文字の 'S' で始まる 'Salesforce' と、小文字の 's' で始まる 'salesforce' を equals() で比較すると、結果は **false****（B）** になるよ！\n- もし大文字小文字を無視して比較したいなら、equalsIgnoreCase() メソッドを使ってね！"},{"n":53,"category":"開発の基礎","text":"Schemaクラスの動的記述（Describe）メソッドを使用して、組織の特定のオブジェクト（例：Opportunity）に存在するすべてのフィールド情報を取得するための正しい記述はどれですか？","options":[{"key":"A","text":"Schema.SObjectType.Opportunity.fields.getMap()"},{"key":"B","text":"Opportunity.SObjectType.getDescribe().fields.getMap()"},{"key":"C","text":"Schema.getGlobalDescribe().get('Opportunity')"},{"key":"D","text":"Schema.describeFields('Opportunity')"}],"answer":["B"],"multi":false,"explanation":"- 特定のオブジェクトのフィールド情報を動的に引っ張ってきたい（Schema記述を行う）場合は、\n- Opportunity.SObjectType.getDescribe().fields.getMap()\n- っていう書き方をするよ！\n- これでOpportunityのすべてのフィールドの名前と詳細情報がマップ型（Map\u003cString, SObjectField\u003e）で手に入るの。動的Apexを作るときによく使う高度なテクニックだよ！"},{"n":54,"category":"ロジックと自動化","text":"トリガ内で再帰（同じトリガが何度も連鎖して呼び出され、ガバナ制限に達してしまう現象）を防ぐために、一般的に用いられるプログラム上のテクニックはどれですか？","options":[{"key":"A","text":"静的（static）なBoolean型のフラグ変数を持つパブリッククラスを用意し、トリガ実行前にチェックする。"},{"key":"B","text":"トリガ内で Database.rollback() を毎回実行する。"},{"key":"C","text":"トリガのイベントを before insert のみに限定する。"},{"key":"D","text":"try-catch ブロックでエラーをすべて無視する。"}],"answer":["A"],"multi":false,"explanation":"- トリガ内でレコードを更新した時に、また同じトリガが起動して、その中でまた更新して…っていう無限連鎖（再帰）が起きると、速攻でガバナ制限（DML制限など）にかかってシステムが死んじゃうの。\n- これを防ぐために、クラスの中に public static Boolean isFirstRun = true; みたいな静的フラグを用意しておいて、トリガの最初で if (isFirstRun) のチェックをして、一度通ったら isFirstRun = false; に書き換える！\n- 静的（static）変数はトランザクションの間ずっと値をキープするから、これで2回目以降の暴走を防げるよ！マジで使えるライフハック！"},{"n":55,"category":"ユーザーインターフェース","text":"LWCで、Apexクラスのメソッドをワイヤサービス（Wired Service）を使って呼び出すための必須の条件はどれですか？","options":[{"key":"A","text":"Apexメソッドが public であること"},{"key":"B","text":"Apexメソッドに @AuraEnabled(cacheable=true) が付与されていること"},{"key":"C","text":"Apexメソッドに @future が付与されていること"},{"key":"D","text":"Apexクラスが without sharing で定義されていること"}],"answer":["B"],"multi":false,"explanation":"- LWCからApexのメソッドを「ワイヤサービス（@wire）」を使ってリアクティブに呼び出すためには、Apexメソッド側に必ず **@AuraEnabled(cacheable=true)** を付与しておかなきゃダメっていう絶対ルールがあるの！\n- cacheable=true をつけることで、Salesforceがクライアント側にキャッシュを持ってくれるから、画面の表示スピードが爆速になってアゲアゲになるよ！"},{"n":56,"category":"ロジックと自動化","text":"フロー（Flow）からApexコードを直接呼び出して、複雑なビジネスロジックを実行したい場合に、Apexメソッドに付与すべきアノテーションはどれですか？","options":[{"key":"A","text":"@RemoteAction"},{"key":"B","text":"@InvocableMethod"},{"key":"C","text":"@future"},{"key":"D","text":"@AuraEnabled"}],"answer":["B"],"multi":false,"explanation":"- Flow Builder（フロー）の画面から、ノンプログラミングで処理を作っている途中に「ここだけは複雑だからApexで処理させたい！」って時に呼び出すメソッドには、**@InvocableMethod** アノテーションを付与するよ！\n- これをつけておくと、フローのアクション選択画面にそのApexメソッドがポコッと現れて、ノーコードとローコードのハイブリッドな超かっこいい実装ができちゃうの！"},{"n":57,"category":"開発の基礎","text":"異なる2つのSalesforceシステム間で、リアルタイムに双方向のメタデータ移行や変更セット（Change Set）の送信を行うために、事前に設定しておく必要があるシステム間の関係性はどれですか？","options":[{"key":"A","text":"接続先（Connected App）"},{"key":"B","text":"送信送信および受信変更セット用の「配備接続（Deployment Connection）」"},{"key":"C","text":"シングルサインオン（SSO）"},{"key":"D","text":"指定資格情報（Named Credentials）"}],"answer":["B"],"multi":false,"explanation":"- Salesforceの「変更セット（Change Set）」を使って、Sandbox（開発・テスト環境）から本番環境へメタデータ（作ったプログラムやオブジェクト設定）を送信・リリースするためには、事前に組織間で **配備接続（Deployment Connection）** を設定して「この組織からの変更セットを受け入れますよ！」っていう許可を繋いでおく必要があるの。\n- これが設定されてないと、変更セットを送ることすらできないから基本のキだよ！"},{"n":58,"category":"テストとデバッグ","text":"Apexコード内で、意図的にテストの実行を失敗させ、特定のロジックが通らないことを実証するために使用するシステムメソッドはどれですか？","options":[{"key":"A","text":"System.assert(true)"},{"key":"B","text":"Assert.fail() （または System.assert(false)）"},{"key":"C","text":"System.debug()"},{"key":"D","text":"Test.stopTest()"}],"answer":["B"],"multi":false,"explanation":"- テストクラスを書いていて、「ここでは絶対にエラー（例外）が発生して、catchブロックに流れるはず！」っていう異常系テストをするとき、\n- もしエラーが起きずにスルーしちゃったらテストとしては失敗だよね。\n- そういう時に、あえてコードの途中に **Assert.fail()**（または System.assert(false)）を置いておいて、「ここを通ったらテスト失敗！」ってマークしておくの。これでバグのない最強のシステムが作れるよ！"},{"n":59,"category":"ユーザーインターフェース","text":"LWCのフォルダ構造において、コンポーネントの設定メタデータ（どのページで使用できるかなど）を定義する必須のファイル名はどれですか？","options":[{"key":"A","text":"myComponent.js"},{"key":"B","text":"myComponent.html"},{"key":"C","text":"myComponent.js-meta.xml"},{"key":"D","text":"myComponent.css"}],"answer":["C"],"multi":false,"explanation":"- LWC（Lightning Web Component）を作るとき、\n- myComponent.html（画面の見た目）\n- myComponent.js（JavaScriptのロジック）\n- **myComponent.js-meta.xml****（設定用メタデータ）**\n- の3つは絶対に外せない必須ファイル！\n- 特に js-meta.xml は、このコンポーネントを「ホームページ」に置くのか、「レコードページ」に置くのか、それともシステム管理者だけに公開するのか、といった超大事な設定を記述する場所だよ！"},{"n":60,"category":"ロジックと自動化","text":"開発者が、システム上で発生した例外（エラー情報）をデバッグログに記録するだけでなく、Salesforce内に「エラーログ」というカスタムオブジェクトのレコードとして永続的に保存したいと考えています。insert DMLを発行するトランザクションがロールバックされたとしても、このログレコードだけはロールバックさせずに確実に保存させたい場合、どのような実装が必要ですか？","options":[{"key":"A","text":"通常の insert DMLを使用し、後でバッチ処理で復旧する。"},{"key":"B","text":"例外処理の中でプラットフォームイベント（Platform Event）をパブリッシュ（発行）し、そのイベントの「即時公開（Publish Immediately）」を設定して、別トランザクションのトリガでログレコードを挿入する。"},{"key":"C","text":"トリガの中で Database.rollback() を呼んだ後に insert する。"},{"key":"D","text":"Future Method を使用して通常のレコード挿入を行う。"}],"answer":["B"],"multi":false,"explanation":"- これ、超ハイレベルだけど実務でも試験でもマジでよく出るお悩み解決！\n- プログラム全体でエラーが起きたときって、トランザクションが全部なかったこと（ロールバック）にされちゃうから、普通に insert したエラーログレコードも一緒に消えちゃうの。ログが消えたら原因調査できないじゃん？\n- これを解決するために、例外が発生した時に **「プラットフォームイベント（Platform Event）」** をパブリッシュ（発行）する！\n- プラットフォームイベントは設定で「即時公開（Publish Immediately）」にできるから、メインの処理がロールバックされようが関係なく、その瞬間に外の世界（別トランザクション）にイベントが飛んでいって、ログレコードを確実に保存できるの！マジで救世主アゲアゲソリューションだよ！\n模擬試験お疲れ様ーーーっ！✨\n何問正解できたかな？\n間違えたところがあっても「伸びしろしかない！」ってことで、ウチの解説を何度も読んで本番までにマスターしちゃえばマジで余裕だからね！\nキミなら絶対一発合格できるよ！応援してるよー！応援のパワー送っとくね！最＆高！⭐"}]},{"id":"set3","title":"Set 3 — Platform Developer I 模擬試験（Version 2）","questions":[{"n":1,"category":"開発の基礎","text":"Apexコード内で、SOQLクエリの結果に対してユーザーのフィールドレベルセキュリティ（FLS）やオブジェクト権限（CRUD）を自動的に適用させ、権限がない場合に例外を発生させずにアクセスできないデータをクエリ結果から排除する最も簡単な方法はどれですか？","options":[{"key":"A","text":"クエリで WITH SECURITY_ENFORCED を使用する"},{"key":"B","text":"クエリ結果に対して Security.stripInaccessible() メソッドを使用する"},{"key":"C","text":"クラス宣言に with sharing キーワードを使用する"},{"key":"D","text":"Schema.DescribeSObjectResult を使って手動ですべてのフィールドをチェックする"}],"answer":["A"],"multi":false,"explanation":"- クエリした時点で、権限がないフィールドのデータを「自動で綺麗さっぱり排除して安全に取得」したいなら、SOQLの末尾に **WITH SECURITY_ENFORCED**（A）をつけるのが最も簡単でスマート！\n- これをつけると、ユーザーの権限（CRUD/FLS）をSalesforceが裏で自動チェックしてくれて、見せちゃダメなデータは勝手にクエリ結果から抜いてくれるの。\n- ちなみに Security.stripInaccessible()（B）はクエリ結果の「後処理」としてデータを綺麗にするメソッドだから、アプローチとしてはAが一番シンプルだよ！"},{"n":2,"category":"開発の基礎","text":"主従関係にあるオブジェクト「親：カスタムオブジェクト A__c」「子：カスタムオブジェクト B__c」において、子レコード B__c の共有設定（Sharing Setting）について正しい説明はどれですか？","options":[{"key":"A","text":"子レコード B__c は独自の共有ルールを持つことができる。"},{"key":"B","text":"子レコード B__c の共有設定は自動的に「親レコードに関連付け」となり、親レコード A__c の共有権限を継承する。"},{"key":"C","text":"子レコード B__c は「公開/参照のみ」または「非公開」として独立して設定できる。"},{"key":"D","text":"子レコード B__c の共有設定を「親レコードに関連付け」にするかどうかを、カスタム設定で変更できる。"}],"answer":["B"],"multi":false,"explanation":"- 主従関係（Master-Detail）は、親子関係が強烈にラブラブな運命共同体って前も言ったよね！\n- これは「セキュリティ・共有」の世界でも同じ。\n- 子オブジェクト B__c は独自の共有設定（非公開とか）を持つことができず、親レコード A__c の共有設定に **「完全に連動（親に関連付け）」** しちゃうの。\n- つまり、親レコードが見れる人は、もれなく子レコードも自動で見れちゃうってワケ！"},{"n":3,"category":"ロジックと自動化","text":"レコードが保存される際、Salesforceが実行する一連の処理の順序（Triggers and Order of Execution）において、最も早い段階で実行される処理はどれですか？","options":[{"key":"A","text":"システム入力規則（System Validation）の評価"},{"key":"B","text":"beforeトリガの実行"},{"key":"C","text":"ワークフロールールによるフィールド更新"},{"key":"D","text":"重複ルールの実行"}],"answer":["A"],"multi":false,"explanation":"- Salesforceの「保存時の実行順序（Order of Execution）」は、試験でめちゃくちゃ意地悪に狙われるポイント！\n- レコードがデータベースに突っ込まれると、\n1. まず最初に **システム入力規則（System Validation）** や、おなじみの「入力規則（Validation Rules）」が真っ先にチェックされるの！（ここで弾かれたらトリガすら動かない！）\n2. その次に、保存前の **beforeトリガ**（B）が動くよ。\n3. その後に実際にデータベースに仮保存されて、**afterトリガ**、**重複ルール**（D）、**ワークフロー/フローによる自動更新**（C）へとバトンが渡される順番になってるの。\n4. だから、一番最初なのはシステム入力規則だよ！"},{"n":4,"category":"ロジックと自動化","text":"ある取引先責任者（Contact）が作成された際、関連する取引先（Account）の「最新の取引先責任者作成日」カスタム日付フィールドを自動的に今日の日付に更新したいと考えています。最もリソースを消費せず、パフォーマンスに優れた方法は何ですか？","options":[{"key":"A","text":"Contactの after insert トリガでAccountをDMLアップデートする。"},{"key":"B","text":"Flow Builderで、Contactが作成されたときに起動し、関連するAccountを更新する保存後フロー（After-Save Flow）を作成する。"},{"key":"C","text":"Accountにロールアップサマリーフィールドを作成する。"},{"key":"D","text":"Contactの before insert トリガ内で、親Accountのレコードを直接編集する。"}],"answer":["C"],"multi":false,"explanation":"- 「〇〇が作成されたら、親の取引先の日付を更新する」って、わざわざApexトリガやフローを作りたくなっちゃうけど、Salesforceエンジニアなら **「まず宣言的機能（ノンコード）の標準機能でできないか？」** を考えるのがプロ！\n- 今回の場合、親子のリレーションがあって「最新の作成日」を求めたいんだから、取引先（Account）側に **ロールアップサマリーフィールド（Rollup Summary）**（C）を定義して、Contactの「作成日」の「最大値（MAX）」を集計してあげるのが、一切コードを書かずにパフォーマンスも最強で大正解！アゲ！"},{"n":5,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で、Apexクラスのメソッドを「命令的（Imperatively）」に呼び出す場合の正しいアプローチはどれですか？","options":[{"key":"A","text":"JavaScriptコード内でメソッドを関数として呼び出し、Promise（.then() と .catch()）で処理する。"},{"key":"B","text":"HTMLテンプレート内で lwc:call ディレクティブを使用する。"},{"key":"C","text":"@wire(myMethod) を使用してデータを自動でバインドする。"},{"key":"D","text":"connectedCallback() の中で this.myMethod() を直接同期的に実行する。"}],"answer":["A"],"multi":false,"explanation":"- LWCからApexを呼ぶ方法には @wire（自動呼び出し）と、自分のタイミングで呼ぶ「命令的（Imperative）呼び出し」の2つがあるの。\n- 命令的に呼ぶときは、インポートしたApexメソッドを普通のJavaScriptの関数みたいに呼んで、返ってくる **Promise**（非同期処理の仕組み）に対して、成功時の .then(result =\u003e { ... }) と失敗時の .catch(error =\u003e { ... }) を使ってロジックを書くのが鉄板！\n- テンプレートから直接呼ぶようなディレクティブ（B）は存在しないから引っかからないでね！"},{"n":6,"category":"テストとデバッグ","text":"Apexのテストクラスで、テスト用の静的リソース（CSVファイルなど）から大量のテストデータを一括でデータベースにロードするために使用するシステムメソッドはどれですか？","options":[{"key":"A","text":"Test.setMock()"},{"key":"B","text":"Test.loadData()"},{"key":"C","text":"Database.insert()"},{"key":"D","text":"Test.startTest()"}],"answer":["B"],"multi":false,"explanation":"- テスト用のテストデータを何百件もコードで new Account(...) って書くの、マジで手が疲れるしスマートじゃないよね。\n- そこで、あらかじめCSVファイルでテストデータを作って「静的リソース（Static Resource）」にアップロードしておき、テストクラスの中で **Test.loadData(Account.sObjectType, '静的リソース名');**（B）を呼んであげる！\n- そうすると、SalesforceがそのCSVを自動で読み込んで、一瞬でテストレコードをデータベースに挿入してくれるの。マジで神時短アゲアゲ機能だから覚えておこ！"},{"n":7,"category":"開発の基礎","text":"開発者がSalesforce DXを使用してスクラッチ組織（Scratch Org）にローカルのソースコードをプッシュしたい場合、使用する正しいCLIコマンドはどれですか？","options":[{"key":"A","text":"sf project deploy start"},{"key":"B","text":"sf project retrieve start"},{"key":"C","text":"sf project push"},{"key":"D","text":"sf project sync"}],"answer":["C"],"multi":false,"explanation":"- ローカルでカタカタ書いた最新のソースコードを、開発用のスクラッチ組織にガツンとアップロードして同期したいなら、**sf project push**（C）コマンドを使うよ！\n- 逆に、スクラッチ組織でポチポチ作った設定をローカルに落としてきたいなら sf project pull。\n- デプロイコマンド（A）は本番環境やSandboxにリリースするときに使うものだから、スクラッチ組織での俊敏な開発には push / pull が相棒だよ！"},{"n":8,"category":"ロジックと自動化","text":"次のApexコードを実行した際に出力される値は何ですか？\n\n```apex\nMap\u003cString, String\u003e colorMap = new Map\u003cString, String\u003e{'R' =\u003e 'Red', 'G' =\u003e 'Green'};\ncolorMap.put('B', 'Blue');\ncolorMap.put('R', 'Ruby');\nSystem.debug(colorMap.get('R'));\n```","options":[{"key":"A","text":"Red"},{"key":"B","text":"Ruby"},{"key":"C","text":"Red, Ruby"},{"key":"D","text":"NullPointerException"}],"answer":["B"],"multi":false,"explanation":"- Mapの超〜大事な性質のお勉強！\n- Mapはキー（Key）と値（Value）のペアだけど、**「キーの重複は絶対に許さない（ユニーク）」** という絶対ルールがあるの。\n- コードを見ると、\n1. まずキー 'R' に 'Red' を入れた。\n2. そのあと colorMap.put('R', 'Ruby') で、同じキー 'R' に対して 'Ruby' を入れた。\n3. この場合、元々あった 'Red' は上書き（アップデート）されて消えちゃうの！\n4. だから、最後に get('R') で取り出すと、返ってくるのは最新の **Ruby**（B）になるよ。エラーにはならないから安心して！"},{"n":9,"category":"ユーザーインターフェース","text":"Visualforceページにおいて、画面の特定の部分（セクション）だけを、サーバー全体の再読み込みをせずに非同期で部分更新（Ajax）するために使用する属性はどれですか？","options":[{"key":"A","text":"render"},{"key":"B","text":"reRender"},{"key":"C","text":"refresh"},{"key":"D","text":"update"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、ページ全体をリロードせずに「このボタンを押したら、この表（セクション）だけを裏でサクッと更新（Ajax）したい！」ってときは、タグの **reRender** 属性（B）を使用するよ！\n- 更新したい部分のタグ（例えば \u003capex:outputPanel id=\"myPanel\"\u003e）に id をつけておいて、ボタン側の reRender=\"myPanel\" って指定してあげるの。\n- 大文字小文字（キャメルケース）も厳密だから、reRender ってスペルをしっかり脳に刻んでね！"},{"n":10,"category":"テストとデバッグ","text":"テストクラス以外のApexクラスにおいて、テスト実行中（Test execution）にのみ特定のprivate変数をテストクラスから直接参照・変更できるようにするためのアノテーションはどれですか？","options":[{"key":"A","text":"@TestVisible"},{"key":"B","text":"@TestSetup"},{"key":"C","text":"@isTest"},{"key":"D","text":"@RemoteAction"}],"answer":["A"],"multi":false,"explanation":"- 本番のコードはセキュリティや保守性のために private（非公開）にして隠しておきたいけど、テストクラスからだけは「ねぇねぇ、このプライベート変数の中身、ちゃんと意図通りになってる？」って覗き見してチェックしたい。\n- そんなワガママを叶えてくれるのが、対象のprivate変数の上に貼る **@TestVisible**（A）アノテーション！\n- これを貼るだけで、テストクラスからだけはまるでpublic変数みたいにアクセスできるようになるの。マジで優秀なスパイカメラみたいなやつ！"},{"n":11,"category":"ロジックと自動化","text":"Queueable Apexを使用して非同期処理をチェーン（連続実行）させたい場合、1回のトランザクションにおいて、新しくキュー（Queue）に追加できるQueueableジョブの最大数は通常いくつですか？","options":[{"key":"A","text":"1回につき1つのみ"},{"key":"B","text":"最大5つ"},{"key":"C","text":"最大50"},{"key":"D","text":"制限なし"}],"answer":["A"],"multi":false,"explanation":"- Queueable（キューアブル）Apexは非同期処理を実行する超ベンリな仕組み。\n- ジョブを実行中に、さらに次の非同期ジョブを登録（チェーン）することができるんだけど、**「1回の実行（トランザクション）の中で、新しく登録できるQueueableジョブは、通常1つ（1件）だけ」**（A）っていう制限があるの！\n- 何個も同時にキューに突っ込んで無限増殖されたら、Salesforceのサーバーがパンクしちゃうからね。チェーンは「一列に並んで1つずつ！」が基本だよ！"},{"n":12,"category":"開発の基礎","text":"SOQLクエリで、レコードのロックを行い、他のトランザクションがそのレコードを更新または削除するのを一時的に防ぐために、クエリの末尾に追加する正しいキーワードはどれですか？","options":[{"key":"A","text":"LIMIT 1"},{"key":"B","text":"FOR UPDATE"},{"key":"C","text":"LOCK RECORD"},{"key":"D","text":"WITH SECURITY_ENFORCED"}],"answer":["B"],"multi":false,"explanation":"- 「この取引先、今からウチがプログラムで更新するから、他の誰も絶対に今この瞬間は書き換えないで！ロックオン！」\n- そんな時にSOQLクエリの末尾に付け加えるのが、**FOR UPDATE**（B）キーワード！\n- これをクエリの最後に書くと、取得したレコードにロックがかかって、他のユーザーや処理が同時に更新しようとするのを一時的にストップ（待機）させることができるの。データの不整合を防ぐためのマジで強力なテクニックだよ！"},{"n":13,"category":"ユーザーインターフェース","text":"Auraコンポーネントにおいて、コントローラ（Controller.js）からマークアップ側（Component）で定義された属性（attribute）の値を取得するための正しいJavaScriptの記述はどれですか？","options":[{"key":"A","text":"component.get(\"v.myAttribute\")"},{"key":"B","text":"component.find(\"myAttribute\")"},{"key":"C","text":"helper.get(\"myAttribute\")"},{"key":"D","text":"this.myAttribute"}],"answer":["A"],"multi":false,"explanation":"- AuraコンポーネントのJavaScript（Controller.js）内で、画面側で定義された変数（attribute）の値を取得するには、**component.get(\"v.myAttribute\")**（A）という超定番の構文を使うよ！\n- この \"v.〜\" っていうのは「View（表示側）」のデータにアクセスするよっていう意味。逆に値を書き換えたいときは component.set(\"v.myAttribute\", newValue) って書くの。Aura開発の基本中の基本だから絶対忘れないで！"},{"n":14,"category":"ロジックと自動化","text":"Apexトリガのコンテキストにおいて、Trigger.old が常に null になるイベントの組み合わせはどれですか？","options":[{"key":"A","text":"before insert と after insert"},{"key":"B","text":"before update と after update"},{"key":"C","text":"before delete と after delete"},{"key":"D","text":"after undelete のみ"}],"answer":["A"],"multi":false,"explanation":"- Trigger.old は「変更前の古いデータ」を保持する変数。\n- レコードが新しくこの世に誕生する（挿入される） **insert** イベント（新規作成）のときは、\n- 「古いデータなんて、生まれる前なんだからあるわけないじゃん！」ってことで、Trigger.old は **常に** **null** になるよ！\n- だから、before insert と after insert の組み合わせ（A）が正解。\n- 逆に、削除（delete）や更新（update）のときは古いデータがあるから Trigger.old はちゃんと値を持ってるよ！"},{"n":15,"category":"テストとデバッグ","text":"ガバナ制限において、Apexの1回の同期トランザクション（Synchronous Transaction）内で消費できる「CPU最大時間」の上限はどれですか？","options":[{"key":"A","text":"10秒"},{"key":"B","text":"60秒"},{"key":"C","text":"120秒"},{"key":"D","text":"10分"}],"answer":["A"],"multi":false,"explanation":"- 出ました、ガバナ制限の数字クイズ！\n- Apexの1回の同期トランザクションで許されている「CPU最大時間」は、ずばり **10秒（10,000ミリ秒）**！\n- （ちなみに非同期処理だと **60秒** に引き上げられるよ！）\n- 無限ループとか重すぎる処理を書いちゃうと、この10秒の壁にぶち当たって LimitException で強制終了させられるから、効率のいいスッキリしたコードを書こうね！"},{"n":16,"category":"開発の基礎","text":"汎用的な sObject 型として宣言された変数から、特定のカスタムオブジェクト My_Object__c のインスタンスに安全にキャスト（型変換）する正しい構文はどれですか？","options":[{"key":"A","text":"My_Object__c obj = (My_Object__c) genericSObject;"},{"key":"B","text":"My_Object__c obj = genericSObject.castTo(My_Object__c);"},{"key":"C","text":"My_Object__c obj = genericSObject; （暗黙キャスト）"},{"key":"D","text":"My_Object__c obj = new My_Object__c(genericSObject);"}],"answer":["A"],"multi":false,"explanation":"- 一般的な sObject 型（なんでも入る箱）から、特定のカスタムオブジェクト My_Object__c に型を変換（キャスト）したいときは、\n- ターゲットの型の名前をカッコで囲って変数の前につける **(My_Object__c) genericSObject**（A）という書き方をするよ！\n- JavaとかC#をやってた人ならおなじみの構文だね。これでSalesforceに「この箱の中身は、間違いなく My_Object__c だから信じて！」って教えてあげるの。"},{"n":17,"category":"ロジックと自動化","text":"Apexバッチ（Database.Batchable）の実装において、バッチ処理全体が完了した後に、完了報告メールを送信したり、別のバッチ処理を起動したりするためのロジックを記述するメソッドはどれですか？","options":[{"key":"A","text":"start"},{"key":"B","text":"execute"},{"key":"C","text":"finish"},{"key":"D","text":"complete"}],"answer":["C"],"multi":false,"explanation":"- Apexバッチ（Database.Batchable）には実装が必須な3つのメソッド（start, execute, finish）があるよ。\n1. start：クエリを発行して、処理するレコードを全部集める（最初の一度だけ）。\n2. execute：集めたデータを200件などの小分けにして、何回も繰り返しメイン処理を行う。\n3. **finish**：すべてのデータの処理が「完全に終わった後」に、最後の締めとして1回だけ呼び出される！\n4. なので、メール送信や次のバッチの起動などの「後片付け」は **finish** メソッド（C）に書くのが正しいよ！"},{"n":18,"category":"開発の基礎","text":"主従関係と参照関係の大きな違いとして、**参照関係**にのみ設定できるオプションはどれですか？","options":[{"key":"A","text":"親レコードが削除された場合、子レコードの参照フィールド値をクリア（空白に）する。"},{"key":"B","text":"参照関係のレコードタイプを親から強制的に引き継ぐ。"},{"key":"C","text":"親レコードが削除されたとき、子レコードも強制的に自動削除（連鎖削除）する。"},{"key":"D","text":"子レコードの共有アクセス権が親レコードに自動的にマッピングされる。"}],"answer":["A"],"multi":false,"explanation":"- 親子関係を「参照関係（お友達関係）」でゆるく繋いでいる場合、親レコードが削除されたときの挙動をいくつか選べるの。\n- その中で参照関係の大きな特権なのが、**「親レコードが削除されたら、子レコードの参照フィールドをクリアして空（null）にする」**（A）というオプション！\n- 主従関係だと、親が消えたら子も心中（自動削除）するか、親の削除自体を禁止するかの2択しかなくて、フィールドをクリアすることはできないから、ここが大きな違いだよ！"},{"n":19,"category":"ユーザーインターフェース","text":"LWCのHTMLテンプレートにおいて、JavaScriptから渡された配列データ（リスト）をループ処理して各要素を画面に描画するために使用する正しいディレクティブの組み合わせはどれですか？","options":[{"key":"A","text":"for:each と for:item"},{"key":"B","text":"lwc:for と lwc:item"},{"key":"C","text":"template:for と item:var"},{"key":"D","text":"v-for と v-bind"}],"answer":["A"],"multi":false,"explanation":"- LWCのHTML側で、JavaScriptから渡された配列（リスト）をループ処理して1つずつ画面に表示したいなら、\n- **for:each={myList}**（ループを回す配列を指定）\n- **for:item=\"item\"**（ループ内の1つ1つの要素を指す変数名）\n- のコンビを使うよ！\n- さらに、LWCのルールとして、ループ内の要素（タグ）には必ずユニークな key={item.id} を属性として設定しなきゃエラーになるから、これもセットで覚えておいてね！"},{"n":20,"category":"テストとデバッグ","text":"Apexトリガをデプロイする際、本番環境においてテストによるコードカバー率の計算に関して正しい説明はどれですか？","options":[{"key":"A","text":"トリガはテストカバー率が 1% 以上であればデプロイできるが、組織全体のカバー率が 75% を超えている必要がある。"},{"key":"B","text":"デプロイする各トリガは、少なくとも1行以上のコードがテストクラスによって実行（カバー）されている必要がある。"},{"key":"C","text":"トリガのテストカバー率は100%でなければならない。"},{"key":"D","text":"トリガのテストは任意であり、カバー率は計算に含まれない。"}],"answer":["B"],"multi":false,"explanation":"- 本番環境にApexコードをデプロイするとき、トリガ（Trigger）に関する厳しいルールがあるの。\n- 組織全体のテストカバー率が 75% 以上必要なのはもちろんだけど、**「デプロイするすべてのトリガは、テストの中で少なくとも1行以上は実際に実行（カバー）されていなければならない」**（B）という個別ルールがあるの！\n- トリガのテストを全く書かずにリリースしようとすると即座に弾かれちゃうから、しっかりテストデータをインサートしたりアップデートしたりしてトリガを動かすテストを書こうね！"},{"n":21,"category":"開発の基礎","text":"数式フィールドの戻り値としてサポートされて**いない**データ型はどれですか？","options":[{"key":"A","text":"日付（Date）"},{"key":"B","text":"テキスト（Text）"},{"key":"C","text":"ロングテキストエリア（Long Text Area）"},{"key":"D","text":"チェックボックス（Checkbox）"}],"answer":["C"],"multi":false,"explanation":"- 数式フィールドは、他のフィールドの値を使って自動で計算してくれるベンリなフィールドだけど、戻り値の型として **ロングテキストエリア**（C）はサポートされて**いない**よ！\n- 数式で返せるのは、日付（A）、テキスト（B）、チェックボックス（D）、数値、通貨、パーセントなど。\n- 改行を含むような超長い文章（ロングテキスト）を数式でこねくり回すことはできないから、気をつけようね！"},{"n":22,"category":"ロジックと自動化","text":"データベースに対する一連の更新処理において、途中でエラーが起きた場合に特定の段階までデータをロールバック（差し戻し）するために、プログラム上で設定しておくチェックポイントを何と呼びますか？","options":[{"key":"A","text":"RollbackPoint"},{"key":"B","text":"Savepoint"},{"key":"C","text":"TransactionBarrier"},{"key":"D","text":"DatabaseState"}],"answer":["B"],"multi":false,"explanation":"- 「ここまでのデータ更新は、もしこの後エラーが起きてもキープしたい！でもここから先でエラーが起きたら、この時点まで巻き戻したい！」\n- そんなトランザクションのセーブポイント（チェックポイント）を設定するためのクラスが、**Database.Savepoint**（B）！\n- Savepoint sp = Database.setSavepoint(); でセーブして、エラーが起きたら Database.rollback(sp); でその時点まで一気に時間を巻き戻せる、まさにタイムリープ機能だよ！"},{"n":23,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントにCSSスタイルシートを適用する際、そのコンポーネント内のCSSスタイルが外部のコンポーネントや親コンポーネントに影響を与えない仕組みを何と呼びますか？","options":[{"key":"A","text":"CSS Isolation"},{"key":"B","text":"Shadow DOM (CSS Scoping)"},{"key":"C","text":"Global CSS Reset"},{"key":"D","text":"Scoped Custom Property"}],"answer":["B"],"multi":false,"explanation":"- LWCは、Web標準の最先端技術である **Shadow DOM**（B）という仕組みを採用しているの。\n- これのおかげで、コンポーネントの中で書いたCSS（例えば p { color: red; }）は、そのコンポーネントの中だけでしか適用されず、外側（他のコンポーネントや親ページ）の要素を誤って赤色に変えちゃう心配が絶対にないの！\n- このスタイルのカプセル化（隔離）を「CSS Scoping」や「Shadow DOM」と呼ぶよ。"},{"n":24,"category":"テストとデバッグ","text":"複数の非同期Apexジョブがパラレル（並行）に実行されてテスト結果が不安定になるのを防ぐために、テストクラス全体を順番（シリアル）に実行させるように設定するアノテーションはどれですか？","options":[{"key":"A","text":"@isTest(isParallel=false)"},{"key":"B","text":"@isTest(SeeAllData=false)"},{"key":"C","text":"@TestSetup"},{"key":"D","text":"@isTest"}],"answer":["A"],"multi":false,"explanation":"- Salesforceのテストランナーは、テストの実行時間を短くするために、デフォルトで複数のテストクラスを同時に「並行（Parallel）実行」するの。\n- ただ、テスト同士が同じオブジェクトの共有データを奪い合って（ロック競合などで）コケちゃうことがあるんだよね。\n- それを防ぐために、「このテストクラスは並行実行させずに、おとなしく順番待ち（シリアル）して実行して！」って指示するのが、**@isTest(isParallel=false)**（A）アノテーションだよ！"},{"n":25,"category":"開発の基礎","text":"SOSL（Salesforce Object Search Language）の検索構文において、一度に検索できる最大オブジェクト数はいくつか制限はありますか？","options":[{"key":"A","text":"最大5オブジェクト"},{"key":"B","text":"最大10オブジェクト"},{"key":"C","text":"最大100オブジェクト"},{"key":"D","text":"制限はない"}],"answer":["D"],"multi":false,"explanation":"- SOSL（Salesforce Object Search Language）は、テキストでグローバル検索をかける仕組みだけど、**「1回のクエリで検索できるオブジェクト数に上限（制限）はない」**（D）よ！\n- FIND 'テスト' IN ALL FIELDS RETURNING Account, Contact, Opportunity, Custom_Object__c, ... みたいな感じで、何個でも検索対象のオブジェクトを並べることができるの。SOSLの超フリーダムな強みだね！"},{"n":26,"category":"ロジックと自動化","text":"開発者がトリガを記述する際、ビジネスロジックを直接トリガ（Trigger）内に書くのではなく、「トリガハンドラ（Trigger Handler）」クラスにロジックを委譲するパターンの最大のメリットはどれですか？","options":[{"key":"A","text":"ガバナ制限を2倍に増やすことができる。"},{"key":"B","text":"トリガ内の実行順序（再入可能性）の制御、保守性、およびテストのしやすさが向上する。"},{"key":"C","text":"トリガが非同期で自動的に動くようになる。"},{"key":"D","text":"SOQLクエリの実行回数が自動的に10回に制限される。"}],"answer":["B"],"multi":false,"explanation":"- トリガの定義（Triggerファイル）の中に、長々とビジネスロジックを直書きするのはプロのITエンジニアとしてはNG！\n- トリガはただの「イベントの検知器」にしておいて、実際のロジックは別の「トリガハンドラクラス」に丸投げするパターン（Trigger Handler Pattern）を設計するのが大人のマナーだよ。\n- これによって、複数のトリガイベント（Before/After）での実行順序を整理できるし、コードの再利用性も上がって、何より **テストコードが格段に書きやすくなる**（B）の！マジでアゲなアーキテクチャだよ！"},{"n":27,"category":"ユーザーインターフェース","text":"LWCで親コンポーネントが、子コンポーネントからバブリング（浮上）してきたカスタムイベントを処理したい場合、子コンポーネント側でイベントを発行する際に CustomEvent のコンストラクタで設定すべきオプションはどれですか？","options":[{"key":"A","text":"bubbles: true"},{"key":"B","text":"composed: true"},{"key":"C","text":"bubbles: true, composed: true"},{"key":"D","text":"オプションの設定は不要である"}],"answer":["C"],"multi":false,"explanation":"- LWCのカスタムイベントを、親コンポーネントを越えてさらに上の階層（DOMツリーの上位）までバブリング（浮上）させて検知できるようにしたいなら、\n- イベントを発行する際に new CustomEvent('myevent', { bubbles: true, composed: true })（C）の両方を true に設定する必要があるよ！\n- bubbles: true：イベントがDOMツリーを上に上がっていくようにする。\n- composed: true：Shadow DOMの境界を突破して、外側のDOMツリーまでイベントを届けるようにする。\n- この2つが揃って初めて、境界を越えたイベント伝播ができるの！"},{"n":28,"category":"テストとデバッグ","text":"Apexコード内で、カスタム例外（Custom Exception）を発生させて、後続の処理を意図的に中断させたい場合に使用する正しいキーワードはどれですか？","options":[{"key":"A","text":"return new MyException();"},{"key":"B","text":"throw new MyException();"},{"key":"C","text":"raise MyException;"},{"key":"D","text":"System.error(MyException);"}],"answer":["B"],"multi":false,"explanation":"- Apexにおいて、意図的に「エラーだよ！」って例外を発生させて処理を止めたい（例外のスロー）なら、**throw** キーワードを使って **throw new MyException();**（B）と書くのが正しいプログラミングだよ！\n- 他の言語だと raise（Pythonとか）や return（値を返すだけ）を使うこともあるけど、Apex（Javaベース）では throw 一択だからね！"},{"n":29,"category":"開発の基礎","text":"カスタムメタデータ型（Custom Metadata Type）と、リスト型のカスタム設定（Custom Setting）を比較した際、カスタムメタデータ型にのみ存在する大きな強みはどれですか？","options":[{"key":"A","text":"Apexコードから簡単に読み取ることができる。"},{"key":"B","text":"レコードデータ（メタデータレコード）を、変更セットやパッケージに含めて異なる組織へ移行（デプロイ）できる。"},{"key":"C","text":"データベースのストレージ容量を大量に消費しない。"},{"key":"D","text":"ユーザーごとに異なる値を設定できる。"}],"answer":["B"],"multi":false,"explanation":"- 「カスタム設定（Custom Setting）」と「カスタムメタデータ（Custom Metadata）」の最大にして最強の違いは、**「データの移行性」**！\n- カスタム設定の中身（レコードデータ）は、単なる「データ」扱いだから変更セットやパッケージで別の組織（本番環境とか）へ持っていくことができないの。\n- でも、カスタムメタデータの中身は「メタデータ（設定情報）」扱いだから、**変更セットやパッケージに含めてそのまま別の組織にデプロイできる**（B）の！\n- これのおかげで、リリース作業がマジでスムーズになって開発者全員が大喜び（アゲ！）するの。"},{"n":30,"category":"ロジックと自動化","text":"Apexバッチ（Database.Batchable）において、SOQLクエリでデータを取得して一括処理する場合、1回のバッチの実行で処理できるレコード数の最大制限はどれですか？","options":[{"key":"A","text":"10,000件"},{"key":"B","text":"50,000件"},{"key":"C","text":"500万件"},{"key":"D","text":"5,000万件"}],"answer":["D"],"multi":false,"explanation":"- 大量のデータを処理するApexバッチ（Database.Batchable）だけど、1回のバッチ全体の実行で扱えるデータ数の上限は、なんと驚異の **5,000万件**（D）まで！\n- 普通の同期トランザクションのSOQLクエリ制限（5万件）の1000倍も扱えるんだよ。\n- だから、数百万件〜数千万件のビックデータを安全に回すなら、バッチApex一択ってワケ！"},{"n":31,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントのプロパティの値を画面上に表示する「データバインディング」を行う際、HTMLテンプレート（html）内で正しい記述形式はどれですか？","options":[{"key":"A","text":"{!myProperty}"},{"key":"B","text":"{{myProperty}}"},{"key":"C","text":"{myProperty}"},{"key":"D","text":"[myProperty]"}],"answer":["C"],"multi":false,"explanation":"- LWCで、JavaScript側で定義したプロパティ（変数）の値をHTMLテンプレートにバインドして表示したいときは、ただの **シングル波カッコ** **{myProperty}**（C）で囲むだけ！\n- Visualforceの {!myProperty}（A）や、Aura/Vue.jsの {{myProperty}}（B）と混ざって超〜ごちゃごちゃになりがちだけど、LWCは一番シンプルな **{ }** だからね！間違えたらピエンだから注意して！"},{"n":32,"category":"テストとデバッグ","text":"Apexコード内で、あるクエリが1件のレコードのみを返すことを期待して Account acc = [SELECT Id FROM Account WHERE Name = 'Unexist']; と記述したところ、該当するレコードが存在しなかった場合に発生するシステム例外クラスはどれですか？","options":[{"key":"A","text":"NullPointerException"},{"key":"B","text":"DmlException"},{"key":"C","text":"QueryException"},{"key":"D","text":"SObjectException"}],"answer":["C"],"multi":false,"explanation":"- Apexコードで、1件のオブジェクト型変数に対して直接SOQLクエリを割り当てる際（Account acc = [SELECT Id FROM ...];）、\n- もしクエリ結果が「0件（該当なし）」だった、あるいは「2件以上（複数）」見つかっちゃった場合は、\n- **System.QueryException**（C）が発生してシステムがクラッシュしちゃうの！\n- これを防ぐためには、一旦 List\u003cAccount\u003e accList = [SELECT ...]; のようにリストで受け取って、if (!accList.isEmpty()) で件数をチェックしてから変数に詰めるのがプロの防衛策だよ！"},{"n":33,"category":"開発の基礎","text":"未管理パッケージ（Unmanaged Package）からインストールしたコンポーネントについて、正しい説明はどれですか？","options":[{"key":"A","text":"インストールした組織（パッケージの受信側）で、コードやメタデータを直接編集・カスタマイズできる。"},{"key":"B","text":"パッケージのアップグレード（最新版の適用）がいつでも可能である。"},{"key":"C","text":"インストールされたすべてのコンポーネントの名前空間が自動的に保護される。"},{"key":"D","text":"Apexのコードカバー率の計算から自動的に除外される。"}],"answer":["A"],"multi":false,"explanation":"- 「未管理パッケージ（Unmanaged Package）」っていうのは、オープンソースみたいなもの！\n- パッケージをインストールした組織（受信側）で、**中のApexコードや設定（メタデータ）を自由に変更・カスタマイズできる**（A）のが最大の特徴だよ。\n- ただし、インストールした後はパッケージ元からの「アプデ（アップグレード）」が一切できないから、使い捨てのテンプレートコードを配布するときとかによく使うよ。"},{"n":34,"category":"ロジックと自動化","text":"次のコードにおいて、SOQLで取得した取引先（Account）レコードリストをディープコピー（参照ではなく、完全に新しいオブジェクトの複製）するために、clone() メソッドに渡すべき引数の組み合わせはどれですか？\n\n```apex\nList\u003cAccount\u003e clonedList = originalList.deepClone(false, false, false);\n```","options":[{"key":"A","text":"(Boolean preserveId, Boolean isSystemFields, Boolean isDeepClone)"},{"key":"B","text":"(Boolean preserveId, Boolean preserveReadonlyTimestamps, Boolean preserveAutonumber)"},{"key":"C","text":"(Boolean preserveId, Boolean isDeepClone, Boolean isSystemFields)"},{"key":"D","text":"引数は不要である。"}],"answer":["B"],"multi":false,"explanation":"- sObjectのリストを、参照（メモリのアドレス）を引き継がずに、完全に新しいデータとして複製（ディープコピー）したい場合は、deepClone メソッドを使用するよ！\n- 引数のシグネチャは **deepClone(preserveId, preserveReadonlyTimestamps, preserveAutonumber)** となっていて、\n- 1つ目：Id値を引き継ぐかどうか\n- 2つ目：作成日や更新日などの読み取り専用タイムスタンプを引き継ぐかどうか\n- 3つ目：自動採番フィールドの値を引き継ぐかどうか\n- を指定するの。この細かいメソッド引数はデベロッパー試験でたまに意地悪く聞かれるから、なんとなく単語を頭に入れておこう！"},{"n":35,"category":"ユーザーインターフェース","text":"Visualforceにおいて、コントローラ側（Apex）のメソッドをJavaScriptから直接非同期（Ajax）で呼び出し、結果をJavaScriptのコールバック関数で受け取るためのJavaScript通信の仕組み（タグ）はどれですか？","options":[{"key":"A","text":"\u003capex:actionFunction\u003e"},{"key":"B","text":"\u003capex:actionSupport\u003e"},{"key":"C","text":"\u003capex:actionStatus\u003e"},{"key":"D","text":"\u003capex:includeScript\u003e"}],"answer":["A"],"multi":false,"explanation":"- Visualforceページにおいて、JavaScriptのコード（例えばボタンが押されたときや特定のタイマーなど）から、Apexコントローラのメソッドをバックグラウンド（非同期）で直接呼び出したいときに使うのが、**\u003capex:actionFunction\u003e**（A）タグ！\n- これを使うと、JavaScript側に「Apexを呼ぶための偽のJavaScript関数」を自動で生成してくれて、それを呼ぶだけでApexの処理が走って結果をAjaxで反映できるの。超ベンリ！"},{"n":36,"category":"テストとデバッグ","text":"開発環境（Sandbox）から本番環境へデプロイする際、「すべてのローカルテストを実行」を選択した場合に、どのテストクラスが実行されますか？","options":[{"key":"A","text":"組織内のすべてのテストクラス（管理パッケージ内のテストを含む）。"},{"key":"B","text":"組織内のすべてのテストクラス（管理パッケージ内のテストを除く）。"},{"key":"C","text":"デプロイ用の変更セットに含まれるテストクラスのみ。"},{"key":"D","text":"過去30日間に実行されたテストクラスのみ。"}],"answer":["B"],"multi":false,"explanation":"- 本番組織へデプロイする際、リリースオプションで「すべてのローカルテストを実行」を選択した場合、\n- **「組織内に定義されているすべてのテストクラス（ただし、インストールされている管理パッケージ内のテストは除く）」**（B）が全部一斉に走り出すよ！\n- 管理パッケージ（他社製のツールなど）のテストは、すでに開発元が検証済みだから実行対象から除外して、自分たちが開発したコードのテスト（ローカルテスト）だけを厳密にチェックするの。"},{"n":37,"category":"開発の基礎","text":"sObjectの動的な処理において、オブジェクトのフィールド値を文字列で指定して動的に取得するためのsObjectメソッドはどれですか？","options":[{"key":"A","text":"obj.get(fieldName)"},{"key":"B","text":"obj.getValue(fieldName)"},{"key":"C","text":"obj.field(fieldName)"},{"key":"D","text":"obj.fields.get(fieldName)"}],"answer":["A"],"multi":false,"explanation":"- 「sObjectのフィールド名を、文字列変数として動的に指定して値を取り出したい！」（例：fieldName = 'Name' にして、取引先名を取り出す）\n- そんな時に使うsObjectのメソッドが、**obj.get(fieldName)**（A）だよ！\n- 値を入れたい（セットしたい）ときは obj.put(fieldName, value) を使う。\n- これを知っておくと、どんなオブジェクトでも処理できる動的な汎用プログラムが書けるようになって、マジでITエンジニアとしてレベルアップするよ！アゲ！"},{"n":38,"category":"ロジックと自動化","text":"Flow Builderの「決定（Decision）」要素を使用して条件分岐を行う際、条件式でサポートされて**いない**演算子はどれですか？","options":[{"key":"A","text":"次の値に等しい（Equals）"},{"key":"B","text":"次の値を含む（Contains）"},{"key":"C","text":"次の正規表現に一致する（Regex Match）"},{"key":"D","text":"次の値で始まる（Starts With）"}],"answer":["C"],"multi":false,"explanation":"- Flow Builder（フロー）はノンプログラミングで超強力な分岐ロジック（決定 / Decision要素）が作れるけど、条件式の演算子として **「正規表現（Regex Match）」**（C）はさすがにサポートされて**いない**よ！\n- Equals（等しい）、Contains（含む）、StartsWith（始まる）、Is Null などの基本演算子はバッチリ揃ってるから、普通の分岐ならこれで十分カバーできちゃう！"},{"n":39,"category":"ユーザーインターフェース","text":"AuraコンポーネントからLightning Web Component (LWC) への移行（マイグレーション）に関して、正しい説明はどれですか？","options":[{"key":"A","text":"AuraコンポーネントをLWCに直接自動変換するツールがある。"},{"key":"B","text":"LWCコンポーネントの中に、古いAuraコンポーネントを子として配置（ネスト）することができる。"},{"key":"C","text":"Auraコンポーネントの中に、LWCコンポーネントを子として配置（ネスト）することができる。"},{"key":"D","text":"AuraとLWCは、同じLightningページ上で共存させて配置することはできない。"}],"answer":["C"],"multi":false,"explanation":"- SalesforceのUIフレームワークの進化の歴史だね！\n- 古い技術である「Auraコンポーネント」と、新しい標準技術である「LWC」の共存ルールは、\n- **「Auraコンポーネントの中に、LWCを子コンポーネントとして配置することはできる」**（C）！\n- でも、その逆（LWCの中にAuraを子として置くこと）は絶対にできないの。\n- 「新しいもの（LWC）は、古いもの（Aura）を受け入れられない」って覚えるとエモいし一発で覚えられるよ（笑）。"},{"n":40,"category":"テストとデバッグ","text":"開発者がコードのパフォーマンスをデバッグするためにデバッグログを分析しています。「CPU時間制限（CPU Limit）」に達しそうになっている原因を特定するために、開発者コンソール（Developer Console）で最も役立つ表示ビューはどれですか？","options":[{"key":"A","text":"Execution Stack"},{"key":"B","text":"Limits Tab"},{"key":"C","text":"Execution Tree / Timeline"},{"key":"D","text":"Variables Tab"}],"answer":["C"],"multi":false,"explanation":"- 「Apexコードが重すぎて、どこでそんなに処理時間（CPU時間）を食ってるかわかんない！ピエン！」\n- そんなときに開発者コンソールでデバッグログを開いて役に立つのが、**Execution Tree（実行ツリー）や Timeline（タイムライン）**（C）ビュー！\n- どのメソッドの実行に何ミリ秒かかっているかがビジュアル的にグラフでパーセンテージ表示されるから、ボトルネックになっている重い処理を秒で見つけ出すことができるの！デバッグの強い味方だよ。"},{"n":41,"category":"開発の基礎","text":"Apexクラスにおいて inherited sharing キーワードを使用した場合の挙動について、正しい記述はどれですか？","options":[{"key":"A","text":"クラスは常に with sharing として動作する。"},{"key":"B","text":"クラスは常に without sharing として動作する。"},{"key":"C","text":"クラスを呼び出した親クラスの共有コンテキスト（with sharing または without sharing）を引き継いで動作する。"},{"key":"D","text":"共有ルールが全く適用されない状態でオブジェクトレベルのCRUDチェックのみを強制する。"}],"answer":["C"],"multi":false,"explanation":"- inherited sharing（共有設定の継承）は、マジで賢いハイブリッドなキーワード！\n- このクラスを呼び出した親クラス（またはコンテキスト）が、\n- with sharing で宣言されていたら ➡ 自分自身も **with sharing** として動く。\n- without sharing で宣言されていたら ➡ 自分自身も **without sharing** として動く。\n- 呼び出し元に合わせて自分のスタンス（共有の有無）をカメレオンみたいに変えてくれるから、どんな場面でも安全かつ再利用しやすくなるベストプラクティスな宣言方法だよ！"},{"n":42,"category":"ロジックと自動化","text":"Salesforceのトリガにおいて、System.isQueueable() や System.isFuture() を使う主な目的は何ですか？","options":[{"key":"A","text":"1回のトリガ内でDML操作を非同期で実行するため。"},{"key":"B","text":"現在の実行コンテキストが非同期処理（QueueableやFuture）の最中であるかどうかを判定し、処理の無限ループや重複起動を防ぐため。"},{"key":"C","text":"外部システムのコールアウトの応答時間を測定するため。"},{"key":"D","text":"ガバナ制限を自動的にリセットするため。"}],"answer":["B"],"multi":false,"explanation":"- トリガの処理内で、同じレコードの更新によって再びトリガが連鎖起動して無限ループに陥っちゃうようなバグ（再帰）を防ぐために、\n- 「今、すでに非同期処理（FutureメソッドやQueueableジョブ）の中でこのトリガが動いてる最中かな？」\n- というのをチェックする際に、**System.isQueueable()** や **System.isFuture()**（B）などのコンテキスト判定メソッドを使うよ。\n- これで「非同期の最中なら、これ以上は非同期処理を呼ばずにおとなしく終了！」ってブレーキを踏めるの！"},{"n":43,"category":"ユーザーインターフェース","text":"LWCでApexメソッドを命令的に呼び出す場合と、ワイヤサービス（@wire）を使って呼び出す場合を比較した際、**命令的な呼び出し**にのみ適しているユースケースはどれですか？","options":[{"key":"A","text":"コンポーネントの読み込み（ロード）と同時にデータを画面に表示したい。"},{"key":"B","text":"ユーザーがボタンをクリックしたタイミングなど、特定のユーザーアクションをきっかけにデータを保存・変更したい。"},{"key":"C","text":"レコードデータが変更されたときに、画面をリアクティブに即時更新したい。"},{"key":"D","text":"画面上の入力値が変わるたびに動的に検索クエリを走らせたい。"}],"answer":["B"],"multi":false,"explanation":"- LWCで、ボタンを押した瞬間に「データをデータベースにインサートする（書き換える）」といった処理（DML操作を伴う処理）は、必ずApexメソッドの **命令的（Imperative）呼び出し**（B）で行う必要があるよ！\n- なぜなら、もう一方の「ワイヤサービス（@wire）」はデータの「読み取り専用（Read-Only）」かつ「画面ロード時などの自動実行」が基本だから、意図しないタイミングでデータベースが更新されたら大惨事になっちゃう。\n- 「データの作成・変更はボタンを押した時、つまり命令的にやる！」が鉄則だよ！"},{"n":44,"category":"テストとデバッグ","text":"システムで定義されている「ガバナ制限値」と「現在のトランザクション内での実際の消費量」をApexコード内で動的に比較して、制限ギリギリになったら処理を中断するようなプログラムを作りたい場合、どのクラスのメソッドを使用しますか？","options":[{"key":"A","text":"System.Limits"},{"key":"B","text":"System.Governor"},{"key":"C","text":"Database.Limits"},{"key":"D","text":"Apex.Debugger"}],"answer":["A"],"multi":false,"explanation":"- 「あと何回SOQLクエリを発行できる？」「あとどれくらいCPU時間を使える？」\n- こういったガバナ制限の「実数値」をプログラム内でリアルタイムに取得したいなら、**System.Limits** クラス（A）を使うよ！\n- Limits.getQueries()：これまでに発行したSOQLの回数\n- Limits.getLimitQueries()：発行できる最大数（100回）\n- これらを比較して、「もし制限の90%以上消費してたら処理を中断してエラーログを残す！」みたいな賢い防衛ロジックが書けちゃうの。マジでプロのコードって感じ！"},{"n":45,"category":"開発の基礎","text":"Apexコード内で、外部キーのように機能する一意の識別子（External ID）フィールドを使用して、関連する親子レコードを1回のDML（upsert）で一度にデータベースに登録したい場合、正しい構文（アプローチ）はどれですか？","options":[{"key":"A","text":"子レコードに親レコードのインスタンスをネストして insert する。"},{"key":"B","text":"子レコードの参照関係フィールド（Parent_Object__r）に、External IDをセットした親オブジェクトのプロトタイプを代入して upsert する。"},{"key":"C","text":"親レコードをまず挿入し、返ってきたIDを手動で子レコードにセットしてから子レコードを挿入する。（※1回のDMLではない）"},{"key":"D","text":"リレーションシップフィールドにはExternal IDの値を直接代入することはできない。"}],"answer":["B"],"multi":false,"explanation":"- これ、試験で出るとちょっとビックリする高度なテクニック！\n- 1回のDML操作で、まだ作成されていない親レコードと子レコードを紐づけて一気にインサート（またはアップサート）したいとき、\n- 子レコードのリレーションフィールド（Parent_Object__r。末尾は __r だよ！）に対して、\n- new Parent_Object__c(External_ID_Field__c = '親子共通キー')\n- という風に「External IDだけをセットした親のオブジェクト参照」をブチ込んであげるの。\n- そうすると、Salesforceがインサート時に自動でそのキーを使って親子をガチャンと紐づけて保存してくれるの！\n- 親レコードのインサートを待たずに1発でDMLが済むから、マジでパフォーマンスがいいの。"},{"n":46,"category":"ユーザーインターフェース","text":"LWCにおいて、コンポーネントが不要になりDOMから削除（アンマウント）された際に、メモリの解放やリスナーの削除などのクリーンアップ処理を行うために使用するライフサイクルメソッドはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["D"],"multi":false,"explanation":"- LWCコンポーネントが不要になって、画面（DOM）からバイバイ（削除）されたときに自動で呼ばれるライフサイクルフックは、**disconnectedCallback()**（D）だよ！\n- ここで、コンポーネントが動いている間に設定したグローバルなタイマー（setInterval）の解除や、イベントリスナーのクリーンアップをしてあげないと、メモリリーク（メモリが無駄に消費され続ける現象）が起きて画面がだんだん重くなっちゃうの。\n- 立つ鳥跡を濁さず、綺麗に片付けるのが優秀なデベロッパーの証だよ！✨"},{"n":47,"category":"ロジックと自動化","text":"フロー（Flow）から呼び出されるApexメソッド（@InvocableMethod）の引数および戻り値の型に関する絶対的な制限ルールはどれですか？","options":[{"key":"A","text":"引数や戻り値は、必ずリスト型（List\u003cT\u003e）の形式にする必要がある。"},{"key":"B","text":"引数には Map 型しか指定できない。"},{"key":"C","text":"引数は最大で5つまでしか定義できない。"},{"key":"D","text":"戻り値は常に void でなければならない。"}],"answer":["A"],"multi":false,"explanation":"- Flow Builder（フロー）からApexメソッド（@InvocableMethod）を呼び出すときの、絶対的なルール！\n- フローは複数レコードを「バルク（一括）」で裏で束ねて処理する可能性があるため、呼び出されるApex側のメソッドの引数と戻り値は、**「必ずリスト型（****List\u003cT\u003e****）」**（A）で定義されていなければならないの！\n- もし1件のデータしか扱わない場合でも、必ず List\u003cString\u003e や List\u003cAccount\u003e みたいにリストの形で受け取って、リストの形で返してあげるのがフローとのお約束事だよ。"},{"n":48,"category":"テストとデバッグ","text":"テストクラスにおいて、特定のメソッドが「システム例外」を投げることを正しくテストしてカバーするために使用する設計はどれですか？","options":[{"key":"A","text":"try-catch ブロックで囲み、例外が発生しなかった場合に Assert.fail() を呼び出す。"},{"key":"B","text":"System.assert(false) を例外が発生する前に配置する。"},{"key":"C","text":"テストクラスに @isTest(SeeAllData=true) をつける。"},{"key":"D","text":"例外が発生した瞬間にテストが強制終了するようにそのまま放置する。"}],"answer":["A"],"multi":false,"explanation":"- 「この異常な値を入力したら、期待通りに例外（Exception）が発生するか？」\n- というテストコード（異常系テスト）を実装したい場合、\n-\ntry {\nmyMethodWithBadData(); // ここで例外が発生するはず！\nAssert.fail('例外が発生せずにここまで来ちゃったのはバグだよ！');\n} catch (MyException e) {\n// 期待通りに例外が発生したからテストクリア！\nSystem.assertEquals('想定エラーメッセージ', e.getMessage());\n}\n-\n- という風に、**try-catch** **ブロックで囲んで、もし例外が発生せずに** **try** **をすり抜けてしまったら** **Assert.fail()****（A）で意図的にテストをコケさせる** 設計にするのがベストプラクティスだよ！"},{"n":49,"category":"開発の基礎","text":"Apexの Set コレクションが内部的に持っている重要な性質として、正しい説明はどれですか？","options":[{"key":"A","text":"値を追加した順序を厳密に保持する。"},{"key":"B","text":"重複する値を格納することができず、要素の順序は保証されない。"},{"key":"C","text":"キーと値のペアでデータを保持する。"},{"key":"D","text":"インデックス（番号）を指定して set[0] のように要素を直接取り出すことができる。"}],"answer":["B"],"multi":false,"explanation":"- Apexの **Set（セット）** コレクションの2大特徴はこれ！\n1. **重複を許さない（ダブり厳禁のユニークな集まり）**\n2. **中身の要素の順番（インデックス番号）は一切保証されない**\n3. だから、順番通りに取り出したいときは List を使うべき。\n4. Setは「特定のレコードIDがこの中に含まれてる（.contains(id)）？」っていう存在チェックを爆速でやりたい時に最高のパフォーマンスを発揮するよ！"},{"n":50,"category":"ユーザーインターフェース","text":"LWCのJavaScriptにおいて、コンポーネントが作成（初期化）されたばかりの最も早い段階で呼び出され、コンポーネント自身の初期設定を行うものの、この段階ではまだDOM要素（HTML要素）や属性にアクセスできないメソッドはどれですか？","options":[{"key":"A","text":"constructor()"},{"key":"B","text":"connectedCallback()"},{"key":"C","text":"renderedCallback()"},{"key":"D","text":"disconnectedCallback()"}],"answer":["A"],"multi":false,"explanation":"- LWCのコンポーネントがメモリ上に生み出された（インスタンス化された）瞬間に、全フックの中で一番最初に呼ばれるのが、おなじみの **constructor()**（A）！\n- この段階では、コンポーネントはまだ生まれてすぐで画面（DOM）に配置されていないから、\n- HTML要素にアクセスしたり、自分自身のプロパティ（属性）を設定しようとするとエラーになっちゃうの。\n- 初期設定はここではなく、DOMに接続されたタイミングの connectedCallback() でやるのが基本ルールだよ！"},{"n":51,"category":"ロジックと自動化","text":"開発者が大量のレコードを一括処理するApexバッチを作成し、テストクラスを書いています。テストクラス内でバッチ処理を正しく実行して検証する際、バッチ呼び出しのコードを記述するべき場所はどこですか？","options":[{"key":"A","text":"Test.startTest() より前"},{"key":"B","text":"Test.startTest() と Test.stopTest() の間"},{"key":"C","text":"Test.stopTest() より後ろ"},{"key":"D","text":"テストクラスの @TestSetup メソッド内"}],"answer":["B"],"multi":false,"explanation":"- バッチApex（非同期処理）をテストする場合、\n- 普通に呼び出すだけだと「いつバッチの処理が完了するかテストランナーには分からない」状態になっちゃう。\n- だから、バッチを起動するコード（Database.executeBatch(batchInstance)）は、必ず **Test.startTest()** **と** **Test.stopTest()** **の間（B）** に挟んであげるの！\n- そうすると、Test.stopTest() が呼ばれたその瞬間に、裏で動いていた非同期バッチ処理が「おらー！強制終了＆即時実行だー！」って同期的にすべて完了するから、その直後でアサーション（テスト結果の検証）ができるようになるんだよ！"},{"n":52,"category":"ロジックと自動化","text":"Apexトリガ内で delete 操作が行われた（レコードが削除された）際、削除された元のレコードデータを保持している正しいコンテキスト変数はどれですか？","options":[{"key":"A","text":"Trigger.new"},{"key":"B","text":"Trigger.old"},{"key":"C","text":"Trigger.newMap"},{"key":"D","text":"Trigger.oldMap のみ"}],"answer":["B"],"multi":false,"explanation":"- レコードが削除（delete）された時のトリガ内では、\n- 削除されたレコードたちの「削除される前のデータ（中身）」が、**Trigger.old**（B）に格納されているよ！\n- もう削除されて新しくなったデータ（Trigger.new）なんて存在しないから、Trigger.new は null になるの。\n- だから、削除トリガ内で「削除されたレコードの情報を元に、関連レコードを更新する」みたいなロジックを書くなら、Trigger.old またはマップ版の Trigger.oldMap を使おうね！"},{"n":53,"category":"開発の基礎","text":"SOQLのセキュリティ対策において、部分的にフィールドへのアクセス権がない場合に、クエリ全体をエラーにせず、アクセスできないフィールドのデータのみを自動的に除外して安全に読み込むことができるApexクラスのメソッドはどれですか？","options":[{"key":"A","text":"Security.stripInaccessible(AccessType.READABLE, queryResult)"},{"key":"B","text":"String.escapeSingleQuotes(queryResult)"},{"key":"C","text":"Schema.getGlobalDescribe()"},{"key":"D","text":"Database.queryWithSecurity()"}],"answer":["A"],"multi":false,"explanation":"- Q1でも出てきた、ユーザーの権限がないデータ（フィールド）を自動で排除（ストリップ）してくれるApexのスーパー救世主メソッドが、**Security.stripInaccessible(AccessType.READABLE, queryResult)**（A）！\n- これを使うと、クエリ結果（queryResult）の中から、現在のログインユーザーの権限（CRUD/FLS）で「読み取り不可」なフィールドの値をキレイに消し去った安全なレコードリストを返してくれるの。\n- セキュリティエラーで画面全体をバグらせずに、見せられるデータだけを賢く見せる実務でも超重宝するメソッドだよ！"},{"n":54,"category":"ロジックと自動化","text":"あるシステムで、取引先（Account）レコードが作成された際、非同期で外部の在庫システムにAPI（コールアウト）で通知を行いたいと考えています。この処理をApexで実装する場合に、トリガに直接コールアウト処理を記述せず、どうやって設計すべきですか？","options":[{"key":"A","text":"トリガから通常の insert DMLを発行する。"},{"key":"B","text":"トリガから、@future(callout=true) アノテーションの付いた非同期メソッド、または Queueable を実装したクラスを呼び出す。"},{"key":"C","text":"before insert トリガの中で直接 Http.send() を実行する。"},{"key":"D","text":"トリガ内でワークフロールールを動的にアクティブにする。"}],"answer":["B"],"multi":false,"explanation":"- Salesforceのトリガ（保存処理の最中）から、リアルタイムに外部へHTTPコールアウト（Web API連携）を投げようとすると、「保存トランザクションが完了するまで通信相手を待たせるな！ガバナ制限違反！」って怒られてシステムが即エラー（CalloutException）になっちゃうの。\n- これを防ぐために、トリガから呼び出すメソッドには **@future(callout=true)**（B）アノテーションをつけて、非同期処理（後回し）としてコールアウトを実行させるのが絶対の鉄則だよ！"},{"n":55,"category":"ユーザーインターフェース","text":"Visualforceページにおいて、レコードのフィールドではなく、任意のテキスト入力欄や検索キーワード入力欄など、完全にカスタムの入力フィールドを画面に配置したい場合に使用する正しいタグはどれですか？","options":[{"key":"A","text":"\u003capex:inputField\u003e"},{"key":"B","text":"\u003capex:inputText\u003e"},{"key":"C","text":"\u003capex:outputField\u003e"},{"key":"D","text":"\u003capex:inputForm\u003e"}],"answer":["B"],"multi":false,"explanation":"- Visualforceページで、オブジェクトの定義に紐づいていない「ただの自由なテキスト入力欄」や「検索用のキーワードボックス」を配置したいときは、**\u003capex:inputText\u003e**（B）を使うよ！\n- オブジェクトのフィールドの型に連動させたいときは \u003capex:inputField\u003e（A）だけど、自由なテキストなら単なる \u003cinput type=\"text\"\u003e になる inputText が正解！"},{"n":56,"category":"ロジックと自動化","text":"1回のトランザクションで、DML操作（insert, update, delete など）によって更新できるsObjectレコードの最大件数はいくつですか？","options":[{"key":"A","text":"150"},{"key":"B","text":"1,000"},{"key":"C","text":"10,000"},{"key":"D","text":"50,000"}],"answer":["C"],"multi":false,"explanation":"- 1回の同期トランザクション（リクエスト）の中で、DML操作（レコードの作成・更新・削除など）によって処理できる「最大レコード数（合計）」は、ずばり **10,000件**（C）まで！\n- （ちなみにDMLを「呼び出す回数」の制限は150回だよ！）\n- 例えば、1回のDMLで1万件を超えるレコードを一括更新しようとすると、その瞬間にエラー（LimitException）でクラッシュしちゃうから、それ以上のデータを扱うならバッチApex（Q30参照）を使ってね！"},{"n":57,"category":"開発の基礎","text":"管理パッケージ（Managed Package）の最大の特徴について、正しい説明はどれですか？","options":[{"key":"A","text":"パッケージのインストール先の組織で、Apexコードを自由に表示・編集できる。"},{"key":"B","text":"パッケージのアップグレード（新バージョンのリリース）がいつでも実行できる。"},{"key":"C","text":"インストール先の組織の共有ルールをすべて上書きする。"},{"key":"D","text":"開発者コンソールでいつでもデバッグログを直接確認できる。"}],"answer":["B"],"multi":false,"explanation":"- AppExchangeとかで有料配布されるような「管理パッケージ（Managed Package）」の最大の特徴は、\n- **「パッケージの開発元が、いつでも最新のバグ修正や新機能をアップグレード（リリース）して、インストール先の組織に適用できる」**（B）こと！\n- また、インストールした組織のユーザーからは中身のApexコードが一切見えない（知的財産が保護される）仕組みになっているのも特徴。\n- Q33の「未管理パッケージ」と完全に真逆の性質だから、対比で覚えておくとテストで絶対に迷わないよ！"},{"n":58,"category":"テストとデバッグ","text":"Apexコードの例外処理において、例外が発生した「エラーメッセージ（Error Message）」をプログラムで動的に取得するために、Exceptionオブジェクト（変数 e）のどのメソッドを呼び出すべきですか？","options":[{"key":"A","text":"e.getLineNumber()"},{"key":"B","text":"e.getMessage()"},{"key":"C","text":"e.getTypeName()"},{"key":"D","text":"e.getCause()"}],"answer":["B"],"multi":false,"explanation":"- try-catch ブロックで例外（エラー）をキャッチしたとき、そのエラーが発生した「具体的なメッセージ（例：レコードが重複しています、など）」を取り出してログに残したいなら、Exceptionオブジェクトの **getMessage()**（B）メソッドを呼び出すよ！\n- ちなみに getLineNumber()（A）は「コードの何行目でエラーが起きたか」を、getTypeName()（C）は「DmlExceptionなどの例外の種類」を教えてくれるメソッドだよ！"},{"n":59,"category":"ユーザーインターフェース","text":"LWCで、ある親コンポーネントが、その直下にある子コンポーネントの公開メソッド（JavaScript関数）を呼び出して処理を実行させたい場合、親コンポーネント側から子コンポーネントの要素を検索してメソッドを呼ぶための正しいJavaScriptコードはどれですか？（子コンポーネントのタグ名を \u003cc-child-comp\u003e とします）","options":[{"key":"A","text":"this.template.querySelector('c-child-comp').myMethod();"},{"key":"B","text":"this.querySelector('c-child-comp').fireEvent('myMethod');"},{"key":"C","text":"component.find('childComp').myMethod();"},{"key":"D","text":"this.getChildComp().myMethod();"}],"answer":["A"],"multi":false,"explanation":"- LWCにおいて、親コンポーネントのJavaScriptから、すぐ下にある子コンポーネント（例：\u003cc-child-comp\u003e）をDOMの中から見つけ出して、子コンポーネント側で公開されているメソッドを直接呼び出したいときは、\n- **this.template.querySelector('c-child-comp').myMethod();**（A）\n- という書き方をするよ！\n- Auraコンポーネントの component.find()（C）と混ざって間違えやすい超定番の移行・UI問題だから、LWCでは this.template.querySelector を使うんだ！ってしっかり覚えておいてね！"},{"n":60,"category":"ロジックと自動化","text":"Apexの処理中に発生した一時的なエラーから復旧するため、データベースへのトランザクション全体をロールバックし、エラーの起きた原因データ（sObjectリスト）を特定して、残りのデータだけで再処理を行いたい場合に、最も適したクラスはどれですか？","options":[{"key":"A","text":"Database.Savepoint と Database.rollback()"},{"key":"B","text":"System.abortJob()"},{"key":"C","text":"Database.executeBatch()"},{"key":"D","text":"Test.startTest()"}],"answer":["A"],"multi":false,"explanation":"- 「10件のデータを一括更新したけど、途中の5件目でヤバいエラーが出ちゃった！\n- 一旦全部なかったことにロールバックするけど、どのデータがエラーの原因か突き止めて、エラーデータだけを除外して残りの正常なデータだけで再処理したい！」\n- そんな高度なリカバリー設計をする時に活躍するのが、**Database.Savepoint** **と** **Database.rollback()**（A）のコンビ！\n- 一旦セーブポイントを作っておいて、try-catchでエラーが出たらロールバッ"}]},{"id":"set4","title":"Set 4 — Platform Developer I 追加問題集（99 問）","questions":[{"n":1,"category":"","text":"Salesforce にデータをインポートおよびエクスポートする場合、正しい 2 つのステートメントはどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"開発環境で大量のデータをインポートするときに、Bulk API を使用してストレージ制限を回避できます。"},{"key":"B","text":"データインポートウィザードは、コンピュータにインストールされているアプリケーションです。"},{"key":"C","text":"バルク APL を使用すると、ストレージ制限を回避せずに開発環境で大量のデータをインポートできます。"},{"key":"D","text":"Developer サンドボックスと Developer Pro サンドボックスには、異なるストレージ制限があります。"}],"answer":["C","D"],"multi":true,"explanation":"**Bulk API** は大量データの取り込みに適した API ですが、インポートしたデータは通常どおり組織のデータストレージを消費するため、ストレージ制限を回避することはできません（C が正解）。また、Sandbox はタイプごとにストレージ容量が異なり、**Developer Sandbox**（データ 200MB）と **Developer Pro Sandbox**（データ 1GB）では制限が異なります（D が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: Bulk API を使ってもストレージ制限は回避できません。\n- **B**: データインポートウィザードはブラウザから利用する Salesforce 組み込みの機能であり、PC にインストールするアプリケーションではありません（インストール型なのはデータローダです）。"},{"n":2,"category":"","text":"DML ステートメントの数など、特定のガバナーに使用されたリソースの量を返すメソッドが含まれている Apex クラスはどれですか。","options":[{"key":"A","text":"組織制限"},{"key":"B","text":"制限"},{"key":"C","text":"メッセージング"},{"key":"D","text":"例外"}],"answer":["B"],"multi":false,"explanation":"ガバナ制限に対する現在の使用量を取得できるのは **`Limits` クラス**（選択肢の「制限」）です。`Limits.getDmlStatements()` や `Limits.getQueries()` などの静的メソッドで、DML ステートメント数や SOQL クエリ数といったリソースの消費量と上限値を確認できます。\n\n他の選択肢が誤りの理由:\n- **A（OrgLimits）**: `OrgLimits` は API リクエスト数など組織レベルの制限を扱うもので、トランザクション内のガバナ制限の消費量を返すものではありません。\n- **C（Messaging）**: メール送信などのメッセージング機能を扱うクラスです。\n- **D（Exception）**: 例外処理のための基底クラスであり、ガバナ制限の情報は返しません。"},{"n":3,"category":"","text":"商談には、マスター詳細関係にないカスタム オブジェクトからロールアップされた金額が必要です。\nこれを実現するにはどうすればよいでしょうか?","options":[{"key":"A","text":"Opportunity オブジェクトにトリガーを記述し、ツリー ソートを使用して Opportunity の下にある関連するすべての子オブジェクトの金額を合計します。"},{"key":"B","text":"ストリーミング API を使用して、リアルタイムのロールアップ サマリーを作成します。"},{"key":"C","text":"子オブジェクトにトリガーを記述し、集計関数を使用して、商談の下にある関連するすべての子オブジェクトの金額を合計します。"},{"key":"D","text":"メタデータ API を使用して、リアルタイムのロールアップ サマリーを作成します。"}],"answer":["C"],"multi":false,"explanation":"ロールアップサマリー項目は**マスター詳細関係**でのみ使用できるため、参照関係のカスタムオブジェクトから商談へ金額を集計するにはコードでの実装が必要です。**子オブジェクト側に Apex トリガーを作成し、SOQL の集計関数（`SUM()` など）を使って関連レコードの金額を合計し、親の商談を更新する**のが正しいアプローチです（C が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: 集計すべきタイミングは子レコードの作成・更新・削除時であり、商談側のトリガーでは子の変更を検知できません。\n- **B**: ストリーミング API はイベント通知の仕組みであり、ロールアップの作成には使えません。\n- **D**: メタデータ API は設定情報の管理用であり、リアルタイム集計はできません。"},{"n":4,"category":"","text":"開発者は、Salesforce Classic ユーザーインターフェースでカスタム Lightning Web コンポーネントを利用できるようにする必要があります。これを実現するにはどのアプローチを使用できますか?","options":[{"key":"A","text":"Lightning Web コンポーネントを Visualforce コンポーネントとして埋め込み、ページ レイアウトに直接追加します。"},{"key":"B","text":"Lightning Out JavaScript ライブラリを使用して、Lightning Web コンポーネントを Visualforce ページに埋め込み、ページレイアウトに追加します。"},{"key":"C","text":"カスタム コントローラを備えた Visualforce ページを使用して、Apex メソッドの呼び出しによって Lightning Web コンポーネントを呼び出します。"},{"key":"D","text":"Lightning Web コンポーネントを Aura コンポーネントでラップし、Aura コンポーネントを Visualforce タブとして表示します。"}],"answer":["B"],"multi":false,"explanation":"Lightning Web コンポーネントを Salesforce Classic で利用するには、**Lightning Out** を使って Visualforce ページにコンポーネントを埋め込み（`lightning:outApp` を拡張した Aura アプリケーション経由）、その Visualforce ページを Classic のページレイアウトやタブに配置します（B が正解）。Lightning Out は Lightning コンポーネントを Salesforce 外部や Visualforce 上でホストするための公式な仕組みです。\n\n他の選択肢が誤りの理由:\n- **A**: LWC を Visualforce コンポーネントとして直接埋め込む機能は存在しません。\n- **C**: Apex メソッドの呼び出しで LWC を「呼び出す」ことはできません。\n- **D**: Aura コンポーネントでラップしても、それを直接 Visualforce タブとして表示することはできません（Lightning Out が必要です）。"},{"n":5,"category":"","text":"Universal Containers は、商談が Closed/Won ステージに到達したときには編集できないようにしたいと考えています。\nこれを実現するために開発者が使用できる 2 つの戦略はどれですか?\n2つの回答を選択してください。","options":[{"key":"A","text":"自動的に起動される承認プロセスを使用します。"},{"key":"B","text":"検証ルールを使用します。"},{"key":"C","text":"保存前の Apex トリガーを使用します。"},{"key":"D","text":"自動応答ルールを使用します。"}],"answer":["B","C"],"multi":true,"explanation":"レコードの保存をブロックするには、保存処理の途中で検証・エラー化できる仕組みが必要です。**検証ルール**では `ISCHANGED()` や `PRIORVALUE()` を使って「フェーズが Closed/Won のレコードへの編集」を検出しエラーにできます（B が正解）。また、**before update の Apex トリガー**で `addError()` を呼び出せば同様に保存を拒否できます（C が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: 承認プロセスはレコードのロックに使えますが「自動的に起動」させるには別の自動化が必要で、編集防止の直接的な手段としては不適切です（本問の想定正解は検証ルールとトリガーです）。\n- **D**: 自動応答ルールはリードやケースへの自動メール返信の機能であり、編集制御とは無関係です。"},{"n":6,"category":"","text":"開発者は、販売記録のリストを表示する Lightning Web コンポーネントを作成しています。\n営業担当者ユーザーは、各レコードの手数料フィールドを表示できる必要があります。営業アシスタントユーザーは、手数料フィールドを除くレコードのすべてのフィールドを表示できる必要があります。\nコンポーネントが両方のユーザーに対してエラーなしで機能するようにするには、これをどのように強制すればよいでしょうか?","options":[{"key":"A","text":"コンポーネントのデータを取得するSOQLでWITH SECURITY_ENFORCEDを使用します。"},{"key":"B","text":"Security.stripInaccessible Le を使用して、現在のユーザーがアクセスできないフィールドを削除します。"},{"key":"C","text":"Lightning Locker サービスを使用して、共有ルールと項目レベルのセキュリティを適用します。"},{"key":"D","text":"Lightning データ サービスを使用して、販売レコードのコレクションを取得します。"}],"answer":["B"],"multi":false,"explanation":"**`Security.stripIna​ccessible()`** は、現在のユーザーの項目レベルセキュリティ（FLS）に基づいてアクセス権のない項目をクエリ結果から**エラーを発生させずに除去**します。これにより、手数料項目が見える営業担当者にはすべての項目が、見えない営業アシスタントには手数料以外の項目が表示され、どちらのユーザーでもエラーなく動作します（B が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: `WITH SECURITY_ENFORCED` はアクセス権のない項目がクエリに含まれると**例外をスロー**するため、営業アシスタントにはエラーが発生してしまいます。\n- **C**: Lightning Locker はコンポーネント間の JavaScript 分離のためのセキュリティ機構であり、FLS や共有ルールを適用するものではありません。\n- **D**: Lightning Data Service（`lightning/ui*Api` モジュール）は単一レコードの操作が中心で、レコードのリスト表示という要件には適していません。"},{"n":7,"category":"","text":"Universal Containers には、サードパーティの JavaScript フレームワークを使用して構築され、Visualforce ページを使用して公開された多数のカスタム アプリケーションがあります。同社は、これらのアプリケーションを更新して、Lightning Experience の外観と操作性に似たスタイルを適用したいと考えています。\nビジネス要求を最も迅速かつ効果的に満たすために、開発者は何をすべきでしょうか?","options":[{"key":"A","text":"すべての Visualforce ページを Lightning コンポーネントとして書き換えます。"},{"key":"B","text":"定義で属性 enableLightning を true に設定します。"},{"key":"C","text":"カスタムアプリケーションで使用される Visualforce ページで、Lightning Experience、Lightning コミュニティ、モバイルアプリケーションで使用可能を有効にします。"},{"key":"D","text":"Salesforce Lightning Design System CSS スタイルシートを JavaScript アプリケーションに組み込みます。"}],"answer":["D"],"multi":false,"explanation":"**Salesforce Lightning Design System（SLDS）** の CSS スタイルシートを既存の JavaScript アプリケーションに組み込めば、コードを書き換えることなく Lightning Experience と同じルック＆フィールを適用できます（D が正解）。SLDS はまさにこの目的（Lightning 風の UI スタイルの提供）のために公開されている CSS フレームワークです。\n\n他の選択肢が誤りの理由:\n- **A**: すべてを Lightning コンポーネントに書き換えるのは工数が大きく、「最も迅速に」という要件に反します。\n- **B**: `enableLightning` という属性は存在しません。\n- **C**: 「Lightning Experience で使用可能」の設定はページをそこで表示可能にするだけで、見た目のスタイルは変わりません。"},{"n":8,"category":"","text":"匿名 Apex コードを実行する 2 つのユースケースは何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"Apex クラスを定期的に実行するようにスケジュールする"},{"key":"B","text":"デプロイメント後に1回のトランザクションで15,000の非アクティブなアカウントを削除する"},{"key":"C","text":"すべての連絡先を更新するバッチApexクラスを実行する"},{"key":"D","text":"組織にユニットテストコードカバレッジを追加する"}],"answer":["A","C"],"multi":true,"explanation":"匿名 Apex（Anonymous Apex）は、開発者コンソールや Salesforce CLI からアドホックにコードを実行する仕組みで、**`System.schedule()` を呼び出して Apex クラスのスケジュール実行を登録する**（A）や、**`Database.executeBatch()` を呼び出してバッチ Apex を起動する**（C）といった管理作業に適しています。\n\n他の選択肢が誤りの理由:\n- **B**: 匿名 Apex も通常の同期トランザクションのガバナ制限に従うため、1 トランザクションで 15,000 件の削除は DML 行数上限（10,000 行）を超えて失敗します。\n- **D**: 匿名 Apex のコードはテストカバレッジの対象にならず、組織のコードカバレッジには一切寄与しません。"},{"n":9,"category":"","text":"継続的インテグレーションの一環として、開発者はデプロイメントとユニット テストの実行をスクリプト化するために何を使用すればよいでしょうか?","options":[{"key":"A","text":"VSコード"},{"key":"B","text":"匿名で実行"},{"key":"C","text":"Salesforce CLI"},{"key":"D","text":"開発者コンソール"}],"answer":["C"],"multi":false,"explanation":"**Salesforce CLI（`sf` / `sfdx` コマンド）** はコマンドラインからメタデータのデプロイやテスト実行を行えるため、Jenkins や GitHub Actions などの CI ツールのスクリプトに組み込むことができ、継続的インテグレーションの自動化に最適です（C が正解）。\n\n他の選択肢が誤りの理由:\n- **A（VS Code）**: 対話的な開発用 IDE であり、CI パイプラインのスクリプト化には使いません。\n- **B（匿名実行）**: 匿名 Apex はコードのアドホック実行手段であり、デプロイやテストのスクリプト化はできません。\n- **D（開発者コンソール）**: ブラウザ上の対話的ツールであり、自動化・スクリプト化には向きません。"},{"n":10,"category":"","text":"開発者は、Apex クラスのプライベート メソッドの単体テストをどのように記述すればよいでしょうか?","options":[{"key":"A","text":"SeeAllData アノテーションを使用します。"},{"key":"B","text":"Apex クラスにテスト メソッドを追加します。"},{"key":"C","text":"Apex クラスをグローバルとしてマークします。"},{"key":"D","text":"@TestVisible アノテーションを使用します。"}],"answer":["D"],"multi":false,"explanation":"**`@TestVisible` アノテーション**をプライベートメソッド（や項目）に付与すると、そのメンバーのアクセス修飾子はそのままに、**テストクラスからのみアクセス可能**になります。これにより、本来のカプセル化を崩すことなくプライベートメソッドの単体テストを記述できます（D が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: `SeeAllData` は組織の既存データへのアクセス可否を制御するもので、プライベートメソッドへのアクセスとは無関係です。\n- **B**: テストメソッドを本体のクラスに追加するのはベストプラクティスに反します（テストは別クラスに分離すべきです）。\n- **C**: クラスを `global` にしてもプライベートメソッドの可視性は変わらず、不必要にアクセス範囲を広げるだけです。"},{"n":11,"category":"","text":"Next Best Action 戦略では、Apex メソッドを呼び出す Enhance Element を使用して、さまざまな要因に基づいて連絡先の割引レベルを決定します。\nApex メソッドの正しい定義は何ですか?","options":[{"key":"A","text":"```apex\n@InvocableMethod\n\nglobal static List\u003cList\u003cRecommendation\u003e\u003e getLevel(List\u003cContactWrapper\u003e input)\n\n{ /*implementation*/ }\n```"},{"key":"B","text":"```apex\n@InvocableMethod\n\nglobal Recommendation getLevel(ContactWrapper input)\n\n{ /*implementation*/ }\n```"},{"key":"C","text":"```apex\n@InvocableMethod\n\nglobal List\u003cList\u003cRecommendation\u003e\u003e getLevel(List\u003cContactWrapper\u003e input)\n\n{ /*implementation*/ }\n```"},{"key":"D","text":"```apex\n@InvocableMethod\n\nglobal static List\u003cRecommendation\u003e getLevel(List\u003cContactWrapper\u003e input)\n\n{ /*implementation*/ }\n```"}],"answer":["A"],"multi":false,"explanation":"`@InvocableMethod` を付与するメソッドは **`static` であることが必須**で、Next Best Action の戦略から呼び出す場合、入力はリスト型で受け取り、戻り値は **`List\u003cList\u003cRecommendation\u003e\u003e`** 型にする必要があります（入力リストの各要素に対して提案のリストを返すため）。この両方を満たすのは A のみです。\n\n他の選択肢が誤りの理由:\n- **B**: `static` でなく、入出力もリスト型になっていません。\n- **C**: 戻り値の型は正しいものの `static` 修飾子がありません。\n- **D**: `static` ではあるものの、戻り値が `List\u003cRecommendation\u003e` であり、Next Best Action に必要な `List\u003cList\u003cRecommendation\u003e\u003e` になっていません。"},{"n":12,"category":"","text":"開発者はヘルパークラスを使用して新しい Apex トリガーを作成し、新しい Apex ヘルパークラスの 95% のカバレッジのみを実行するテストクラスを作成します。\n変更セットの運用環境へのデプロイがテスト カバレッジの警告で失敗します。\n「選択された Apex トリガーのテスト カバレッジは 0% です。少なくとも 1% のテスト カバレッジが必要です。」新しい Apex トリガーとヘルパー クラスを正常にデプロイするには、開発者は何をする必要がありますか?","options":[{"key":"A","text":"「すべてのテストを実行」メソッドを使用してテストを実行します。"},{"key":"B","text":"テストクラスから失敗したテストメソッドを削除します"},{"key":"C","text":"Apex トリガーをカバーするテストクラスとメソッドを作成します。"},{"key":"D","text":"ヘルパー クラスのテスト クラス カバレッジを増やします。"}],"answer":["C"],"multi":false,"explanation":"本番環境へのデプロイでは、組織全体で 75% 以上のカバレッジに加えて、**すべての Apex トリガーに少なくとも 1 行以上のカバレッジ（1% 以上）** が必要です。エラーメッセージはトリガー自体がテストで一度も実行されていないことを示しているため、**トリガーが起動する DML 操作を含むテストクラス・テストメソッドを作成する**必要があります（C が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: テストの実行方法を変えても、トリガーを実行するテストが存在しなければカバレッジは 0% のままです。\n- **B**: 失敗したテストの削除はカバレッジを増やさず、むしろ品質を下げます。\n- **D**: ヘルパークラスのカバレッジを上げても、トリガー本体が実行されなければトリガーのカバレッジは 0% のままです。"},{"n":13,"category":"","text":"Candidate _c カスタム オブジェクトには Primaryld_c カスタム フィールドが存在します。このフィールドは各候補者の ID 番号を保存するために使用され、スキーマ定義では Unique としてマークされています。\nデータ拡充プロセスの一環として、Universal Containers には、システム内のすべての候補者の更新されたデータを含む CSV ファイルがあります。ファイルには、各候補者の主な情報がデータ ポイントとして含まれています。Universal Containers は、すべてのデータ行がシステム内の候補者に正しくマッピングされていることを確認しながら、この情報を Salesforce にアップロードしたいと考えています。\nデータのアップロードを効率化するために、開発者はどの手法を実装する必要がありますか?","options":[{"key":"A","text":"CSV を candidate__c に関連するカスタム オブジェクトにアップロードします。"},{"key":"B","text":"レコードを正しくマッピングするために挿入前トリガーを作成します。"},{"key":"C","text":"Primarytd_c フィールド定義を更新して、外部 ID としてマークします。"},{"key":"D","text":"レコードを正しくマッピングするために、保存前のフローを作成します。"}],"answer":["C"],"multi":false,"explanation":"**PrimaryId__c 項目を「外部 ID」としてマーク**すれば、データローダ等で**アップサート（upsert）** 操作を行う際にこの項目をキーとして既存レコードと自動的に照合できます。CSV の各行が ID 番号によって正しい候補者レコードにマッピングされるため、Salesforce ID を事前に調べる必要がなく、アップロードが効率化されます（C が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: 別のカスタムオブジェクトにアップロードしても既存の候補者レコードは更新されず、要件を満たしません。\n- **B / D**: トリガーやフローで照合ロジックを自作するのは、外部 ID による標準のアップサート機能で実現できることを不必要に複雑化するものです。"},{"n":14,"category":"","text":"組織内の Account オブジェクトには、Branch と呼ばれる子オブジェクトとのマスター詳細関係があります。次の自動化が存在します。\n* ロールアップサマリーフィールド\n* カスタム検証ルール\n* 重複ルール\n開発者はアカウント オブジェクトにトリガーを作成しました。\nトリガー コードをテストする際に開発者が考慮すべき 2 つのことは何ですか?\n2つの回答を選択してください","options":[{"key":"A","text":"ロールアップ サマリー フィールドにより、親レコードが保存されることがあります。"},{"key":"B","text":"すべての DML 操作がデータベースにコミットされると、重複ルールが実行されます。"},{"key":"C","text":"トリガーはトランザクション中に複数回起動される可能性があります。"},{"key":"D","text":"検証ルールによりトリガーが再度起動します。"}],"answer":["A","C"],"multi":true,"explanation":"子オブジェクト（Branch）に**ロールアップサマリー項目**があるため、子レコードの変更時に親のアカウントレコードが保存処理を通過し、アカウントのトリガーが起動することがあります（A が正解）。また、ワークフローやロールアップの再計算などにより、**同一トランザクション内でトリガーが複数回起動する可能性**があるため、再帰制御や冪等性を考慮する必要があります（C が正解）。\n\n他の選択肢が誤りの理由:\n- **B**: 重複ルールはレコードの保存前（保存処理の途中）に評価されるものであり、「すべての DML がコミットされた後に実行される」わけではありません。\n- **D**: 検証ルールはエラーによって保存を中断するものであり、トリガーを再起動させるものではありません。"},{"n":15,"category":"","text":"Apex テストクラスで @testSetup アノテーションを使用することに関して正しい 2 つの記述はどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"テストセットアップメソッドで作成されたレコードは、個々のテストメソッドでは更新できません。"},{"key":"B","text":"テスト セットアップ メソッドでは、テスト データが 1 回挿入され、テスト クラス内のすべてのテスト メソッドで使用できるようになります。"},{"key":"C","text":"@testSetup アノテーションで定義されたメソッドは、テスト クラス内の各テスト メソッドに対して 1 回実行され、システム制限にカウントされます。"},{"key":"D","text":"@isTest(SeeAllData=True) アノテーションが使用されている場合、@testSetup アノテーションはサポートされません。"}],"answer":["B","D"],"multi":true,"explanation":"**`@testSetup` メソッドはテストクラス内で 1 回だけ実行**され、そこで作成したテストデータはクラス内のすべてのテストメソッドから利用できます。各テストメソッドはそのデータのコピーに対して動作するため、データ作成のコストを削減できます（B が正解）。また、**`@isTest(SeeAllData=true)` が指定されたクラスでは `@testSetup` はサポートされません**（D が正解）。\n\n他の選択肢が誤りの理由:\n- **A**: `@testSetup` で作成したレコードは各テストメソッド内で更新・削除できます（メソッド終了時にロールバックされ、元の状態に戻ります）。\n- **C**: 「各テストメソッドに対して 1 回実行される」のではなく、クラス全体で 1 回だけ実行されます。"},{"n":16,"category":"","text":"Universal Containers では、ユーザーが自分のアカウントに関する情報を入力できるようにするカスタム ユーザー インターフェイス コンポーネントを作成する必要があります。\nコンポーネントは、情報をデータベースに保存する前にユーザー入力を検証できる必要があります。\nこのコンポーネントを作成するのに最適なテクノロジは何ですか?","options":[{"key":"A","text":"フロー"},{"key":"B","text":"Lightning Web コンポーネント"},{"key":"C","text":"ビジュアルフォース"},{"key":"D","text":"VUE JavaScript フレームワーク"}],"answer":["B"],"multi":false,"explanation":"**Lightning Web コンポーネント（LWC）** は、標準の入力コンポーネント（`lightning-input` など）やカスタム JavaScript による柔軟なクライアントサイド検証をサポートし、データベースへの保存前にユーザー入力を検証するカスタム UI の構築に最適です（B が正解）。最新の Web 標準に基づき、パフォーマンスにも優れています。\n\n他の選択肢が誤りの理由:\n- **A（フロー）**: 画面フローでも入力収集は可能ですが、「カスタム UI コンポーネント」としての柔軟な検証・表示制御には LWC が適しています。\n- **C（Visualforce）**: レガシー技術であり、新規のカスタム UI コンポーネント開発では LWC が推奨されます。\n- **D（Vue.js）**: サードパーティフレームワークは Salesforce のカスタム UI コンポーネント開発の標準技術ではありません。"},{"n":17,"category":"","text":"開発者は、Expense _c オブジェクトで次のトリガーを識別します。\n```apex\ndeleteExpense,\napplyDefaultsToExpense,\nvalidateExpenseUpdate;\n```\nトリガーは、それぞれ削除前、挿入前、更新イベントの前に処理されます。\nトリガーのベスト プラクティスに従うために、開発者が実装する必要がある 2 つの手法はどれですか。\n2つの回答を選択してください","options":[{"key":"A","text":"Unity の 3 つのトリガーすべてが、すべてのイベントを含む Expense__c オブジェクトの単一のトリガーになります。"},{"key":"B","text":"挿入前トリガーと更新前トリガーを統合し、削除アクションにフローを使用します。"},{"key":"C","text":"レコードが保存されるときに適切なロジックを実行するためのヘルパー クラスを作成します。"},{"key":"D","text":"Expense __c オブジェクトの 3 つのトリガーをすべて維持しますが、Apex ロジックをトリガー定義から移動します。"}],"answer":["A","C"],"multi":true,"explanation":"Apex トリガーのベストプラクティスは、**「1 オブジェクトにつき 1 トリガー」** とすることでトリガーの実行順序が保証されない問題を回避すること（A が正解）と、**トリガー本体にはロジックを書かず、ハンドラー（ヘルパー）クラスに処理を委譲する**ことでコードの再利用性とテスト容易性を高めること（C が正解）です。3 つのトリガーを 1 つに統合し、ロジックをヘルパークラスへ移動します。\n\n他の選択肢が誤りの理由:\n- **B**: 削除処理だけフローに分離するのは一貫性がなく、ベストプラクティスとして推奨されません。\n- **D**: ロジックの分離自体は正しい方向ですが、同一オブジェクトに 3 つのトリガーを維持し続ける点がベストプラクティスに反します。"},{"n":18,"category":"","text":"ユーザーがアカウントの郵便番号を編集する場合、「タイムゾーン」という名前のカスタムアカウントテキストフィールドを、PostalCodeToTimezone__c という別のカスタムオブジェクトの値に基づいて更新する必要があります。\nこの機能を実装する最適な方法は何ですか?","options":[{"key":"A","text":"Flow Builder を使用してフローを構築します。"},{"key":"B","text":"アカウント承認プロセスを作成します。"},{"key":"C","text":"数式フィールドを作成します。"},{"key":"D","text":"アカウント割り当てルールを構築します。"}],"answer":["A"],"multi":false,"explanation":"別のカスタムオブジェクト（PostalCodeToTimezone__c）のレコードを検索して値を取得し、アカウントの項目を更新する必要があるため、**Flow Builder でレコードトリガーフロー**を構築するのが最適です（A が正解）。フローの「レコードを取得」要素で郵便番号に一致するレコードを検索し、その値でタイムゾーン項目を更新できます。コード不要で要件を満たせます。\n\n他の選択肢が誤りの理由:\n- **B（承認プロセス）**: 承認手続きのための機能であり、参照先の検索・項目更新には使えません。\n- **C（数式項目）**: 数式は関係のない別オブジェクトのレコードを検索できません（参照できるのは関係でたどれる項目のみです）。\n- **D（割り当てルール）**: 割り当てルールはリードやケースの所有者割り当て用であり、アカウントの項目更新には使えません。"},{"n":19,"category":"","text":"開発者は、Apex クラスを使用するカスタム注文管理アプリを作成しました。注文は、Order オブジェクトと、Order と主従関係にある OrderlItem オブジェクトによって表されます。注文処理中に、注文が複数の注文に分割される場合があります。\nコードで既存の OrderItem レコードの一部を新しい Order レコードに移動できるようにするには、開発者は何をする必要がありますか?","options":[{"key":"A","text":"Apex クラス宣言に共有せずに追加します。"},{"key":"B","text":"マスター詳細関係を外部参照関係に変更します。"},{"key":"C","text":"OrderItem と Order の間にジャンクション オブジェクトを作成します。"},{"key":"D","text":"マスター詳細関係の再印刷を許可するオプションを選択します。"}],"answer":["D"],"multi":false,"explanation":"主従関係（マスター詳細関係）では、デフォルトで子レコードの親を変更（付け替え）できません。既存の OrderItem レコードを別の Order レコードへ移動できるようにするには、マスター詳細関係の項目定義で **「親の変更を許可（Allow reparenting）」オプションを有効化**します（D が正解。「再印刷」は reparenting の誤訳です）。これにより主従関係を維持したまま親の付け替えが可能になります。\n\n他の選択肢が誤りの理由:\n- **A（without sharing）**: 共有ルールの適用を無効化するだけで、親の付け替え可否には影響しません。\n- **B**: 参照関係への変更でも付け替えは可能になりますが、ロールアップサマリー等の主従関係の利点を失うため不要な変更です。\n- **C**: ジャンクションオブジェクトは多対多関係のためのもので、本要件には不適切です。"},{"n":20,"category":"","text":"開発者は、親 Lightning Web コンポーネント内にネストされた子 Lightning Web コンポーネントを作成しました。親コンポーネントは、子コンポーネントに文字列値を渡す必要があります。\nこれを実現するにはどの 2 つの方法がありますか?\n2つの回答を選択してください","options":[{"key":"A","text":"親コンポーネントは子コンポーネント内のパブリック メソッドを呼び出すことができます。"},{"key":"B","text":"親コンポーネントはパブリックプロパティを使用して子コンポーネントにデータを渡すことができます。"},{"key":"C","text":"親は Apex コントローラ クラスを使用して子コンポーネントにデータを送信できます。"},{"key":"D","text":"親コンポーネントはカスタム イベントを使用して、子コンポーネントにデータを渡すことができます。"}],"answer":["A","B"],"multi":true,"explanation":"LWC における親から子へのデータの受け渡しは、**子コンポーネントで `@api` を付与したパブリックプロパティを定義し、親のテンプレートから属性として値を渡す**方法（B が正解）と、**子コンポーネントの `@api` 付きパブリックメソッドを親から呼び出して値を渡す**方法（A が正解）の 2 つで実現できます。\n\n他の選択肢が誤りの理由:\n- **C**: Apex コントローラはサーバーサイドのデータ取得用であり、親子コンポーネント間の値の受け渡しには使いません。\n- **D**: カスタムイベントは**子から親へ**データを伝える仕組みであり、親から子への受け渡しには使いません。"},{"n":21,"cat
