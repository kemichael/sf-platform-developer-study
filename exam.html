<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模擬試験 | Platform デベロッパー</title>
<style>/* ===== カラートークン ===== */
:root{
  --blue:#0176D3; --blue-d:#014486; --navy:#032D60;
  --app-bg:#F3F3F3; --surface:#FFFFFF; --side-bg:#FBFBFD;
  --text:#181818; --text-2:#5C5C5C; --text-3:#747474;
  --border:#E5E5E5; --border-2:#EDEDED;
  --ok:#2E844A; --ok-bg:#EAF5EC;
  --code-bg:#F6F8FA; --code-border:#E7EBEF; --inline-code:#B5306E; --inline-code-bg:#FBEAF1;
  --accent:var(--blue); --accent-soft:#E8F2FC;
  --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --side-w:288px; --toc-w:232px; --header-h:58px; --read-w:824px;
  --mono:ui-monospace,"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Yu Gothic",Meiryo,system-ui,sans-serif;
  --tok-comment:#6E7781; --tok-key:#CF222E; --tok-str:#0A7D33; --tok-num:#0550AE;
  --tok-fn:#8250DF; --tok-punc:#57606A; --tok-tag:#116329; --tok-attr:#0550AE;
  /* callout colors */
  --c-term:#6B4FBB; --c-term-bg:#F1EDFB; --c-term-bd:#D9CDF2;
  --c-ex:#0B7A6E; --c-ex-bg:#E6F6F3; --c-ex-bd:#BFE7E0;
  --c-tip:#1A6DB5; --c-tip-bg:#E8F2FC; --c-tip-bd:#C5DEF6;
  --c-warn:#B25800; --c-warn-bg:#FBF0E2; --c-warn-bd:#F1D9BA;
  --c-step:#0B6E99; --c-step-bg:#E7F4FA; --c-step-bd:#BFE3F0;
  --c-sum:#2E844A; --c-sum-bg:#EAF5EC; --c-sum-bd:#C5E5CD;
  --c-triv:#C0398B; --c-triv-bg:#FCEAF4; --c-triv-bd:#F2CBE2;
}
[data-theme="dark"]{
  --blue:#1B96FF; --blue-d:#57ABFF; --navy:#C9E2FF;
  --app-bg:#16191F; --surface:#1E222B; --side-bg:#13161B;
  --text:#E6E8EB; --text-2:#9BA1AC; --text-3:#79808B;
  --border:#2A2F3A; --border-2:#242935;
  --ok:#4BCA7E; --ok-bg:#193326;
  --code-bg:#13161B; --code-border:#2A2F3A; --inline-code:#FF9CC7; --inline-code-bg:#2A1B23;
  --accent:var(--blue); --accent-soft:#13283D;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.3);
  --tok-comment:#8B949E; --tok-key:#FF7B72; --tok-str:#7EE787; --tok-num:#79C0FF;
  --tok-fn:#D2A8FF; --tok-punc:#8B949E; --tok-tag:#7EE787; --tok-attr:#79C0FF;
  --c-term:#C3B0F0; --c-term-bg:#221C33; --c-term-bd:#3A2F55;
  --c-ex:#6FD8C8; --c-ex-bg:#132A27; --c-ex-bd:#244641;
  --c-tip:#7CC0FF; --c-tip-bg:#132433; --c-tip-bd:#22405C;
  --c-warn:#F0B36A; --c-warn-bg:#2C2113; --c-warn-bd:#4A3820;
  --c-step:#6FC5E8; --c-step-bg:#12242D; --c-step-bd:#234049;
  --c-sum:#5FD18E; --c-sum-bg:#15291E; --c-sum-bd:#264A33;
  --c-triv:#F19BD0; --c-triv-bg:#2A1622; --c-triv-bd:#46283A;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--text); background:var(--app-bg);
  font-size:16px; line-height:1.85; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.ico{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ===== トップバー ===== */
.topbar{
  position:sticky;top:0;z-index:40;height:var(--header-h);
  display:flex;align-items:center;gap:16px;padding:0 18px;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex-shrink:0}
.brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff}
.brand-mark .ico{width:20px;height:20px}
.brand-text{display:flex;flex-direction:column;line-height:1.2}
.brand-text b{font-size:15px;color:var(--navy);font-weight:700}
.brand-text small{font-size:11px;color:var(--text-3);letter-spacing:.04em}

.search-wrap{position:relative;flex:1;max-width:520px;margin-left:6px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text-3)}
#searchInput{
  width:100%;height:38px;padding:0 64px 0 38px;border-radius:10px;
  border:1px solid var(--border);background:var(--side-bg);color:var(--text);
  font-family:inherit;font-size:14px;outline:none;transition:.15s;
}
#searchInput:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
.search-count{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-3)}

.topbar-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mini-bar{width:90px;height:7px;border-radius:99px;background:var(--border);overflow:hidden}
.mini-bar span{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--ok),#43b96a);transition:width .4s ease}
.mini-pct{font-size:12px;color:var(--text-2);font-variant-numeric:tabular-nums;min-width:32px}

.icon-btn{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;
  border:1px solid transparent;background:transparent;color:var(--text-2);cursor:pointer;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--side-bg);color:var(--text);border-color:var(--border)}
.menu-toggle{display:none}
/* クイックリンク群のラッパー。デスクトップでは display:contents で透過し、
   各リンクを topbar の直接の flex 子要素として従来どおり横並びさせる */
.quicklinks{display:contents}
.summary-link{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;text-decoration:none;
  font-size:13px;font-weight:700;color:#fff;border-radius:10px;padding:8px 14px;
  background:linear-gradient(95deg,#ff5fa2,#ff8a5b);box-shadow:0 1px 4px rgba(255,95,162,.35);transition:.15s}
.summary-link:hover{filter:brightness(1.06);transform:translateY(-1px)}
.summary-link .ico{width:15px;height:15px}
#themeToggle .ico-moon{display:none}
[data-theme="dark"] #themeToggle .ico-sun{display:none}
[data-theme="dark"] #themeToggle .ico-moon{display:block}

/* ===== レイアウト ===== */
.layout{display:grid;grid-template-columns:var(--side-w) minmax(0,1fr) var(--toc-w);
  align-items:start;max-width:1500px;margin:0 auto}
.sidebar{position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));
  overflow-y:auto;background:var(--side-bg);border-right:1px solid var(--border);padding:14px 10px 60px}
.toc{position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));
  overflow-y:auto;padding:26px 18px 60px}
.content{min-height:calc(100vh - var(--header-h));padding:0 40px}

.sidebar::-webkit-scrollbar,.toc::-webkit-scrollbar{width:8px}
.sidebar::-webkit-scrollbar-thumb,.toc::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ===== サイドバーナビ ===== */
.nav-topic{margin-bottom:2px}
.nav-topic>button{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:none;
  cursor:pointer;color:var(--text);font-family:inherit;font-size:13.5px;text-align:left;border-radius:8px;line-height:1.35}
.nav-topic>button:hover{background:var(--border-2)}
.nav-topic.open>button{color:var(--navy);font-weight:700}
.t-num{display:grid;place-items:center;flex-shrink:0;width:24px;height:24px;border-radius:7px;
  font-size:11px;font-weight:700;background:var(--accent-soft);color:var(--blue);font-variant-numeric:tabular-nums}
.nav-topic.open .t-num{background:var(--blue);color:#fff}
.t-title{flex:1}
.t-chev{width:16px;height:16px;color:var(--text-3);transition:transform .2s}
.nav-topic.open .t-chev{transform:rotate(90deg)}
.t-done{font-size:10.5px;color:var(--ok);font-variant-numeric:tabular-nums}

.nav-units{display:none;margin:2px 0 6px;padding-left:6px}
.nav-topic.open .nav-units{display:block}
.nav-section{font-size:11px;color:var(--text-3);font-weight:700;padding:8px 10px 3px;letter-spacing:.02em}
.nav-unit{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px 6px 12px;border:none;background:none;
  cursor:pointer;color:var(--text-2);font-family:inherit;font-size:13px;text-align:left;border-radius:7px;
  border-left:2px solid transparent;line-height:1.4}
.nav-unit:hover{background:var(--border-2);color:var(--text)}
.nav-unit.active{background:var(--accent-soft);color:var(--blue);font-weight:600;border-left-color:var(--blue)}
.nav-unit .dot{flex-shrink:0;width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border);display:grid;place-items:center}
.nav-unit.done .dot{background:var(--ok);border-color:var(--ok)}
.nav-unit .dot .ico{width:10px;height:10px;color:#fff;stroke-width:3.2;opacity:0}
.nav-unit.done .dot .ico{opacity:1}

/* ===== 記事(コンテンツ) ===== */
.article{max-width:var(--read-w);margin:0 auto;padding:30px 0 100px}
.crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-3);margin-bottom:14px;flex-wrap:wrap}
.crumb b{color:var(--blue);font-weight:600}
.crumb .sep{opacity:.5}

.unit-head{border-bottom:1px solid var(--border);padding-bottom:22px;margin-bottom:8px}
.unit-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
  color:var(--blue);background:var(--accent-soft);padding:4px 11px;border-radius:99px;margin-bottom:14px}
.unit-eyebrow .ico{width:14px;height:14px}
.unit-title{font-size:30px;line-height:1.3;font-weight:800;color:var(--navy);margin:0 0 16px;letter-spacing:-.01em}

.done-toggle{display:inline-flex;align-items:center;gap:9px;cursor:pointer;padding:9px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-family:inherit;font-size:13.5px;
  font-weight:600;transition:.15s}
.done-toggle:hover{border-color:var(--ok);color:var(--ok)}
.done-toggle .box{width:18px;height:18px;border-radius:5px;border:1.8px solid var(--text-3);display:grid;place-items:center}
.done-toggle .box .ico{width:12px;height:12px;color:#fff;opacity:0;stroke-width:3}
.done-toggle.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.done-toggle.done .box{background:var(--ok);border-color:var(--ok)}
.done-toggle.done .box .ico{opacity:1}

/* 本文タイポ */
.prose{font-size:16px;line-height:1.9;color:var(--text)}
.prose h1{font-size:25px;color:var(--navy);font-weight:800;margin:38px 0 14px;line-height:1.35}
.prose h2{font-size:22px;color:var(--navy);font-weight:700;margin:36px 0 12px;padding-top:8px;
  scroll-margin-top:74px;line-height:1.4;border-bottom:2px solid var(--border-2);padding-bottom:8px}
.prose h3{font-size:18px;color:var(--text);font-weight:700;margin:28px 0 10px;scroll-margin-top:74px;
  display:flex;align-items:center;gap:9px}
.prose h3::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--blue);flex-shrink:0}
.prose h4{font-size:15.5px;font-weight:700;color:var(--text);margin:22px 0 8px}
.prose p{margin:13px 0}
.prose a{color:var(--blue);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--blue) 35%,transparent);word-break:break-word}
.prose a:hover{border-bottom-color:var(--blue)}
.prose strong{font-weight:700;color:var(--text)}
.prose ul,.prose ol{margin:13px 0;padding-left:26px}
.prose li{margin:7px 0}
.prose li::marker{color:var(--blue)}
.prose blockquote{margin:18px 0;padding:12px 18px;border-left:4px solid var(--blue);
  background:var(--accent-soft);border-radius:0 10px 10px 0;color:var(--text-2)}
.prose blockquote p{margin:4px 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:30px 0}
.prose img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:14px 0}

.prose :not(pre)>code{font-family:var(--mono);font-size:.86em;background:var(--inline-code-bg);
  color:var(--inline-code);padding:.15em .42em;border-radius:6px;border:1px solid color-mix(in srgb,var(--inline-code) 18%,transparent)}

/* コードブロック */
.code-block{position:relative;margin:18px 0;border:1px solid var(--code-border);border-radius:12px;
  background:var(--code-bg);overflow:hidden}
.code-bar{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-bottom:1px solid var(--code-border);background:color-mix(in srgb,var(--code-bg) 60%,var(--app-bg))}
.code-lang{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.copy-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);font-family:inherit;font-size:11.5px;padding:4px 9px;border-radius:7px;cursor:pointer;transition:.15s}
.copy-btn:hover{color:var(--blue);border-color:var(--blue)}
.copy-btn.copied{color:var(--ok);border-color:var(--ok)}
.copy-btn .ico{width:13px;height:13px}
.code-block pre{margin:0;padding:15px 16px;overflow-x:auto;font-family:var(--mono);font-size:13.5px;line-height:1.7}
.code-block code{font-family:var(--mono);background:none;color:var(--text);padding:0;border:none}

/* テーブル */
.prose .table-wrap{overflow-x:auto;margin:18px 0;border:1px solid var(--border);border-radius:12px}
.prose table{border-collapse:collapse;width:100%;font-size:14px}
.prose th,.prose td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.prose thead th{background:var(--side-bg);color:var(--navy);font-weight:700;font-size:13px;border-bottom:2px solid var(--border)}
.prose tbody tr:last-child td{border-bottom:none}
.prose tbody tr:hover{background:var(--accent-soft)}

/* ===== コールアウト(用語/例/ポイント/注意/手順/まとめ) ===== */
.callout{margin:20px 0;border:1px solid var(--bd,var(--border));background:var(--bg,var(--side-bg));
  border-radius:12px;padding:0;overflow:hidden}
.callout-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;
  color:var(--cl,var(--text));padding:10px 16px 0}
.callout-head .ico{width:17px;height:17px;color:var(--cl)}
.callout-body{padding:6px 16px 14px;color:var(--text)}
.callout-body>:first-child{margin-top:6px}
.callout-body>:last-child{margin-bottom:0}
.callout-body p{margin:8px 0}
.callout.term{--cl:var(--c-term);--bg:var(--c-term-bg);--bd:var(--c-term-bd)}
.callout.example{--cl:var(--c-ex);--bg:var(--c-ex-bg);--bd:var(--c-ex-bd)}
.callout.tip{--cl:var(--c-tip);--bg:var(--c-tip-bg);--bd:var(--c-tip-bd)}
.callout.warning{--cl:var(--c-warn);--bg:var(--c-warn-bg);--bd:var(--c-warn-bd)}
.callout.steps{--cl:var(--c-step);--bg:var(--c-step-bg);--bd:var(--c-step-bd)}
.callout.summary{--cl:var(--c-sum);--bg:var(--c-sum-bg);--bd:var(--c-sum-bd)}
.callout.trivia{--cl:var(--c-triv);--bg:var(--c-triv-bg);--bd:var(--c-triv-bd)}
.callout.steps .callout-body ol{counter-reset:step;list-style:none;padding-left:0}
.callout.steps .callout-body ol>li{position:relative;padding-left:34px;margin:10px 0;min-height:24px}
.callout.steps .callout-body ol>li::before{counter-increment:step;content:counter(step);
  position:absolute;left:0;top:0;width:23px;height:23px;border-radius:50%;background:var(--c-step);color:#fff;
  display:grid;place-items:center;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

/* ===== 「この単元で学ぶこと」要点カード ===== */
.prose .goals{margin:22px 0 30px;padding:4px 24px 18px;border:1px solid var(--c-tip-bd);
  border-left:4px solid var(--blue);border-radius:14px;
  background:linear-gradient(180deg,var(--accent-soft),color-mix(in srgb,var(--surface) 70%,var(--accent-soft)))}
.prose .goals h2.goals-head,.prose .goals h1.goals-head,.prose .goals h3.goals-head{
  border:none;padding:0;margin:16px 0 8px;color:var(--blue);font-size:15px;font-weight:800;letter-spacing:.02em;
  display:flex;align-items:center;gap:8px}
.prose .goals h2.goals-head .ico{width:18px;height:18px}
.prose .goals ul,.prose .goals ol{margin:6px 0 2px;padding-left:22px}
.prose .goals li{margin:5px 0}
.prose .goals li::marker{color:var(--blue)}
.prose .goals>p{margin:6px 0;color:var(--text-2);font-size:14.5px}

/* ===== 図解・例パネル(text フェンス) ===== */
.prose figure.diagram{position:relative;margin:20px 0;padding:16px 18px;border:1px solid var(--border);
  border-radius:12px;background:var(--side-bg);overflow-x:auto}
.prose figure.diagram.is-figure{padding:22px 18px 18px;text-align:center;
  background:radial-gradient(circle at 50% 0,color-mix(in srgb,var(--accent-soft) 60%,var(--side-bg)),var(--side-bg) 70%)}
.prose figure.diagram pre{margin:0;padding:0;background:none;border:none;
  font-family:var(--mono);font-size:12.5px;line-height:1.55;color:var(--text-2);
  white-space:pre;display:inline-block;text-align:left}
.prose figure.diagram code{background:none;border:none;padding:0;color:inherit;font-size:inherit}
.prose figure.diagram .diagram-tag{position:absolute;top:9px;right:11px;font-size:10px;font-weight:700;
  letter-spacing:.06em;color:var(--text-3);background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:2px 8px;z-index:1}

/* Mermaid 図 */
.prose figure.mermaid-fig{padding:20px 16px;background:
  radial-gradient(circle at 50% 0,color-mix(in srgb,var(--accent-soft) 50%,var(--surface)),var(--surface) 75%)}
.prose figure.mermaid-fig svg{max-width:100%;height:auto;display:block;margin:0 auto}

/* ===== ページャ ===== */
.pager{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:46px;padding-top:26px;border-top:1px solid var(--border)}
.pager a{display:flex;flex-direction:column;gap:4px;padding:14px 18px;border:1px solid var(--border);
  border-radius:12px;text-decoration:none;color:var(--text);background:var(--surface);transition:.15s}
.pager a:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-1px)}
.pager .lbl{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-3);font-weight:600}
.pager .ttl{font-size:14px;font-weight:600;color:var(--navy);line-height:1.4}
.pager .next{text-align:right}.pager .next .lbl{justify-content:flex-end}
.pager a.empty{visibility:hidden}

/* ===== オンページ目次 ===== */
.toc-inner{border-left:1px solid var(--border);padding-left:14px}
.toc-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.toc a{display:block;font-size:12.5px;color:var(--text-2);text-decoration:none;padding:4px 0;line-height:1.45;
  border-left:2px solid transparent;margin-left:-15px;padding-left:13px;transition:.12s}
.toc a.lv3{padding-left:24px;font-size:12px}
.toc a:hover{color:var(--text)}
.toc a.active{color:var(--blue);font-weight:600;border-left-color:var(--blue)}

/* ===== 検索結果 ===== */
.search-results{max-width:var(--read-w);margin:0 auto;padding:28px 0 60px}
.sr-head{font-size:14px;color:var(--text-2);margin-bottom:18px}
.sr-head b{color:var(--navy)}
.sr-item{display:block;padding:15px 18px;border:1px solid var(--border);border-radius:12px;margin-bottom:11px;
  text-decoration:none;color:inherit;background:var(--surface);transition:.15s;cursor:pointer}
.sr-item:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.sr-crumb{font-size:11.5px;color:var(--text-3);margin-bottom:5px}
.sr-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px}
.sr-snippet{font-size:13px;color:var(--text-2);line-height:1.7;max-height:3.4em;overflow:hidden}
.sr-item mark,.prose mark{background:#FFE9A8;color:inherit;padding:0 2px;border-radius:3px}
[data-theme="dark"] .sr-item mark,[data-theme="dark"] .prose mark{background:#5C4A1A;color:#FFE9A8}
.sr-empty{text-align:center;color:var(--text-3);padding:60px 0}

/* ===== ホーム ===== */
.home{max-width:980px;margin:0 auto;padding:34px 0 90px}
.hero{padding:34px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero h1{margin:0 0 10px;font-size:28px;font-weight:800;line-height:1.3}
.hero p{margin:0;font-size:14.5px;opacity:.92;max-width:620px;line-height:1.8}
.hero-stats{display:flex;gap:26px;margin-top:22px}
.hero-stats div{display:flex;flex-direction:column}
.hero-stats b{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.hero-stats span{font-size:12px;opacity:.85}
.home-prog{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 22px;margin-bottom:26px;flex-wrap:wrap}
.home-prog .big-bar{flex:1;min-width:120px;height:11px;border-radius:99px;background:var(--border);overflow:hidden}
.home-prog .big-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#43b96a);border-radius:99px;transition:width .5s}
.home-prog .big-pct{font-size:20px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums}
.home-prog .resume a{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;text-decoration:none;
  padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.15s}
.home-prog .resume a:hover{background:var(--blue-d)}
.home h2.sec{font-size:15px;color:var(--text-2);font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.topic-card{display:flex;flex-direction:column;gap:10px;padding:18px;border:1px solid var(--border);border-radius:14px;
  background:var(--surface);cursor:pointer;text-decoration:none;color:inherit;transition:.18s}
.topic-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-2px)}
.topic-card .tc-top{display:flex;align-items:center;gap:11px}
.topic-card .tc-num{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;font-weight:800;font-size:14px;
  background:var(--accent-soft);color:var(--blue);flex-shrink:0;font-variant-numeric:tabular-nums}
.topic-card.complete .tc-num{background:var(--ok);color:#fff}
.topic-card .tc-title{font-size:14.5px;font-weight:700;color:var(--navy);line-height:1.4}
.topic-card .tc-meta{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--text-3)}
.topic-card .tc-bar{height:5px;border-radius:99px;background:var(--border);overflow:hidden}
.topic-card .tc-bar span{display:block;height:100%;background:var(--ok);border-radius:99px;transition:width .4s}

/* ===== レスポンシブ ===== */
@media(max-width:1180px){
  .layout{grid-template-columns:var(--side-w) minmax(0,1fr)}
  .toc{display:none}
}
@media(max-width:860px){
  /* モバイル/タブレットではトップバーを2段組みにする。
     1段目: メニュー・ブランド・検索・テーマ切替 / 2段目: クイックリンクを横スクロール。
     --header-h を2段分に拡張し、fixed なサイドバー・スクリムの位置揃えを保つ */
  :root{--side-w:300px; --header-h:100px}
  .layout{grid-template-columns:minmax(0,1fr)}
  .menu-toggle{display:grid}
  .sidebar{position:fixed;top:var(--header-h);left:0;z-index:35;width:var(--side-w);
    transform:translateX(-105%);transition:transform .25s ease;box-shadow:var(--shadow)}
  .sidebar.open{transform:translateX(0)}
  .scrim{display:block;position:fixed;inset:var(--header-h) 0 0;background:rgba(0,0,0,.4);z-index:34;opacity:0;visibility:hidden;transition:.25s}
  .scrim.show{opacity:1;visibility:visible}
  .content{padding:0 20px}
  .brand-text small{display:none}
  .topbar-progress{display:none}

  .topbar{flex-wrap:wrap;align-content:center;height:var(--header-h);
    padding:8px 12px;gap:8px 10px;overflow:hidden}
  .menu-toggle{order:1}
  .brand{order:2}
  .search-wrap{order:3;flex:1 1 80px;margin-left:0;max-width:none}
  #themeToggle{order:4}
  /* 2段目: クイックリンクを必ず全幅で折り返し、横スクロールできる帯にする */
  .quicklinks{order:5;display:flex;flex:1 1 100%;align-items:center;gap:8px;
    overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;
    margin:0 -12px;padding:0 12px}
  .quicklinks::-webkit-scrollbar{display:none}
  .summary-link{flex:0 0 auto;padding:7px 12px;font-size:12px}
  .summary-link .ico{width:14px;height:14px}
}
@media(max-width:560px){
  .unit-title{font-size:24px}
  .pager{grid-template-columns:1fr}
  .search-wrap{max-width:none}
  /* 横幅が厳しい端末ではブランド名テキストを省きアイコンのみに */
  .brand-text{display:none}
}
.scrim{display:none}

/* ===== まとめチートシート専用 ===== */
.summary-body .topbar{position:sticky;top:0}
.summary-body .sum-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.back-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:700;
  color:var(--blue);background:var(--accent-soft);border:1px solid var(--c-tip-bd);border-radius:10px;padding:8px 13px;transition:.15s}
.back-link:hover{background:var(--blue);color:#fff}
.back-link .ico{width:15px;height:15px}
.sum-main{max-width:900px;margin:0 auto;padding:0 24px}
.summary-body .article{padding:34px 0 110px}
/* タイトルをポップに（ギャル感のあるグラデ） */
.summary-body .prose h1{font-size:34px;line-height:1.25;
  background:linear-gradient(95deg,#ff5fa2,#ff8a5b 45%,#0176D3);-webkit-background-clip:text;background-clip:text;color:transparent;
  margin:8px 0 18px}
.summary-body .prose h2{font-size:23px;margin-top:46px;border-bottom:none;position:relative;padding-left:16px}
.summary-body .prose h2::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:6px;border-radius:4px;
  background:linear-gradient(180deg,#ff5fa2,#ff8a5b)}
.summary-body .prose h2::after{content:"";display:block;height:1px;background:var(--border);margin-top:10px}
/* GFM チェックリスト（直前チェック） */
.callout-body ul.contains-task-list,.prose ul.contains-task-list{list-style:none;padding-left:4px}
.prose li.task-list-item,.callout-body li.task-list-item{display:flex;align-items:flex-start;gap:9px;margin:9px 0}
.prose li.task-list-item::marker{content:""}
.prose input[type="checkbox"]{appearance:none;-webkit-appearance:none;flex-shrink:0;width:19px;height:19px;margin:2px 0 0;
  border:2px solid var(--blue);border-radius:6px;background:var(--surface);cursor:pointer;position:relative;transition:.15s}
.prose input[type="checkbox"]:checked{background:var(--blue)}
.prose input[type="checkbox"]:checked::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;
  border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}

/* ===== Prism トークン配色 ===== */
.token.comment,.token.prolog,.token.doctype,.token.cdata{color:var(--tok-comment);font-style:italic}
.token.punctuation{color:var(--tok-punc)}
.token.property,.token.tag,.token.boolean,.token.constant,.token.symbol{color:var(--tok-tag)}
.token.number{color:var(--tok-num)}
.token.selector,.token.attr-name,.token.string,.token.char,.token.builtin{color:var(--tok-str)}
.token.attr-value{color:var(--tok-attr)}
.token.operator,.token.entity,.token.url{color:var(--tok-punc)}
.token.keyword,.token.atrule,.token.important{color:var(--tok-key);font-weight:600}
.token.function,.token.class-name{color:var(--tok-fn)}
.token.regex,.token.variable{color:var(--tok-attr)}
.token.deleted{color:var(--tok-key)}
</style>
<style>
/* ===== 模擬試験ページ専用スタイル ===== */
.exam-body{--bad:#C23934;--bad-bg:#FCECEC;--bad-bd:#F3C9C9}
[data-theme="dark"] .exam-body{--bad:#FF6B61;--bad-bg:#2E1719;--bad-bd:#522A2C}
.exam-body .topbar{position:sticky;top:0}
.exam-main{max-width:880px;margin:0 auto;padding:28px 22px 140px}

/* --- スタート画面 --- */
.exam-hero h1{font-size:30px;line-height:1.25;margin:6px 0 8px;color:var(--navy)}
.exam-hero p{color:var(--text-2);font-size:14px;line-height:1.8;margin:0 0 8px}
.exam-hero .note{font-size:12.5px;color:var(--text-3)}

/* --- 回答モード切替 --- */
.mode-select{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:22px}
.ms-label{font-size:13px;font-weight:800;color:var(--text-2)}
.ms-seg{display:inline-flex;border:1px solid var(--border);border-radius:11px;background:var(--surface);padding:3px;gap:3px}
.ms-btn{border:none;background:transparent;color:var(--text-2);font-size:13px;font-weight:700;border-radius:8px;padding:7px 16px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.ms-btn .ico{width:14px;height:14px}
.ms-btn.active{background:linear-gradient(95deg,#ff5fa2,#ff8a5b);color:#fff}
.ms-desc{flex-basis:100%;margin:0;font-size:12.5px;color:var(--text-3)}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:24px}
.set-card{text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:16px;
  padding:18px 18px 16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.set-card:hover{transform:translateY(-2px);border-color:var(--blue)}
.set-card .sc-badge{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:11.5px;font-weight:700;
  color:#fff;background:linear-gradient(95deg,#ff5fa2,#ff8a5b);border-radius:99px;padding:4px 11px}
.set-card .sc-title{font-size:15.5px;font-weight:700;color:var(--text);line-height:1.45}
.set-card .sc-meta{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--text-3);margin-top:auto}
.set-card .sc-best{color:var(--ok);font-weight:700}
.set-card .sc-go{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--blue)}
.set-card .sc-go .ico{width:15px;height:15px}

/* --- 問題 --- */
.quiz-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.quiz-head h2{font-size:19px;color:var(--navy);margin:0;flex:1;min-width:200px}
.back-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-2);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}
.back-btn .ico{width:15px;height:15px}

.q-card{border:1px solid var(--border);background:var(--surface);border-radius:14px;padding:18px 20px;margin:0 0 16px;box-shadow:var(--shadow)}
.q-card.is-correct{border-color:var(--ok)}
.q-card.is-wrong{border-color:var(--bad)}
.q-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.q-num{flex-shrink:0;display:grid;place-items:center;min-width:30px;height:30px;padding:0 8px;border-radius:8px;
  background:var(--accent-soft);color:var(--blue);font-weight:800;font-size:14px}
.q-cat{font-size:11.5px;font-weight:700;color:var(--text-3);background:var(--border-2);border-radius:99px;padding:3px 10px}
.q-multi{font-size:11.5px;font-weight:700;color:#fff;background:var(--c-triv);border-radius:99px;padding:3px 10px}
.q-mark{margin-left:auto;display:none;align-items:center;gap:5px;font-size:13px;font-weight:800}
.q-card.is-correct .q-mark.ok{display:inline-flex;color:var(--ok)}
.q-card.is-wrong .q-mark.ng{display:inline-flex;color:var(--bad)}
.q-mark .ico{width:17px;height:17px}
.q-text{font-size:15px;line-height:1.85;color:var(--text);margin:0 0 14px}
.q-text p{margin:0 0 8px}
.q-text p:last-child{margin-bottom:0}

.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--border);border-radius:11px;
  padding:11px 14px;cursor:pointer;transition:.12s;background:var(--surface)}
.opt:hover{border-color:var(--blue);background:var(--accent-soft)}
.opt.selected{border-color:var(--blue);background:var(--accent-soft)}
.opt .mark{flex-shrink:0;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);
  display:grid;place-items:center;font-size:12.5px;font-weight:800;color:var(--text-2);background:var(--side-bg);transition:.12s}
.opt.multi .mark{border-radius:50%}
.opt.selected .mark{background:var(--blue);border-color:var(--blue);color:#fff}
.opt .otext{font-size:14px;line-height:1.7;color:var(--text);padding-top:1px}
.opt .otext code{font-size:.92em}
/* 採点後 */
.opts.graded .opt{cursor:default}
.opts.graded .opt:hover{background:var(--surface)}
.opts.graded .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
.opts.graded .opt.correct .mark{background:var(--ok);border-color:var(--ok);color:#fff}
.opts.graded .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opts.graded .opt.wrong .mark{background:var(--bad);border-color:var(--bad);color:#fff}
.opts.graded .opt:hover.correct{background:var(--ok-bg)}
.opts.graded .opt:hover.wrong{background:var(--bad-bg)}

.explain{margin-top:14px;border-radius:11px;border:1px solid var(--c-sum-bd);background:var(--c-sum-bg);padding:13px 15px;display:none}
.q-card.graded .explain{display:block}
.explain-head{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--c-sum);margin-bottom:6px}
.explain-head .ico{width:15px;height:15px}
.explain-body{font-size:13.5px;line-height:1.85;color:var(--text)}
.explain-body p{margin:0 0 7px}
.explain-body p:last-child{margin-bottom:0}
.explain-body code{font-size:.92em}

/* --- 結果パネル --- */
.result{border:1px solid var(--border);background:var(--surface);border-radius:18px;padding:24px;margin:0 0 22px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.score-ring{--p:0;flex-shrink:0;width:128px;height:128px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--ring-color) calc(var(--p)*1%), var(--border-2) 0)}
.score-ring .inner{width:104px;height:104px;border-radius:50%;background:var(--surface);display:grid;place-items:center;flex-direction:column}
.score-ring .pct{font-size:30px;font-weight:800;color:var(--text);line-height:1}
.score-ring .pl{font-size:11px;color:var(--text-3);margin-top:3px}
.result-info{flex:1;min-width:220px}
.result-info .verdict{font-size:22px;font-weight:800;margin:0 0 6px}
.result-info .verdict.pass{color:var(--ok)}
.result-info .verdict.fail{color:var(--bad)}
.result-info .detail{font-size:14px;color:var(--text-2);line-height:1.8}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:700;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn .ico{width:15px;height:15px}
.btn.primary{background:linear-gradient(95deg,#ff5fa2,#ff8a5b);border-color:transparent;color:#fff}
.btn.primary:hover{filter:brightness(1.06);color:#fff}
.filter-toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);cursor:pointer;user-select:none}
.filter-toggle input{width:16px;height:16px;accent-color:var(--blue)}

/* --- 下部固定バー（採点前） --- */
.quiz-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--surface);border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.quiz-bar-inner{max-width:880px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
.quiz-bar .answered{font-size:13.5px;color:var(--text-2);font-variant-numeric:tabular-nums}
.quiz-bar .answered b{color:var(--text);font-size:15px}
.quiz-bar .qb-bar{flex:1;height:7px;border-radius:99px;background:var(--border);overflow:hidden;min-width:60px}
.quiz-bar .qb-bar span{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--ok),#43b96a);transition:width .3s}
.quiz-bar .btn{flex-shrink:0}
.quiz-bar .bar-sub{margin-left:10px;color:var(--ok);font-weight:700}
.btn[disabled]{opacity:.45;cursor:default;pointer-events:none}

.quiz-bar-inner{position:relative}
.qnav{position:absolute;bottom:calc(100% + 12px);right:22px;width:min(560px,calc(100vw - 28px));max-height:46vh;overflow:auto;

.qnav-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:11px}
.qnav-head .qh-title{font-size:12.5px;font-weight:800;color:var(--text-2);margin-right:auto}
.qnav-head .lg{display:inline-flex;align-items:center;gap:5px}
.qnav-head .dot{width:10px;height:10px;border-radius:3px;border:1.5px solid var(--border);background:var(--surface)}
.qnav-head .dot.done{background:var(--accent-soft);border-color:var(--blue)}
.qnav-head .dot.ok{background:var(--ok-bg);border-color:var(--ok)}
.qnav-head .dot.ng{background:var(--bad-bg);border-color:var(--bad)}
.qnav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px}
.qn-btn{height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);
  font-weight:700;font-size:12.5px;cursor:pointer;transition:.12s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--blue);color:var(--blue)}
.qn-btn.done{background:var(--accent-soft);border-color:var(--blue);color:var(--blue)}
.qn-btn.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.q-card{scroll-margin-top:70px}
@media(max-width:640px){
  .qnav{right:14px}
  .qnav-grid{grid-template-columns:repeat(auto-fill,minmax(36px,1fr))}
  .quiz-bar .btn .bt-label{display:none}
}

.q-text code,.explain-body code,.opt .otext code{font-family:var(--mono);font-size:.9em;

.q-text .code-block,.explain-body .code-block{margin:12px 0}

@media(max-width:640px){
  .exam-main{padding:18px 14px 130px}
  .result{gap:16px;padding:18px}
  .score-ring{width:108px;height:108px}
  .score-ring .inner{width:88px;height:88px}
  .score-ring .pct{font-size:26px}
  .quiz-bar-inner{padding:10px 14px;gap:10px}
}
</style>

<body class="exam-body">

<main class="exam-main">
  <!-- スタート画面：セット選択 -->
  <section id="startScreen">
    <div class="exam-hero">
      <h1>模擬試験</h1>
      <p>本番形式の択一・複数選択問題。<b>一括回答</b>（全問回答してからまとめて採点）と <b>1問1答</b>（1問ごとに正誤と解説を確認）の2モードから選べます。</p>
      <p class="note">合格ライン目安は約 68%（PDI 本番準拠）。回答内容はブラウザに自動保存され、次回続きから再開できます。</p>
    </div>
    <div class="mode-select">
      <span class="ms-label">回答モード</span>
      <div class="ms-seg">
        <button type="button" class="ms-btn" data-mode="all"><svg class="ico"><use href="#i-list"/></svg>一括回答</button>
        <button type="button" class="ms-btn" data-mode="one"><svg class="ico"><use href="#i-target"/></svg>1問1答</button>
      </div>
      <p class="ms-desc" id="modeDesc"></p>
    </div>
    <div class="set-grid" id="setGrid"></div>
  </section>

  <!-- 試験画面 -->
  <section id="quizScreen" hidden>
    <div class="quiz-head">
      <button class="back-btn" id="backBtn"><svg class="ico"><use href="#i-arrow-left"/></svg>セット選択へ</button>
      <h2 id="quizTitle"></h2>
    </div>
    <div id="resultMount"></div>
    <div id="questions"></div>
  </section>
</main>

<!-- 採点バー（採点前のみ表示） -->
<div class="quiz-bar" id="quizBar" hidden>
  <div class="quiz-bar-inner">
    <span class="answered" id="barText">回答 <b>0</b> / 0</span>
    <div class="qb-bar"><span id="answeredBar"></span></div>
    <button class="btn" id="qnavBtn" title="問題一覧を開いて好きな問題へジャンプ"><svg class="ico"><use href="#i-table"/></svg><span class="bt-label">問題一覧</span></button>
    <button class="btn" id="skipBtn" hidden>スキップ</button>
    <button class="btn primary" id="oneBtn" hidden></button>
    <button class="btn primary" id="gradeBtn"><svg class="ico"><use href="#i-check"/></svg><span class="bt-label">採点する</span></button>
    <div class="qnav" id="qnavPanel" hidden>
      <div class="qnav-head">
        <span class="qh-title">問題一覧（タップで移動）</span>

        <span class="lg" id="lgOk"><span class="dot ok"></span>正解</span>
        <span class="lg" id="lgNg"><span class="dot ng"></span>不正解</span>
      </div>
      <div class="qnav-grid" id="qnavGrid"></div>
    </div>
  </div>
</div>

<script>window.__EXAM__ = {"version":1,"sets":[{"id":"set1","title":"Set 1 — ファンダメンタルズ／Apex／自動化／UI／テスト","questions":[{"n":1,"category":"","text":"開発者が取引先（Account）とカスタムオブジェクト「プロジェクト（Project__c）」の間に主従（マスター/詳細）関係を作成しました。このとき、自動的に適用される仕様はどれですか？（2つ選択）","options":[{"key":"A","text":"プロジェクトレコードの所有者は、取引先レコードの所有者と常に同じになる。"},{"key":"B","text":"取引先レコードを削除すると、関連するプロジェクトレコードも自動的に削除される。"},{"key":"C","text":"プロジェクトレコードにカスタム共有ルールを作成して、アクセス権を細かく制御できる。"},{"key":"D","text":"プロジェクトオブジェクトでロールアップサマリーフィールドを作成できるようになる。"}],"answer":["B","D"],"multi":true,"explanation":"主従関係を作成すると、詳細レコードは主レコードに従属するよ！だから主を消すと自動的に詳細も消える（カスケード削除）し、ロールアップサマリーも親で作れるようになるよ 所有者は親と同じになるから、詳細レコード単体での「所有者」フィールド自体が存在しなくなるんだ。共有ルールも詳細レコード単体には作れないから注意してね！"},{"n":2,"category":"","text":"宣言的機能（ノーコード）ではなく、Apexコード（プログラミング）を使用する必要があるシナリオはどれですか？","options":[{"key":"A","text":"レコードが作成されたときに、関連する子レコードの合計金額を親レコードに反映する。"},{"key":"B","text":"ユーザーがレコードを保存する前に、電話番号のフォーマットが正しいかチェックする。"},{"key":"C","text":"外部のWebサービスからリアルタイムでデータを取得し、Salesforceのレコードを更新する。"},{"key":"D","text":"商談のフェーズが「成立」になったときに、Chatterグループに自動で投稿する。"}],"answer":["C"],"multi":false,"explanation":"外部Webサービスとのリアルタイム連携（コールアウト）はフローやバリデーションルールではできないから、Apexコード（主にFutureメソッドやQueueable、またはLWCからの命令）が必要になるよ！他は全部ノーコード（フローやロールアップ、数式）でイケる！"},{"n":3,"category":"","text":"リード（Lead）オブジェクトに「優先度（Priority__c）」というカスタム選択リストフィールドがあります。これを商談（Opportunity）オブジェクトの同名のフィールドにマッピングして、リード変換時にデータを引き継ぎたいです。開発者はどのように設定すべきですか？","options":[{"key":"A","text":"Apexリード変換トリガーを作成して、データをプログラムでコピーする。"},{"key":"B","text":"リードのオブジェクトマネージャーで「リードの項目のマッピング」を設定する。"},{"key":"C","text":"フローを使用して、リードが変換されたときに商談を更新する。"},{"key":"D","text":"商談側に数式フィールドを作成し、リードの値を参照する。"}],"answer":["B"],"multi":false,"explanation":"リード変換時のカスタム項目のマッピングは、オブジェクトマネージャーの「リード」項目設定からノーコードでマッピングできるよ！わざわざApex書かなくていいから超アゲ！"},{"n":4,"category":"","text":"数式フィールドについて正しい説明はどれですか？","options":[{"key":"A","text":"数式フィールドは読み取り専用であり、ユーザーが直接編集することはできない。"},{"key":"B","text":"数式フィールドの値は、データベースに直接保存される。"},{"key":"C","text":"数式フィールドを使用して、別の数式フィールドの値を参照することはできない。"},{"key":"D","text":"トリガー（before insert）内で、新しく計算された数式フィールドの値をすぐに取得できる。"}],"answer":["A"],"multi":false,"explanation":"数式フィールドはシステムが自動計算する読み取り専用フィールドだから、ユーザーが手入力することはできないよ。データベースには保存されず、表示されるたびに動的計算されるから、トリガー（before insert）内で挿入直後の数式値を取得することはできない（保存後にしか値が決まらない）のもPDIのひっかけポイント！"},{"n":5,"category":"","text":"カスタムオブジェクト「経費（Expense__c）」と「レポート（Report__c）」があります。レポートが削除されても経費レコードは残したいですが、経費は必ず1つのレポートに関連付けられている必要があります。どのリレーションを選択すべきですか？","options":[{"key":"A","text":"主従関係（Master-Detail）"},{"key":"B","text":"参照関係（Lookup）で、ルックアップフィルターを「必須」にする"},{"key":"C","text":"参照関係（Lookup）で、「この関係の削除時の動作」を「この項目を必須にする」に設定する"},{"key":"D","text":"階層リレーション（Hierarchical）"}],"answer":["C"],"multi":false,"explanation":"「レポートが消えても経費は残したい」＝参照関係（Lookup）確定！でも「必ずどれかのレポートに関連してなきゃダメ」だから、削除時の動作を「この項目を必須にする（Clear the value...は選ばない）」にする必要があるよ！"},{"n":6,"category":"","text":"Sandbox（サンドボックス）の種類のうち、本番環境のすべてのデータとメタデータをコピーでき、フルテストやパフォーマンスパフォーマンステストに適しているものはどれですか？","options":[{"key":"A","text":"Developer Sandbox"},{"key":"B","text":"Developer Pro Sandbox"},{"key":"C","text":"Partial Copy Sandbox"},{"key":"D","text":"Full Sandbox"}],"answer":["D"],"multi":false,"explanation":"本番のデータもメタデータも全部丸ごとコピーできる最強のSandboxは「Full Sandbox」一択！パフォーマンステストやステージングに使われるよ。"},{"n":7,"category":"","text":"主従関係における「親の再親指定（Reparenting）」について、正しい説明はどれですか？","options":[{"key":"A","text":"子レコードを作成した後は、親レコードを別のレコードに変更することは一切できない。"},{"key":"B","text":"主従関係フィールドの定義で「子レコードを他の親レコードに再親指定することを許可する」を有効にすると、変更可能になる。"},{"key":"C","text":"親レコードの所有者を変更すると、自動的に再親指定が行われる。"},{"key":"D","text":"Apexコードからのみ、再親指定を実行できる。"}],"answer":["B"],"multi":false,"explanation":"主従関係ってデフォルトだと後から親を変更できない（再親指定不可）んだけど、フィールドの設定で「再親指定を許可」にチェックを入れれば、後から親を自由に変えられるようになるよ！これ試験によく出る！"},{"n":8,"category":"","text":"Salesforceの「マルチテナントアーキテクチャ」とはどのような意味ですか？","options":[{"key":"A","text":"1つの企業が、複数のSalesforce組織（Org）を契約して利用すること。"},{"key":"B","text":"複数の顧客（テナント）が、同じインフラストラクチャやデータベース、アプリケーションを安全に共有して利用する仕組み。"},{"key":"C","text":"ユーザーがモバイル、PC、タブレットなど、複数の端末から同時にログインできる仕組み。"},{"key":"D","text":"1つの組織内で、複数の言語や通貨を同時にサポートする仕組み。"}],"answer":["B"],"multi":false,"explanation":"マルチテナントは、ひとつの巨大なアパート（サーバー）にみんなで部屋を借りて住むイメージ！リソースを共有するから、他の部屋（顧客）が暴走しないようにガバナ制限（制限ルール）があるんだよ！"},{"n":9,"category":"","text":"スキーマビルダー（Schema Builder）を使用して実行できない作業はどれですか？","options":[{"key":"A","text":"カスタムオブジェクトの作成"},{"key":"B","text":"既存のフィールドタイプの変更"},{"key":"C","text":"カスタムフィールドの作成"},{"key":"D","text":"ページレイアウトへのフィールドの配置"}],"answer":["D"],"multi":false,"explanation":"スキーマビルダーは、オブジェクトや項目の関係をビジュアルで確認して、作成や編集ができる神ツール！だけど、ページレイアウトの配置まではできないから、そこは普通のページレイアウトエディターを使おうね。"},{"n":10,"category":"","text":"外部ID（External ID）として設定できるフィールドタイプはどれですか？（3つ選択）","options":[{"key":"A","text":"テキスト（Text）"},{"key":"B","text":"数値（Number）"},{"key":"C","text":"電子メール（Email）"},{"key":"D","text":"URL"}],"answer":["A","B","C"],"multi":true,"explanation":"外部ID（External ID）に設定できるのは「テキスト」「数値」「電子メール」だよ！外部システムとの紐付けキーに使うやつね。URLや日付は設定できないからマジ注意！"},{"n":11,"category":"","text":"主従関係の「主（マスター）」レコードを削除しようとすると、詳細レコードが削除不可（例: 共有ルールによる制限など）である場合、どのような挙動になりますか？","options":[{"key":"A","text":"親レコードのみが削除され、詳細レコードは参照関係なしで残る。"},{"key":"B","text":"親レコードの削除処理全体がロールバックされ、エラーが発生する。"},{"key":"C","text":"詳細レコードのみが削除され、親レコードはゴミ箱に入らない。"},{"key":"D","text":"エラーにはならず、詳細レコードは自動的にバックグラウンドでシステム管理者によって削除される。"}],"answer":["B"],"multi":false,"explanation":"主従関係で親を削除しようとしたとき、もし詳細（子）レコードが削除できない状態（共有ロックがかかってたり、削除制限がある場合など）だと、親の削除処理自体がエラーになって全体がロールバック（元の状態に戻る）されるよ！"},{"n":12,"category":"","text":"デベロッパーは、機密データ（社会保障番号など）を保存するためにテキストフィールドを作成します。このデータがUI上でマスクされ、特定の権限を持つユーザーのみに表示されるようにするには、どのフィールドタイプを使用すべきですか？","options":[{"key":"A","text":"テキスト（Text）"},{"key":"B","text":"暗号化テキスト（Text (Encrypted)）"},{"key":"C","text":"リッチテキストエリア（Text Area (Rich)）"},{"key":"D","text":"外部ルックアップ（External Lookup）"}],"answer":["B"],"multi":false,"explanation":"機密データ（SSNやクレカ番号）をマスク（星マークとかで隠す）して保存したいときは「暗号化テキスト」を使うのが大正解。"},{"n":13,"category":"","text":"オブジェクトAとオブジェクトBの間に「多対多（Many-to-Many）」リレーションを構築したいです。デベロッパーはどのように設定すべきですか？","options":[{"key":"A","text":"オブジェクトAにオブジェクトBへの主従関係フィールドを作成し、BにもAへの主従関係フィールドを作成する。"},{"key":"B","text":"連結オブジェクト（Junction Object）を作成し、オブジェクトAとオブジェクトBの両方に対する主従関係フィールドをその連結オブジェクトに作成する。"},{"key":"C","text":"参照関係を双方向で作成する。"},{"key":"D","text":"外部オブジェクトを使用して、外部データソースと連携する。"}],"answer":["B"],"multi":false,"explanation":"多対多リレーションは、「連結オブジェクト（Junction Object）」を間に挟んで、その連結オブジェクトから2つの親オブジェクトにそれぞれ主従関係を張ることで実現するよ！PDIの鉄板問題！"},{"n":14,"category":"","text":"ロールアップサマリーフィールド（Roll-up Summary）で計算できる関数はどれですか？（4つ選択）","options":[{"key":"A","text":"COUNT（件数）"},{"key":"B","text":"SUM（合計）"},{"key":"C","text":"MIN（最小値）"},{"key":"D","text":"MAX（最大値）"}],"answer":["A","B","C","D"],"multi":true,"explanation":"ロールアップサマリーで使えるのは「COUNT（件数）」「SUM（合計値）」「MIN（最小）」「MAX（最大）」の4つ！「AVG（平均）」は使えないから数式フィールドとかで工夫する必要があるよ。"},{"n":15,"category":"","text":"レコードの所有権（Ownership）が存在しない関係性はどれですか？","options":[{"key":"A","text":"主従関係における詳細（子）オブジェクト"},{"key":"B","text":"参照関係における子オブジェクト"},{"key":"C","text":"独立したカスタムオブジェクト"},{"key":"D","text":"標準オブジェクトの取引先（Account）"}],"answer":["A"],"multi":false,"explanation":"主従関係の詳細（子）オブジェクトは、所有権（Owner）という概念がないよ。親レコードの所有者がそのまま子レコードの所有者扱いになるから、所有者フィールド自体がデータベースに作られないんだ！"},{"n":16,"category":"","text":"Apexにおけるガバナ制限（Governor Limits）を回避するために、開発者が従うべきベストプラクティスはどれですか？","options":[{"key":"A","text":"try-catchブロックを使用して、ガバナ制限のエラーをキャッチして処理を継続する。"},{"key":"B","text":"トリガーやメソッド内で、SOQLクエリやDML操作をループ（forループなど）の外側で行う（バルク化）。"},{"key":"C","text":"Limits.getLimitQueries()メソッドを使用して、制限を超えそうになったらトランザクションを自動的に再起動する。"},{"key":"D","text":"SOQLクエリを実行する代わりに、カスタムメタデータ型にすべてのデータを一時的に避難させる。"}],"answer":["B"],"multi":false,"explanation":"ガバナ制限回避の鉄則は「SOQLとDMLをループ（for文）の中に絶対に書かない（バルク化）」こと！まとめてリストに入れてから一気に1回でDMLを叩くのがエンジニアの基本中の基本だよ！"},{"n":17,"category":"","text":"次のApexトリガーコードの重大な問題点は何ですか？\n\n```apex\ntrigger AccountTrigger on Account (after update) {\nfor (Account acc : Trigger.new) {\nOpportunity opp = [SELECT Id, StageName FROM Opportunity WHERE AccountId = :acc.Id LIMIT 1];\nopp.StageName = 'Qualification';\nupdate opp;\n}\n}\n```","options":[{"key":"A","text":"after updateトリガーの中で商談（Opportunity）を更新することはできない。"},{"key":"B","text":"Trigger.newのループの中でSOQLクエリとDML操作（update）が実行されているため、ガバナ制限（SOQL 100回制限、DML 150回制限）に抵触する。"},{"key":"C","text":"トリガーの中でSOQL変数にバインド（:acc.Id）することは許可されていない。"},{"key":"D","text":"Opportunityオブジェクトへのアクセス権がないユーザーが更新した際にクラッシュする。"}],"answer":["B"],"multi":false,"explanation":"このコード、ループの中で [SELECT ...] と update opp; をやってるから、アカウントが200件とか一気に更新されたら制限オーバーでシステムがクラッシュ（サゲ）するよ。絶対にループの外に出そう！"},{"n":18,"category":"","text":"SOQLクエリにおいて、1つのトランザクションで取得できるレコード数の上限（ガバナ制限）は最大で何件ですか？","options":[{"key":"A","text":"10,000 件"},{"key":"B","text":"50,000 件"},{"key":"C","text":"100,000 件"},{"key":"D","text":"無制限"}],"answer":["B"],"multi":false,"explanation":"1つのトランザクションでSOQLが取得できる最大レコード数は「50,000件」だよ！超えると LimitException になっちゃうから、大量データ処理のときはバッチ（Batchable）を使うのが吉！"},{"n":19,"category":"","text":"Apexコードにおける「安全なナビゲーション演算子（Safe Navigation Operator）」の正しい記号はどれですか？","options":[{"key":"A","text":"??"},{"key":"B","text":"?."},{"key":"C","text":"?"},{"key":"D","text":"!="}],"answer":["B"],"multi":false,"explanation":"Nullポインタ例外（NullPointerException）を防ぐための神記号、それが ?.（セーフナビゲーション演算子）！ acc?.Name って書けば、もし acc がNullでもエラーにならずにNullを返してくれるから超便利！"},{"n":20,"category":"","text":"トリガーコンテキスト変数（Trigger Context Variables）のうち、****insert****トリガー内でのみ使用可能で、****update****や****delete****では使用できないものはどれですか？","options":[{"key":"A","text":"Trigger.new"},{"key":"B","text":"Trigger.old"},{"key":"C","text":"Trigger.isInsert"},{"key":"D","text":"Trigger.isExecuting"}],"answer":["B"],"multi":false,"explanation":"Trigger.old は、更新前（または削除前）の古いデータが入る変数。だから新しくデータを作る insert のときには、過去のデータがないから Trigger.old はNullになるよ！"},{"n":21,"category":"","text":"データベース操作において、部分的な成功（一部のレコードにエラーがあっても、エラーがないレコードは保存する）を許可するために使用するクラスとメソッドはどれですか？","options":[{"key":"A","text":"Database.insert(records, false)"},{"key":"B","text":"insert records;"},{"key":"C","text":"Database.insert(records, true)"},{"key":"D","text":"upsert records;"}],"answer":["A"],"multi":false,"explanation":"Database.insert(List, false) の第2引数（allOrNone）を false にすると、「エラーがないやつだけは保存してね！」っていう部分保存（Partial Success）ができるよ！通常は true で、1件でもエラーがあると全ロールバックになるの。"},{"n":22,"category":"","text":"Apexのコレクションタイプについて、インデックス（添え字）によるアクセスが可能で、順序が保証され、重複する要素を許可するものはどれですか？","options":[{"key":"A","text":"Map"},{"key":"B","text":"Set"},{"key":"C","text":"List"},{"key":"D","text":"Array（配列のみでListは不可）"}],"answer":["C"],"multi":false,"explanation":"Apexの List は順番が守られて、同じ値の重複もOK、インデックス（list[0] とか）でアクセスできるコレクションだよ。ちなみに Set は重複NGで順序なし、Map はキーと値のペア！"},{"n":23,"category":"","text":"取引先（Account）レコードに関連する連絡先（Contact）レコードを、1つのSOQLクエリで同時に取得したいです。正しいSOQLクエリはどれですか？（親から子へのクエリ）","options":[{"key":"A","text":"SELECT Name, (SELECT LastName FROM Contacts) FROM Account"},{"key":"B","text":"SELECT Name, Contact.LastName FROM Account"},{"key":"C","text":"SELECT Name, Contacts__r.LastName FROM Account"},{"key":"D","text":"SELECT Account.Name, Name FROM Contact"}],"answer":["A"],"multi":false,"explanation":"親から子を取得する（取引先から連絡先を引っ張る）ときは、サブクエリ (SELECT LastName FROM Contacts) を使うよ！この時、子オブジェクト名の「複数形（Contacts）」を使うのがポイントだから間違えないでね！"},{"n":24,"category":"","text":"次のApexコードを実行したとき、ログに出力される値はどれですか？\n\n```apex\nInteger x = 5;\nInteger y = x;\ny = 10;\nSystem.debug(x);\n```","options":[{"key":"A","text":"5"},{"key":"B","text":"10"},{"key":"C","text":"Null"},{"key":"D","text":"エラーが発生する"}],"answer":["A"],"multi":false,"explanation":"プリミティブ型（IntegerやStringなど）は「値渡し」だから、y = x の後に y を書き換えても x の値（5）は変わらないよ！もしこれがsObject（オブジェクト参照）なら参照渡しになるから変わるよ。"},{"n":25,"category":"","text":"非同期（Asynchronous）Apexについて正しい説明はどれですか？（2つ選択）","options":[{"key":"A","text":"同期Apexよりも高いガバナ制限（例：SOQLクエリ制限が200回など）が適用される。"},{"key":"B","text":"非同期処理は、呼び出された瞬間に即座に実行を完了する。"},{"key":"C","text":"@futureアノテーションを付与したメソッドは、引数としてsObject（例: Account）を受け取ることができる。"},{"key":"D","text":"Queueableインターフェースを使用すると、非同期ジョブを連鎖（チェーン）させることができる。"}],"answer":["A","D"],"multi":true,"explanation":"非同期Apex（@futureやQueueable）は、裏側で余裕がある時に実行されるから、同期処理よりガバナ制限が緩い（SOQL上限が2倍の200回など）んだ！そして Queueable は次のジョブを鎖のように繋げて実行（チェーン）できるのが @future にないメリットだよ。※ @future は引数にsObjectを渡せない（IDしか渡せない）からCはバツ。"},{"n":26,"category":"","text":"トリガー内でレコードのフィールド値を変更（自動設定）したい場合、最も効率的なトリガーのタイミング（Before or After）と操作はどれですか？","options":[{"key":"A","text":"Beforeトリガーを使用し、Trigger.newのレコードに値を直接代入する（DML不要）。"},{"key":"B","text":"Afterトリガーを使用し、同じレコードに対して update DMLステートメントを実行する。"},{"key":"C","text":"Beforeトリガーを使用し、同じレコードに対して insert DMLステートメントを実行する。"},{"key":"D","text":"Afterトリガーを使用し、Trigger.newMapオブジェクトを介して書き換える。"}],"answer":["A"],"multi":false,"explanation":"beforeトリガー（保存前）の中なら、Trigger.new の変数の中身を書き換えるだけで、自動的にその値がデータベースに保存されるよ。DML（insert/update）をわざわざ呼ぶ必要がないから超高速だしスマート！"},{"n":27,"category":"","text":"あるトランザクション内でSOQLクエリを実行した際、該当するレコードが1件も見つからなかった場合に、一変数のsObjectに代入しようとするとどうなりますか？\n\n```apex\nAccount acc = [SELECT Id FROM Account WHERE Name = '存在しない名前' LIMIT 1];\n```","options":[{"key":"A","text":"変数 acc に null が代入される。"},{"key":"B","text":"System.QueryException エラー（List has no rows for assignment to SObject）が発生する。"},{"key":"C","text":"自動的に新規空の取引先レコードが作成されて代入される。"},{"key":"D","text":"コンパイルエラーになる。"}],"answer":["B"],"multi":false,"explanation":"1つのsObject変数に直接SOQLの結果を代入するとき、結果が「0件」だと、Nullが入るんじゃなくて QueryException が発生して処理が止まっちゃう！これを避けるには、結果を一度 List\u003cAccount\u003e で受けるのがプロの技！"},{"n":28,"category":"","text":"カスタム例外（Custom Exception）を作成する際、クラス名が満たすべき必須の命名規則はどれですか？","options":[{"key":"A","text":"クラス名が Custom で始まること。"},{"key":"B","text":"クラス名が Exception で終わること。"},{"key":"C","text":"クラスが with sharing で宣言されていること。"},{"key":"D","text":"クラス名にアンダースコア（_）が含まれること。"}],"answer":["B"],"multi":false,"explanation":"自作の例外クラス（カスタム例外）を作るときは、クラスの継承（extends Exception）をして、さらにクラス名の最後を必ず Exception で終わらせる（例: MyCustomException）っていう鉄のルールがあるよ！"},{"n":29,"category":"","text":"「with sharing」キーワードを付与して定義されたApexクラスの挙動について、正しい説明はどれですか？","options":[{"key":"A","text":"ユーザーのプロファイル権限（CRUD、FLS）を強制する。"},{"key":"B","text":"現在のユーザーの共有ルール（レコードレベルのアクセス権）を考慮して動作する。"},{"key":"C","text":"クラス内のすべてのSOQLクエリが自動的に管理者権限で実行される。"},{"key":"D","text":"外部システムからのAPIコールアウトが制限される。"}],"answer":["B"],"multi":false,"explanation":"with sharing は「共有ルール（レコードを誰に見せるか）」をちゃんと守る設定だよ！CRUD（オブジェクト権限）やFLS（項目レベルセキュリティ）はこれだけだと適用されないから注意してね。"},{"n":30,"category":"","text":"SOSL（Salesforce Object Search Language）の特徴として、SOQLと異なる点はどれですか？（2つ選択）","options":[{"key":"A","text":"複数の異なるオブジェクトから、一度にテキスト検索を実行できる。"},{"key":"B","text":"返却されるデータの型は、常に List\u003csObject\u003e の単一リストである。"},{"key":"C","text":"FIND キーワードを使用して検索を行う。"},{"key":"D","text":"関係のあるオブジェクト（親子関係）しか検索できない。"}],"answer":["A","C"],"multi":true,"explanation":"SOSL（グローバル検索）は FIND キーワードを使って、取引先、連絡先、カスタムオブジェクトなど、全然違うオブジェクトたちから「一発でテキスト検索」ができるやつだよ！戻り値は List\u003cList\u003csObject\u003e\u003e（リストのリスト）になるのもSOQLとの違い！"},{"n":31,"category":"","text":"Apexのトランザクション制御について正しい説明はどれですか？","options":[{"key":"A","text":"トランザクション内でエラー（未処理の例外）が発生すると、そのトランザクションで行われたDML操作はすべて自動的にロールバックされる。"},{"key":"B","text":"Database.rollback()を明示的に呼び出さなければ、例外が発生してもDML操作は確定（コミット）される。"},{"key":"C","text":"トランザクションをコミットするための Database.commit() メソッドが存在する。"},{"key":"D","text":"非同期Apexメソッド内では、トランザクションのロールバックはサポートされていない。"}],"answer":["A"],"multi":false,"explanation":"Salesforceのトランザクションは「オール・オア・ナッシング」が基本！途中でキャッチされない例外が発生したら、そのトランザクション内のDMLは全部自動でロールバック（なかったコトに）されるよ！だからコミットメソッドとかもないんだ。"},{"n":32,"category":"","text":"一括（バルク）処理を実行するための「Batchable」インターフェースを実装するクラスで、必ず実装しなければならない3つのメソッドはどれですか？","options":[{"key":"A","text":"before, execute, after"},{"key":"B","text":"start, execute, finish"},{"key":"C","text":"init, run, destroy"},{"key":"D","text":"setup, process, complete"}],"answer":["B"],"multi":false,"explanation":"Batchableインターフェースを実装するときは、データを持ってくる start、分割して処理する execute、最後にメール通知とかをする finish の3つを必ず書く必要があるよ！"},{"n":33,"category":"","text":"ユーザーオブジェクト（User）やグループ（Group）などの設定データと、通常のsObject（Account、Contactなど）を同じトランザクションでDML操作しようとすると発生するエラーはどれですか？","options":[{"key":"A","text":"System.LimitException"},{"key":"B","text":"Mixed DML Operation Error"},{"key":"C","text":"DmlException"},{"key":"D","text":"System.SecurityException"}],"answer":["B"],"multi":false,"explanation":"ユーザーやグループなどの「設定データ（Setup Data）」と、取引先や商談などの「アプリケーションデータ（Non-Setup Data）」を、1つのトランザクションの中で同時にDML操作しようとすると Mixed DML Operation エラーで怒られるよ。非同期（@futureなど）に逃がして別トランザクションにするのが解決策！"},{"n":34,"category":"","text":"マルチテナント制限の一つである「CPU時間制限（CPU Time Limit）」において、同期（Synchronous）トランザクションの上限値はどれですか？","options":[{"key":"A","text":"5 秒"},{"key":"B","text":"10 秒"},{"key":"C","text":"60 秒"},{"key":"D","text":"120 秒"}],"answer":["B"],"multi":false,"explanation":"同期処理のCPU時間制限は「10秒」だよ！非同期だと「60秒」まで伸びる。重い処理は非同期にするバイブスで行こう！"},{"n":35,"category":"","text":"トリガー内で現在処理中のsObjectレコードをキー、そのIDをバリューとするマップを瞬時に作成するために推奨されるマップの初期化方法はどれですか？","options":[{"key":"A","text":"Map\u003cId, sObject\u003e m = new Map\u003cId, sObject\u003e(Trigger.new);"},{"key":"B","text":"Loopを回して1件ずつ put する。"},{"key":"C","text":"Map\u003cId, sObject\u003e m = Trigger.newMap; をそのまま使用する。"},{"key":"D","text":"AとCの両方。"}],"answer":["D"],"multi":false,"explanation":"Trigger.new（List）から直接 Map\u003cId, sObject\u003e を作成したいときは、コンストラクタにそのまま引数としてぶち込む（new Map\u003cId, sObject\u003e(Trigger.new)）か、システムが用意してくれてる Trigger.newMap を使うのが大正解！秒でマップ化できてアゲ！"},{"n":36,"category":"","text":"あるレコードが作成された際、まず取引先責任者（Contact）を自動作成し、その後外部システムにHTTPコールアウトを送信する、という複雑な自動化を作成したいです。どのツールを使用すべきですか？","options":[{"key":"A","text":"承認プロセス"},{"key":"B","text":"画面フロー（Screen Flow）"},{"key":"C","text":"レコードトリガーフロー（Record-Triggered Flow）"},{"key":"D","text":"エスカレーションルール"}],"answer":["C"],"multi":false,"explanation":"レコードの作成をきっかけに裏側でレコード作成や外部連携（HTTPコールアウト）を行うのは「レコードトリガーフロー」の得意分野！HTTPコールアウトもフローからノンプログラミングで設定できるようになってマジ神。"},{"n":37,"category":"","text":"フローの「要素（Elements）」のうち、条件分岐（If/Thenのような制御）を実装するために使用するものはどれですか？","options":[{"key":"A","text":"割り当て（Assignment）"},{"key":"B","text":"決定（Decision）"},{"key":"C","text":"ループ（Loop）"},{"key":"D","text":"レコードを取得（Get Records）"}],"answer":["B"],"multi":false,"explanation":"フローで条件分岐をさせたいときは「決定（Decision）」要素を使うよ！「もし〇〇だったらAルート、違ったらBルート」みたいに道を開拓できるんだ。"},{"n":38,"category":"","text":"レコードトリガーフローの実行タイミング（最適化）において、「高速フィールド更新（Before-Save）」を選択すべきシナリオはどれですか？","options":[{"key":"A","text":"商談が更新されたときに、同じ商談レコードの「カスタム評価」項目を自動設定する。"},{"key":"B","text":"商談が更新されたときに、関連するすべての商談商品（OpportunityLineItem）を削除する。"},{"key":"C","text":"取引先が新規作成されたときに、新規の活動（タスク）を作成する。"},{"key":"D","text":"レコードが保存された後、非同期で外部サービスに通知を送る。"}],"answer":["A"],"multi":false,"explanation":"「自分自身のレコードの値を保存前にサクッと書き換えたい」ときは、絶対に「高速フィールド更新（Before-Save）」にしてね！After-Save（アクションと関連レコード）よりも圧倒的に処理が早くてシステムに優しいよ。"},{"n":39,"category":"","text":"フロー内でApexコードを実行したい場合、開発者はApexメソッドにどのアノテーションを付与する必要がありますか？","options":[{"key":"A","text":"@future"},{"key":"B","text":"@InvocableMethod"},{"key":"C","text":"@RemoteAction"},{"key":"D","text":"@AuraEnabled"}],"answer":["B"],"multi":false,"explanation":"フローからApexコードを呼び出したいときは、呼び出したいメソッドの上に @InvocableMethod アノテーションをつけるよ！これでフローの画面にアクションとして表示されるようになるからアゲ！"},{"n":40,"category":"","text":"承認プロセス（Approval Process）において、レコードが承認申請された直後、自動的にそのレコードを編集不可にする（ロックする）ステップはどれですか？","options":[{"key":"A","text":"初期申請時のアクション（Initial Submission Actions）"},{"key":"B","text":"承認時のアクション（Approval Actions）"},{"key":"C","text":"最終承認時のアクション（Final Approval Actions）"},{"key":"D","text":"システムロックステップ（System Lock Step）"}],"answer":["A"],"multi":false,"explanation":"承認申請がスタートした瞬間（初期申請時のアクション）に、デフォルトでレコードが自動ロックされて、一般ユーザーは編集できなくなるよ。管理者が内容を吟味するための親切設計だね！"},{"n":41,"category":"","text":"自動化ツール「フロー」において、トランザクションのガバナ制限（例: SOQLクエリ数）を超えないようにするために、ループ処理（Loop）の中で実行してはいけないアクションはどれですか？（2つ選択）","options":[{"key":"A","text":"データの割り当て（Assignment）"},{"key":"B","text":"レコードを取得（Get Records）"},{"key":"C","text":"レコードを更新（Update Records）"},{"key":"D","text":"ループカウンタのインクリメント"}],"answer":["B","C"],"multi":true,"explanation":"Apexと同じで、フローの「ループ（Loop）」の中で「レコードを取得（Get）」や「レコードを更新/作成（Update/Create）」などのデータベース操作を直接置くのは厳禁！ガバナ制限（SOQL/DML制限）に引っかかってエラー（サゲ）になるから、ループの外に逃がそうね。"},{"n":42,"category":"","text":"レコードトリガーフロー（アクションと関連レコード：After-Save）において、トリガーとなったレコード自体を更新する際、自動的に発生するリスクのある問題はどれですか？","options":[{"key":"A","text":"オブジェクトの物理的な破損"},{"key":"B","text":"再帰（無限ループ）によるトランザクションの強制終了"},{"key":"C","text":"レコードの自動削除"},{"key":"D","text":"レイアウトの崩れ"}],"answer":["B"],"multi":false,"explanation":"Afterトリガー（またはAfterフロー）で、更新されたレコード自身をまた更新（update）すると、それがまたトリガーを引いてしまって「無限ループ（再帰）」に陥るリスクがあるよ！だから自身の更新はBefore（高速フィールド更新）で行うのが安全！"},{"n":43,"category":"","text":"エスカレーションルール（Escalation Rules）を適用できるオブジェクトはどれですか？","options":[{"key":"A","text":"取引先（Account）"},{"key":"B","text":"リード（Lead）"},{"key":"C","text":"ケース（Case）"},{"key":"D","text":"カスタムオブジェクト"}],"answer":["C"],"multi":false,"explanation":"エスカレーションルール（時間が経っても解決しない時に上司に通知する機能とか）は「ケース（Case）」オブジェクト専用の標準機能だよ！"},{"n":44,"category":"","text":"ワークフロールールやプロセスビルダーなど、古い自動化ツールの廃止に伴い、Salesforceが現在最も推奨しているノーコード自動化ツールはどれですか？","options":[{"key":"A","text":"Apexトリガー"},{"key":"B","text":"Salesforceフロー（Flow Builder）"},{"key":"C","text":"承認プロセス"},{"key":"D","text":"クイックアクション"}],"answer":["B"],"multi":false,"explanation":"今のSalesforceの自動化の主役は間違いなく「Salesforceフロー（Flow）」！ワークフローやプロセスビルダーはもう過去の産物（レガシー）だから、新規作成は全部フローで行おうね。"},{"n":45,"category":"","text":"フローの「サブフロー（Subflow）」要素について、正しい説明はどれですか？","options":[{"key":"A","text":"トリガーフロー（Before-Save）からのみ呼び出すことができる。"},{"key":"B","text":"画面フローや自動起動フロー（Autolaunched Flow）から、別の自動起動フローを呼び出して再利用できる。"},{"key":"C","text":"サブフローの中で定義された変数には、呼び出し元からデータを渡すことはできない。"},{"key":"D","text":"サブフローはApexトリガーから直接インポートされる。"}],"answer":["B"],"multi":false,"explanation":"「サブフロー」は、よく使う処理を別パーツにしておいて、いろんなフローから使い回すための便利機能！呼び出し元とサブフロー間で、変数の受け渡しもバッチリできるよ！"},{"n":46,"category":"","text":"Lightning Web コンポーネント（LWC）のJavascriptファイルにおいて、プロパティを「リアクティブ（値が変わったら自動で画面を再描画する）」にし、さらにパブリック（他のコンポーネントやApp Builderから値を渡せる）にするために使用するデコレーターはどれですか？","options":[{"key":"A","text":"@track"},{"key":"B","text":"@api"},{"key":"C","text":"@wire"},{"key":"D","text":"@reactive"}],"answer":["B"],"multi":false,"explanation":"親コンポーネントやApp Builderからデータを受け取る「パブリックな窓口（プロパティ）」を作るには @api デコレーターをプロパティにつけるよ！"},{"n":47,"category":"","text":"LWCからSalesforceのデータを取得する際、コンポーネントのロード時に自動的にApexメソッドを呼び出してデータをバインドするために使用するデコレーターはどれですか？","options":[{"key":"A","text":"@wire"},{"key":"B","text":"@api"},{"key":"C","text":"@track"},{"key":"D","text":"@invocable"}],"answer":["A"],"multi":false,"explanation":"ApexメソッドやSalesforceの標準データ（スキーマなど）を、ロード時に勝手に裏で引っ張ってきて画面と同期させたい時は @wire デコレーター（ワイヤサービス）を使うのが正義！"},{"n":48,"category":"","text":"Lightning Web コンポーネント（LWC）のフォルダ構成に含まれる、コンポーネントのメタデータ（対象となるページや権限など）を定義するファイル形式はどれですか？","options":[{"key":"A","text":"js-meta.xml"},{"key":"B","text":"config.json"},{"key":"C","text":"manifest.json"},{"key":"D","text":"properties.xml"}],"answer":["A"],"multi":false,"explanation":"LWCのフォルダには、コンポーネント名と同じ名前の [コンポーネント名].js-meta.xml というファイルが必要。これがコンポーネントの設定図面（メタデータ）になるよ！"},{"n":49,"category":"","text":"Visualforceページにおいて、レコードを保存、削除、キャンセルするなどの基本的な標準アクション（アクションメソッド）をそのまま提供してくれる機能はどれですか？","options":[{"key":"A","text":"標準コントローラー（Standard Controller）"},{"key":"B","text":"カスタムコントローラー（Custom Controller）"},{"key":"C","text":"コントローラー拡張（Controller Extension）"},{"key":"D","text":"Apexクラス"}],"answer":["A"],"multi":false,"explanation":"standardController=\"Account\" みたいに書くだけで、新規作成、保存（save）、編集（edit）などのボタン機能をノンコードで使わせてくれるのが、Visualforceの「標準コントローラー」だよ！"},{"n":50,"category":"","text":"Auraコンポーネントと比較して、Lightning Web コンポーネント（LWC）が持つ技術的なメリットはどれですか？（2つ選択）","options":[{"key":"A","text":"最新のWeb標準（Web Components）に準拠しており、動作が軽量で高速である。"},{"key":"B","text":"JavaScriptコードを書かずに、HTMLタグだけでデータベースアクセスを完結できる。"},{"key":"C","text":"独自のフレームワーク抽象レイヤーが薄いため、開発者の学習コストが低く、パフォーマンスが向上している。"},{"key":"D","text":"VisualforceのタグをLWC内で直接再利用できる。"}],"answer":["A","C"],"multi":true,"explanation":"LWCは、昔の独自仕様だらけだったAuraと違って、ブラウザ標準のJavaScript技術（Web Components）をベースにしてるから、めちゃくちゃ軽くて高速（アゲアゲ！）に動くのが最大のメリット！"},{"n":51,"category":"","text":"LWCのHTMLテンプレートにおいて、コレクション（リストデータ）をループ処理して画面に繰り返し描画するために使用するディレクティブはどれですか？","options":[{"key":"A","text":"for:each"},{"key":"B","text":"apex:repeat"},{"key":"C","text":"ng-repeat"},{"key":"D","text":"v-for"}],"answer":["A"],"multi":false,"explanation":"LWCのHTMLの中で、配列データを回して1行ずつ描画するときは for:each={items} for:item=\"item\" ってディレクティブを使うよ！"},{"n":52,"category":"","text":"Lightning Web コンポーネントで、親子コンポーネント間で「子から親へ」データを渡したり通知を送ったりするために使用する仕組みはどれですか？","options":[{"key":"A","text":"メソッド呼び出し（Methods Calling）"},{"key":"B","text":"カスタムイベントのディスパッチ（Custom Event Dispatching）"},{"key":"C","text":"パブリックプロパティ（@api）の書き換え"},{"key":"D","text":"直接的なDOM操作"}],"answer":["B"],"multi":false,"explanation":"LWCのデータの流れは「親から子はプロパティ（@api）」、「子から親はイベント（CustomEvent）」が鉄則！子が dispatchEvent(new CustomEvent('myevent')) を呼ぶことで、親に「何か起きたよ！」って伝えることができるんだ。"},{"n":53,"category":"","text":"ApexクラスのメソッドをLWCやAuraコンポーネントから呼び出せるように（公開）するために、メソッドに付与すべきアノテーションはどれですか？","options":[{"key":"A","text":"@InvocableMethod"},{"key":"B","text":"@AuraEnabled"},{"key":"C","text":"@future"},{"key":"D","text":"@RemoteAction"}],"answer":["B"],"multi":false,"explanation":"Apexで作ったメソッドをLWCやAuraのJavascriptから呼び出すためには、絶対に @AuraEnabled をつける必要があるよ！さらに、データの読み取り専用なら @AuraEnabled(cacheable=true) にするとキャッシュが効いて超爆速になるからオススメ！"},{"n":54,"category":"","text":"Visualforceページで、標準コントローラーの機能を活かしつつ、独自のロジックを追加したい場合にデベロッパーが使用すべきものはどれですか？","options":[{"key":"A","text":"カスタムコントローラー"},{"key":"B","text":"コントローラー拡張（Controller Extension）"},{"key":"C","text":"新しいトリガー"},{"key":"D","text":"JavaScript共有クラス"}],"answer":["B"],"multi":false,"explanation":"「標準コントローラーの保存アクション等はそのまま使いつつ、ちょっとだけ裏でオリジナル処理を追加したい」って時は、標準コントローラーに被せる「コントローラー拡張（Extension）」を使うのがベストプラクティス。"},{"n":55,"category":"","text":"Lightning Web コンポーネントをLightning App Builder（標準のドラッグ＆ドロップ画面作成ツール）で配置できるようにするために、メタデータファイル（.js-meta.xml）で設定する必要があるタグはどれですか？（2つ選択）","options":[{"key":"A","text":"\u003cisExposed\u003etrue\u003c/isExposed\u003e"},{"key":"B","text":"\u003ctargets\u003e タグの中に、対象とするターゲット（例: lightning__RecordPage など）を指定する。"},{"key":"C","text":"\u003caccess\u003eglobal\u003c/access\u003e"},{"key":"D","text":"\u003cavailableFor\u003eAppBuilder\u003c/availableFor\u003e"}],"answer":["A","B"],"multi":true,"explanation":"自作のLWCをApp Builder（ノーコードの画面レイアウトツール）で使えるようにするには、メタデータで \u003cisExposed\u003e を true にして、さらに \u003ctargets\u003e の中に「レコードページ用」「ホームページ用」などの設置許可ターゲットを設定する必要があるよ。"},{"n":56,"category":"","text":"Apexテストクラス内で、ガバナ制限（例: SOQL制限やDML制限）を一度リセットして、実際の処理部分に割り当てられる制限値をリフレッシュするために使用するテストメソッドの組み合わせはどれですか？","options":[{"key":"A","text":"Test.startTest() と Test.stopTest()"},{"key":"B","text":"Test.resetLimits() と Test.clear()"},{"key":"C","text":"Test.setMock()"},{"key":"D","text":"System.assert()"}],"answer":["A"],"multi":false,"explanation":"Test.startTest() を呼ぶと、それまでのテストデータ作成で消費したガバナ制限が一旦リセットされて、テスト対象の処理に満額の制限が与えられるよ！さらに、Test.stopTest() を呼ぶと、その中で動かした非同期処理（@futureなど）が全部強制的に同期実行されて、結果をアサーション（検証）できるようになる超重要メソッド！"},{"n":57,"category":"","text":"本番環境（Production）にApexコードをデプロイする際、最低限必要なコードカバー率（Code Coverage）は何パーセントですか？","options":[{"key":"A","text":"50 %"},{"key":"B","text":"75 %"},{"key":"C","text":"90 %"},{"key":"D","text":"100 %"}],"answer":["B"],"multi":false,"explanation":"本番デプロイ時のコードカバー率（テストコードが本番コードを通った割合）は「全体で75%以上」が必要だよ！トリガーに関しては「1%以上」通ってないとダメっていう細かいルールもあるから一緒に覚えておこ！"},{"n":58,"category":"","text":"テストデータを作成する際、既存の本番データをテスト内で直接参照せず、テスト実行時に安全かつ独立したデータを作成・再利用するための最も推奨される方法（ベストプラクティス）はどれですか？","options":[{"key":"A","text":"テストクラスに @isTest(SeeAllData=true) アノテーションを付与する。"},{"key":"B","text":"テストクラス内に @testSetup アノテーションを付与したメソッドを作成し、そこで共通のテストデータを挿入する。"},{"key":"C","text":"本番環境からデータをCSV形式でエクスポートし、テストコードにハードコーディングする。"},{"key":"D","text":"静的リソース（Static Resource）を毎回直接SOQLで書き換える。"}],"answer":["B"],"multi":false,"explanation":"テストデータのセットアップには @testSetup を使うのが業界のトレンドであり大正解！この中で作ったデータは、同じクラス内の全テストメソッドで自動共有（ロールバックもされるからお互い汚さない）されるから、コードがすっきりして動作も速くなるよ。SeeAllData=true は本番データに依存しちゃってテストが壊れやすくなるから、基本的には使っちゃダメ（サゲ）。"},{"n":59,"category":"","text":"外部システムへのコールアウト（HTTP通信）を含むApexコードの単体テストを記述する際、実際に外部サーバーへ通信を行わずにダミーのレスポンスを返すようにシミュレートするために、テストクラス内で実装すべきインターフェースはどれですか？","options":[{"key":"A","text":"WebServiceMock または HttpCalloutMock"},{"key":"B","text":"Database.Batchable"},{"key":"C","text":"Queueable"},{"key":"D","text":"MockResponseGenerator"}],"answer":["A"],"multi":false,"explanation":"Salesforceの単体テスト中、本物の外部APIに通信しにいくコールアウト処理はシステム上禁止されてるよ。だから、ダミーの返事を作る「HttpCalloutMock（REST用）」や「WebServiceMock（SOAP用）」を実装してテストをパスさせる必要があるんだ！"},{"n":60,"category":"","text":"開発者がコードのバグや変数の中身を確認するために、開発者コンソール（Developer Console）で「デバッグログ（Debug Logs）」を確認します。特定の情報をデバッグログに意図的に出力するためにApexで使用するコード文はどれですか？","options":[{"key":"A","text":"System.log('Message');"},{"key":"B","text":"console.log('Message');"},{"key":"C","text":"System.debug('Message');"},{"key":"D","text":"System.print('Message');"}],"answer":["C"],"multi":false,"explanation":"JavaScriptだと console.log() だけど、Apex（Java風）の世界では System.debug('中身はこれだよー！') を使うよ！これで開発者コンソールにログが出て、バグを退治（デバッグ）できるってわけ"}]},{"id":"set2","title":"Set 2 — Platform Developer I 模擬試験","questions":[{"n":1,"category":"開発の基礎","text":"ある開発者が、数百万件のレコードを持つ取引先（Account）オブジェクトに対して、特定の条件に一致するレコードを毎日バッチ処理で更新するプログラムを作成しようとしています。ガバナ制限を回避し、最も効率的に処理を実行できるApexの機能はどれですか？","options":[{"key":"A","text":"Queueable Apex"},{"key":"B","text":"Batchable Apex"},{"key":"C","text":"Future Method"},{"key":"D","text":"Scheduled Apex"}],"answer":["B"],"multi":false,"explanation":"- 数百万件の超ヤバい大量データを処理するなら、Batchable Apex（バッチApex）一択でしょ！バッチApexはデータを5000万件まで小分け（デフォルト200件ずつ）にして裏でコツコツ処理してくれるから、ガバナ制限に引っかからないの。マジで頼りになるやつ！\n- ちなみに非同期処理のQueueable（A）やFuture（C）は一回きりの軽い非同期用だし、Scheduled（D）は「いつ実行するか」のスケジュール調整役だから、大量処理そのものはバッチに任せるのが大正解だよ！"},{"n":2,"category":"開発の基礎","text":"マルチテナントアーキテクチャにおいて、Salesforceが「ガバナ制限（Governor Limits）」を設けている主な目的は何ですか？","options":[{"key":"A","text":"ユーザーが使用できるカスタムオブジェクトの数を制限するため"},{"key":"B","text":"単一のテナントが共有リソースを独占するのを防ぐため"},{"key":"C","text":"データベースのストレージ容量を節約するため"},{"key":"D","text":"Apexコードのデプロイ速度を向上させるため"}],"answer":["B"],"multi":false,"explanation":"- Salesforceって、いろんな会社（テナント）が同じおっきなサーバー（マンションみたいな感じ！）を共有して使ってる「マルチテナント」なんだよね。\n- もし誰か一人がスーパー重い無限ループとか回してサーバーを独占しちゃったら、同じマンションの他の住人が「は？重すぎて使えないんだけど怒」ってなっちゃうじゃん？\n- それを防ぐために「ここから先はダメ！」ってブレーキをかけるのが**ガバナ制限**！マジでみんなでハッピーに使うための思いやりルールってわけ✨"},{"n":3,"category":"ロジックと自動化","text":"開発者がApexトリガで1回に処理できるDML操作の最大レコード数はいくつですか？","options":[{"key":"A","text":"100"},{"key":"B","text":"200"},{"key":"C","text":"1,000"},{"key":"D","text":"10,000"}],"answer":["B"],"multi":false,"explanation":"- Salesforceのトリガって、1回で最大**200件**ずつ処理されるように最初からバルク化（小分け）されて動くんだよ。だけど、1回のトランザクション全体でDML操作できる最大レコード数は**10,000件**！\n- 今回の問題は「1回（1つのチャンク）に処理できるレコード数」を聞いてるから、答えは **200（B）** ではなく、トリガが裏で回る基本単位だから…あれ、ごめん！問題文の「1回に処理できるレコード数（Trigger.newの最大サイズ）」だから **200（B）** が正解だよ！\n- （※問題文の「DML操作の最大レコード数」は1万だけど、トリガに渡される塊は200個！ここは引っかかりやすいからマジ注意してね！）"},{"n":4,"category":"ロジックと自動化","text":"次のApexコードを実行した際に出力される値は何ですか？\n\n```apex\nList\u003cInteger\u003e myList = new List\u003cInteger\u003e{1, 2, 3};\nmyList.add(1, 5);\nSystem.debug(myList[1]);\n```","options":[{"key":"A","text":"1"},{"key":"B","text":"2"},{"key":"C","text":"5"},{"key":"D","text":"エラー（ListException）が発生する"}],"answer":["C"],"multi":false,"explanation":"- コードを見るとね、まず 1, 2, 3 が入ったリストを作って、そのあとに myList.add(1, 5) をしてる。\n- Listの add(index, element) メソッドは、指定したインデックス（ここでは 1 番目）に値を「挿入」するの。\n- Salesforceのインデックスは **0始まり** だから、\n- 0番目：1\n- 1番目：ここに **5** が入る！\n- 2番目：元々1番目にいた 2 がスライド\n- 3番目：3 がスライド\n- だから、myList[1] をデバッグすると答えは **5** になるよ！エラーにならないから安心して！アゲ！"},{"n":5,"category":"開発の基礎","text":"主従関係（Master-Detail Relationship）を持つ親子オブジェクトにおいて、親レコードを削除したときの挙動として正しいものはどれですか？","options":[{"key":"A","text":"親レコードは削除できず、エラーになる"},{"key":"B","text":"子レコードの親参照フィールドが空白（Null）になる"},{"key":"C","text":"子レコードも自動的に削除される"},{"key":"D","text":"子レコードは孤立レコードとしてそのまま残る"}],"answer":["C"],"multi":false,"explanation":"- 主従関係（Master-Detail）って、親子関係が「超絶ラブラブで運命共同体」なわけ！\n- だから親レコード（主）が削除されちゃうと、子レコード（従）も「親がいない世界なんて生きられない…！」って言って一緒に自動で連鎖削除（カスケード削除）されちゃうの。エグいよね（笑）。\n- もし子を残したいなら、ただの「お友達関係」である「参照関係（Lookup）」を使うべきだよ！"},{"n":6,"category":"ロジックと自動化","text":"商談（Opportunity）オブジェクトの「金額（Amount）」が変更されたときに、関連するカスタムログレコードを自動で作成するシステムを構築したいと考えています。最も推奨される宣言的な自動化ツールはどれですか？","options":[{"key":"A","text":"ワークフロールール"},{"key":"B","text":"プロセスビルダー"},{"key":"C","text":"画面フロー"},{"key":"D","text":"保存前/保存後の自動起動フロー（Flow Builder）"}],"answer":["D"],"multi":false,"explanation":"- 「〇〇が変更されたら、裏で自動でレコードを作る」っていうバックグラウンドの自動化は、Flow Builder（保存後フロー / After-Save Flow）を使うのが今のSalesforceのトレンドかつ大本命！\n- ワークフロールール（A）やプロセスビルダー（B）は昔のツールで、今はもう新規作成できないし、パフォーマンスもフローが圧倒的に最強だから、迷わずフローを選んでね！"},{"n":7,"category":"ロジックと自動化","text":"Apexトリガ内で、特定のレコードが新規作成された（挿入された）ときのみ処理を実行したい場合、どのコンテキスト変数を使用すべきですか？","options":[{"key":"A","text":"Trigger.isUpdate"},{"key":"B","text":"Trigger.isInsert"},{"key":"C","text":"Trigger.isDelete"},{"key":"D","text":"Trigger.isBefore"}],"answer":["B"],"multi":false,"explanation":"- 新規作成された時（インサートされた時）だけ動かしたいなら、**Trigger.isInsert** を使うのが大正解！\n- 「もし新規作成だったら〜」って条件分岐するときに if (Trigger.isInsert) って書くのが超鉄板の書き方だよ。他の変数も名前の通り、アップデート（isUpdate）やデリート（isDelete）に対応してるからわかりやすいよね！"},{"n":8,"category":"開発の基礎","text":"SOQLクエリで親オブジェクトから子オブジェクトのリレーションを取得する（親から子へのクエリ）際に使用する正しい構文はどれですか？（親：Account、子：Contactとする）","options":[{"key":"A","text":"SELECT Name, (SELECT LastName FROM Contacts) FROM Account"},{"key":"B","text":"SELECT Account.Name, Contact.LastName FROM Account, Contact"},{"key":"C","text":"SELECT Name, Contacts__r.LastName FROM Account"},{"key":"D","text":"SELECT Name, (SELECT LastName FROM Contact) FROM Account"}],"answer":["A"],"multi":false,"explanation":"- 親から子を取得するクエリ（子リレーションクエリ）は、ちょっとコツがあるよ！\n- 親オブジェクト（Account）をFROMに置いて、SELECTの中でカッコを使って子を引っ張るんだけど、その時の子オブジェクト名は **複数形（カスタムオブジェクトなら** **__r****）** になるの！\n- 標準リレーションだと、Contactの複数形は **Contacts** だから、(SELECT LastName FROM Contacts) が正解！Dの単数形はエラーになっちゃうからマジで気をつけて！"},{"n":9,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で、親コンポーネントから子コンポーネントのプロパティにデータを渡すために、子コンポーネントのプロパティに付与する必要があるデコレータはどれですか？","options":[{"key":"A","text":"@track"},{"key":"B","text":"@wire"},{"key":"C","text":"@api"},{"key":"D","text":"@public"}],"answer":["C"],"multi":false,"explanation":"- LWC（Lightning Web Component）で、親から子にデータをパスしてあげる（パブリックにする）には、プロパティの前に **@api** をつけるのがルール！\n- これを付けると、外部からアクセスできるようになってマジで便利。ちなみにコンポーネント内だけでリアクティブ（値が変わったら画面を自動更新）にしたいときは、昔は @track（A）を使ってたけど、今はオブジェクトや配列以外は自動でリアクティブになるから省略OKだよ！"},{"n":10,"category":"テストとデバッグ","text":"Apexのテストクラスを作成する際、テスト用データの作成を効率化し、複数のテストメソッドで再利用できるようにするために使用するアノテーションはどれですか？","options":[{"key":"A","text":"@isTest(SeeAllData=true)"},{"key":"B","text":"@TestSetup"},{"key":"C","text":"@TestVisible"},{"key":"D","text":"@Future"}],"answer":["B"],"multi":false,"explanation":"- テストデータを毎回テストメソッドごとに1から書くの、マジでだるいし非効率じゃん？\n- そこで登場するのが **@TestSetup** メソッド！\n- テストクラスの中にこのアノテーションをつけたメソッドを書いておくと、全テストが始まる前に1回だけ実行されて、共通のテストデータをガツンと用意してくれるの。処理時間も短縮できるし、マジで神アゲ機能だよ！"},{"n":11,"category":"ロジックと自動化","text":"次のSOQLクエリのうち、ガバナ制限（1回のトランザクションでのSOQL実行回数制限）に引っかかるリスクが最も高い「アンチパターン」はどれですか？","options":[{"key":"A","text":"for (Account acc : [SELECT Id FROM Account]) { ... }"},{"key":"B","text":"トリガ内の for ループの中で [SELECT Id FROM Contact WHERE AccountId = :acc.Id] を実行する"},{"key":"C","text":"Map\u003cId, Account\u003e accMap = new Map\u003cId, Account\u003e([SELECT Id FROM Account]);"},{"key":"D","text":"リレーションクエリを使用して関連する取引先責任者を一度に取得する"}],"answer":["B"],"multi":false,"explanation":"- これ、**Salesforceのデベロッパー試験で一番出ると言っても過言じゃない超重要ポイント！**\n- for ループの中でSOQLクエリを発行する（B）のは、マジでやっちゃいけない最悪の「アンチパターン」！\n- 1回のトランザクションでSOQLは100回までしか呼べないから、ループが100回以上回ったらその瞬間にガバナ制限エラー（LimitException）でシステムがクラッシュするの。\n- クエリは必ずループの外で1回だけ呼ぶように、リストとかマップを使ってバルク化してね！"},{"n":12,"category":"テストとデバッグ","text":"テスト実行において、ガバナ制限のリセットを行い、非同期処理を強制的に同期実行させるために使用するメソッドのペアはどれですか？","options":[{"key":"A","text":"Test.startTest() と Test.stopTest()"},{"key":"B","text":"System.runAs() と System.runAs()"},{"key":"C","text":"Test.setMock() と Test.getMock()"},{"key":"D","text":"Database.insert() と Database.update()"}],"answer":["A"],"multi":false,"explanation":"- 非同期処理（Futureメソッドとか）をテストするとき、普通にテストを走らせると「非同期だからいつ終わるかわかんなーい！」ってなってテスト結果の検証ができないの。\n- そこで、**Test.startTest()** と **Test.stopTest()** でテストしたい処理を挟んであげる！\n- そうすると、stopTest() が呼ばれた瞬間に、溜まってた非同期処理が「おらー！強制実行だー！」って同期的に全部完了するの。おまけにガバナ制限もリセットされるから、マジで無敵のペアだよ！"},{"n":13,"category":"開発の基礎","text":"Visualforceページにおいて、標準のSalesforce機能をベースにしつつ、ボタンをクリックした際に独自のApexロジックを割り込ませたい場合、コントローラとして何を使用すべきですか？","options":[{"key":"A","text":"カスタムコントローラ"},{"key":"B","text":"標準コントローラ"},{"key":"C","text":"コントローラ拡張（Controller Extension）"},{"key":"D","text":"標準リストコントローラ"}],"answer":["C"],"multi":false,"explanation":"- Visualforceページで、標準の画面（例えば取引先の詳細画面とか）をベースにしつつ、ちょっとだけボタンの裏にオリジナルのApexコード（Apexロジック）を差し込みたいときは、**「コントローラ拡張（Controller Extension）」** を使うよ！\n- 標準コントローラ（B）を引数に持つコンストラクタを作って、機能を追加（拡張）してあげるイメージ。これで標準機能とカスタムロジックをいいとこ取りできちゃう！"},{"n":14,"category":"ロジックと自動化","text":"Apexトリガにおいて、beforeイベント（before insertやbefore update）を使用する最適なユースケースはどれですか？","options":[{"key":"A","text":"関連する別オブジェクトのレコードを新規に作成する"},{"key":"B","text":"同じオブジェクトの同じレコードのフィールド値を変更・検証する"},{"key":"C","text":"外部システムへのアウトバウンドメッセージを送信する"},{"key":"D","text":"メールアラートを送信する"}],"answer":["B"],"multi":false,"explanation":"- トリガの before（実行前）は、**「自分自身のレコードの値を書き換える、または入力規則チェックをする」** ときに使うのがベストプラクティス！\n- なんでかっていうと、before の段階なら DML操作（update とか）を明示的に書かなくても、Trigger.new の値を書き換えるだけで自動的に保存されるから超効率的なの。\n- 逆に、他のオブジェクトのレコードを作ったり（A）、メールを送ったり（D）するのは、自分自身の保存が確定した後の after（実行後）でやるべきだよ！"},{"n":15,"category":"テストとデバッグ","text":"Salesforceで本番環境にApexコードをデプロイするために、組織全体で最低限必要なコードカバー率は何％ですか？","options":[{"key":"A","text":"50%"},{"key":"B","text":"75%"},{"key":"C","text":"80%"},{"key":"D","text":"90%"}],"answer":["B"],"multi":false,"explanation":"- 本番組織にApexコードをデプロイ（リリース）するときは、組織全体のテストカバー率が最低でも **75%** 以上じゃないとSalesforce様から「ダメです♀」って弾かれちゃうの。\n- しかも、トリガは少なくとも1行はテストを通す必要があるよ。合格ラインは75％だけど、実務では100%を目指してアゲアゲでテスト書こうね！"},{"n":16,"category":"開発の基礎","text":"SOSL（Salesforce Object Search Language）の検索結果の戻り値のデータ型として正しいものはどれですか？","options":[{"key":"A","text":"Map\u003cId, SObject\u003e"},{"key":"B","text":"List\u003cSObject\u003e"},{"key":"C","text":"List\u003cList\u003cSObject\u003e\u003e"},{"key":"D","text":"Set\u003cSObject\u003e"}],"answer":["C"],"multi":false,"explanation":"- SOSL（ソースル）は、複数のオブジェクトをまたいでテキスト検索（グローバル検索みたいなやつ）ができる言語！\n- 色んなオブジェクトから結果が返ってくるから、戻り値の型は「リストのリスト」である **List\u003cList\u003cSObject\u003e\u003e** になるの！\n- 例えば、1つ目のリストにはAccountの検索結果、2つ目のリストにはContactの検索結果…みたいな感じで返ってくるよ。この二重リストの構造はテストに出やすいから暗記必須！"},{"n":17,"category":"ロジックと自動化","text":"Apexクラスで、特定のメソッドを非同期で実行し、戻り値を返さずに最大で50件のコールアウトを許可したい場合に使用するアノテーションはどれですか？","options":[{"key":"A","text":"@InvocableMethod"},{"key":"B","text":"@ReadOnly"},{"key":"C","text":"@future"},{"key":"D","text":"@RemoteAction"}],"answer":["C"],"multi":false,"explanation":"- Apexで非同期処理を行い、外部へのWebサービスコールアウト（API連携）を最大50件まで許可したいなら、**@future(callout=true)** アノテーションを使うよ！\n- @future メソッドは戻り値が必ず void（何も返さない）っていうルールがあるのも特徴。同期処理だとコールアウトは10回までだけど、非同期（future）なら50回までいけるからマジ強力！"},{"n":18,"category":"開発の基礎","text":"異なるデータ型のコレクションにおいて、キーと値のペアでデータを保持し、キーの重複を許さないコレクション型はどれですか？","options":[{"key":"A","text":"List"},{"key":"B","text":"Set"},{"key":"C","text":"Map"},{"key":"D","text":"Array"}],"answer":["C"],"multi":false,"explanation":"- キー（Key）と値（Value）のペアでデータを管理するのが **Map（マップ）**！\n- 例えば、郵便番号（キー）と住所（値）みたいな関係だね。キーは絶対に重複しちゃダメ（ユニーク）っていう性質があるから、一瞬で特定のデータを検索したいときにマジで重宝するよ！"},{"n":19,"category":"ロジックと自動化","text":"Apexトリガのコンテキスト変数 Trigger.new に含まれるレコードリストについて、after update トリガ内でフィールド値を直接変更しようとした場合の挙動はどうなりますか？","options":[{"key":"A","text":"レコードは正常に更新され、データベースに保存される。"},{"key":"B","text":"無限ループが発生する。"},{"key":"C","text":"「System.FinalException: Record is read-only」などの読み取り専用エラーが発生する。"},{"key":"D","text":"トリガが無視され、エラーなく処理が終了する。"}],"answer":["C"],"multi":false,"explanation":"- after update（更新後）っていうのは、データベースへの書き込みが一回終わった状態なの。\n- だから、その段階で Trigger.new の中身を勝手に書き換えようとすると、Salesforceに「もう書き込み終わったから読み取り専用（Read-Only）だし！」ってキレられて **System.FinalException** が発生しちゃう。\n- 値を書き換えたいなら、保存前の before イベントでやるのが基本だよ！"},{"n":20,"category":"ユーザーインターフェース","text":"Lightning Web Component (LWC) で、HTMLテンプレート内で条件分岐（要素の表示/非表示）を行うために使用するディレクティブはどれですか？","options":[{"key":"A","text":"if:true および if:false （または lwc:if および lwc:else）"},{"key":"B","text":"v-if および v-else"},{"key":"C","text":"ng-if"},{"key":"D","text":"show-if"}],"answer":["A"],"multi":false,"explanation":"- LWCのHTML側で「この条件が true のときだけボタンを表示したい！」みたいなときは、**if:true** や **if:false**（最新のLWC規格なら lwc:if や lwc:else）っていう属性（ディレクティブ）を使うよ！\n
