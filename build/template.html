<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salesforce Platform デベロッパー 学習ノート</title>
<style>/*__CSS__*/</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></symbol>
    <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.5" y1="4.5" x2="6.6" y2="6.6"/><line x1="17.4" y1="17.4" x2="19.5" y2="19.5"/><line x1="4.5" y1="19.5" x2="6.6" y2="17.4"/><line x1="17.4" y1="6.6" x2="19.5" y2="4.5"/></symbol>
    <symbol id="i-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></symbol>
    <symbol id="i-menu" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
    <symbol id="i-arrow-left" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></symbol>
    <symbol id="i-arrow-right" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></symbol>
    <symbol id="i-book" viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><line x1="4" y1="19" x2="4" y2="5"/></symbol>
    <symbol id="i-cloud" viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 0 0 .5-8.97A6 6 0 0 0 6.2 9.2 4 4 0 0 0 7 17h10.5z"/></symbol>
    <symbol id="i-bulb" viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 2 2 21h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><line x1="12" y1="17.5" x2="12" y2="17.5"/></symbol>
    <symbol id="i-list" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.5" y2="6"/><line x1="3" y1="12" x2="3.5" y2="12"/><line x1="3" y1="18" x2="3.5" y2="18"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="8" x2="12" y2="8"/></symbol>
    <symbol id="i-flag" viewBox="0 0 24 24"><path d="M4 21V4h13l-2 4 2 4H4"/></symbol>
  </defs>
</svg>

<header class="topbar">
  <button class="icon-btn menu-toggle" id="menuToggle" aria-label="メニュー"><svg class="ico"><use href="#i-menu"/></svg></button>
  <a class="brand" href="#home" id="brandHome">
    <span class="brand-mark"><svg class="ico"><use href="#i-cloud"/></svg></span>
    <span class="brand-text"><b>Platform デベロッパー</b><small>学習ノート</small></span>
  </a>
  <div class="search-wrap">
    <svg class="ico search-ico"><use href="#i-search"/></svg>
    <input type="search" id="searchInput" placeholder="教材を検索 ( / )" autocomplete="off" spellcheck="false">
    <span class="search-count" id="searchCount"></span>
  </div>
  <div class="topbar-progress" title="全体の学習進捗">
    <div class="mini-bar"><span id="globalBar"></span></div>
    <span class="mini-pct" id="globalPct">0%</span>
  </div>
  <button class="icon-btn" id="themeToggle" aria-label="テーマ切替">
    <svg class="ico ico-sun"><use href="#i-sun"/></svg>
    <svg class="ico ico-moon"><use href="#i-moon"/></svg>
  </button>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="nav" id="nav" aria-label="教材ナビゲーション"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>
  <main class="content" id="content">
    <div id="searchResults" class="search-results" hidden></div>
    <article id="article" class="article"></article>
  </main>
  <aside class="toc" id="toc" aria-label="このユニットの目次"></aside>
</div>

<script>/*__VENDOR__*/</script>
<script>/*__DATA__*/</script>
<script>/*__APP__*/</script>
</body>
</html>
